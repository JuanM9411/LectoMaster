  // ─── LITERAL (zone 0) ───
  {id:'6L01',zone:0,title:'La leyenda del Dorado',icon:'🏺',type:'L',theme:'soc',xp:25,text:'Los muiscas realizaban una ceremonia sagrada en la laguna de Guatavita. El nuevo cacique era cubierto con polvo de oro y navegaba en balsa hasta el centro. Arrojaba ofrendas de oro y esmeraldas al agua. Los conquistadores españoles convirtieron estas historias en la leyenda de "El Dorado", una ciudad de oro que buscaron sin encontrar. El Dorado no era un lugar, sino una persona: el cacique dorado.',source:'Historia precolombina',qs:[{q:'¿Dónde era la ceremonia?',t:'L',o:['Cartagena','Amazonas','Laguna de Guatavita','Río Magdalena'],c:2},{q:'¿Qué arrojaba al agua?',t:'L',o:['Piedras','Flores','Oro y esmeraldas','Comida'],c:2},{q:'¿Quiénes crearon la leyenda?',t:'L',o:['Los muiscas','Los incas','Los conquistadores','Los portugueses'],c:2}]},
  {id:'6L02',zone:0,title:'El sistema solar',icon:'🪐',type:'L',theme:'nat',xp:25,text:'El sistema solar tiene 8 planetas que orbitan alrededor del Sol. Los cuatro más cercanos (Mercurio, Venus, Tierra, Marte) son rocosos. Los cuatro lejanos (Júpiter, Saturno, Urano, Neptuno) son gaseosos. Júpiter es el más grande: cabrían 1.300 Tierras dentro. Plutón fue reclasificado como "planeta enano" en 2006. La Tierra es el único planeta conocido con vida.',source:'Ciencias Naturales — Astronomía',qs:[{q:'¿Cuántos planetas tiene el sistema solar?',t:'L',o:['10','9','7','8'],c:3},{q:'¿Cuál es el planeta más grande?',t:'L',o:['Júpiter','Marte','Neptuno','Saturno'],c:0},{q:'¿Cuándo reclasificaron a Plutón?',t:'L',o:['2010','2006','2000','1999'],c:1}]},
  {id:'6L03',zone:0,title:'Frida Kahlo',icon:'🎨',type:'L',theme:'art',xp:25,text:'Magdalena Carmen Frida Kahlo nació en México en 1907. A los 18 años sufrió un grave accidente de autobús que la dejó con dolor crónico toda la vida. Durante su recuperación empezó a pintar autorretratos. Frida pintó 143 obras, de las cuales 55 son autorretratos. Se casó con el muralista Diego Rivera. Su obra refleja dolor físico, identidad mexicana y feminismo. Hoy es un ícono cultural mundial.',source:'Arte y biografía',qs:[{q:'¿Dónde nació Frida?',t:'L',o:['España','Argentina','Colombia','México'],c:3},{q:'¿Cuántos autorretratos pintó?',t:'L',o:['143','200','55','100'],c:2},{q:'¿Qué evento cambió su vida?',t:'L',o:['Un accidente de autobús','Una guerra','Un incendio','Una enfermedad'],c:0}]},
  {id:'6L04',zone:0,title:'El agua en Colombia',icon:'💧',type:'L',theme:'nat',xp:25,text:'Colombia posee 6 vertientes hidrográficas. El río Magdalena, con 1.528 km, es el más importante. Según el IDEAM, el 40% del agua está contaminada. Paradójicamente, muchas comunidades rurales no tienen agua potable a pesar de estar rodeadas de ríos.',source:'Geografía — IDEAM',qs:[{q:'¿Cuántas vertientes tiene Colombia?',t:'L',o:['8','5','4','6'],c:3},{q:'¿Cuántos km tiene el Magdalena?',t:'L',o:['800','1.000','1.528','2.000'],c:2},{q:'¿Qué % del agua está contaminada?',t:'L',o:['50%','30%','20%','40%'],c:3}]},
  {id:'6L05',zone:0,title:'Los videojuegos: historia',icon:'🎮',type:'L',theme:'tec',xp:25,text:'El primer videojuego fue "Pong" (1972), un tenis de mesa digital. En 1985, Nintendo lanzó "Super Mario Bros" que vendió 40 millones de copias. En 1996, "Pokémon" revolucionó los juegos portátiles. Hoy, la industria de videojuegos genera más dinero que el cine y la música juntos: 180.000 millones de dólares anuales. Más de 3.000 millones de personas juegan videojuegos en el mundo.',source:'Tecnología e industria cultural',qs:[{q:'¿Cuál fue el primer videojuego?',t:'L',o:['Mario','Tetris','Pokémon','Pong'],c:3},{q:'¿Cuántas copias vendió Mario Bros?',t:'L',o:['5 millones','100 millones','40 millones','10 millones'],c:2},{q:'¿Cuántas personas juegan videojuegos?',t:'L',o:['500 millones','3.000 millones','2.000 millones','1.000 millones'],c:1}]},
  {id:'6L06',zone:0,title:'La fotosíntesis',icon:'🌱',type:'L',theme:'nat',xp:25,text:'Las plantas producen su propio alimento mediante la fotosíntesis. Necesitan tres ingredientes: luz solar, agua y dióxido de carbono (CO₂). Las hojas capturan la luz con una sustancia verde llamada clorofila. Como resultado, la planta produce glucosa (azúcar) para alimentarse y libera oxígeno al aire. Sin fotosíntesis, no habría oxígeno para respirar ni alimentos en la cadena alimenticia.',source:'Ciencias Naturales — Biología',qs:[{q:'¿Qué sustancia da color verde a las hojas?',t:'L',o:['Glucosa','Oxígeno','Clorofila','Agua'],c:2},{q:'¿Qué libera la planta al aire?',t:'L',o:['CO₂','Agua','Glucosa','Oxígeno'],c:3},{q:'¿Cuántos ingredientes necesita la fotosíntesis?',t:'L',o:['3','5','4','2'],c:0}]},
  {id:'6L07',zone:0,title:'Shakira: biografía',icon:'🎤',type:'L',theme:'gen',xp:25,text:'Shakira Isabel Mebarak nació en Barranquilla, Colombia, el 2 de febrero de 1977. Escribió su primera canción a los 8 años. Su álbum "Pies Descalzos" (1995) la hizo famosa en Latinoamérica. En 2010, su canción "Waka Waka" fue el himno del Mundial de Fútbol en Sudáfrica. Ha vendido más de 80 millones de discos y es la artista colombiana más exitosa de la historia.',source:'Cultura general — Biografía',qs:[{q:'¿Dónde nació Shakira?',t:'L',o:['Cali','Barranquilla','Bogotá','Medellín'],c:1},{q:'¿A qué edad escribió su primera canción?',t:'L',o:['12 años','5 años','8 años','15 años'],c:2},{q:'¿Cuántos discos ha vendido?',t:'L',o:['80 millones','100 millones','50 millones','30 millones'],c:0}]},
  {id:'6L08',zone:0,title:'Los dinosaurios',icon:'🦕',type:'L',theme:'nat',xp:25,text:'Los dinosaurios vivieron durante 165 millones de años, desde el período Triásico hasta el Cretácico. El más grande conocido es el Argentinosaurio, que medía 40 metros. El más feroz fue el Tiranosaurio Rex, con dientes de 30 cm. Se extinguieron hace 66 millones de años cuando un asteroide de 10 km de diámetro impactó en lo que hoy es Yucatán, México. Las aves actuales son descendientes directos de los dinosaurios.',source:'Paleontología',qs:[{q:'¿Cuántos millones de años vivieron los dinosaurios?',t:'L',o:['50','100','165','200'],c:2},{q:'¿Qué los extinguió?',t:'L',o:['Un volcán','Una inundación','El frío','Un asteroide'],c:3},{q:'¿De qué animales actuales descienden?',t:'L',o:['Reptiles','Mamíferos','Peces','Aves'],c:3}]},
  {id:'6L09',zone:0,title:'La Constitución de 1991',icon:'📜',type:'L',theme:'soc',xp:25,text:'La Constitución Política de Colombia fue promulgada el 4 de julio de 1991. Reemplazó a la de 1886. Fue escrita por una Asamblea Nacional Constituyente con 70 miembros, incluyendo representantes indígenas, exguerrilleros y líderes sociales. Estableció que Colombia es un Estado social de derecho. Creó la tutela como mecanismo para proteger derechos fundamentales. También reconoció la diversidad étnica y cultural del país.',source:'Cívica — Constitución colombiana',qs:[{q:'¿En qué año se promulgó?',t:'L',o:['2000','1886','1991','1975'],c:2},{q:'¿Cuántos miembros tuvo la Asamblea?',t:'L',o:['30','50','70','100'],c:2},{q:'¿Qué mecanismo creó para proteger derechos?',t:'L',o:['El plebiscito','La tutela','El decreto','El voto'],c:1}]},
  {id:'6L10',zone:0,title:'Internet: ¿cómo funciona?',icon:'🌐',type:'L',theme:'tec',xp:25,text:'Internet nació en 1969 como ARPANET, una red militar estadounidense. Tim Berners-Lee inventó la World Wide Web en 1989. Hoy, más de 5.000 millones de personas usan internet. La información viaja por cables submarinos que cruzan los océanos: hay más de 500 cables que suman 1.3 millones de kilómetros. Un mensaje de WhatsApp viaja por estos cables a la velocidad de la luz antes de llegar al celular del receptor.',source:'Tecnología',qs:[{q:'¿En qué año nació internet?',t:'L',o:['1999','1989','1969','1975'],c:2},{q:'¿Quién inventó la World Wide Web?',t:'L',o:['Steve Jobs','Bill Gates','Mark Zuckerberg','Tim Berners-Lee'],c:3},{q:'¿Cuántas personas usan internet?',t:'L',o:['3.000 millones','5.000 millones','1.000 millones','8.000 millones'],c:1}]},

  // ─── INFERENCIAL (zone 1) ───
  {id:'6I01',zone:1,title:'El Principito y la rosa',icon:'🌹',type:'I',theme:'lit',xp:40,text:'"Fue el tiempo que perdiste con tu rosa lo que la hace importante", dijo el zorro. El Principito viajó por planetas con adultos extraños: un rey sin súbditos, un vanidoso sin público. En la Tierra descubrió miles de rosas iguales a la suya. Se sintió engañado. Pero el zorro enseñó que su rosa era única por el vínculo que habían creado.',source:'Saint-Exupéry — El Principito',qs:[{q:'¿Por qué se sintió engañado?',t:'I',o:['Creyó que la suya no era única','Las rosas eran feas','No le gustaban','Eran falsas'],c:0},{q:'¿Qué hace especial a la rosa según el zorro?',t:'I',o:['Su color','Ser la más bonita','Su tamaño','El tiempo y cuidado invertido'],c:3},{q:'Los adultos de los planetas representan...',t:'I',o:['Profesores','Amigos','Vicios humanos','Personas normales'],c:2}]},
  {id:'6I02',zone:1,title:'Deforestación del Amazonas',icon:'🌳',type:'I',theme:'nat',xp:40,text:'La Amazonía colombiana ha perdido más de 2 millones de hectáreas de bosque en 20 años. Las causas: ganadería, cultivos ilícitos y minería. Cuando se tala un árbol, se destruye el hogar de cientos de especies, se libera carbono y se debilita el ciclo del agua. Los pueblos indígenas que protegen la selva durante milenios ven cómo sus territorios se reducen.',source:'Medioambiente',qs:[{q:'¿Qué consecuencia va más allá de perder madera?',t:'I',o:['Se pierden empleos','Se destruyen ecosistemas y se altera el clima','Sube el precio','Llueve más'],c:1},{q:'¿Por qué se mencionan los pueblos indígenas?',t:'I',o:['Venden madera','Protegen la selva y pierden territorios','Causan deforestación','No les importa'],c:1},{q:'¿Qué relación hay entre árboles y lluvias?',t:'I',o:['Causan sequías','Ninguna','Los árboles participan en el ciclo del agua','Las lluvias destruyen árboles'],c:2}]},
  {id:'6I03',zone:1,title:'El mito de la caverna',icon:'🕯️',type:'I',theme:'lit',xp:40,text:'Platón imaginó personas encadenadas en una caverna desde niños, mirando solo sombras en la pared. Creían que esas sombras eran la realidad. Si alguien se liberaba y salía al sol, al principio el brillo lo cegaría. Pero al acostumbrarse, vería el mundo real. Si volviera a la caverna a contarles, los demás lo tomarían por loco.',source:'Filosofía — Platón',qs:[{q:'¿Qué representan las sombras?',t:'I',o:['Fantasmas','Animales','Dibujos','Lo que creemos que es real pero no lo es'],c:3},{q:'¿Por qué los encadenados no creerían al libre?',t:'I',o:['Porque están sordos','Porque es mentiroso','Porque no habla bien','Porque no conocen otra realidad'],c:3},{q:'¿Qué representa salir de la caverna?',t:'I',o:['Hacer ejercicio','Acceder al conocimiento verdadero','Dormir','Viajar'],c:1}]},
  {id:'6I04',zone:1,title:'¿Por qué bostezamos?',icon:'🥱',type:'I',theme:'nat',xp:40,text:'Los científicos aún no saben con certeza por qué bostezamos. La teoría más aceptada dice que el bostezo enfría el cerebro: al abrir la boca, el aire fresco baja la temperatura cerebral. Curiosamente, el bostezo es contagioso: ver a alguien bostezar activa las "neuronas espejo", las mismas que nos hacen sentir empatía. Los bebés bostezan desde el útero. Incluso los perros bostezan cuando ven a sus dueños hacerlo.',source:'Neurociencia',qs:[{q:'¿Qué función tendría el bostezo según la teoría?',t:'I',o:['Enfriar el cerebro','Abrir la boca','Respirar mejor','Dar sueño'],c:0},{q:'¿Por qué el bostezo es contagioso?',t:'I',o:['Por aburrimiento','Por el aire','Por una bacteria','Por las neuronas espejo (empatía)'],c:3},{q:'¿Qué nos dicen las neuronas espejo sobre los humanos?',t:'I',o:['Que somos lentos','Que estamos conectados emocionalmente','Que somos iguales','Que dormimos mucho'],c:1}]},
  {id:'6I05',zone:1,title:'La música y las emociones',icon:'🎵',type:'I',theme:'art',xp:40,text:'Cuando escuchamos música que nos gusta, el cerebro libera dopamina, la misma sustancia que se libera al comer chocolate o recibir un abrazo. Una canción triste puede hacernos llorar aunque nuestra vida esté bien. La música activa simultáneamente más partes del cerebro que cualquier otra actividad humana. Por eso se usa en terapias con pacientes de Alzheimer: aunque olviden sus nombres, recuerdan canciones de su juventud.',source:'Neurociencia y arte',qs:[{q:'¿Por qué la música nos hace sentir bien?',t:'I',o:['Por las letras','Por el ritmo','Por el volumen','Porque libera dopamina en el cerebro'],c:3},{q:'¿Qué revela el uso de música con Alzheimer?',t:'I',o:['Que la memoria musical es más resistente que otros tipos','Que la música es medicina','Que el Alzheimer es leve','Que la música cura todo'],c:0},{q:'¿Por qué una canción triste nos hace llorar?',t:'I',o:['Por las letras solamente','Porque somos débiles','Porque estamos tristes','Porque la música activa emociones profundas en el cerebro'],c:3}]},
  {id:'6I06',zone:1,title:'El efecto mariposa',icon:'🦋',type:'I',theme:'nat',xp:40,text:'En 1961, el meteorólogo Edward Lorenz descubrió algo sorprendente: cambiar un número mínimo en un modelo climático generaba resultados completamente diferentes. Lo llamó "efecto mariposa": teóricamente, el aleteo de una mariposa en Brasil podría causar un tornado en Texas semanas después. Esto no significa que las mariposas causen tornados, sino que los sistemas complejos son extremadamente sensibles a pequeños cambios iniciales.',source:'Ciencia — Teoría del caos',qs:[{q:'¿Qué descubrió Lorenz?',t:'I',o:['Que los tornados son frecuentes','Que pequeños cambios generan grandes consecuencias','Que las mariposas vuelan lejos','Que el clima es fácil de predecir'],c:1},{q:'¿Qué significa realmente "efecto mariposa"?',t:'I',o:['Que Brasil tiene muchas mariposas','Que los tornados son impredecibles','Que las mariposas son peligrosas','Que en sistemas complejos, pequeñas causas tienen grandes efectos'],c:3},{q:'¿Cómo aplica esto a la vida diaria?',t:'I',o:['Solo aplica al clima','No aplica','Pequeñas decisiones pueden tener consecuencias grandes e impredecibles','Solo a las mariposas'],c:2}]},
  {id:'6I07',zone:1,title:'Los colores y el marketing',icon:'🎨',type:'I',theme:'tec',xp:40,text:'Las empresas eligen sus colores cuidadosamente. El rojo (Coca-Cola, YouTube) genera urgencia y hambre. El azul (Facebook, Samsung) transmite confianza. El amarillo (McDonald\'s) evoca felicidad. El verde (Starbucks) sugiere naturaleza. Los supermercados pintan las ofertas en rojo porque el cerebro lo asocia con "actúa rápido". Un estudio reveló que el 85% de los consumidores dice que el color es la razón principal para elegir un producto.',source:'Marketing y psicología',qs:[{q:'¿Por qué las ofertas suelen ser en rojo?',t:'I',o:['Es más barato','Es bonito','Tradición','Porque el cerebro lo asocia con urgencia'],c:3},{q:'¿Qué revela el dato del 85%?',t:'I',o:['Que los colores no importan','Que el 15% es ciego','Que somos más influenciados por lo visual de lo que creemos','Que la gente no lee'],c:2},{q:'¿Por qué las empresas de tecnología usan azul?',t:'I',o:['Por casualidad','Porque es barato','Porque transmite confianza y seriedad','Es su color favorito'],c:2}]},
  {id:'6I08',zone:1,title:'El Hombre Araña: ¿héroe o vigilante?',icon:'🕷️',type:'I',theme:'lit',xp:40,text:'"Un gran poder conlleva una gran responsabilidad." Peter Parker es un adolescente común que obtiene poderes extraordinarios. Decide usarlos para proteger a otros después de que su inacción causó la muerte de su tío Ben. Pero Spider-Man opera fuera de la ley: no tiene autorización oficial, destruye propiedad y decide por sí solo quién es el villano. ¿Es un héroe porque salva vidas, o un problema porque actúa sin control?',source:'Narrativa — Ética en ficción',qs:[{q:'¿Por qué Peter Parker decide ser héroe?',t:'I',o:['Por dinero','Porque su inacción tuvo consecuencias fatales','Por diversión','Por fama'],c:1},{q:'¿Cuál es el dilema ético que plantea el texto?',t:'I',o:['Si los poderes son reales','Si actuar fuera de la ley está bien cuando el fin es bueno','Si las arañas son peligrosas','Si los villanos existen'],c:1},{q:'¿Qué significa "un gran poder conlleva una gran responsabilidad"?',t:'I',o:['Que el poder corrompe','Que los poderosos son responsables','Que cuanta más capacidad tienes, mayor es tu deber de usarla bien','Que los héroes son fuertes'],c:2}]},
  {id:'6I09',zone:1,title:'¿Los animales sienten?',icon:'🐾',type:'I',theme:'nat',xp:40,text:'En 2012, un grupo de neurocientíficos firmó la "Declaración de Cambridge sobre la Conciencia", afirmando que muchos animales tienen experiencias conscientes. Los elefantes lloran a sus muertos, los cuervos fabrican herramientas, los pulpos resuelven laberintos. Si los animales sienten dolor, alegría y miedo como nosotros, ¿es ético encerrarlos en zoológicos "para educar", o cazarlos "por tradición"?',source:'Ética y ciencias naturales',qs:[{q:'¿Qué afirmó la Declaración de Cambridge?',t:'I',o:['Que solo los humanos piensan','Que los animales no sienten','Que muchos animales tienen experiencias conscientes','Que los zoológicos son buenos'],c:2},{q:'¿Qué implica que los elefantes lloren a sus muertos?',t:'I',o:['Que son débiles','Nada','Que están enfermos','Que tienen emociones complejas similares al duelo humano'],c:3},{q:'¿Cuál es la pregunta ética central?',t:'I',o:['Si los animales son bonitos','Si tenemos derecho a tratar como objetos a seres que sienten','Si los zoológicos son divertidos','Si los cuervos son inteligentes'],c:1}]},
  {id:'6I10',zone:1,title:'Las fake news',icon:'📰',type:'I',theme:'tec',xp:40,text:'Un estudio del MIT reveló que las noticias falsas se propagan 6 veces más rápido que las verdaderas en redes sociales. ¿Por qué? Porque las fake news apelan a emociones fuertes: miedo, indignación, sorpresa. Nuestro cerebro reacciona primero emocionalmente y después racionalmente. Cuando algo nos enfurece, lo compartimos antes de verificar si es cierto. Los algoritmos de redes sociales amplifican lo que genera más reacciones, sin importar si es verdad.',source:'Medios y pensamiento crítico',qs:[{q:'¿Por qué las noticias falsas se propagan más rápido?',t:'I',o:['Porque activan emociones fuertes antes que la razón','Porque son más cortas','Porque son gratuitas','Porque internet es rápido'],c:0},{q:'¿Qué papel juegan los algoritmos?',t:'I',o:['No hacen nada','Amplifican lo que genera más reacciones, sin importar si es verdad','Bloquean las fake news','Verifican la verdad'],c:1},{q:'¿Cuál sería la mejor defensa contra las fake news?',t:'I',o:['Detenerse a verificar antes de reaccionar emocionalmente','Creer todo','Solo leer títulos','No usar internet'],c:0}]},

  // ─── CRÍTICO (zone 2) ───
  {id:'6C01',zone:2,title:'¿Quién escribe la historia?',icon:'📜',type:'C',theme:'soc',xp:60,text:'Durante siglos, la historia de América se contó desde la perspectiva europea. Colón fue presentado como "descubridor" heroico. Pero, ¿se puede "descubrir" un continente donde vivían millones de personas con culturas propias? Los pueblos originarios tenían astronomía, medicina y gobierno. Quizás no fueron "descubiertos", sino invadidos.',source:'Pensamiento crítico histórico',qs:[{q:'¿Por qué el autor cuestiona "descubrimiento"?',t:'C',o:['Ya existían civilizaciones completas','Los vikingos llegaron antes','Es palabra difícil','Colón no llegó primero'],c:0},{q:'¿Cuál es el argumento principal?',t:'C',o:['La historia se ha contado desde un solo punto de vista','Colón fue héroe','Los indígenas no tenían cultura','Europa era mejor'],c:0},{q:'Si defiendes esta postura, ¿qué dirías?',t:'C',o:['Solo importa la versión de los ganadores','La historia debe contarse desde todas las perspectivas','No vale estudiar historia','El pasado no importa'],c:1}]},
  {id:'6C02',zone:2,title:'Redes sociales: ¿conexión o aislamiento?',icon:'📱',type:'C',theme:'tec',xp:60,text:'78% de adolescentes colombianos pasa más de 4 horas en redes, pero 62% se siente solo frecuentemente. Las plataformas generan adicción: likes como validación, algoritmos de emociones fuertes. Compararse con vidas "perfectas" causa ansiedad. Sin embargo, otros argumentan que las redes conectan personas lejanas y crean comunidades de apoyo.',source:'Medios y sociedad',qs:[{q:'¿Cuál es la contradicción principal?',t:'C',o:['Son divertidas','Las redes son gratis','Los adultos no usan redes','Estar más conectados digitalmente puede generar más soledad real'],c:3},{q:'¿Qué postura presenta el texto?',t:'C',o:['Deberían prohibirse','Presenta ambos lados del debate','Las redes son totalmente malas','Son perfectas'],c:1},{q:'¿Cuál sería TU argumento?',t:'C',o:['Las redes son malas siempre','No me importa','Depende del uso consciente de cada persona','Solo adultos deberían usarlas'],c:2}]},
  {id:'6C03',zone:2,title:'Uniforme escolar: ¿sí o no?',icon:'👔',type:'C',theme:'gen',xp:60,text:'Los defensores del uniforme argumentan: reduce la desigualdad visible (nadie se compara por ropa), crea sentido de pertenencia y elimina la distracción de "qué ponerme". Los opositores dicen: limita la expresión personal, no elimina realmente la desigualdad (zapatos, mochilas siguen siendo diferentes) y enseña obediencia en lugar de identidad. En Finlandia, el país con mejor educación del mundo, no hay uniformes.',source:'Debate educativo',qs:[{q:'¿Cuál es el argumento más fuerte A FAVOR del uniforme?',t:'C',o:['Es barato','Reduce la desigualdad visible entre estudiantes','Es bonito','Los profesores lo prefieren'],c:1},{q:'¿Cuál es el argumento más fuerte EN CONTRA?',t:'C',o:['Nadie lo quiere','No elimina la desigualdad real y limita la expresión','Es feo','Es caro'],c:1},{q:'¿El ejemplo de Finlandia prueba que el uniforme es malo?',t:'C',o:['Sí, totalmente','Sí, hay que copiar a Finlandia','No importa','No necesariamente: la calidad educativa depende de muchos factores'],c:3}]},
  {id:'6C04',zone:2,title:'¿Los zoológicos son éticos?',icon:'🦁',type:'C',theme:'nat',xp:60,text:'Los zoológicos argumentan que educan al público, protegen especies en peligro y financian investigación. Los críticos responden: los animales sufren estrés en cautiverio, los recintos nunca replican su hábitat natural, y la "educación" se puede lograr con documentales. Un oso polar en un zoológico tropical recorre obsesivamente el mismo camino (estereotipia), señal de sufrimiento psicológico. Pero sin zoológicos, el rinoceronte blanco del norte ya estaría extinto.',source:'Ética ambiental',qs:[{q:'¿Cuál es el dilema central?',t:'C',o:['Si los zoológicos son divertidos','Si los animales son bonitos','Si es ético privar de libertad a animales para protegerlos y educar','Si los zoológicos son caros'],c:2},{q:'¿Qué es la "estereotipia" y qué indica?',t:'C',o:['Un nombre científico','Un comportamiento repetitivo que indica sufrimiento psicológico','Un tipo de animal','Una enfermedad'],c:1},{q:'¿Cuál sería una postura equilibrada?',t:'C',o:['Abrir más zoológicos','Cerrar todos los zoológicos','Transformarlos en santuarios con condiciones dignas, enfocados en conservación','No importa'],c:2}]},
  {id:'6C05',zone:2,title:'Trabajo infantil',icon:'👷',type:'C',theme:'soc',xp:60,text:'En Colombia, más de 1 millón de niños trabajan. Muchos lo hacen para ayudar a sus familias a sobrevivir. La ley prohíbe el trabajo infantil, pero la pobreza obliga a muchas familias a depender de esos ingresos. Algunos argumentan que el trabajo "forma carácter". Pero los datos muestran que los niños que trabajan tienen 40% más probabilidades de abandonar la escuela, perpetuando el ciclo de pobreza.',source:'Sociología — Derechos de la infancia',qs:[{q:'¿Por qué prohibir el trabajo infantil no es suficiente?',t:'C',o:['Porque la pobreza obliga a las familias a depender de esos ingresos','Porque los niños son fuertes','Porque a los niños les gusta','Porque la ley no funciona'],c:0},{q:'¿Qué demuestra el dato del 40%?',t:'C',o:['Que los niños no quieren estudiar','Que la escuela es aburrida','Que trabajar es bueno','Que el trabajo infantil perpetúa la pobreza al quitar educación'],c:3},{q:'¿Cuál sería la solución más efectiva?',t:'C',o:['Castigar a las familias','Atacar la pobreza para que las familias no necesiten que los niños trabajen','Permitir el trabajo','Ignorar el problema'],c:1}]},
  {id:'6C06',zone:2,title:'¿Es justo el fútbol femenino?',icon:'⚽',type:'C',theme:'gen',xp:60,text:'En 2023, un futbolista hombre del top mundial gana aproximadamente 100 veces más que una futbolista mujer del mismo nivel. Los estadios para partidos masculinos se llenan; los femeninos apenas al 30%. Los que defienden la diferencia argumentan que "el fútbol masculino genera más dinero". Los críticos responden: genera más dinero porque históricamente recibió TODA la inversión, publicidad y atención. Si se hubiera invertido igual en el femenino, ¿los resultados serían diferentes?',source:'Igualdad de género — Deporte',qs:[{q:'¿Cuál es el argumento de quienes defienden la brecha salarial?',t:'C',o:['Que el fútbol masculino genera más dinero','Que los hombres son mejores','Que las mujeres no juegan bien','Que es tradición'],c:0},{q:'¿Cómo responden los críticos?',t:'C',o:['Que no importa el dinero','Que el fútbol no es importante','Que la diferencia de ingresos es resultado de décadas de inversión desigual','No responden'],c:2},{q:'¿Cuál es tu postura argumentada?',t:'C',o:['La igualdad requiere invertir equitativamente para comparar resultados reales','Los hombres merecen más','No tengo opinión','El fútbol no importa'],c:0}]},
  {id:'6C07',zone:2,title:'Comida chatarra en colegios',icon:'🍔',type:'C',theme:'nat',xp:60,text:'El 30% de los niños colombianos tiene sobrepeso. Las tiendas escolares venden papas, gaseosas y dulces porque generan ganancias. Prohibirlas podría mejorar la salud pero limita la libertad de elección. Chile implementó la "Ley de Etiquetado" que pone sellos negros en alimentos no saludables y prohíbe su venta en colegios. La obesidad infantil bajó 25% en 5 años. Pero los vendedores perdieron ingresos.',source:'Salud pública vs. libertad',qs:[{q:'¿Por qué las tiendas venden comida chatarra?',t:'C',o:['Porque los niños la piden','Porque genera más ganancias que la comida saludable','Porque no hay otra opción','Porque es rica'],c:1},{q:'¿Qué demuestra el ejemplo de Chile?',t:'C',o:['Que las leyes no sirven','Que prohibir es malo','Que Chile es mejor','Que las regulaciones pueden mejorar la salud pública significativamente'],c:3},{q:'¿Cuál es el dilema ético?',t:'C',o:['Si la salud pública justifica limitar la libertad de elección','Si la comida es rica','Si los niños saben elegir','Si los vendedores son malos'],c:0}]},
  {id:'6C08',zone:2,title:'Inteligencia artificial: ¿amiga o enemiga?',icon:'🤖',type:'C',theme:'tec',xp:60,text:'La IA puede diagnosticar enfermedades mejor que algunos médicos, escribir textos y crear arte. Pero también puede reemplazar empleos: un estudio estima que el 40% de los trabajos actuales podrían ser automatizados en 20 años. Los optimistas dicen que la IA creará nuevos empleos. Los pesimistas advierten que esos nuevos empleos requerirán educación que no todos pueden pagar. ¿Quién se beneficia cuando la tecnología avanza pero la desigualdad permanece?',source:'Tecnología y sociedad',qs:[{q:'¿Cuál es el riesgo principal que señala el texto?',t:'C',o:['Que la IA no funciona','Que los robots son peligrosos','Que los beneficios de la IA pueden concentrarse en quienes ya tienen ventajas','Que la IA es cara'],c:2},{q:'¿Por qué el argumento de "creará nuevos empleos" es insuficiente?',t:'C',o:['Porque esos empleos requieren formación que no todos pueden costear','Porque nadie quiere trabajar','Porque es falso','Porque la IA es mala'],c:0},{q:'¿Cuál sería tu postura?',t:'C',o:['Ignorar el problema','Solo beneficia a los ricos','El avance tecnológico debe acompañarse de políticas que reduzcan la desigualdad','Prohibir la IA'],c:2}]},
  {id:'6C09',zone:2,title:'El reggaetón: ¿arte o problema?',icon:'🎶',type:'C',theme:'art',xp:60,text:'El reggaetón es el género musical más escuchado en Latinoamérica. Sus defensores dicen que es expresión cultural legítima de barrios populares, que da voz a comunidades marginadas y que ha llevado el español al mundo. Sus críticos señalan que muchas letras cosifican a la mujer, normalizan la violencia y promueven el consumismo. ¿Puede un género musical ser culturalmente valioso y éticamente problemático al mismo tiempo?',source:'Cultura y crítica social',qs:[{q:'¿Cuál es la tesis central del texto?',t:'C',o:['Que no importa la letra','Que algo puede tener valor cultural y problemas éticos simultáneamente','Que toda música es buena','Que el reggaetón es malo'],c:1},{q:'¿Es válido criticar un género musical? ¿Por qué?',t:'C',o:['Sí, porque la música influye en valores y comportamientos sociales','No, la música es libre','Sí, porque suena mal','No, es solo entretenimiento'],c:0},{q:'¿Cuál es la postura más madura?',t:'C',o:['Escuchar solo clásica','Disfrutarlo sin pensar','Disfrutar la música pero ser consciente y crítico de los mensajes que transmite','Prohibirlo'],c:2}]},
  {id:'6C10',zone:2,title:'¿Deberían los niños tener celular?',icon:'📱',type:'C',theme:'gen',xp:60,text:'En España se debate prohibir celulares a menores de 16 años. A favor: proteger de ciberacoso, adicción a pantallas, contenido inapropiado y pérdida de atención. En contra: el celular es herramienta educativa, permite comunicación familiar y prepara para el mundo digital. Los neurocientíficos advierten que el cerebro adolescente es especialmente vulnerable a la dopamina de las notificaciones. Pero también señalan que prohibir sin enseñar crea adultos sin criterio digital.',source:'Debate social — Tecnología y educación',qs:[{q:'¿Cuál es el riesgo neurológico específico?',t:'C',o:['Que olvidan estudiar','Que el celular pesa','Que el cerebro adolescente es vulnerable a la adicción por dopamina','Que se dañan los ojos'],c:2},{q:'¿Por qué "prohibir sin enseñar" es problemático?',t:'C',o:['Porque es imposible','Porque los niños se enojan','Porque no forma criterio para cuando sí tengan acceso','Porque es aburrido'],c:2},{q:'¿Cuál sería la solución más efectiva?',t:'C',o:['Educación digital progresiva con acompañamiento adulto','Dar celular sin límites','Prohibir totalmente','No hacer nada'],c:0}]},

  {id:'6G01',zone:0,title:'🧩 Ordena la historia',icon:'🧩',type:'G',theme:'lit',xp:35,game:'order',instruction:'Lee estos eventos de la leyenda del Dorado y ordénalos cronológicamente. Toca un elemento para subirlo.',items:['Los muiscas preparan una ceremonia sagrada en Guatavita','El nuevo cacique es cubierto con polvo de oro','Navega en balsa hasta el centro de la laguna','Arroja ofrendas de oro y esmeraldas al agua','Los conquistadores españoles escuchan las historias','Buscan una ciudad de oro sin encontrarla']},

  // LITERAL
  {id:'7L01',zone:0,title:'La Revolución Industrial',icon:'⚙️',type:'L',theme:'soc',xp:30,text:'Comenzó en Inglaterra a finales del siglo XVIII. La máquina de vapor (James Watt, 1769) transformó la producción. Miles de campesinos migraron a ciudades. Jornadas de 14-16 horas, incluidos niños desde los 5 años. Condiciones insalubres. Creó riqueza para dueños, miseria para trabajadores.',source:'Historia Universal',qs:[{q:'¿Dónde comenzó?',t:'L',o:['España','Inglaterra','Alemania','Francia'],c:1},{q:'¿Cuántas horas trabajaban?',t:'L',o:['10','6','8','14 a 16'],c:3},{q:'¿Desde qué edad trabajaban niños?',t:'L',o:['10','8','5','12'],c:2}]},
  {id:'7L02',zone:0,title:'García Márquez',icon:'📚',type:'L',theme:'lit',xp:30,text:'Nació en Aracataca, 1927. "Cien años de soledad" (1967): 50 millones de copias, 37 idiomas. Nobel de Literatura 1982. Macondo se inspiró en Aracataca y las historias de su abuela.',source:'Literatura colombiana',qs:[{q:'¿Dónde nació?',t:'L',o:['Medellín','Aracataca','Cartagena','Bogotá'],c:1},{q:'¿En qué año se publicó la novela?',t:'L',o:['1957','1982','1977','1967'],c:3},{q:'¿Cuántas copias vendió?',t:'L',o:['30M','10M','50M','100M'],c:2}]},
  {id:'7L03',zone:0,title:'El ADN',icon:'🧬',type:'L',theme:'nat',xp:30,text:'El ADN (ácido desoxirribonucleico) contiene las instrucciones genéticas de todos los seres vivos. Fue descubierto por Watson y Crick en 1953. Tiene forma de doble hélice. El genoma humano tiene 3.000 millones de pares de bases. Compartimos 98.7% del ADN con los chimpancés y 60% con los plátanos.',source:'Biología — Genética',qs:[{q:'¿Qué forma tiene el ADN?',t:'L',o:['Circular','Cuadrada','Recta','Doble hélice'],c:3},{q:'¿Cuánto ADN compartimos con chimpancés?',t:'L',o:['50%','98.7%','75%','100%'],c:1},{q:'¿En qué año se descubrió su estructura?',t:'L',o:['1973','1953','1963','1943'],c:1}]},
  {id:'7L04',zone:0,title:'Van Gogh: genio incomprendido',icon:'🌻',type:'L',theme:'art',xp:30,text:'Vincent van Gogh pintó más de 2.100 obras en solo 10 años. En vida vendió un solo cuadro. Sufría de enfermedades mentales y se cortó parte de la oreja en 1888. Murió en 1890 a los 37 años. Hoy, su cuadro "Los girasoles" vale más de 80 millones de dólares. Su estilo postimpresionista influyó en todo el arte del siglo XX.',source:'Historia del arte',qs:[{q:'¿Cuántas obras pintó Van Gogh?',t:'L',o:['5.000','2.100','1.000','500'],c:1},{q:'¿Cuántos cuadros vendió en vida?',t:'L',o:['Uno','Ninguno','Cien','Diez'],c:0},{q:'¿A qué edad murió?',t:'L',o:['27','57','37','47'],c:2}]},
  {id:'7L05',zone:0,title:'El cuerpo humano en números',icon:'🫀',type:'L',theme:'nat',xp:30,text:'El corazón late unas 100.000 veces al día. El cerebro tiene 86.000 millones de neuronas. Los huesos del cuerpo son 206. La sangre recorre 96.000 km diarios. El intestino delgado mide 7 metros. El ser humano produce 25.000 litros de saliva en su vida, suficiente para llenar dos piscinas.',source:'Anatomía',qs:[{q:'¿Cuántas veces late el corazón al día?',t:'L',o:['10.000','100.000','200.000','50.000'],c:1},{q:'¿Cuántos huesos tenemos?',t:'L',o:['100','150','300','206'],c:3},{q:'¿Cuánto mide el intestino delgado?',t:'L',o:['5 metros','7 metros','10 metros','3 metros'],c:1}]},
  {id:'7L06',zone:0,title:'La Segunda Guerra Mundial',icon:'🌍',type:'L',theme:'soc',xp:30,text:'Duró de 1939 a 1945. Murieron entre 70 y 85 millones de personas. Alemania nazi, liderada por Hitler, invadió Polonia el 1 de septiembre de 1939. Los Aliados (EE.UU., URSS, Reino Unido, Francia) derrotaron al Eje (Alemania, Italia, Japón). Terminó con las bombas atómicas sobre Hiroshima y Nagasaki en agosto de 1945.',source:'Historia — WWII',qs:[{q:'¿Cuántos años duró?',t:'L',o:['6','8','10','4'],c:0},{q:'¿Qué país fue invadido primero?',t:'L',o:['Francia','Polonia','Inglaterra','Rusia'],c:1},{q:'¿Cuántas personas murieron?',t:'L',o:['70-85 millones','100 millones','40-50 millones','20-30 millones'],c:0}]},
  {id:'7L07',zone:0,title:'Minecraft: más que un juego',icon:'⛏️',type:'L',theme:'tec',xp:30,text:'Minecraft fue creado por Markus Persson (Notch) en 2011 y vendido a Microsoft por 2.500 millones de dólares en 2014. Es el videojuego más vendido de la historia con más de 300 millones de copias. Se usa en escuelas de 115 países como herramienta educativa (Minecraft Education). Los estudiantes aprenden arquitectura, historia, programación y trabajo en equipo construyendo mundos virtuales.',source:'Tecnología educativa',qs:[{q:'¿Cuánto pagó Microsoft por Minecraft?',t:'L',o:['100 millones','10.000 millones','500 millones','2.500 millones'],c:3},{q:'¿Cuántas copias se han vendido?',t:'L',o:['300 millones','200 millones','100 millones','500 millones'],c:0},{q:'¿En cuántos países se usa en educación?',t:'L',o:['200','115','50','80'],c:1}]},
  {id:'7L08',zone:0,title:'Los océanos',icon:'🌊',type:'L',theme:'nat',xp:30,text:'Los océanos cubren el 71% de la superficie terrestre. El Pacífico es el más grande (165 millones de km²). La fosa de las Marianas es el punto más profundo: 11.034 metros. Solo hemos explorado el 5% del océano. Hay más artefactos históricos bajo el mar que en todos los museos del mundo. Los océanos producen el 50% del oxígeno que respiramos.',source:'Geografía — Oceanografía',qs:[{q:'¿Qué porcentaje de la Tierra cubren los océanos?',t:'L',o:['80%','60%','71%','50%'],c:2},{q:'¿Cuánto del océano hemos explorado?',t:'L',o:['25%','75%','5%','50%'],c:2},{q:'¿Qué porcentaje de oxígeno producen?',t:'L',o:['50%','25%','75%','10%'],c:0}]},
  {id:'7L09',zone:0,title:'La Independencia de Colombia',icon:'🇨🇴',type:'L',theme:'soc',xp:30,text:'El 20 de julio de 1810, el incidente del Florero de Llorente desencadenó el grito de independencia en Bogotá. Simón Bolívar lideró la campaña libertadora. La Batalla de Boyacá, el 7 de agosto de 1819, selló la independencia de la Nueva Granada. Bolívar soñaba con una Gran Colombia que uniera Venezuela, Colombia, Ecuador y Panamá, pero el proyecto se disolvió en 1830.',source:'Historia de Colombia',qs:[{q:'¿Qué fecha es el grito de independencia?',t:'L',o:['7 de agosto','12 de octubre','20 de julio','25 de diciembre'],c:2},{q:'¿Qué batalla selló la independencia?',t:'L',o:['Pichincha','Junín','Carabobo','Boyacá'],c:3},{q:'¿Qué países formarían la Gran Colombia?',t:'L',o:['Colombia y Perú','Colombia y Venezuela','Todos los de Sudamérica','Colombia, Venezuela, Ecuador y Panamá'],c:3}]},
  {id:'7L10',zone:0,title:'El cerebro adolescente',icon:'🧠',type:'L',theme:'nat',xp:30,text:'El cerebro no termina de desarrollarse hasta los 25 años. La última parte en madurar es la corteza prefrontal, responsable de tomar decisiones, controlar impulsos y prever consecuencias. Por eso los adolescentes tienden a tomar más riesgos. En cambio, el sistema límbico (emociones) ya está completamente activo. Esto explica por qué los adolescentes sienten las emociones con más intensidad que los adultos.',source:'Neurociencia del desarrollo',qs:[{q:'¿A qué edad termina de desarrollarse el cerebro?',t:'L',o:['18 años','30 años','21 años','25 años'],c:3},{q:'¿Qué parte madura al final?',t:'L',o:['El sistema límbico','El tallo cerebral','La corteza prefrontal','El cerebelo'],c:2},{q:'¿Qué controla la corteza prefrontal?',t:'L',o:['Decisiones, impulsos y consecuencias','Las emociones','La memoria','El movimiento'],c:0}]},
  // INFERENCIAL
  {id:'7I01',zone:1,title:'Migración venezolana',icon:'🚶',type:'I',theme:'soc',xp:45,text:'Desde 2015, más de 7 millones de venezolanos salieron de su país. Colombia recibió 2.5 millones. Enfrentan discriminación y empleo informal. Pero estudios muestran que la migración aporta: emprendimientos, mano de obra y diversidad. En los 2000, miles de colombianos migraron a Venezuela cuando era próspera.',source:'Migración — Sociales',qs:[{q:'¿Por qué menciona que colombianos migraron a Venezuela?',t:'I',o:['Para criticar','Para cambiar tema','No es importante','Para mostrar que la migración se da en ambas direcciones'],c:3},{q:'¿Qué contradicción señala?',t:'I',o:['Todos son ricos','Genera discriminación pero también aporta económicamente','No afecta a nadie','Es solo problema'],c:1},{q:'¿Idea principal?',t:'I',o:['Venezuela es mala','Migrantes no trabajan','Colombia no recibe migrantes','La migración es compleja con consecuencias positivas y negativas'],c:3}]},
  {id:'7I02',zone:1,title:'El lenguaje del poder',icon:'🦁',type:'I',theme:'lit',xp:45,text:'Un león propuso que votaran al líder, pero definió que el criterio fuera la fuerza. Ganó. La hormiga sugirió "¿y si fuera inteligencia o trabajo en equipo?", pero nadie la escuchó. El búho pensó: "El que define las reglas del juego, gana antes de empezar."',source:'Fábula — Pensamiento crítico',qs:[{q:'¿Por qué ganó el león?',t:'I',o:['Era el más viejo','Él mismo definió el criterio','Era el más inteligente','Todos lo querían'],c:1},{q:'¿Qué representa la hormiga?',t:'I',o:['Los débiles','Perdedores','Voces ignoradas que proponen criterios diferentes','Los insectos'],c:2},{q:'¿Qué quiso decir el búho?',t:'I',o:['Que las reglas no importan','Quien controla las reglas controla el resultado','Que el león es tonto','Que los búhos son sabios'],c:1}]},
  {id:'7I03',zone:1,title:'La paradoja de la tolerancia',icon:'⚖️',type:'I',theme:'gen',xp:45,text:'El filósofo Karl Popper planteó: si una sociedad es tolerante con todo, incluyendo la intolerancia, eventualmente los intolerantes destruirán la tolerancia misma. Es como dejar que alguien incendie la estación de bomberos. Por lo tanto, para preservar la tolerancia, debemos ser intolerantes con la intolerancia. Este principio es la base de las leyes contra el discurso de odio.',source:'Filosofía política',qs:[{q:'¿Cuál es la paradoja?',t:'I',o:['Que nadie es tolerante','Que la tolerancia no existe','Que tolerar es difícil','Que tolerar la intolerancia destruye la tolerancia misma'],c:3},{q:'¿Qué significa la metáfora de la estación de bomberos?',t:'I',o:['Que los bomberos son buenos','Que hay incendios','Que las estaciones son importantes','Que proteger lo que nos protege a veces requiere límites'],c:3},{q:'¿Cómo aplica esto a redes sociales?',t:'I',o:['No aplica','Permitir discurso de odio en nombre de la "libertad" puede destruir la convivencia','No hay odio en redes','Las redes son libres'],c:1}]},
  {id:'7I04',zone:1,title:'¿Por qué nos da miedo la oscuridad?',icon:'🌑',type:'I',theme:'nat',xp:45,text:'El miedo a la oscuridad no es realmente a la oscuridad: es al no saber qué hay en ella. Evolutivamente, nuestros ancestros que temían la oscuridad sobrevivían más, porque los depredadores cazaban de noche. Ese miedo se grabó en nuestro ADN. Curiosamente, los niños de 0-2 años NO temen la oscuridad; el miedo aparece entre los 3-5 años, cuando el cerebro desarrolla la imaginación suficiente para crear amenazas invisibles.',source:'Psicología evolutiva',qs:[{q:'¿Realmente le tememos a la oscuridad?',t:'I',o:['No: tememos a lo desconocido que podría estar en ella','Solo de noche','Solo algunos','Sí'],c:0},{q:'¿Por qué los bebés no temen la oscuridad?',t:'I',o:['Están acostumbrados','No ven bien','Aún no tienen imaginación para crear amenazas mentales','Son valientes'],c:2},{q:'¿Qué nos enseña sobre el miedo en general?',t:'I',o:['Que muchos miedos son construcciones mentales heredadas, no peligros reales','Que la oscuridad es peligrosa','Que somos cobardes','Que los ancestros eran miedosos'],c:0}]},
  {id:'7I05',zone:1,title:'El mapa de Peters vs. Mercator',icon:'🗺️',type:'I',theme:'soc',xp:45,text:'El mapa de Mercator (1569), el más usado en escuelas, distorsiona el tamaño real de los continentes: Europa y Norteamérica parecen más grandes. África, que es 14 veces más grande que Groenlandia, aparece del mismo tamaño. El mapa de Peters (1974) corrige las proporciones reales pero distorsiona las formas. ¿Por qué seguimos usando un mapa que hace ver más grande al norte?',source:'Geografía y geopolítica',qs:[{q:'¿Qué problema tiene el mapa de Mercator?',t:'I',o:['Hace parecer más grandes a Europa y Norteamérica','Es difícil de leer','No tiene colores','Es viejo'],c:0},{q:'¿Qué implica políticamente usar este mapa?',t:'I',o:['Refuerza visualmente la idea de que el norte global es más importante','Nada','No hay otro mapa','Es tradición'],c:0},{q:'¿Cuál es la reflexión implícita?',t:'I',o:['Que la geografía no importa','Que los mapas son bonitos','Que hasta la forma de representar el mundo puede estar sesgada por relaciones de poder','Que todos los mapas son iguales'],c:2}]},
  {id:'7I06',zone:1,title:'El dilema del tranvía',icon:'🚃',type:'I',theme:'gen',xp:45,text:'Un tranvía sin frenos va hacia 5 personas atadas a la vía. Puedes desviar el tranvía a otra vía donde solo hay 1 persona. Si no haces nada, mueren 5. Si actúas, salvas 5 pero tú eliges que muera 1. ¿Es moralmente correcto actuar? Los utilitaristas dicen sí: salvar más vidas es mejor. Los deontologistas dicen no: nunca es correcto elegir matar a alguien activamente.',source:'Ética — Filosofía moral',qs:[{q:'¿Cuál es el dilema central?',t:'I',o:['Si está bien causar un daño menor para evitar uno mayor','Si las personas deben estar en las vías','Si los frenos fallan mucho','Si los tranvías son seguros'],c:0},{q:'¿Cuál es la diferencia entre no actuar y actuar?',t:'I',o:['Ninguna','Es lo mismo','No actuar permite que algo pase; actuar te hace responsable directo','Actuar es siempre mejor'],c:2},{q:'¿Qué revela este dilema sobre la moral humana?',t:'I',o:['Que no existen respuestas morales absolutas y que el contexto importa','Que todos pensamos igual','Que somos malos','Que la filosofía es inútil'],c:0}]},
  {id:'7I07',zone:1,title:'La música de las ballenas',icon:'🐋',type:'I',theme:'nat',xp:45,text:'Las ballenas jorobadas cantan canciones que duran hasta 20 minutos y las repiten durante horas. Cada población tiene su propia canción que va cambiando con el tiempo, como una cultura musical. Una ballena solitaria, llamada "la ballena de 52 hercios", canta a una frecuencia que ninguna otra ballena puede escuchar. Ha sido llamada "la ballena más sola del mundo".',source:'Biología marina',qs:[{q:'¿Qué sugiere que cada población tenga su propia canción?',t:'I',o:['Que cantan mal','Que es casualidad','Que no se escuchan','Que las ballenas tienen una forma de cultura'],c:3},{q:'¿Por qué la ballena de 52 hercios es "la más sola"?',t:'I',o:['Porque es pequeña','Porque está lejos','Porque nadie puede escuchar su comunicación','Porque es vieja'],c:2},{q:'¿Qué metáfora humana evoca esta ballena?',t:'I',o:['La de alguien que habla pero nadie lo entiende ni lo escucha','La de un músico','La de un nadador','La de un científico'],c:0}]},
  {id:'7I08',zone:1,title:'El efecto Dunning-Kruger',icon:'🤔',type:'I',theme:'gen',xp:45,text:'Los psicólogos Dunning y Kruger descubrieron en 1999 que las personas con menor conocimiento sobre un tema tienden a sobreestimar su competencia, mientras que los expertos tienden a subestimarse. Es decir: los que menos saben creen que saben mucho, y los que más saben dudan de sí mismos. Esto explica por qué en internet, quienes gritan más fuerte sobre un tema suelen ser los menos informados.',source:'Psicología cognitiva',qs:[{q:'¿Qué descubrieron Dunning y Kruger?',t:'I',o:['Que todos somos iguales','Que los expertos son arrogantes','Que la ignorancia genera falsa seguridad y el conocimiento genera humildad','Que internet es malo'],c:2},{q:'¿Cómo aplica esto a debates en redes sociales?',t:'I',o:['Todos tienen razón','No aplica','Las redes son educativas','Los más ruidosos suelen ser los menos informados'],c:3},{q:'¿Qué deberías hacer al enterarte de este efecto?',t:'I',o:['Gritar más fuerte','Ignorarlo','No opinar nunca','Cuestionar tu propia seguridad cuando opinas sobre algo que no dominas'],c:3}]},
  {id:'7I09',zone:1,title:'El arte de la propaganda',icon:'📢',type:'I',theme:'soc',xp:45,text:'Durante la Segunda Guerra Mundial, todos los bandos usaron propaganda: carteles, radio, cine. Los nazis usaron frases repetitivas y enemigos comunes para unir al pueblo. Los Aliados usaron héroes y patriotismo. Joseph Goebbels, ministro de propaganda nazi, dijo: "Una mentira repetida mil veces se convierte en verdad." Hoy, los algoritmos de redes sociales repiten contenido similar, creando "cámaras de eco" donde solo escuchamos lo que ya creemos.',source:'Historia y medios de comunicación',qs:[{q:'¿Qué paralelo traza el texto entre propaganda y redes sociales?',t:'I',o:['Que la propaganda ya no existe','Que las redes son nazis','Ninguno','Ambos repiten mensajes hasta que se naturalizan, creando realidades parciales'],c:3},{q:'¿Qué son las "cámaras de eco"?',t:'I',o:['Cuartos de grabación','Lugares silenciosos','Espacios donde solo escuchamos opiniones que confirman las nuestras','Salas de música'],c:2},{q:'¿Cómo puedes romper tu "cámara de eco"?',t:'I',o:['Dejando de leer','No usando internet','Buscando activamente fuentes y perspectivas diferentes a las tuyas','Creyendo todo'],c:2}]},
  {id:'7I10',zone:1,title:'La economía del helado',icon:'🍦',type:'I',theme:'gen',xp:45,text:'Un estudio encontró que las ventas de helado y los casos de ahogamiento aumentan al mismo tiempo en verano. ¿Significa que el helado causa ahogamientos? No. Ambos aumentan por una tercera variable: el calor. Cuando hace calor, más personas compran helado Y más personas van a nadar. Esto se llama "correlación no implica causalidad" y es uno de los errores lógicos más comunes.',source:'Estadística y pensamiento crítico',qs:[{q:'¿El helado causa ahogamientos?',t:'I',o:['No hay datos','Sí','Tal vez','No: ambos son causados por una tercera variable (el calor)'],c:3},{q:'¿Qué error lógico describe el texto?',t:'I',o:['Error ortográfico','Error de cálculo','Error matemático','Confundir correlación con causalidad'],c:3},{q:'¿Dónde más ves este error?',t:'I',o:['Cuando se dice que vacunarse causa autismo porque coincide en el tiempo','En la escuela','En ningún lado','En los videojuegos'],c:0}]},
  // CRÍTICO
  {id:'7C01',zone:2,title:'¿Votar a los 16?',icon:'🗳️',type:'C',theme:'soc',xp:65,text:'En Brasil y Argentina votan desde los 16. En Colombia desde los 18. A favor: los jóvenes pagan impuestos al consumir, les afectan decisiones políticas sobre educación, y a los 16 pueden trabajar. En contra: falta madurez, son influenciables. Curiosamente, nadie cuestiona que a los 18 se tenga automáticamente la madurez necesaria.',source:'Ciudadanía — DBA: Argumentación',qs:[{q:'¿Argumento más fuerte a favor?',t:'C',o:['Son jóvenes','Sus amigos quieren','Las decisiones políticas ya los afectan directamente','Es divertido'],c:2},{q:'¿Qué debilidad señala en AMBAS posturas?',t:'C',o:['Jóvenes no quieren','Votar no sirve','Nadie garantiza que a los 18 se sea maduro tampoco','No hay datos'],c:2},{q:'¿Tu argumento fundamentado?',t:'C',o:['La madurez no depende de la edad sino de la formación ciudadana','Solo adultos saben','No me interesa','Votar a los 10'],c:0}]},
  {id:'7C02',zone:2,title:'IA en la escuela',icon:'🤖',type:'C',theme:'tec',xp:65,text:'Un colegio permitió usar IA para tareas. Notas subieron 30%, pero en examen presencial sin IA cayeron 45%. Debate: ¿herramienta o atajo? Un estudiante: "La calculadora no nos hizo peores en matemáticas." Una profesora: "Pero primero aprendieron a sumar solos."',source:'Tecnología y educación',qs:[{q:'¿El problema central?',t:'C',o:['La IA es cara','Mejorar notas con IA no significa mejorar comprensión','Las tareas son difíciles','Los profesores son malos'],c:1},{q:'¿Es válida la comparación con la calculadora?',t:'C',o:['Parcialmente: ambas son herramientas pero la base del conocimiento debe existir primero','No importa','Sí, son lo mismo','No, son diferentes'],c:0},{q:'¿Postura más equilibrada?',t:'C',o:['No usar tecnología','Usar IA como complemento después de dominar lo básico','Usar IA sin límites','Prohibir toda IA'],c:1}]},
  {id:'7C03',zone:2,title:'Cancelación: ¿justicia o linchamiento?',icon:'🚫',type:'C',theme:'gen',xp:65,text:'La "cultura de la cancelación" en redes sociales busca responsabilizar a personas por comentarios ofensivos. A favor: da voz a quienes antes no podían denunciar abusos de poder. En contra: no permite defensa, el castigo (perder empleo, reputación) es desproporcional, y un error del pasado define a la persona para siempre. ¿Dónde está el límite entre justicia social y linchamiento digital?',source:'Sociedad digital — Ética',qs:[{q:'¿Cuál es el argumento a favor de la cancelación?',t:'C',o:['Da poder a quienes antes no podían denunciar abusos','Es divertido','No tiene argumentos','Destruye reputaciones'],c:0},{q:'¿Cuál es la crítica más fuerte en contra?',t:'C',o:['Que es aburrida','Que no funciona','Que es nueva','Que no permite defensa y el castigo puede ser desproporcionado'],c:3},{q:'¿Cuál sería un sistema más justo?',t:'C',o:['Cancelar a todos','Prohibir redes sociales','Permitir diálogo, contexto y proporcionalidad antes de juzgar','No hacer nada'],c:2}]},
  {id:'7C04',zone:2,title:'¿La belleza es objetiva?',icon:'💄',type:'C',theme:'art',xp:65,text:'En la Edad Media, las mujeres "bellas" eran pálidas y con curvas amplias (símbolo de riqueza). Hoy, el estándar incluye piel bronceada y cuerpo delgado. En Mauritania, las niñas son forzadas a comer para engordar porque la gordura es belleza. En Corea del Sur, el 30% de mujeres se ha operado los párpados. Si la belleza cambia según época y lugar, ¿es "natural" o es una construcción social?',source:'Sociología — Estándares de belleza',qs:[{q:'¿Qué demuestra que la belleza cambie según la época?',t:'C',o:['Que antes eran tontos','Que la gente es indecisa','Que la belleza es una construcción social, no algo natural o universal','Que la belleza no existe'],c:2},{q:'¿Quiénes se benefician de que existan estándares de belleza?',t:'C',o:['Los gobiernos','Nadie','Los científicos','Las industrias que venden productos para alcanzar esos estándares'],c:3},{q:'¿Cuál es la postura más liberadora?',t:'C',o:['Seguir las tendencias','Operarse para encajar','Cuestionar los estándares y reconocer que la diversidad es la verdadera norma','Ignorar la belleza'],c:2}]},
  {id:'7C05',zone:2,title:'Minería vs. medio ambiente',icon:'⛏️',type:'C',theme:'nat',xp:65,text:'Colombia es el cuarto productor de carbón del mundo. La minería genera miles de empleos y regalías para municipios. Pero la minería a cielo abierto destruye ecosistemas, contamina ríos y desplaza comunidades. En La Guajira, la mina del Cerrejón desvió arroyos que eran la única fuente de agua de comunidades Wayúu. ¿El desarrollo económico justifica el daño ambiental y social?',source:'Economía vs. ambiente — Colombia',qs:[{q:'¿Cuál es el dilema central?',t:'C',o:['Si el crecimiento económico justifica destruir el medioambiente y afectar comunidades','Si Colombia es minera','Si la minería es aburrida','Si el carbón es útil'],c:0},{q:'¿Por qué el caso Wayúu es especialmente grave?',t:'C',o:['Porque se privó de agua a comunidades que dependían de ella para sobrevivir','Porque es lejos','Porque es ilegal','Porque los Wayúu no quieren trabajar'],c:0},{q:'¿Cuál sería un modelo más justo?',t:'C',o:['Más minería','Prohibir toda minería','Minería responsable con consulta previa, restauración ambiental y distribución equitativa de beneficios','No hacer nada'],c:2}]},
  {id:'7C06',zone:2,title:'Servicio militar obligatorio',icon:'🪖',type:'C',theme:'soc',xp:65,text:'En Colombia, el servicio militar es obligatorio para hombres. No hacerlo impide obtener la libreta militar, necesaria para trabajar formalmente. Los defensores dicen que forma carácter, disciplina y amor patrio. Los opositores argumentan que viola la libertad individual, que es sexista (solo hombres) y que en un país con conflicto armado, enviar jóvenes al ejército es poner vidas en riesgo. Países como Japón y Costa Rica no tienen ejército.',source:'Derechos y ciudadanía',qs:[{q:'¿Qué derecho se cuestiona?',t:'C',o:['Derecho al voto','Derecho a la educación','La libertad individual de elegir si se quiere ser militar o no','Derecho al trabajo'],c:2},{q:'¿Por qué el texto lo califica de "sexista"?',t:'C',o:['Porque es difícil','Porque no es','Porque es obligatorio solo para hombres, no para mujeres','Porque dura mucho'],c:2},{q:'¿Cuál es tu postura argumentada?',t:'C',o:['Solo mujeres','Debería ser voluntario y equitativo, con alternativas de servicio social','Todos deben ir','Nadie debería ir'],c:1}]},
  {id:'7C07',zone:2,title:'Tarea vs. tiempo libre',icon:'📝',type:'C',theme:'gen',xp:65,text:'Finlandia no deja tareas a menores de 16 años. Japón deja hasta 4 horas diarias. Los defensores de la tarea argumentan que refuerza hábitos de estudio. Los estudios muestran que en primaria las tareas no mejoran el rendimiento, pero en secundaria tienen efecto moderado. Lo que sí mejora el rendimiento es el sueño, el juego y la lectura libre. ¿Y si el tiempo de tareas se usara en leer por placer?',source:'Debate educativo internacional',qs:[{q:'¿Qué evidencia cuestiona las tareas?',t:'C',o:['Que los profes son malos','Que son aburridas','Que Finlandia es mejor','Que en primaria no mejoran rendimiento y el sueño/juego sí lo hacen'],c:3},{q:'¿Es válido comparar Finlandia con Colombia?',t:'C',o:['Sí, son iguales','Solo vale comparar países vecinos','Parcialmente: los contextos son distintos pero la evidencia es útil como referencia','No, son muy diferentes'],c:2},{q:'¿Cuál sería tu propuesta?',t:'C',o:['Más tareas','Eliminar toda tarea','Tareas significativas, cortas, que motiven curiosidad en vez de repetición mecánica','4 horas de tarea diaria'],c:2}]},
  {id:'7C08',zone:2,title:'Energía nuclear: ¿solución o amenaza?',icon:'☢️',type:'C',theme:'nat',xp:65,text:'La energía nuclear produce electricidad sin emitir CO₂, clave contra el cambio climático. Francia genera el 70% de su electricidad con nuclear. Pero los accidentes de Chernóbil (1986) y Fukushima (2011) causaron desastres ambientales. Los residuos nucleares permanecen radiactivos miles de años. Los defensores dicen que es la energía más segura estadísticamente. Los opositores dicen que cuando falla, falla catastrófica e irreversiblemente.',source:'Energía y medioambiente',qs:[{q:'¿Cuál es la ventaja principal de la nuclear?',t:'C',o:['Es barata','Produce electricidad sin emisiones de CO₂','No tiene residuos','Es fácil'],c:1},{q:'¿Cuál es la diferencia entre riesgo y consecuencia?',t:'C',o:['El riesgo es peor','La probabilidad de accidente es baja, pero la consecuencia cuando ocurre es catastrófica','Son lo mismo','No hay diferencia'],c:1},{q:'¿Cuál sería tu postura argumentada?',t:'C',o:['Nuclear para todo','Prohibir toda nuclear','Solo solar y eólica','Invertir en nuclear junto con renovables, con regulaciones estrictas y planes de residuos'],c:3}]},
  {id:'7C09',zone:2,title:'El derecho a morir',icon:'💭',type:'C',theme:'gen',xp:65,text:'La eutanasia es legal en Colombia desde 2015 para enfermos terminales. Países como Países Bajos y Bélgica la permiten en más casos. Los defensores argumentan que es un acto de compasión: evitar sufrimiento innecesario. Los opositores dicen que la vida es sagrada y que las presiones económicas podrían llevar a que personas vulnerables elijan morir por no ser "carga". ¿Quién debe decidir el final de una vida: el paciente, su familia, el médico o el Estado?',source:'Bioética y derechos',qs:[{q:'¿Cuál es el argumento principal a favor?',t:'C',o:['Que los médicos lo prefieren','Evitar sufrimiento innecesario a una persona que lo decide libremente','Que ahorrar recursos','Que la vida no importa'],c:1},{q:'¿Cuál es el riesgo que plantean los opositores?',t:'C',o:['Que es ilegal','Que no funciona','Que es inmoral','Que personas vulnerables podrían sentir presión para morir por razones económicas'],c:3},{q:'¿Quién debería decidir?',t:'C',o:['Solo el médico','El paciente informado, con acompañamiento médico y psicológico, sin presiones externas','Solo el Estado','Solo la familia'],c:1}]},
  {id:'7C10',zone:2,title:'Educación: ¿memorizar o pensar?',icon:'🎓',type:'C',theme:'gen',xp:65,text:'El modelo educativo tradicional evalúa la memoria: fechas, fórmulas, definiciones. Pero cualquier dato se puede buscar en Google en 3 segundos. Lo que Google no puede hacer es pensar críticamente, resolver problemas complejos o crear ideas nuevas. Singapur y Canadá reformaron su educación hacia el pensamiento crítico y la creatividad. Sus estudiantes lideran pruebas internacionales. Colombia sigue evaluando principalmente memoria.',source:'Política educativa',qs:[{q:'¿Cuál es el argumento central contra memorizar?',t:'C',o:['Que es aburrido','Que la memoria no existe','Que la información está disponible instantáneamente y lo valioso es saber analizarla','Que Google es malo'],c:2},{q:'¿Qué demuestran Singapur y Canadá?',t:'C',o:['Que educar para el pensamiento crítico produce mejores resultados medibles','Que son diferentes','Que son ricos','Que la memoria no importa'],c:0},{q:'¿Cómo reformarías la evaluación escolar?',t:'C',o:['Solo proyectos','Solo exámenes de memoria','Eliminar evaluaciones','Evaluar análisis, argumentación y aplicación del conocimiento, no solo repetición'],c:3}]},

  {id:'7G01',zone:0,title:'✏️ Completa la frase',icon:'✏️',type:'G',theme:'gen',xp:40,game:'complete',instruction:'Completa cada frase con la palabra correcta basándote en lo que has aprendido.',sentences:[{text:'La Revolución Industrial comenzó en ___ a finales del siglo XVIII.',options:['Francia','Inglaterra','Alemania','España'],correct:1},{text:'García Márquez se inspiró en Aracataca para crear el pueblo ficticio de ___.',options:['Comala','Macondo','Yoknapatawpha','Ítaca'],correct:1},{text:'El ADN tiene forma de ___.',options:['Círculo','Cuadrado','Doble hélice','Triángulo'],correct:2},{text:'Van Gogh vendió ___ cuadro(s) en vida.',options:['Cien','Diez','Ninguno','Un solo'],correct:3},{text:'El cerebro adolescente no termina de desarrollarse hasta los ___ años.',options:['18','21','25','30'],correct:2}]},
  {id:'7G02',zone:1,title:'🔍 Intruso conceptual',icon:'🔍',type:'G',theme:'gen',xp:50,game:'intruder',instruction:'Encuentra el elemento que NO pertenece al grupo. ¡Cuidado, requiere pensar!',rounds:[{category:'Sesgos cognitivos',options:['Sesgo de confirmación','Efecto Dunning-Kruger','Correlación ≠ causalidad','Ley de gravedad'],intruder:3,explanation:'La ley de gravedad es un hecho físico, no un sesgo cognitivo'},{category:'Argumentos contra el voto a los 16',options:['Falta de madurez','Son influenciables','Las decisiones políticas los afectan','No están preparados'],intruder:2,explanation:'Que las decisiones los afecten es un argumento A FAVOR, no en contra'},{category:'Características de la propaganda',options:['Repetición de mensajes','Verificación de fuentes','Apelación a emociones','Uso de enemigos comunes'],intruder:1,explanation:'La propaganda NO verifica fuentes; las manipula'},{category:'Miembros de los Aliados en WWII',options:['EE.UU.','Reino Unido','Italia','URSS'],intruder:2,explanation:'Italia era parte del Eje, no de los Aliados'}]},
  {id:'7G03',zone:2,title:'⏱️ V/F Velocidad',icon:'⏱️',type:'G',theme:'gen',xp:60,game:'tf_speed',instruction:'¡35 segundos! Verdadero o Falso sobre los temas de 7°.',timeLimit:35,statements:[{text:'La Revolución Industrial comenzó en Francia',isTrue:false},{text:'El ADN humano comparte 98.7% con los chimpancés',isTrue:true},{text:'Van Gogh pintó más de 2.100 obras',isTrue:true},{text:'La Segunda Guerra Mundial duró 8 años',isTrue:false},{text:'El corazón late unas 100.000 veces al día',isTrue:true},{text:'La independencia de Colombia se firmó el 7 de agosto de 1810',isTrue:false},{text:'El cerebro tiene 86.000 millones de neuronas',isTrue:true},{text:'Minecraft se usa en educación en 115 países',isTrue:true},{text:'Los océanos producen el 25% del oxígeno',isTrue:false},{text:'Bolívar soñaba con la Gran Colombia',isTrue:true}]},
  {id:'7G04',zone:1,title:'🧠 Memoria Histórica',icon:'🧠',type:'G',theme:'gen',xp:50,game:'memory',instruction:'Une cada evento o personaje con su dato clave. ¡Memoriza bien!',pairs:[{q:'Revolución Industrial',a:'Comenzó en Inglaterra siglo XVIII'},{q:'ADN humano',a:'98.7% igual al chimpancé'},{q:'Van Gogh',a:'Pintó más de 2.100 obras'},{q:'Gran Colombia',a:'Sueño de Bolívar'},{q:'Neuroplasticidad',a:'El cerebro cambia toda la vida'},{q:'Fotosíntesis',a:'CO₂ + luz → oxígeno'}]},
