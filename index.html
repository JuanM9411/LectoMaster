// ═══ RANDOM QUESTION BANK ═══
function shuffleQuestionsForRetry(act){
  if(!act||!act.qs)return act;
  const shuffled={...act};
  // Shuffle question order
  const indices=act.qs.map((_,i)=>i);
  for(let i=indices.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[indices[i],indices[j]]=[indices[j],indices[i]];}
  shuffled.qs=indices.map(i=>act.qs[i]);
  // Shuffle options within each question
  shuffled.qs=shuffled.qs.map(q=>{
    const correctText=q.o[q.c];
    const opts=[...q.o];
    for(let i=opts.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[opts[i],opts[j]]=[opts[j],opts[i]];}
    return{...q,o:opts,c:opts.indexOf(correctText)};
  });
  return shuffled;
}

  let chartHTML='<div style="margin-bottom:20px;"><h4 style="font-size:13px;font-family:Orbitron;color:var(--neon);margin-bottom:10px;">📊 Precisión promedio por grado y tipo</h4>';
  chartHTML+='<div style="display:flex;gap:12px;align-items:flex-end;height:140px;padding:0 8px;">';

    const types=[{k:'L',c:'var(--ngrn)',n:'L'},{k:'I',c:'var(--npur)',n:'I'},{k:'C',c:'var(--norg)',n:'C'}];
    chartHTML+='<div style="flex:1;display:flex;gap:2px;align-items:flex-end;height:100%;">';
    types.forEach(t=>{

      const pct=totalQ?Math.round(correctQ/totalQ*100):0;
      const col=pct>=70?'var(--ngrn)':pct>=50?'var(--norg)':'var(--nred)';
      chartHTML+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;">
        <div style="font-size:9px;font-weight:700;color:${col};margin-bottom:2px;">${pct}%</div>

  });
  chartHTML+='</div></div>';

  chartHTML+='<div style="margin-bottom:20px;"><h4 style="font-size:13px;font-family:Orbitron;color:var(--gold);margin-bottom:10px;">📅 Actividad semanal por área</h4>';
  chartHTML+='<div style="display:grid;grid-template-columns:auto repeat(4,1fr);gap:4px;font-size:10px;">';
  chartHTML+='<div></div>';grades.forEach(g=>{chartHTML+=`<div style="text-align:center;font-weight:700;color:var(--txt2);">${g}°</div>`;});
  const wk=getWeekId();
  AREAS.forEach(a=>{
    chartHTML+=`<div style="color:var(--txt3);font-weight:600;padding:4px 8px 4px 0;white-space:nowrap;">${a.icon} ${a.name.substring(0,8)}</div>`;
    grades.forEach(g=>{
      const students=Object.entries(allU).filter(([k,v])=>v.grade===g);
      const totalWk=students.reduce((s,[k,v])=>s+((v.weeklyProgress?.[a.id]?.[wk])||0),0);
      const maxPossible=students.length*WEEKLY_LIMIT;
      const pct=maxPossible?Math.round(totalWk/maxPossible*100):0;
      const bg=pct>=80?'rgba(34,211,238,.2)':pct>=40?'rgba(251,191,36,.15)':pct>0?'rgba(251,146,60,.1)':'rgba(255,255,255,.03)';
      const col=pct>=80?'var(--ngrn)':pct>=40?'var(--gold)':pct>0?'var(--norg)':'var(--txt3)';
      chartHTML+=`<div style="text-align:center;background:${bg};border-radius:6px;padding:6px 4px;"><span style="font-weight:700;color:${col};">${totalWk}</span><span style="color:var(--txt3);font-size:8px;">/${maxPossible}</span></div>`;
    });
  });
  chartHTML+='</div></div>';
  // 3. Students at risk
  chartHTML+='<div><h4 style="font-size:13px;font-family:Orbitron;color:var(--nred);margin-bottom:10px;">🚨 Estudiantes en riesgo</h4>';

    if(v.isAdmin||!v.grade)return false;

    if(hist.length===0)return true;
    const tq=hist.reduce((s,h)=>s+h.t,0);const cq=hist.reduce((s,h)=>s+h.c,0);
    return tq>0&&(cq/tq)<0.5;
  }).sort((a,b)=>{
    const aH=a[1].history||[];const bH=b[1].history||[];
    const aP=aH.reduce((s,h)=>s+h.t,0)?aH.reduce((s,h)=>s+h.c,0)/aH.reduce((s,h)=>s+h.t,0):0;
    const bP=bH.reduce((s,h)=>s+h.t,0)?bH.reduce((s,h)=>s+h.c,0)/bH.reduce((s,h)=>s+h.t,0):0;
    return aP-bP;

  else{
    atRisk.slice(0,8).forEach(([k,v])=>{
      const hist=v.history||[];const tq=hist.reduce((s,h)=>s+h.t,0);const cq=hist.reduce((s,h)=>s+h.c,0);
      const pct=tq?Math.round(cq/tq*100):0;
      const weak=[];
      ['L','I','C'].forEach(tp=>{const qs=hist.filter(h=>h.tp===tp);const t=qs.reduce((s,h)=>s+h.t,0);const c=qs.reduce((s,h)=>s+h.c,0);if(t>0&&c/t<0.5)weak.push(({L:'Literal',I:'Inferencial',C:'Crítico'})[tp]);});

        `<div style="font-size:10px;color:var(--nred);">Precisión: ${pct}%${weak.length?' — Débil en: '+weak.join(', '):''}</div>`}</div>
      </div>`;
    });
  }
  chartHTML+='</div>';
  el.innerHTML=chartHTML;
}

function fireworks(x,y){
  const cols=['#00D4FF','#A855F7','#F472B6','#FBBF24','#22D3EE','#FB923C','#EF4444','#22C55E'];
  for(let i=0;i<24;i++){
    const el=document.createElement('div');el.className='firework';
    const angle=Math.random()*Math.PI*2;const dist=60+Math.random()*80;
    el.style.cssText=`left:${x}px;top:${y}px;background:${cols[~~(Math.random()*cols.length)]};--dx:${Math.cos(angle)*dist}px;--dy:${Math.sin(angle)*dist}px;width:${3+Math.random()*5}px;height:${3+Math.random()*5}px;`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),1300);
  }
}

function initPetData(){
  if(!UD)return;
  if(!UD.pet)UD.pet={hunger:80,happiness:70,energy:90,wisdom:20,inventory:[],accessories:[],lastVisit:Date.now(),sick:false};
  // Decay over time
  const now=Date.now();
  const hours=Math.floor((now-(UD.pet.lastVisit||now))/3600000);
  if(hours>0){
    const decay=Math.min(hours*3,60);
    UD.pet.hunger=Math.max(0,UD.pet.hunger-decay);
    UD.pet.happiness=Math.max(0,UD.pet.happiness-decay*0.7);
    UD.pet.energy=Math.max(0,UD.pet.energy-decay*0.5);
    UD.pet.lastVisit=now;
    // Sick if not visited in 7+ days
    if(hours>=168)UD.pet.sick=true;
    sUser(CU,UD);
  }
}
function getPetMood(){
  if(!UD?.pet)return{emoji:'😊',text:'Contenta'};
  const p=UD.pet;
  if(p.sick)return{emoji:'🤒',text:'Enferma — ¡completa 2 actividades para curarla!'};
  const avg=(p.hunger+p.happiness+p.energy)/3;
  const hours=Math.floor((Date.now()-(p.lastVisit||Date.now()))/3600000);
  if(hours>=72)return{emoji:'😢',text:'Triste — ¡no la visitas hace '+Math.floor(hours/24)+' días!'};
  if(avg<20)return{emoji:'😰',text:'Muy débil — ¡aliméntala!'};
  if(avg<40)return{emoji:'😟',text:'Necesita atención'};
  if(avg<60)return{emoji:'😊',text:'Bien'};
  if(avg<80)return{emoji:'😄',text:'Feliz'};
  return{emoji:'🤩',text:'¡Radiante!'};
}
function grantPetItem(){

function usePetItem(itemId){
  if(!UD?.pet)return;
  const inv=UD.pet.inventory||[];
  const idx=inv.indexOf(itemId);
  if(idx===-1){alert('No tienes ese item');return;}
  const item=PET_ITEMS.find(i=>i.id===itemId);if(!item)return;
  inv.splice(idx,1);
  if(item.stat==='all'){['hunger','happiness','energy','wisdom'].forEach(s=>{UD.pet[s]=Math.min(100,UD.pet[s]+item.val);});}
  else{UD.pet[item.stat]=Math.min(100,UD.pet[item.stat]+item.val);}
  // Cure sickness
  if(UD.pet.sick){
    UD.pet.healCount=(UD.pet.healCount||0)+1;
    if(UD.pet.healCount>=2){UD.pet.sick=false;UD.pet.healCount=0;alert('🎉 ¡Tu mascota se curó!');}

  sUser(CU,UD);renderPet();

  ga.style.display='block';
  // Mini-game: catch the star (click as many as you can in 10 sec)

  if(gameType==='catch'){
    ga.innerHTML=`<h3 style="font-size:13px;margin-bottom:8px;">⭐ ¡Atrapa estrellas! (10 segundos)</h3>
      <div id="pgField" style="position:relative;height:200px;background:var(--bg);border-radius:10px;overflow:hidden;cursor:pointer;" onclick="catchStar(event)">
        <div id="pgStar" style="position:absolute;font-size:28px;transition:all .1s;">⭐</div>
        <div style="position:absolute;top:8px;right:12px;font-size:14px;font-weight:700;color:var(--neon);" id="pgScore">0</div>
        <div style="position:absolute;top:8px;left:12px;font-size:12px;color:var(--txt3);" id="pgTimer">10s</div>
      </div>`;
    let score=0,timeLeft=10;
    const moveStar=()=>{const s=document.getElementById('pgStar');if(s){s.style.left=Math.random()*85+'%';s.style.top=(20+Math.random()*70)+'%';}};
    moveStar();
    window._pgScore=0;
    window.catchStar=(e)=>{
      const rect=e.currentTarget.getBoundingClientRect();const x=e.clientX-rect.left;const y=e.clientY-rect.top;
      const star=document.getElementById('pgStar');if(!star)return;
      const sx=parseFloat(star.style.left)/100*rect.width;const sy=parseFloat(star.style.top)/100*rect.height;
      if(Math.abs(x-sx)<40&&Math.abs(y-sy)<40){window._pgScore++;document.getElementById('pgScore').textContent=window._pgScore;moveStar();}
    };
    const timer=setInterval(()=>{timeLeft--;const t=document.getElementById('pgTimer');if(t)t.textContent=timeLeft+'s';
      if(timeLeft<=0){clearInterval(timer);finishPetGame(window._pgScore);}},1000);
  }else{
    // Quiz mini-game
    const quizzes=[
      {q:'¿Capital de Colombia?',o:['Lima','Bogotá','Quito','Caracas'],c:1},
      {q:'¿Cuántos huesos tiene un adulto?',o:['100','206','300','150'],c:1},
      {q:'¿En qué año fue la independencia?',o:['1810','1900','1750','1830'],c:0},
      {q:'¿Qué gas producen las plantas?',o:['CO₂','Nitrógeno','Oxígeno','Helio'],c:2},
      {q:'¿Río más largo de Colombia?',o:['Cauca','Amazonas','Magdalena','Orinoco'],c:2},
      {q:'7 × 8 = ?',o:['54','56','58','48'],c:1},
      {q:'¿Cuántos departamentos tiene Colombia?',o:['28','30','32','36'],c:2},
      {q:'¿Quién pintó la Mona Lisa?',o:['Picasso','Da Vinci','Miguel Ángel','Botticelli'],c:1},
    ];
    const qs=quizzes.sort(()=>Math.random()-.5).slice(0,3);
    let current=0,correct=0;
    const showQ=()=>{
      if(current>=3){finishPetGame(correct*4);return;}
      const q=qs[current];
      ga.innerHTML=`<h3 style="font-size:13px;margin-bottom:8px;">🧠 Quiz rápido (${current+1}/3)</h3>
        <p style="font-size:14px;font-weight:600;margin-bottom:10px;">${q.q}</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">${q.o.map((o,i)=>
          `<button onclick="answerPetQuiz(${i},${q.c})" style="padding:10px;border-radius:8px;border:1px solid var(--brd);background:var(--card);color:var(--txt);cursor:pointer;font-size:12px;">${o}</button>`
        ).join('')}</div>`;
    };
    window.answerPetQuiz=(sel,cor)=>{if(sel===cor)correct++;current++;showQ();};
    showQ();
  }
}
function finishPetGame(score){

  if(score>=8)grantPetItem();

  const ga=document.getElementById('petGameArea');
  if(ga)ga.innerHTML=`<div style="text-align:center;padding:16px;"><div style="font-size:32px;">${score>=8?'🎉':'😊'}</div><div style="font-size:14px;font-weight:700;color:var(--neon);margin:8px 0;">Puntaje: ${score}</div><div style="font-size:12px;color:var(--txt2);">+${bonus} felicidad${score>=8?' · +1 item bonus':''}${UD.pet.energy<20?' · ⚠️ Energía baja':''}  </div><button class="obtn" style="margin-top:10px;padding:8px 20px;font-size:11px;" onclick="document.getElementById('petGameArea').style.display='none'">Cerrar</button></div>`;
}

function buyAccessory(id){
  if(!UD?.pet)return;

// ═══ CONCEPT MAP ═══
function showConceptMap(act){
  const box=document.getElementById('cmapBox');if(!box||!act)return;
  // Extract key concepts from text
  const text=act.text||'';
  const title=act.title||'';
  // Get key nouns/concepts from questions as map nodes
  const concepts=[title];
  (act.qs||[]).forEach(q=>{
    const correct=q.o[q.c];
    if(correct&&correct.length>2&&!concepts.includes(correct))concepts.push(correct);
  });
  // Add theme-based concepts
  const themeWords={soc:['Sociedad','Historia'],nat:['Naturaleza','Ciencia'],lit:['Literatura','Narrativa'],tec:['Tecnología','Innovación'],art:['Arte','Cultura'],gen:['Conocimiento','Análisis']};
  const tw=themeWords[act.theme]||['Lectura'];
  concepts.push(...tw.filter(w=>!concepts.includes(w)).slice(0,2));
  // Build visual map
  let html=`<div class="cmap-nodes"><div class="cmap-node cmap-center">${concepts[0]}</div></div><div class="cmap-line"></div><div class="cmap-nodes" style="gap:6px;">`;
  concepts.slice(1).forEach(c=>{html+=`<div class="cmap-node">${c}</div>`;});
  html+=`</div>`;
  document.getElementById('cmapContent').innerHTML=html;
  box.classList.add('show');
}

function checkSecretMissions(){
  if(!UD)return;
  if(!UD.secretsUnlocked)UD.secretsUnlocked=[];
  let newSecret=null;
  for(const sm of SECRET_MISSIONS){
    if(!UD.secretsUnlocked.includes(sm.id)&&sm.check(UD)){
      UD.secretsUnlocked.push(sm.id);UD.xp+=sm.xp;newSecret=sm;break;

  }
  sUser(CU,UD);

}

  mk('6LN08',0,'Gabo: García Márquez','📖','L','lit',26,'Nació en Aracataca, Magdalena, en 1927. Cien años de soledad se tradujo a 46 idiomas y vendió más de 50 millones de copias. Nobel de Literatura en 1982. Fue periodista antes que escritor. Su estilo es el "realismo mágico": mezcla lo fantástico con lo cotidiano.','Literatura colombiana',[{q:'¿Dónde nació García Márquez?',t:'L',o:['Bogotá','Cartagena','Aracataca','Barranquilla'],c:2},{q:'¿A cuántos idiomas se tradujo su obra cumbre?',t:'L',o:['10','46','100','20'],c:1},{q:'¿Qué era antes de escritor?',t:'L',o:['Médico','Profesor','Periodista','Abogado'],c:2}]),
  // INFERENCIAL 6° (8 acts)
  mk('6IN01',1,'¿Por qué cambian de color las hojas?','🍂','I','nat',30,'En otoño, los árboles dejan de producir clorofila porque hay menos luz. Sin clorofila, se ven otros pigmentos: carotenoides (amarillo/naranja) y antocianinas (rojo/morado). El árbol cierra la conexión con la hoja para conservar agua y energía. Cuando la hoja no recibe agua, se seca y cae.','Botánica',[{q:'¿Por qué las hojas son verdes normalmente?',t:'I',o:['Absorben agua verde','La clorofila es verde y oculta otros colores','Las pintan','No tienen otros pigmentos'],c:1},{q:'¿Qué estrategia de supervivencia usa el árbol?',t:'I',o:['Se prepara para morir','Conserva agua y energía para el invierno','Quiere verse diferente','No tiene control'],c:1},{q:'Si un árbol tropical no pierde hojas, ¿qué puedes inferir?',t:'I',o:['Está muerto','Vive en un clima sin invierno severo','Le falta agua','Está enfermo'],c:1}]),
  mk('6IN02',1,'Las hormigas agricultoras','🐜','I','nat',30,'Las hormigas cortadoras no comen las hojas. Las mastican para hacer pasta donde cultivan un hongo que es su alimento. Si el hongo se contamina, ciertas hormigas producen un antibiótico natural para protegerlo. Este sistema tiene 50 millones de años.','Entomología',[{q:'¿Por qué son "agricultoras"?',t:'I',o:['Comen hojas','Cultivan su alimento usando hojas como sustrato','Siembran semillas','Riegan plantas'],c:1},{q:'Que produzcan antibiótico sugiere que...',t:'I',o:['Son inteligentes como humanos','Desarrollaron mecanismos de defensa complejos en millones de años','Los humanos les enseñaron','No necesitan el hongo'],c:1},{q:'¿Qué implica que su agricultura tenga 50 millones de años?',t:'I',o:['Los humanos les enseñaron','La naturaleza desarrolló agricultura mucho antes que la humanidad','Es reciente','No es real'],c:1}]),
  mk('6IN03',1,'El efecto invernadero','🌡️','I','nat',32,'Sin efecto invernadero natural, la Tierra estaría a -18°C (hoy es 15°C). El problema es que las actividades humanas aumentaron los gases. Desde 1850 la temperatura subió 1.1°C. Parece poco, pero en la Edad de Hielo solo era 5°C menos y había glaciares de 3km sobre Europa.','Cambio climático',[{q:'¿Por qué el autor menciona la Edad de Hielo?',t:'I',o:['Para asustar','Para demostrar que cambios pequeños tienen efectos enormes','Por historia','Para cambiar de tema'],c:1},{q:'¿Cuál es la diferencia entre efecto invernadero "bueno" y "malo"?',t:'I',o:['No hay diferencia','El natural mantiene la vida; el exceso humano causa calentamiento peligroso','Todo es malo','Solo el natural es malo'],c:1},{q:'Si 1.1°C ya causa problemas, ¿qué pasaría con 3°C?',t:'I',o:['Nada','Efectos mucho más severos y potencialmente catastróficos','Todo se congela','Mejoraría el clima'],c:1}]),
  mk('6IN04',1,'La paradoja del barco','⛵','I','gen',35,'Un barco de madera: cada año reemplazas una tabla. En 20 años reemplazaste todas. ¿Sigue siendo el mismo barco? Y si alguien construyó otro con las tablas viejas, ¿cuál es el original? Plutarco lo planteó hace 2.000 años.','Filosofía',[{q:'¿Qué pregunta plantea esta paradoja?',t:'I',o:['Si los barcos flotan','Si la identidad depende de las partes materiales o la continuidad','Cuánto cuesta un barco','Si Plutarco tenía barco'],c:1},{q:'Si tus células cambian cada 7 años, ¿sigues siendo tú?',t:'I',o:['La persona muere','Podríamos preguntarnos si seguimos siendo "los mismos"','No cambian','Es imposible'],c:1},{q:'¿Por qué sigue siendo relevante después de 2.000 años?',t:'I',o:['Porque no hay respuesta definitiva y toca temas profundos','Los filósofos no trabajan','Por moda','No es relevante'],c:0}]),
  mk('6IN05',1,'¿Los animales sienten?','🐘','I','nat',35,'Los elefantes visitan huesos de muertos y permanecen en silencio horas. Los cuervos dejan "regalos" a humanos que los alimentan. Los delfines tienen nombres propios: silbidos únicos. Los perros detectan cáncer por el olfato.','Etología',[{q:'¿Qué sugiere el comportamiento de los elefantes?',t:'I',o:['Tienen hambre','Experimentan algo similar al duelo','Buscan calcio','Están jugando'],c:1},{q:'Los regalos de cuervos sugieren...',t:'I',o:['Son desordenados','Tienen reciprocidad y tal vez gratitud','Los humanos los entrenan','No saben qué hacer'],c:1},{q:'¿Qué implica que los delfines tengan "nombres"?',t:'I',o:['Hablan español','Tienen autoconciencia e identidad individual','Repiten sonidos al azar','Se equivocan'],c:1}]),
  mk('6IN06',1,'El sesgo de confirmación','🔍','I','gen',38,'Las personas tienden a buscar información que confirme lo que ya creen y a ignorar la que los contradiga. Si crees que los gatos son mejores que los perros, recordarás más noticias positivas sobre gatos. Las redes sociales amplifican esto: los algoritmos te muestran más de lo que ya te gusta.','Psicología cognitiva',[{q:'¿Por qué las redes sociales amplifican este sesgo?',t:'I',o:['Porque son malas','Porque los algoritmos te muestran contenido que ya valida tus creencias','Porque publican mentiras','Porque no hay algoritmos'],c:1},{q:'¿Cómo afecta el sesgo a decisiones importantes?',t:'I',o:['No afecta','Te hace ignorar evidencia contraria y tomar decisiones con información incompleta','Mejora las decisiones','Solo afecta a otros'],c:1},{q:'¿Cómo se combate el sesgo de confirmación?',t:'I',o:['No se puede','Buscando activamente información que contradiga tus creencias','Viendo más redes','Ignorando todo'],c:1}]),
  mk('6IN07',1,'¿Por qué bostezamos?','🥱','I','nat',32,'Bostezar es contagioso: ver a alguien bostezar o incluso leer sobre bostezos puede provocarlo. Los científicos no saben exactamente por qué, pero la teoría más aceptada es que enfría el cerebro. El bostezo aumenta la frecuencia cardíaca y envía sangre fresca al cerebro. Los fetos bostezan desde las 11 semanas de gestación.','Neurociencia',[{q:'¿Por qué es significativo que el bostezo sea contagioso?',t:'I',o:['Es molesto','Sugiere un mecanismo social de empatía o sincronización grupal','Es casualidad','No es contagioso'],c:1},{q:'¿Qué revela que los fetos bostecen?',t:'I',o:['Que tienen sueño','Que es un mecanismo biológico fundamental, no aprendido','Que necesitan aire','Que están aburridos'],c:1},{q:'Si bostezar enfría el cerebro, ¿por qué sería contagioso en un grupo?',t:'I',o:['No se sabe','Podría sincronizar los niveles de alerta del grupo para responder mejor a amenazas','Es un defecto','Por aburrimiento'],c:1}]),
  mk('6IN08',1,'Los colores de las banderas','🏳️','I','soc',33,'El rojo aparece en el 74% de banderas del mundo y representa sacrificio. El azul en el 50% representa cielo o libertad. El verde en banderas africanas representa tierra fértil. Los 5 países nórdicos comparten el mismo diseño de cruz descentrada.','Vexilología',[{q:'¿Por qué tantos países usan rojo?',t:'I',o:['Es bonito','Muchos nacieron tras luchas de independencia con sacrificio','Coincidencia','Único color disponible'],c:1},{q:'¿Qué infieres de que los nórdicos compartan diseño?',t:'I',o:['No son creativos','Historia cultural y geográfica compartida','Se copiaron','No les importa'],c:1},{q:'¿Por qué el verde es común en banderas africanas?',t:'I',o:['Moda','Refleja la importancia de la tierra y agricultura en su identidad','Muchos árboles','Sin significado'],c:1}]),
  // CRITICO 6° (8 acts)
  mk('6CN01',2,'¿Las tareas sirven?','📝','C','gen',40,'Finlandia asigna menos de 3h semanales de tareas y tiene excelente educación. Corea del Sur asigna más de 15h y también. Un estudio con 7.725 estudiantes: más de 90 min diarios reduce el rendimiento. Pero cero tarea también reduce rendimiento.','Educación',[{q:'¿Por qué no podemos decir si las tareas son buenas o malas?',t:'C',o:['No importa','La evidencia muestra que la cantidad y tipo importan más que si hay o no','Los estudios mienten','Depende solo del país'],c:1},{q:'¿Qué debilidad tiene comparar Finlandia y Corea?',t:'C',o:['Ninguna','Son países con culturas muy diferentes; la tarea no es el único factor','Son iguales','No se pueden comparar'],c:1},{q:'¿Cuál sería tu postura argumentada?',t:'C',o:['Eliminar todas','Las tareas moderadas y significativas mejoran; el exceso perjudica','5 horas diarias','No importa la cantidad'],c:1}]),
  mk('6CN02',2,'¿Redes sociales nos aíslan?','📱','C','tec',42,'Estudio con 1.787 adultos: quienes usan redes +2h diarias tienen doble probabilidad de sentirse aislados. Pero Pew Research dice que adolescentes sienten amistades más fuertes con redes. Permiten contacto con lejanos pero pueden reemplazar interacción con cercanos.','Psicología social',[{q:'¿Por qué los dos estudios se contradicen?',t:'C',o:['Uno miente','Miden cosas diferentes: aislamiento en adultos vs. percepción de amistad en jóvenes','Son iguales','No se contradicen'],c:1},{q:'¿Es justo culpar a las redes del aislamiento?',t:'C',o:['Sí son las culpables','No necesariamente: son herramientas; el efecto depende del uso','Nunca causan problemas','Sí prohibirlas'],c:1},{q:'¿Qué argumento defenderías?',t:'C',o:['Prohibir todo','Que complementen pero no reemplacen las interacciones presenciales','Usarlas 24h','No usarlas nunca'],c:1}]),
  mk('6CN03',2,'¿Zoológicos: protección o prisión?','🦁','C','nat',44,'El cóndor californiano se salvó gracias a zoológicos. Pero el 75% de elefantes en zoológicos muestran estrés repetitivo. Un oso polar tiene un espacio un millón de veces menor que en la naturaleza. Pero los zoológicos generan 700 millones de visitantes que aprenden sobre conservación.','Bioética',[{q:'¿Cuál es la tensión ética central?',t:'C',o:['No hay tensión','El bienestar individual se sacrifica por un supuesto beneficio colectivo','Son solo negocios','Solo protegen'],c:1},{q:'¿Un caso exitoso justifica todos los zoológicos?',t:'C',o:['Sí todos son buenos','No: un caso no justifica el sufrimiento de miles en condiciones inadecuadas','Siempre salvan','No existen buenos'],c:1},{q:'¿Cuál sería una alternativa ética?',t:'C',o:['Cerrar todo','Reservas naturales amplias donde vivan en condiciones más cercanas a su hábitat','Más zoológicos','No hacer nada'],c:1}]),
  mk('6CN04',2,'¿La tecnología nos hace tontos?','🧠','C','tec',44,'Antes de GPS memorizábamos rutas. Antes de calculadoras hacíamos cuentas mentales. Nicholas Carr argumenta que internet reduce nuestra capacidad de concentración. Pero la tecnología también liberó nuestra mente para tareas más complejas.','Tecnología y cognición',[{q:'¿Es válido decir que la tecnología nos hace "tontos"?',t:'C',o:['Sí, nos degrada','No es tan simple: cambia nuestras habilidades; perdemos unas pero ganamos otras','No, siempre mejora','Es irrelevante'],c:1},{q:'¿Qué habilidades estamos perdiendo y cuáles ganando?',t:'C',o:['Ninguna cambia','Perdemos memorización y cálculo mental; ganamos capacidad de búsqueda y multitarea','Solo perdemos','Solo ganamos'],c:1},{q:'¿Cómo debería usarse la tecnología en la educación?',t:'C',o:['Prohibirla','Como herramienta que complemente el pensamiento crítico, no que lo reemplace','Sin límites','Solo para recreo'],c:1}]),
  mk('6CN05',2,'¿Los uniformes escolares son necesarios?','👔','C','gen',40,'Los defensores dicen que eliminan diferencias socioeconómicas y reducen bullying. Los críticos dicen que limitan la expresión individual y no hay evidencia sólida de que mejoren el rendimiento. En Japón son obligatorios; en Finlandia no existen. Ambos tienen buena educación.','Debate escolar',[{q:'¿El ejemplo de Japón vs Finlandia qué demuestra?',t:'C',o:['Que uniformes son buenos','Que el uniforme por sí solo no determina la calidad educativa','Que Finlandia es mejor','Nada'],c:1},{q:'¿Es válido el argumento de reducir diferencias?',t:'C',o:['Sí totalmente','Parcialmente: iguala lo visible pero no resuelve la desigualdad económica real','No tiene sentido','Empeora todo'],c:1},{q:'¿Cuál es tu postura argumentada?',t:'C',o:['Siempre obligatorio','Puede ser útil pero debe acompañarse de políticas reales de equidad','Nunca uniforme','No importa'],c:1}]),
  mk('6CN06',2,'¿Copiar está siempre mal?','📋','C','gen',42,'La copia en exámenes es vista como trampa. Pero en el mundo laboral, buscar información y consultar fuentes es una habilidad valorada. Einstein dijo: "La imaginación es más importante que el conocimiento." Los exámenes tradicionales evalúan memoria, no comprensión. Finlandia usa pocas evaluaciones estandarizadas y tiene excelentes resultados.','Evaluación educativa',[{q:'¿Qué diferencia hay entre "copiar" y "consultar"?',t:'C',o:['Es lo mismo','La intención y el contexto: memorizar para un examen no es igual a aplicar conocimiento consultando fuentes','Copiar es siempre mejor','Consultar es trampa'],c:1},{q:'¿Los exámenes de memoria son la mejor forma de evaluar?',t:'C',o:['Sí, son perfectos','No necesariamente: evalúan retención pero no comprensión, análisis ni aplicación','Sí, la única forma','No sirven para nada'],c:1},{q:'¿Cómo evaluarías mejor el aprendizaje?',t:'C',o:['Solo exámenes escritos','Combinando proyectos, debates, reflexiones y evaluaciones donde se pueda consultar','Solo tareas','No evaluar'],c:1}]),
  mk('6CN07',2,'¿Los videojuegos son dañinos?','🎮','C','tec',45,'La OMS clasificó el "trastorno por videojuegos" como enfermedad. Pero estudios del MIT muestran que videojuegos mejoran coordinación, resolución de problemas y trabajo en equipo. Cirujanos que juegan videojuegos cometen 37% menos errores. El problema no es el medio sino el uso excesivo.','Salud y tecnología',[{q:'¿Por qué no se puede decir simplemente que son buenos o malos?',t:'C',o:['Son siempre malos','Porque el impacto depende del tipo de juego, el tiempo de uso y la persona','Son siempre buenos','Es irrelevante'],c:1},{q:'¿El dato de los cirujanos demuestra que los videojuegos son buenos?',t:'C',o:['Sí totalmente','No: demuestra un beneficio específico, no que todo uso sea beneficioso','Es falso','No demuestra nada'],c:1},{q:'¿Cuál sería una postura equilibrada?',t:'C',o:['Prohibir todo','Usar videojuegos con moderación, eligiendo los que desarrollan habilidades útiles','Sin límites','Solo adultos'],c:1}]),
  mk('6CN08',2,'¿Los animales deben tener derechos?','🐾','C','nat',46,'En Colombia, la Ley 1774 de 2016 reconoce animales como "seres sintientes" y penaliza maltrato. Pero las corridas de toros siguen como "patrimonio cultural." En Argentina, una orangutana recibió habeas corpus como "persona no humana." Si los animales sienten dolor, ¿dónde trazamos la línea?','Derecho animal',[{q:'¿Cuál es la contradicción en Colombia?',t:'C',o:['No hay contradicción','La ley reconoce que son sintientes pero permite actividades que causan sufrimiento','Las leyes no sirven','Los toros no sienten'],c:1},{q:'¿Qué implica llamar a un animal "persona no humana"?',t:'C',o:['Nada','Tendría derechos legales como protección contra sufrimiento','Podría votar','Sería humano'],c:1},{q:'¿Cuál es tu postura argumentada?',t:'C',o:['No tienen derechos','Los que sienten merecen protección legal contra sufrimiento innecesario','Todos son personas','Solo mascotas'],c:1}]),

  mk('7LN01',0,'La Revolución Francesa','🇫🇷','L','soc',25,'El 14 de julio de 1789, el pueblo asaltó la Bastilla. Francia estaba en bancarrota: el 97% de impuestos los pagaban los campesinos mientras nobleza y clero estaban exentos. La Declaración de Derechos del Hombre proclamó que todos nacen libres e iguales. Paradójicamente, la revolución terminó en el Terror (1793-94) con 16.000 a 40.000 guillotinados.','Historia Universal',[{q:'¿Qué % de impuestos pagaban los campesinos?',t:'L',o:['50%','97%','30%','75%'],c:1},{q:'¿Qué proclamó la Declaración?',t:'L',o:['Que el rey es divino','Que todos nacen libres e iguales','Que la nobleza manda','Que no hay derechos'],c:1},{q:'¿Cuántos murieron en el Terror?',t:'L',o:['100','1.000','16.000 a 40.000','1 millón'],c:2}]),
  mk('7LN02',0,'El ADN explicado','🧬','L','nat',28,'El ADN es una doble hélice con instrucciones genéticas. Estirado de una célula mide 2 metros. El genoma tiene 3.200 millones de pares de bases. Compartimos 60% con bananas, 85% con ratones, 98.7% con chimpancés. El Proyecto Genoma tardó 13 años y costó 2.700 millones.','Genética',[{q:'¿Cuánto mediría el ADN de una célula estirado?',t:'L',o:['1 mm','2 metros','1 km','10 cm'],c:1},{q:'¿Qué % compartimos con chimpancés?',t:'L',o:['50%','75%','98.7%','100%'],c:2},{q:'¿Cuánto costó el Proyecto Genoma?',t:'L',o:['1 millón','2.700 millones','100.000','Fue gratis'],c:1}]),

    const isActive=currentArea===a.id;
    const wp=getWeeklyProgress(a.id);
    const pctTotal=totalActs>0?Math.round(doneActs/totalActs*100):0;
    const wkBadge=wp.blocked?`<span style="font-size:9px;background:rgba(34,197,94,.15);color:var(--ngrn);border-radius:50px;padding:2px 6px;font-weight:700;">✅ Semana OK</span>`

      :`<span style="font-size:9px;background:rgba(255,255,255,.05);color:var(--txt3);border-radius:50px;padding:2px 6px;">📅 0/${wp.limit}</span>`;
    const barFill=totalActs>0?`<div class="ac-bar-wrap"><div class="ac-bar-fill" style="width:${pctTotal}%;background:${isActive?a.color:'rgba(255,255,255,.25)'};"></div></div>`:'';
    return`<div class="area-card ${isActive?'active':''}" onclick="switchArea('${a.id}')" style="${isActive?`background:${a.gradient};border-color:${a.border};`:''}"> 
      <span class="ac-icon">${a.icon}</span>
      <div class="ac-name" style="${isActive?`color:${a.color}`:''}">${a.name}</div>
      <div class="ac-count">${totalActs>0?doneActs+'/'+totalActs+' misiones':'Próximamente'}</div>
      ${totalActs>0?`<div class="ac-pct" style="color:${isActive?a.color:'var(--txt3)'}">${pctTotal}%</div>`:''}

    </div>`;
  }).join('');
}
function switchArea(areaId){
  currentArea=areaId;

    if(LECTURA_BACKUP[g])CONTENT[g]=LECTURA_BACKUP[g];
  }else if(AREA_CONTENT[areaId]?.[g]){

// Load area content from Firebase
async function loadAreaContentFromFirebase(){
  if(!fbReady||!fbDB)return;
  for(const area of AREAS){
    if(area.id==='lectura')continue;
    try{
      const snap=await fbDB.ref('areas/'+area.id).once('value');
      const data=snap.val();
      if(!data){console.log('⚠️ No data for area: '+area.id);continue;}
      // Firebase may return data with string or numeric keys
      const grades=[6,7,8,9];
      grades.forEach(g=>{
        const gData=data[g]||data[String(g)];
        if(!gData)return;
        const actArr=Array.isArray(gData)?gData.filter(Boolean):Object.values(gData);
        if(actArr.length===0)return;
        if(!AREA_CONTENT[area.id])AREA_CONTENT[area.id]={};

            {name:area.icon+' NIVEL INTERMEDIO',gradient:'linear-gradient(180deg,#2d1854,#1a0e3a)',labelBg:'#7B1FA2',decos:[]},
            {name:area.icon+' NIVEL AVANZADO',gradient:'linear-gradient(180deg,#4a1c0a,#2a0f05)',labelBg:'#E65100',decos:[]}
          ],acts:[]};
        }
        actArr.forEach(a=>{
          if(a&&a.id&&!AREA_CONTENT[area.id][g].acts.find(x=>x.id===a.id)){
            AREA_CONTENT[area.id][g].acts.push(a);

// ═══ FUNCIÓN 1: MAPA DE CALOR DE DIFICULTAD ═══════════════════
// ══════════════════════════════════════════════════════════════
function getHeatData(){
  // Construye mapa actId -> {fails, attempts} desde TODOS los usuarios
  const allU=gU();
  const heat={};
  Object.values(allU).forEach(u=>{
    (u.history||[]).forEach(h=>{
      // Buscar actId por nombre
      const g=u.grade;if(!g)return;
      const act=(CONTENT[g]?.acts||[]).find(a=>a.title===h.n);
      if(!act)return;
      if(!heat[act.id])heat[act.id]={fails:0,attempts:0};
      heat[act.id].attempts++;
      if(!h.passed&&h.c<h.t)heat[act.id].fails++;
    });
  });
  return heat;
}

function getNodeHeatClass(actId){
  if(!UD?.isAdmin)return'';
  const heat=getHeatData();
  const d=heat[actId];if(!d||d.attempts<2)return'';
  const ratio=d.fails/d.attempts;
  if(ratio>=0.6)return'hot-2';
  if(ratio>=0.35)return'hot-1';
  return'';
}

// ═══ FUNCIÓN 2: REPASO ESPACIADO ══════════════════════════════
// ══════════════════════════════════════════════════════════════
const REVIEW_DAYS=3; // días hasta volver a sugerir una fallida

function getReviewQueue(){
  if(!UD)return[];
  const g=UD.grade;
  const acts=CONTENT[g]?.acts||[];
  const now=Date.now();
  const queue=[];
  // Actividades fallidas hace REVIEW_DAYS días o más
  (UD.history||[]).forEach(h=>{
    if(h.passed===false||(h.c/h.t)<0.66){
      const daysSince=h.dt?(now-new Date(h.dt).getTime())/(86400000):999;
      if(daysSince>=REVIEW_DAYS){
        const act=acts.find(a=>a.title===h.n);
        if(act&&!queue.find(q=>q.id===act.id))queue.push(act);
      }
    }
  });
  return queue.slice(0,5);
}

function renderReviewBanner(){
  const el=document.getElementById('reviewBanner');if(!el||UD?.isAdmin)return;
  const queue=getReviewQueue();
  if(queue.length===0){el.innerHTML='';return;}
  el.innerHTML=`<div class="review-banner" onclick="openReviewQueue()">
    <div class="review-count">${queue.length}</div>
    <div>
      <div style="font-size:13px;font-weight:700;color:var(--npur);">📬 Repasos pendientes</div>
      <div style="font-size:11px;color:var(--txt3);">Actividades que deberías volver a intentar · Haz clic para empezar</div>
    </div>
    <div style="margin-left:auto;font-size:20px;">→</div>
  </div>`;
}

function openReviewQueue(){
  const queue=getReviewQueue();if(!queue.length)return;
  const act=queue[0];
  openAct(act.id);
}

// ═══ FUNCIÓN 3: RUTA DE APRENDIZAJE PERSONALIZADA ═════════════
// ══════════════════════════════════════════════════════════════
function renderRutaAprendizaje(){
  const el=document.getElementById('rutaAprendizaje');if(!el||!UD||UD.isAdmin)return;
  const g=UD.grade;
  const hist=UD.history||[];
  if(hist.length<3){el.innerHTML='';return;}
  // Calcular precisión por tipo
  const tipos={L:{c:0,t:0},I:{c:0,t:0},C:{c:0,t:0}};
  hist.forEach(h=>{if(tipos[h.tp]){tipos[h.tp].c+=h.c;tipos[h.tp].t+=h.t;}});
  const pcts={
    L:tipos.L.t?Math.round(tipos.L.c/tipos.L.t*100):100,
    I:tipos.I.t?Math.round(tipos.I.c/tipos.I.t*100):100,
    C:tipos.C.t?Math.round(tipos.C.c/tipos.C.t*100):100
  };
  // Ordenar de menor a mayor
  const sorted=Object.entries(pcts).sort((a,b)=>a[1]-b[1]);
  const typeNames={L:'Literal',I:'Inferencial',C:'Crítico'};
  const typeIcons2={L:'🔍',I:'🧠',C:'⚔️'};
  const acts=CONTENT[g]?.acts||[];
  const steps=sorted.slice(0,3).map(([tp,pct],i)=>{
    const pending=acts.filter(a=>a.type===tp&&!UD.done.includes(a.id));
    const next=pending[0];
    return{tp,pct,next,label:typeNames[tp],icon:typeIcons2[tp],i};
  });
  el.innerHTML=`<div class="ruta-card">
    <div style="font-size:12px;font-weight:700;color:var(--neon);margin-bottom:10px;">🗺️ TU RUTA RECOMENDADA ESTA SEMANA</div>
    ${steps.map(s=>`<div class="ruta-step">
      <div class="ruta-num">${s.i+1}</div>
      <div style="flex:1;">
        <div style="font-size:13px;font-weight:700;color:var(--txt);">${s.icon} ${s.label} <span style="font-size:10px;color:${s.pct<50?'var(--nred)':s.pct<75?'var(--norg)':'var(--ngrn)'};">${s.pct}% precisión</span></div>
        ${s.next?`<div style="font-size:11px;color:var(--txt3);">Siguiente: "${s.next.title}" · <span style="color:var(--neon);cursor:pointer;" onclick="openAct('${s.next.id}')">Ir →</span></div>`:'<div style="font-size:11px;color:var(--ngrn);">✅ ¡Todas completadas en este tipo!</div>'}
      </div>
    </div>`).join('')}
  </div>`;
}

// ═══ FUNCIÓN 5: MODO CONTRARRELOJ ═════════════════════════════
// ══════════════════════════════════════════════════════════════
let clockInterval=null,clockSecs=0,clockActive=false,clockBonus=0;
const CLOCK_TIME=25; // segundos por pregunta

function startClock(qi,totalQs){
  stopClock();
  clockSecs=CLOCK_TIME;clockActive=true;clockBonus=0;
  const barId='clockBar'+qi;
  clockInterval=setInterval(()=>{
    clockSecs--;
    const pct=Math.round(clockSecs/CLOCK_TIME*100);
    const bar=document.getElementById(barId);
    if(bar){
      bar.style.width=pct+'%';
      bar.className='clock-fill '+(clockSecs>15?'ok':clockSecs>7?'warn':'danger');
    }
    const lbl=document.getElementById('clockLbl'+qi);
    if(lbl)lbl.textContent=clockSecs+'s';
    if(clockSecs<=0){
      stopClock();
      // Auto-submit this question as wrong
      const btn=document.getElementById('qb'+qi)?.querySelector('.opt');
      if(btn&&ans[qi]===undefined){ans[qi]=-1;}
      // Enable submit if all answered
      const allAns=Object.keys(ans).length;
      if(allAns>=(document.querySelectorAll('.q-block').length||totalQs)){
        document.getElementById('subBtn').disabled=false;
      }
    }
  },1000);
}

function stopClock(){
  if(clockInterval)clearInterval(clockInterval);
  clockInterval=null;clockActive=false;
}

function renderClockBar(qi){
  return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
    <div class="clock-bar" style="flex:1;"><div class="clock-fill ok" id="clockBar${qi}" style="width:100%;"></div></div>
    <span class="clock-badge" id="clockLbl${qi}" style="color:var(--ngrn);border-color:rgba(34,211,238,.3);">${CLOCK_TIME}s</span>
  </div>`;
}

function adminCreateTorneo(){
  const grades=[6,7,8,9];
  const grade=prompt('¿Para qué grado? (6,7,8,9)','6');
  if(!grades.includes(parseInt(grade)))return;
  const title=prompt('Nombre del torneo:','¡Gran Torneo de Lectura!');
  if(!title)return;
  const acts=CONTENT[parseInt(grade)]?.acts||[];
  if(!acts.length){alert('No hay actividades para ese grado.');return;}
  const act=acts[Math.floor(Math.random()*acts.length)];
  const end=new Date(Date.now()+3*24*3600000).toISOString(); // 3 días
  const torneo={active:true,grade:parseInt(grade),title,actId:act.id,endDate:end};
  localStorage.setItem('lm_torneo',JSON.stringify(torneo));
  if(fbReady&&fbDB)fbDB.ref('torneo').set(torneo);
  alert('✅ Torneo creado: '+title+'\nActividad: '+act.title+'\nDuración: 3 días');
  renderTorneo();
}

  const torneo=JSON.parse(localStorage.getItem('lm_torneo')||'null');

  window._torneoMode=true;
  openAct(torneo.actId);

function endTorneo(){
  if(!confirm('¿Terminar el torneo y anunciar ganadores?'))return;

function getPeerHints(actId){
  const allU=gU();
  const hints=[];
  Object.entries(allU).forEach(([k,v])=>{
    if(k===CU)return;
    (v.diary||[]).forEach(e=>{
      if(e.actId===actId&&e.text){
        hints.push({text:e.text,avatar:v.avatar||'🧑'});
      }
    });
  });
  return hints.slice(0,2);
}

function renderPeerHints(actId,container){

// ═══ FUNCIÓN 9: INFORME SEMANAL AUTOMÁTICO ════════════════════
// ══════════════════════════════════════════════════════════════
function generateWeeklyReport(){
  const el=document.getElementById('weeklyReportContent');if(!el)return;
  const allU=gU();
  const wk=getWeekId();
  const grades=[6,7,8,9];
  const now=new Date();

  // Datos globales
  const allStudents=Object.entries(allU).filter(([k,v])=>v.grade>0&&!v.isAdmin);
  const totalSts=allStudents.length;
  const activeThisWeek=allStudents.filter(([k,v])=>{
    return AREAS.some(a=>(v.weeklyProgress?.[a.id]?.[wk]||0)>0);
  }).length;
  const totalActsWeek=allStudents.reduce((s,[k,v])=>{
    return s+AREAS.reduce((a,ar)=>a+(v.weeklyProgress?.[ar.id]?.[wk]||0),0);
  },0);

  // Área más activa esta semana
  const areaCount={};AREAS.forEach(a=>{areaCount[a.id]=0;});
  allStudents.forEach(([k,v])=>{
    AREAS.forEach(a=>{areaCount[a.id]+=(v.weeklyProgress?.[a.id]?.[wk]||0);});
  });
  const topAreaId=Object.entries(areaCount).sort((a,b)=>b[1]-a[1])[0]?.[0]||'lectura';
  const topArea=AREAS.find(a=>a.id===topAreaId);

  // Tipo con mayor falla global
  const typeAcc={L:{c:0,t:0},I:{c:0,t:0},C:{c:0,t:0}};
  allStudents.forEach(([k,v])=>{
    (v.history||[]).forEach(h=>{
      if(typeAcc[h.tp]){typeAcc[h.tp].c+=h.c;typeAcc[h.tp].t+=h.t;}
    });
  });
  const typePcts=Object.entries(typeAcc).map(([tp,d])=>({tp,pct:d.t?Math.round(d.c/d.t*100):100}));
  const worstType=typePcts.sort((a,b)=>a.pct-b.pct)[0];
  const typeNames={L:'Literal',I:'Inferencial',C:'Crítico'};

  // Reporte por grado
  const gradeReports=grades.map(g=>{
    const sts=allStudents.filter(([k,v])=>v.grade===g);
    const active=sts.filter(([k,v])=>AREAS.some(a=>(v.weeklyProgress?.[a.id]?.[wk]||0)>0)).length;
    const avgXP=sts.length?Math.round(sts.reduce((s,[k,v])=>s+(v.xp||0),0)/sts.length):0;
    const complete=sts.filter(([k,v])=>AREAS.some(a=>(v.weeklyProgress?.[a.id]?.[wk]||0)>=WEEKLY_LIMIT)).length;
    return{g,total:sts.length,active,complete,avgXP};
  });

  el.innerHTML=`
  <div class="report-card">
    <div style="font-size:11px;color:var(--txt3);margin-bottom:12px;">📅 Semana: ${wk} · Generado: ${now.toLocaleString('es-CO')}</div>
    <div class="report-kpi">
      <div class="report-kpi-item">
        <div class="report-kpi-val" style="color:var(--neon);">${activeThisWeek}<span style="font-size:13px;color:var(--txt3);">/${totalSts}</span></div>
        <div class="report-kpi-lbl">Activos esta semana</div>
      </div>
      <div class="report-kpi-item">
        <div class="report-kpi-val" style="color:var(--gold);">${totalActsWeek}</div>
        <div class="report-kpi-lbl">Actividades completadas</div>
      </div>
      <div class="report-kpi-item">
        <div class="report-kpi-val" style="color:var(--npur);">${topArea?.icon||'📖'}</div>
        <div class="report-kpi-lbl">Área más activa: ${topArea?.name||''}</div>
      </div>
    </div>
    ${worstType?`<div style="background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);border-radius:var(--r);padding:10px 14px;margin-bottom:12px;font-size:13px;">
      ⚠️ Tipo con mayor dificultad: <strong style="color:var(--nred);">${typeNames[worstType.tp]}</strong> — precisión global ${worstType.pct}%
    </div>`:''}
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;">
      ${gradeReports.map(r=>`<div style="background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r);padding:10px 12px;">
        <div style="font-size:11px;font-weight:700;color:var(--neon);margin-bottom:6px;">GRADO ${r.g}°</div>
        <div style="font-size:12px;color:var(--txt2);">Activos: <strong>${r.active}/${r.total}</strong></div>
        <div style="font-size:12px;color:var(--txt2);">Semana completa: <strong style="color:var(--ngrn);">${r.complete}</strong></div>
        <div style="font-size:12px;color:var(--txt2);">XP prom: <strong style="color:var(--gold);">${r.avgXP}</strong></div>
      </div>`).join('')}
    </div>
  </div>`;
}

// ═══ FUNCIÓN 10: ALERTAS DE ESTUDIANTES EN RIESGO ═════════════

function renderRiskAlerts(){
  const el=document.getElementById('riskContent');if(!el)return;
  const allU=gU();
  const wk=getWeekId();
  const now=new Date();
  const risks=[];

  Object.entries(STUDENTS).filter(([k,v])=>v.grade>0&&!v.isAdmin).forEach(([k,st])=>{
    const v=allU[k];
    if(!v){
      risks.push({level:'high',name:st.name,grade:st.grade,reason:'Nunca ha ingresado a la plataforma',action:'Verificar credenciales de acceso'});
      return;
    }
    // Sin actividad en 2+ semanas
    const lastDate=v.lastDate?new Date(v.lastDate):null;
    const daysSince=lastDate?Math.floor((now-lastDate)/86400000):999;
    if(daysSince>=14){
      risks.push({level:'high',name:st.name,grade:st.grade,reason:`Sin actividad hace ${daysSince} días`,action:'Contactar al estudiante o acudiente'});
      return;
    }
    // Sin actividad esta semana
    const weekActs=AREAS.reduce((s,a)=>s+(v.weeklyProgress?.[a.id]?.[wk]||0),0);
    if(weekActs===0&&daysSince>=7){
      risks.push({level:'warn',name:st.name,grade:st.grade,reason:'Sin actividades esta semana',action:'Motivar a completar al menos 1 actividad'});
    }
    // Precisión muy baja
    const hist=v.history||[];
    const tq=hist.reduce((s,h)=>s+h.t,0),cq=hist.reduce((s,h)=>s+h.c,0);
    const acc=tq>=6?Math.round(cq/tq*100):null;
    if(acc!==null&&acc<40){
      risks.push({level:'warn',name:st.name,grade:st.grade,reason:`Precisión muy baja: ${acc}% en ${hist.length} actividades`,action:'Revisar tipo de dificultades y reforzar presencialmente'});
    }
  });

  if(risks.length===0){
    el.innerHTML=`<div style="text-align:center;padding:40px;"><div style="font-size:48px;margin-bottom:12px;">✅</div><div style="font-size:16px;font-weight:700;color:var(--ngrn);">¡Sin alertas activas!</div><div style="font-size:13px;color:var(--txt3);margin-top:8px;">Todos los estudiantes están en buen camino esta semana.</div></div>`;
    return;
  }

  const high=risks.filter(r=>r.level==='high');
  const warn=risks.filter(r=>r.level==='warn');

  el.innerHTML=`<div style="font-size:13px;color:var(--txt2);margin-bottom:14px;">${risks.length} estudiantes necesitan atención — ${high.length} urgentes, ${warn.length} en seguimiento.</div>
  ${high.length?`<h4 style="font-size:13px;color:var(--nred);margin-bottom:8px;">🚨 Urgente (${high.length})</h4>
  ${high.map(r=>`<div class="risk-card">
    <div style="flex:1;"><strong style="font-size:14px;">${r.name}</strong> <span style="font-size:11px;color:var(--txt3);">Grado ${r.grade}°</span>
    <div style="font-size:12px;color:var(--txt2);margin-top:3px;">⚠️ ${r.reason}</div>
    <div style="font-size:11px;color:var(--txt3);margin-top:2px;">→ ${r.action}</div></div>
    <span class="risk-badge">URGENTE</span>
  </div>`).join('')}`:''}
  ${warn.length?`<h4 style="font-size:13px;color:var(--norg);margin:14px 0 8px;">⏳ En seguimiento (${warn.length})</h4>
  ${warn.map(r=>`<div class="risk-card risk-warn">
    <div style="flex:1;"><strong style="font-size:14px;">${r.name}</strong> <span style="font-size:11px;color:var(--txt3);">Grado ${r.grade}°</span>
    <div style="font-size:12px;color:var(--txt2);margin-top:3px;">📊 ${r.reason}</div>
    <div style="font-size:11px;color:var(--txt3);margin-top:2px;">→ ${r.action}</div></div>
    <span class="risk-badge">SEGUIMIENTO</span>
  </div>`).join('')}`:''}`;
}

function processTextForDict(text){

    result=result.replace(regex,`<span class="dict-word" onclick="showDict('${word.toLowerCase()}',event)">$1</span>`);

}

  html+=`<div style="margin-top:14px;"><button onclick="launchDuel('bot')" style="display:flex;align-items:center;gap:10px;padding:12px 16px;background:linear-gradient(135deg,rgba(168,85,247,.06),rgba(244,114,182,.06));border:1px solid rgba(168,85,247,.15);border-radius:var(--r);cursor:pointer;max-width:350px;margin:0 auto;text-align:left;" onmouseover="this.style.borderColor='var(--npur)'" onmouseout="this.style.borderColor='rgba(168,85,247,.15)'">

    <div style="flex:1;"><strong style="font-size:14px;color:var(--txt);">Bot Lector</strong><div style="font-size:11px;color:var(--txt3);">Nivel adaptativo</div></div>

  </button></div>`;

  document.getElementById('modal').classList.add('open');
}
function launchDuel(oppKey){
  const acts=CONTENT[UD.grade].acts.filter(a=>a.qs&&a.qs.length>=3);
  if(acts.length===0)return;
  const act=acts[Math.floor(Math.random()*acts.length)];
  let opponent;
  if(oppKey==='bot'){opponent={name:'Bot Lector',avatar:'🤖'};}
  else{const allU=gU();const v=allU[oppKey];opponent={name:v?.name?.split(' ')[0]||oppKey,avatar:v?.avatar||'🧑'};}
  duelState={act,opponent,myScore:0,oppScore:0,qIdx:0,total:Math.min(act.qs.length,3)};
  showDuelQuestion();
}
function showDuelQuestion(){
  if(!duelState||duelState.qIdx>=duelState.total){endDuel();return;}
  const q=duelState.act.qs[duelState.qIdx];
  const mo=document.getElementById('moB');
  document.getElementById('moT').textContent='⚔️ DUELO 1v1 — Pregunta '+(duelState.qIdx+1)+'/'+duelState.total;
  document.getElementById('moType').textContent='Duelo';document.getElementById('moType').className='tbdg tG';
  let html=`<div class="duel-vs">
    <div class="duel-player"><span class="dp-av">${UD.avatar||'🧑'}</span><span class="dp-nm">${UD.name.split(' ')[0]}</span></div>
    <div class="duel-score">${duelState.myScore} — ${duelState.oppScore}</div>
    <div class="duel-player"><span class="dp-av">${duelState.opponent.avatar}</span><span class="dp-nm">${duelState.opponent.name}</span></div>
  </div>`;
  html+=`<div class="q-block"><h4 style="font-size:16px;">${q.q}</h4><div class="opts">${q.o.map((o,oi)=>`<button class="opt" onclick="duelAnswer(${duelState.qIdx},${oi})">${o}</button>`).join('')}</div></div>`;
  mo.innerHTML=html;
  document.getElementById('modal').classList.add('open');
}
function duelAnswer(qi,oi){
  const q=duelState.act.qs[qi];
  if(oi===q.c)duelState.myScore++;
  // Opponent "answers" with ~60% accuracy
  if(Math.random()<0.6)duelState.oppScore++;
  duelState.qIdx++;
  setTimeout(showDuelQuestion,600);
}
function endDuel(){
  const won=duelState.myScore>duelState.oppScore;
  const tie=duelState.myScore===duelState.oppScore;
  const xpWin=won?30:tie?15:5;
  UD.xp+=xpWin;sUser(CU,UD);

    <button class="duel-btn" onclick="closeMo();renderAll();">CONTINUAR</button>
  </div>`;
  duelState=null;
}

// ═══ ADMIN: TOPIC MASTERY SUMMARY ═══
function renderTopicSummary(g){
  const allU=gU();
  const students=Object.entries(allU).filter(([k,v])=>v.grade===g);
  const acts=CONTENT[g]?.acts||[];
  if(students.length===0||acts.length===0)return'';

  // Group by theme
  const themes={soc:'Sociales',nat:'Ciencias',lit:'Literatura',tec:'Tecnología',art:'Arte',gen:'Cultura General'};
  let themeStats={};
  Object.keys(themes).forEach(t=>{
    const themeActs=acts.filter(a=>a.theme===t);
    if(themeActs.length===0)return;
    let totalQ=0,correctQ=0;
    students.forEach(([k,v])=>{
      (v.history||[]).forEach(h=>{
        const act=acts.find(a=>a.title===h.n&&a.theme===t);
        if(act){totalQ+=h.t;correctQ+=h.c;}
      });
    });
    const pct=totalQ?Math.round(correctQ/totalQ*100):0;
    themeStats[t]={name:themes[t],total:themeActs.length,pct,totalQ,correctQ};
  });

  // Type mastery
  const types={L:{name:'Literal',color:'var(--ngrn)'},I:{name:'Inferencial',color:'var(--npur)'},C:{name:'Crítico',color:'var(--norg)'}};
  let typeStats={};
  Object.entries(types).forEach(([t,info])=>{
    let totalQ=0,correctQ=0;
    students.forEach(([k,v])=>{
      (v.history||[]).forEach(h=>{if(h.tp===t){totalQ+=h.t;correctQ+=h.c;}});
    });
    typeStats[t]={...info,pct:totalQ?Math.round(correctQ/totalQ*100):0};
  });

  let html=`<div class="admin-card"><h3>📊 Dominio por Tipo de Comprensión — Grado ${g}°</h3>
  <div class="sum-chart">`;
  Object.entries(typeStats).forEach(([t,s])=>{
    const color=s.pct>=70?'var(--ngrn)':s.pct>=50?'var(--norg)':'var(--nred)';
    html+=`<div class="sum-bar-col"><div class="sum-bar-wrap"><div class="sum-bar-fill" style="height:${Math.max(s.pct,5)}%;background:${color};"></div></div><div class="sum-bar-val">${s.pct}%</div><div class="sum-bar-label">${s.name}</div></div>`;
  });
  html+=`</div></div>`;

  html+=`<div class="admin-card"><h3>📚 Dominio por Tema — Grado ${g}°</h3>`;
  const sortedThemes=Object.entries(themeStats).sort((a,b)=>a[1].pct-b[1].pct);
  sortedThemes.forEach(([t,s])=>{
    const color=s.pct>=70?'var(--ngrn)':s.pct>=50?'var(--norg)':'var(--nred)';
    const status=s.pct>=70?'✅ Dominado':s.pct>=50?'⚠️ En progreso':s.totalQ===0?'📋 Sin datos':'❌ Necesita refuerzo';
    html+=`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--brd);">
      <div style="width:120px;font-weight:700;font-size:13px;color:var(--txt);">${s.name}</div>
      <div style="flex:1;height:12px;background:var(--bg);border-radius:50px;overflow:hidden;"><div style="height:100%;width:${s.pct}%;background:${color};border-radius:50px;"></div></div>
      <div style="min-width:40px;font-weight:800;font-size:12px;font-family:Orbitron;color:${color};">${s.pct}%</div>
      <div style="font-size:11px;color:var(--txt2);min-width:110px;">${status}</div>
    </div>`;
  });
  html+=`</div>`;
  return html;
}
</script>

<script>
// ═══ PWA — Offline + Instalable ═══
// Registrar Service Worker (archivo sw.js en el mismo directorio)
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').then(reg=>{
    console.log('✅ PWA Service Worker registrado');
    setInterval(()=>reg.update(),1800000);
  }).catch(()=>{
    console.log('ℹ️ SW no disponible — usando cache directo');
  });
}
// Cache directo como fallback: guardar el HTML en localStorage para offline
try{
  const pageHTML=document.documentElement.outerHTML;
  if(pageHTML.length<600000)localStorage.setItem('lm_offline_page',pageHTML);
}catch(e){}
// Detectar offline y mostrar indicador
window.addEventListener('online',()=>{
  const d=document.getElementById('offlineBadge');if(d)d.remove();
  console.log('🌐 Conexión restaurada');
});
window.addEventListener('offline',()=>{
  if(document.getElementById('offlineBadge'))return;
  const d=document.createElement('div');d.id='offlineBadge';
  d.style.cssText='position:fixed;top:60px;right:12px;background:rgba(251,146,60,.9);color:#000;padding:6px 14px;border-radius:50px;font-size:11px;font-weight:700;z-index:9999;font-family:Outfit,sans-serif;box-shadow:0 4px 12px rgba(0,0,0,.3);';
  d.textContent='📡 Sin conexión — modo offline';
  document.body.appendChild(d);
});
// ═══ PWA Install prompt ═══
let deferredPrompt;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();
  deferredPrompt=e;
  // Show install button in header (permanent, not floating)
  const btn=document.getElementById('installBtn');
  if(btn){btn.style.display='flex';btn.style.animation='pulse 2s ease-in-out infinite';}
});
function installPWA(){
  if(!deferredPrompt){
    // Fallback: manual instructions
    alert('📲 Para instalar LectoMaster:\n\n1. Toca los 3 puntos ⋮ de Chrome (arriba a la derecha)\n2. Toca "Instalar aplicación" o "Añadir a pantalla de inicio"\n3. ¡Listo! Aparecerá el icono en tu celular');
    return;
  }
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(choice=>{
    if(choice.outcome==='accepted'){
      const btn=document.getElementById('installBtn');
      if(btn)btn.style.display='none';
    }
    deferredPrompt=null;
  });
}
// Hide install button if already installed (standalone mode)
if(window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone){
  const btn=document.getElementById('installBtn');if(btn)btn.style.display='none';
}
</script>
