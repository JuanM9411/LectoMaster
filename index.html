genGrade(8, [
  {id:'8L01',zone:0,title:'Conflicto armado colombiano',icon:'🕊️',type:'L',theme:'soc',xp:30,text:'Duró más de 50 años. Surgieron guerrillas como FARC y ELN en los 60, motivadas por desigualdad y exclusión política. Más de 8 millones de desplazados. En 2016 se firmó acuerdo de paz en La Habana. Santos recibió Nobel de la Paz.',source:'Historia contemporánea',qs:[{q:'¿Cuántos años duró?',t:'L',o:['10','20','30','Más de 50'],c:3},{q:'¿Cuántos desplazados hubo?',t:'L',o:['1 millón','500 mil','3 millones','8 millones'],c:3},{q:'¿Dónde se firmó el acuerdo?',t:'L',o:['Washington','Madrid','Bogotá','La Habana'],c:3}]},
  {id:'8L02',zone:0,title:'Crónica de una muerte anunciada',icon:'📕',type:'L',theme:'lit',xp:30,text:'Todo el pueblo sabía que los hermanos Vicario matarían a Santiago Nasar. La noticia se esparció desde la madrugada. Muchos intentaron advertirle pero por confusión, indiferencia o incredulidad, nadie lo evitó. El narrador reconstruye los hechos años después entrevistando habitantes.',source:'García Márquez — Literatura',qs:[{q:'¿Quiénes cometerían el crimen?',t:'L',o:['Los hermanos Vicario','El narrador','La policía','Santiago Nasar'],c:0},{q:'¿Sabía el pueblo?',t:'L',o:['Nadie','Sí, todos lo sabían','No','Solo algunos'],c:1},{q:'¿Cómo reconstruye la historia?',t:'L',o:['Viendo fotos','Imaginando','Leyendo periódico','Entrevistando habitantes'],c:3}]},
  {id:'8L03',zone:0,title:'La tabla periódica',icon:'⚗️',type:'L',theme:'nat',xp:30,text:'Dmitri Mendeléyev organizó los elementos químicos en 1869. La tabla actual tiene 118 elementos. El hidrógeno es el más ligero y abundante del universo. El oganesson (118) es el más pesado y fue creado artificialmente en 2006. El cuerpo humano está compuesto principalmente de oxígeno (65%), carbono (18%), hidrógeno (10%) y nitrógeno (3%).',source:'Química',qs:[{q:'¿Quién organizó la tabla periódica?',t:'L',o:['Curie','Newton','Einstein','Mendeléyev'],c:3},{q:'¿Cuántos elementos tiene?',t:'L',o:['150','118','92','100'],c:1},{q:'¿Cuál es el elemento más abundante en el cuerpo?',t:'L',o:['Nitrógeno','Carbono','Hidrógeno','Oxígeno'],c:3}]},
  {id:'8L04',zone:0,title:'El Renacimiento',icon:'🎭',type:'L',theme:'art',xp:30,text:'El Renacimiento (siglos XV-XVI) fue un movimiento cultural que nació en Italia. Leonardo da Vinci pintó La Mona Lisa y diseñó máquinas voladoras. Miguel Ángel esculpió el David y pintó la Capilla Sixtina. Galileo demostró que la Tierra gira alrededor del Sol. El Renacimiento colocó al ser humano en el centro del pensamiento, reemplazando el dominio de la Iglesia sobre el conocimiento.',source:'Historia del arte y la ciencia',qs:[{q:'¿Dónde nació el Renacimiento?',t:'L',o:['Alemania','Francia','Italia','España'],c:2},{q:'¿Quién pintó la Capilla Sixtina?',t:'L',o:['Leonardo','Rafael','Miguel Ángel','Botticelli'],c:2},{q:'¿Qué demostró Galileo?',t:'L',o:['Que la Tierra es plana','Que la Luna tiene agua','Que la Tierra gira alrededor del Sol','Que el Sol es frío'],c:2}]},
  {id:'8L05',zone:0,title:'Las vacunas',icon:'💉',type:'L',theme:'nat',xp:30,text:'Edward Jenner creó la primera vacuna en 1796 contra la viruela, usando pus de viruela bovina. La viruela mataba a 400.000 europeos al año antes de la vacuna. En 1980, la OMS declaró la viruela erradicada: la primera enfermedad eliminada por la humanidad. Hoy existen vacunas contra más de 25 enfermedades. La vacunación salva entre 3.5 y 5 millones de vidas cada año.',source:'Historia de la medicina',qs:[{q:'¿Quién creó la primera vacuna?',t:'L',o:['Pasteur','Jenner','Fleming','Koch'],c:1},{q:'¿Cuándo se erradicó la viruela?',t:'L',o:['2000','1950','1970','1980'],c:3},{q:'¿Cuántas vidas salva la vacunación al año?',t:'L',o:['3.5-5 millones','10 millones','1 millón','500 mil'],c:0}]},
  {id:'8L06',zone:0,title:'Streaming: el fin del cine',icon:'🎬',type:'L',theme:'tec',xp:30,text:'Netflix comenzó en 1997 enviando DVDs por correo. En 2007 lanzó el streaming. Hoy tiene 260 millones de suscriptores. En 2020, durante la pandemia, las plataformas de streaming crecieron 40%. Los cines perdieron el 80% de su audiencia. Disney+, HBO Max, Amazon Prime y Spotify compiten por nuestra atención. Un estadounidense promedio pasa 4.5 horas diarias viendo contenido en streaming.',source:'Industria del entretenimiento',qs:[{q:'¿Cuándo comenzó Netflix?',t:'L',o:['1997','2010','2007','2015'],c:0},{q:'¿Cuántos suscriptores tiene Netflix?',t:'L',o:['260 millones','150 millones','100 millones','500 millones'],c:0},{q:'¿Cuánto creció el streaming durante la pandemia?',t:'L',o:['10%','20%','80%','40%'],c:3}]},
  {id:'8L07',zone:0,title:'La Revolución Francesa',icon:'🇫🇷',type:'L',theme:'soc',xp:30,text:'Comenzó en 1789 con la toma de la Bastilla el 14 de julio. El pueblo francés se rebeló contra la monarquía de Luis XVI. Los revolucionarios proclamaron "Libertad, Igualdad, Fraternidad". Se abolieron los privilegios de la nobleza. Luis XVI y María Antonieta fueron guillotinados en 1793. La revolución inspiró movimientos de independencia en toda América Latina.',source:'Historia Universal',qs:[{q:'¿En qué año comenzó?',t:'L',o:['1789','1810','1776','1799'],c:0},{q:'¿Cuál era el lema?',t:'L',o:['Dios y patria','Libertad, Igualdad, Fraternidad','Paz y guerra','Rey y pueblo'],c:1},{q:'¿A quién inspiró en América Latina?',t:'L',o:['A los movimientos de independencia','A los conquistadores','A los comerciantes','A los artistas'],c:0}]},
  {id:'8L08',zone:0,title:'Agujeros negros',icon:'🕳️',type:'L',theme:'nat',xp:30,text:'Un agujero negro es una región del espacio donde la gravedad es tan intensa que nada puede escapar, ni siquiera la luz. Se forman cuando estrellas masivas colapsan al final de su vida. En 2019, el telescopio Event Horizon capturó la primera imagen real de un agujero negro, ubicado a 55 millones de años luz. El agujero negro más cercano a la Tierra está a 1.600 años luz.',source:'Astrofísica',qs:[{q:'¿Por qué nada escapa de un agujero negro?',t:'L',o:['Porque es grande','Porque es oscuro','Porque su gravedad es tan intensa que atrapa hasta la luz','Porque está lejos'],c:2},{q:'¿Cuándo se tomó la primera foto real?',t:'L',o:['2022','2010','2015','2019'],c:3},{q:'¿Cómo se forman?',t:'L',o:['Cuando estrellas masivas colapsan','Por radiación','Por meteoritos','Por explosiones'],c:0}]},
  {id:'8L09',zone:0,title:'Pablo Neruda',icon:'✍️',type:'L',theme:'lit',xp:30,text:'Neftalí Ricardo Reyes Basoalto, conocido como Pablo Neruda, nació en Chile en 1904. Escribió más de 50 libros de poesía. "Veinte poemas de amor y una canción desesperada" (1924) es uno de los poemarios más vendidos en español. Recibió el Nobel de Literatura en 1971. Fue también diplomático y político. Murió en 1973, 12 días después del golpe de Estado contra Salvador Allende.',source:'Literatura latinoamericana',qs:[{q:'¿De qué país era Neruda?',t:'L',o:['Argentina','Colombia','México','Chile'],c:3},{q:'¿Cuántos libros escribió?',t:'L',o:['25','100','Más de 50','10'],c:2},{q:'¿En qué año ganó el Nobel?',t:'L',o:['1980','1950','1971','1965'],c:2}]},
  {id:'8L10',zone:0,title:'Las criptomonedas',icon:'₿',type:'L',theme:'tec',xp:30,text:'Bitcoin fue creado en 2009 por una persona o grupo bajo el pseudónimo Satoshi Nakamoto. Es una moneda digital descentralizada: no depende de ningún banco ni gobierno. Funciona con tecnología blockchain, un registro público e inmutable de transacciones. En 2021, El Salvador se convirtió en el primer país en adoptar Bitcoin como moneda legal. Existen más de 20.000 criptomonedas diferentes.',source:'Tecnología financiera',qs:[{q:'¿Quién creó Bitcoin?',t:'L',o:['Satoshi Nakamoto','Elon Musk','Steve Jobs','Mark Zuckerberg'],c:0},{q:'¿En qué año se creó?',t:'L',o:['2005','2013','2017','2009'],c:3},{q:'¿Qué país lo adoptó como moneda legal?',t:'L',o:['Japón','Suiza','El Salvador','EE.UU.'],c:2}]},
  // INFERENCIAL
  {id:'8I01',zone:1,title:'Calentamiento global',icon:'🌡️',type:'I',theme:'nat',xp:50,text:'La temperatura global ha aumentado 1.1°C desde la era preindustrial. Parece poco. Pero ha provocado: derretimiento de glaciares, aumento del mar, sequías extremas. Los 10 países más ricos producen el 70% de emisiones. Los más afectados son los más pobres, que paradójicamente menos contaminan.',source:'Cambio climático',qs:[{q:'¿Qué paradoja señala?',t:'I',o:['Que hace frío','Que los más afectados son los que menos contaminan','Todos contaminan igual','No hay problema'],c:1},{q:'¿Por qué "1.1°C" no es poco?',t:'I',o:['No importa','Termómetros fallan','Es mentira','Sus efectos ya son devastadores a escala global'],c:3},{q:'¿Crítica implícita a acuerdos internacionales?',t:'I',o:['Son secretos','No existen','Son buenos','Son voluntarios y difíciles de hacer cumplir'],c:3}]},
  {id:'8I02',zone:1,title:'1984 y la vigilancia',icon:'👁️',type:'I',theme:'lit',xp:50,text:'En "1984" de Orwell, "El Gran Hermano" vigila a todos mediante pantallas. Pensar diferente es crimen. Se creía exagerada en 1949. Hoy, con reconocimiento facial, algoritmos predictivos y redes que registran cada clic, muchos preguntan: ¿Orwell fue novelista o profeta?',source:'Literatura y sociedad',qs:[{q:'¿Por qué compara la novela con la actualidad?',t:'I',o:['Las novelas se cumplen','Orwell vivió hoy','La tecnología actual se parece a la vigilancia del libro','Es ficción'],c:2},{q:'¿Qué significa "novelista o profeta"?',t:'I',o:['Era religioso','Escribía mal','Adivinaba el futuro','Lo que imaginó como ficción se está haciendo realidad'],c:3},{q:'¿Idea principal?',t:'I',o:['Debemos leer más','La vigilancia tecnológica actual plantea preguntas similares a la novela','1984 es buen libro','La tecnología es mala'],c:1}]},
  {id:'8I03',zone:1,title:'El síndrome del impostor',icon:'🎭',type:'I',theme:'gen',xp:50,text:'El 70% de las personas experimenta el "síndrome del impostor" al menos una vez: la sensación de no merecer sus logros y el miedo a ser "descubierto" como fraude. Afecta más a personas exitosas, mujeres, minorías y estudiantes de alto rendimiento. Albert Einstein dijo: "La exagerada estima en que se tiene mi trabajo me hace sentir muy incómodo, a veces me siento como un estafador involuntario."',source:'Psicología',qs:[{q:'¿Qué revela que Einstein también lo sintiera?',t:'I',o:['Que todos son genios','Que era fraude','Que era modesto','Que ni el mayor genio es inmune a la inseguridad sobre sus propios logros'],c:3},{q:'¿Por qué afecta más a personas exitosas?',t:'I',o:['Porque no son inteligentes','Porque son débiles','Porque tienen más trabajo','Porque a mayor éxito, mayor presión de estar a la altura y mayor miedo a fallar'],c:3},{q:'¿Qué implica que el 70% lo experimente?',t:'I',o:['Que somos fraudulentos','Que es parte normal de la experiencia humana, no un defecto personal','Que nadie es bueno','Que la psicología miente'],c:1}]},
  {id:'8I04',zone:1,title:'La tragedia de los comunes',icon:'🐄',type:'I',theme:'soc',xp:50,text:'Imagina un pastizal compartido por varios ganaderos. Cada uno tiene incentivo para añadir más vacas (más ganancia individual). Pero si todos lo hacen, el pasto se agota y TODOS pierden. Este dilema explica por qué los océanos se sobrepescan, los bosques se talan y el aire se contamina: el beneficio es individual pero el costo lo paga la comunidad.',source:'Economía y medioambiente',qs:[{q:'¿Por qué cada ganadero añade más vacas?',t:'I',o:['Porque le gustan las vacas','Porque tiene espacio','Porque el beneficio es individual aunque el daño sea colectivo','Porque es tonto'],c:2},{q:'¿Cómo aplica esto a la contaminación?',t:'I',o:['Cada empresa contamina porque el beneficio es propio pero el aire contaminado lo respiramos todos','No aplica','Solo aplica al campo','Las empresas no contaminan'],c:0},{q:'¿Cuál sería la solución?',t:'I',o:['Prohibir vacas','Regulaciones colectivas que hagan que el costo individual refleje el costo social','No hacer nada','Cada quien cuide lo suyo'],c:1}]},
  {id:'8I05',zone:1,title:'Romeo y Julieta: ¿amor o impulsividad?',icon:'💔',type:'I',theme:'lit',xp:50,text:'Romeo y Julieta se conocen, se enamoran, se casan secretamente y mueren... todo en 4 días. Romeo tenía aproximadamente 16 años y Julieta 13. Antes de conocer a Julieta, Romeo estaba "locamente enamorado" de Rosalina. Shakespeare no escribió una historia de amor ideal: escribió una tragedia sobre la impulsividad juvenil potenciada por el odio familiar.',source:'Shakespeare — Análisis literario',qs:[{q:'¿Cuánto dura toda la historia?',t:'I',o:['4 días','Años','Semanas','Meses'],c:0},{q:'¿Qué sugiere que Romeo estuviera enamorado de Rosalina antes?',t:'I',o:['Que era infiel','Nada','Que su "amor" podría ser impulsividad adolescente, no amor profundo','Que era romántico'],c:2},{q:'¿Cuál era la verdadera intención de Shakespeare?',t:'I',o:['Contar una historia bonita','Mostrar cómo la impulsividad y el odio causan tragedias evitables','Hacer llorar','Celebrar el amor'],c:1}]},
  {id:'8I06',zone:1,title:'La gentrificación',icon:'🏘️',type:'I',theme:'soc',xp:50,text:'Cuando un barrio popular se "pone de moda", llegan cafeterías, tiendas caras y personas con más ingresos. Los precios suben. Los residentes originales, que dieron identidad al barrio, son desplazados por no poder pagar. En Bogotá, barrios como La Candelaria y Chapinero viven este proceso. Los nuevos residentes disfrutan de la "cultura local" que ellos mismos están eliminando al desplazar a quienes la crearon.',source:'Urbanismo y sociedad',qs:[{q:'¿Cuál es la ironía de la gentrificación?',t:'I',o:['Que los barrios son feos','Que los barrios mejoran','Que se busca la cultura local pero se desplaza a quienes la crearon','Que es cara'],c:2},{q:'¿Quiénes se benefician y quiénes se perjudican?',t:'I',o:['Solo ganan los viejos','Todos ganan','Nadie pierde','Se benefician los nuevos residentes y propietarios; se perjudican los originales'],c:3},{q:'¿Qué solución propondrías?',t:'I',o:['Que todos se vayan','No hacer nada','Políticas de vivienda accesible que protejan a residentes originales','Prohibir mudanzas'],c:2}]},
  {id:'8I07',zone:1,title:'El sesgo de confirmación',icon:'🔍',type:'I',theme:'gen',xp:50,text:'El cerebro humano tiende a buscar información que confirme lo que ya cree y a ignorar la que lo contradiga. Si crees que tu equipo es el mejor, recordarás sus victorias y olvidarás sus derrotas. Si crees que un político es corrupto, cualquier noticia ambigua la interpretarás como prueba de corrupción. Este sesgo es inconsciente y afecta a TODOS, incluidos los más inteligentes.',source:'Psicología cognitiva — Pensamiento crítico',qs:[{q:'¿Qué es el sesgo de confirmación?',t:'I',o:['Un examen','Un tipo de mentira','Un error de cálculo','La tendencia a buscar solo información que confirme lo que ya creemos'],c:3},{q:'¿Por qué es peligroso?',t:'I',o:['No es peligroso','Porque afecta a pocos','Porque es inconsciente','Porque nos impide evaluar evidencia de forma objetiva y nos encierra en nuestras creencias'],c:3},{q:'¿Cómo puedes combatirlo?',t:'I',o:['Leyendo más','No se puede','Siendo más inteligente','Buscando activamente argumentos que contradigan tu postura antes de formar opinión'],c:3}]},
  {id:'8I08',zone:1,title:'La Mona Lisa: ¿por qué es famosa?',icon:'🖼️',type:'I',theme:'art',xp:50,text:'La Mona Lisa no es la pintura más bella, más grande ni más técnica de la historia. Mide solo 77x53 cm. Entonces, ¿por qué es la más famosa? En 1911 fue ROBADA del Louvre. El robo generó escándalo mundial en periódicos. Cuando fue recuperada, millones querían ver "la pintura que alguien quiso robar". La fama se retroalimentó: es famosa porque es famosa.',source:'Arte y sociología de la fama',qs:[{q:'¿Qué evento catapultó su fama?',t:'I',o:['Una exposición','Su robo en 1911 y la cobertura mediática','Un concurso','Su precio'],c:1},{q:'¿Qué fenómeno social describe el texto?',t:'I',o:['Que los robos son buenos','Que el arte es subjetivo','Que la fama puede ser un ciclo que se retroalimenta: es famosa porque es famosa','Que el Louvre es importante'],c:2},{q:'¿Dónde más ves este fenómeno?',t:'I',o:['En ningún lado','En influencers que son famosos por ser famosos, no por un talento específico','Solo en museos','Solo en arte'],c:1}]},
  {id:'8I09',zone:1,title:'La isla de la basura',icon:'🏝️',type:'I',theme:'nat',xp:50,text:'En el Pacífico Norte existe una "isla" de basura plástica del tamaño de Francia. Se formó por las corrientes oceánicas que concentran los desechos. El 80% proviene de tierra firme: botellas, bolsas, microplásticos. Los peces ingieren estos plásticos y nosotros comemos esos peces: un estudio encontró que una persona promedio ingiere 5 gramos de plástico por semana, equivalente a una tarjeta de crédito.',source:'Contaminación — Medioambiente',qs:[{q:'¿Qué implica que comamos plástico a través de los peces?',t:'I',o:['Que la contaminación ambiental regresa a nosotros: lo que le hacemos al planeta nos lo hacemos a nosotros mismos','Que los peces son malos','Nada','Que no debemos comer pescado'],c:0},{q:'¿Por qué el texto dice "isla" entre comillas?',t:'I',o:['Porque es nueva','Porque es pequeña','Porque no existe','Porque no es una isla sólida sino una acumulación dispersa de microplásticos'],c:3},{q:'¿Qué responsabilidad individual se deduce?',t:'I',o:['Cada objeto plástico que tiramos puede terminar en el océano y volver a nosotros','Ninguna','El plástico no contamina','Solo los gobiernos son responsables'],c:0}]},
  {id:'8I10',zone:1,title:'El placebo: la mente cura',icon:'💊',type:'I',theme:'nat',xp:50,text:'En ensayos clínicos, pacientes que reciben una pastilla de azúcar creyendo que es medicina real mejoran sus síntomas en un 30-40% de los casos. Esto se llama efecto placebo. Funciona incluso cuando el paciente SABE que es placebo (estudios de Harvard, 2010). El cerebro libera sustancias curativas reales cuando cree que está siendo tratado. ¿Qué nos dice esto sobre el poder de la mente sobre el cuerpo?',source:'Neurociencia médica',qs:[{q:'¿Qué es lo más sorprendente del efecto placebo?',t:'I',o:['Que funciona incluso cuando el paciente sabe que es placebo','Que las pastillas son de azúcar','Que los médicos mienten','Que es mentira'],c:0},{q:'¿Qué revela sobre la relación mente-cuerpo?',t:'I',o:['Que la mente es débil','Que la creencia y expectativa tienen poder fisiológico real sobre nuestra salud','Que el cuerpo no importa','Que la medicina no funciona'],c:1},{q:'¿Qué implicaciones tiene para la medicina?',t:'I',o:['Que el tratamiento psicológico y la confianza en el proceso son componentes reales de la curación','Que los doctores sobran','Que todos deberían tomar placebos','Que los medicamentos no sirven'],c:0}]},
  // CRÍTICO
  {id:'8C01',zone:2,title:'Memoria vs. olvido',icon:'🕯️',type:'C',theme:'soc',xp:65,text:'Las Madres de Plaza de Mayo marcharon décadas por justicia. Colombia creó el Centro de Memoria Histórica. Alemania tiene "stolpersteine" — piedras con nombres de víctimas del Holocausto. Algunos políticos piden "pasar la página". Las víctimas responden: "Quien olvida está condenado a repetir." ¿Recordar es vivir en el pasado o es construir un futuro justo?',source:'Memoria histórica — DBA',qs:[{q:'¿Por qué las víctimas se oponen a "pasar la página"?',t:'C',o:['Les gusta el pasado','No quieren cambiar','Sin memoria no hay justicia ni garantía de no repetición','Son vengativas'],c:2},{q:'¿Argumento más fuerte del texto?',t:'C',o:['La historia no importa','Recordar es la base para no repetir tragedias','Hay que olvidar','Solo importa el futuro'],c:1},{q:'¿Tu postura argumentada?',t:'C',o:['Olvidar todo','No me interesa','La memoria histórica es necesaria para justicia y no repetición','Solo importa mi vida'],c:2}]},
  {id:'8C02',zone:2,title:'¿Meritocracia o privilegio?',icon:'⚖️',type:'C',theme:'soc',xp:65,text:'Estudiante estrato 6: colegio bilingüe, internet, clases extras, espacio silencioso. Estudiante rural en Chocó: 2 horas caminando, sin biblioteca, un profesor para todos los grados, sin internet. Ambos presentan la misma prueba Saber. Cuando el primero obtiene mejor puntaje, se dice que "se esforzó más". ¿Es justo medir con la misma vara a quienes no partieron del mismo punto?',source:'Desigualdad educativa',qs:[{q:'¿Tesis central?',t:'C',o:['Medir por igual a personas en condiciones desiguales no es justo','Estudiar no importa','Las pruebas son fáciles','El campo es malo'],c:0},{q:'¿Qué cuestiona sobre la meritocracia?',t:'C',o:['Solo aplica en Bogotá','Que es perfecta','Que no existe','Que ignora las desigualdades de partida'],c:3},{q:'¿Solución argumentada?',t:'C',o:['Eliminar pruebas','Que todos vivan en Bogotá','Garantizar condiciones equitativas antes de evaluar por igual','Que nadie estudie'],c:2}]},
  {id:'8C03',zone:2,title:'Prisión vs. rehabilitación',icon:'🔒',type:'C',theme:'soc',xp:65,text:'Noruega: cárceles que parecen residencias, reincidencia del 20%. EE.UU.: cárceles hacinadas, reincidencia del 76%. Colombia intenta ser restaurativo pero los recursos faltan. ¿Castigar previene el crimen o lo reproduce?',source:'Justicia y sociedad',qs:[{q:'¿Qué evidencia usa el texto?',t:'C',o:['Ninguna','Datos comparativos entre Noruega (20%) y EE.UU. (76%)','Noticias falsas','Opiniones'],c:1},{q:'¿Tesis implícita?',t:'C',o:['La justicia restaurativa puede ser más efectiva','El castigo funciona','Adolescentes no cometen crímenes','No hay solución'],c:0},{q:'¿Contraargumento válido?',t:'C',o:['No hay','El castigo siempre es mejor','La restaurativa podría percibirse como impunidad si no se implementa bien','No importa'],c:2}]},
  {id:'8C04',zone:2,title:'Fast fashion: ropa que mata',icon:'👕',type:'C',theme:'nat',xp:65,text:'La industria de la moda es la segunda más contaminante del mundo. Cada año se producen 100.000 millones de prendas. El 60% termina en basureros antes de un año. En 2013, el edificio Rana Plaza en Bangladesh colapsó matando a 1.134 trabajadores textiles que ganaban $2 diarios cosiendo ropa para marcas occidentales. Nosotros compramos ropa barata; alguien más paga el precio real con su salud, su vida y su planeta.',source:'Economía global — Ética del consumo',qs:[{q:'¿Por qué el texto dice "ropa que mata"?',t:'C',o:['Porque es cara','Porque es fea','Porque la producción masiva de moda barata cuesta vidas humanas y destruye el planeta','Porque es venenosa'],c:2},{q:'¿Cuál es la responsabilidad del consumidor?',t:'C',o:['Cada compra de ropa barata financia un sistema de explotación y contaminación','Solo de las empresas','Solo de los gobiernos','Ninguna'],c:0},{q:'¿Qué podrías hacer?',t:'C',o:['Comprar solo caro','Comprar menos, elegir mejor, y exigir transparencia a las marcas','Dejar de vestirse','Nada'],c:1}]},
  {id:'8C05',zone:2,title:'Drogas: ¿legalizar o prohibir?',icon:'🚫',type:'C',theme:'soc',xp:65,text:'La "guerra contra las drogas" lleva 50 años y ha costado billones de dólares. El consumo NO ha disminuido. En cambio, ha llenado cárceles, financiado carteles y causado violencia. Portugal despenalizó todas las drogas en 2001: el consumo bajó, las muertes por sobredosis cayeron 80% y las cárceles se desahogaron. Los recursos se destinaron a tratamiento de salud en lugar de persecución criminal.',source:'Política de drogas — Salud pública',qs:[{q:'¿Qué demuestra el caso de Portugal?',t:'C',o:['Que Portugal es diferente','Que hay que legalizar todo','Que tratar el consumo como tema de salud funciona mejor que criminalizarlo','Que las drogas son buenas'],c:2},{q:'¿Por qué la "guerra contra las drogas" fracasó según el texto?',t:'C',o:['Porque no redujo el consumo y en cambio generó violencia y encarcelamiento masivo','Porque faltó dinero','Porque los policías son malos','Porque las drogas son fuertes'],c:0},{q:'¿Cuál es la postura del texto?',t:'C',o:['Anti-drogas','Pro-drogas','Neutral','Que un enfoque de salud pública es más efectivo que uno punitivo'],c:3}]},
  {id:'8C06',zone:2,title:'El derecho al olvido digital',icon:'🗑️',type:'C',theme:'tec',xp:65,text:'En Europa existe el "derecho al olvido": puedes pedir a Google que elimine resultados sobre ti. Un hombre pidió eliminar una noticia de 1998 sobre una deuda que ya pagó, pero que seguía apareciendo al buscar su nombre, afectando su vida laboral. A favor: las personas merecen superar errores del pasado. En contra: limita la libertad de información y podría usarse para ocultar crímenes o corrupción. ¿Quién decide qué se olvida?',source:'Derechos digitales — Tecnología',qs:[{q:'¿Cuál es el conflicto de derechos?',t:'C',o:['Privacidad vs. libertad de vestir','El derecho a la privacidad y la segunda oportunidad vs. el derecho a la información','Información vs. entretenimiento','No hay conflicto'],c:1},{q:'¿Cuándo sería peligroso el derecho al olvido?',t:'C',o:['Siempre','Cuando se usa para ocultar información de interés público como crímenes o corrupción','Solo en Europa','Nunca'],c:1},{q:'¿Cómo se debería regular?',t:'C',o:['Con criterios claros: proteger a personas comunes pero mantener información de interés público','Eliminar todo','Mantener todo','Sin regulación'],c:0}]},
  {id:'8C07',zone:2,title:'Turismo: ¿desarrollo o destrucción?',icon:'✈️',type:'C',theme:'gen',xp:65,text:'El turismo genera el 10% del empleo mundial. En Cartagena, genera millones pero también desplaza a comunidades afro de Getsemaní por gentrificación turística. En Barcelona, los habitantes protestan con carteles "Tourists go home". Venecia limita cruceros porque hundían la ciudad. ¿El turismo masivo beneficia a las comunidades o las consume para entretenimiento de otros?',source:'Economía y cultura — Turismo sostenible',qs:[{q:'¿Cuál es la paradoja del turismo en Getsemaní?',t:'C',o:['Que hay muchos turistas','El turismo valora la cultura afro pero desplaza a la comunidad que la creó','Que es caro','Que es bonito'],c:1},{q:'¿Por qué la protesta de Barcelona dice "Tourists go home"?',t:'C',o:['Porque son xenófobos','Porque no hay espacio','Porque no les gusta viajar','Porque el turismo masivo degrada la calidad de vida de los residentes'],c:3},{q:'¿Cuál sería un turismo más ético?',t:'C',o:['Prohibir turismo','Turismo solo para ricos','Más turismo en todo lado','Turismo que limite la masificación, beneficie a comunidades locales y respete los ecosistemas'],c:3}]},
  {id:'8C08',zone:2,title:'¿Las mascotas deben tener derechos?',icon:'🐕',type:'C',theme:'nat',xp:65,text:'En Colombia, la Ley 1774 de 2016 reconoce a los animales como "seres sintientes" y penaliza el maltrato. Pero las corridas de toros siguen siendo legales como "patrimonio cultural". En 2023, una jueza argentina otorgó a una orangutana cautiva el derecho de habeas corpus (protección contra detención ilegal), reconociéndola como "persona no humana". Si los animales sienten dolor y tienen emociones, ¿dónde trazamos la línea de sus derechos?',source:'Bioética — Derecho animal',qs:[{q:'¿Cuál es la contradicción que señala el texto?',t:'C',o:['Que las leyes no sirven','Que Colombia es injusta','Que los toros no sienten','Que la ley reconoce animales como sintientes pero permite actividades que causan sufrimiento'],c:3},{q:'¿Qué implicaría considerar a un animal "persona no humana"?',t:'C',o:['Que sería humano','Nada','Que tendría derechos legales como libertad, protección contra el sufrimiento y representación legal','Que podría votar'],c:2},{q:'¿Cuál es tu postura argumentada?',t:'C',o:['Los animales que sienten merecen protección legal que impida su sufrimiento innecesario','Todos los animales son personas','Los animales no tienen derechos','Solo las mascotas merecen derechos'],c:0}]},
  {id:'8C09',zone:2,title:'Algoritmos y discriminación',icon:'🤖',type:'C',theme:'tec',xp:65,text:'Amazon desarrolló un algoritmo de contratación que penalizaba currículos con la palabra "mujer". Un sistema policial predictivo en EE.UU. enviaba más patrullas a barrios afroamericanos, creando un ciclo: más vigilancia → más arrestos → más datos → más vigilancia. Los algoritmos aprenden de datos históricos que contienen sesgos humanos. Si la sociedad fue desigual, la IA replica y amplifica esa desigualdad.',source:'Tecnología y justicia social',qs:[{q:'¿Cómo replica la IA la desigualdad humana?',t:'C',o:['Porque aprende de datos históricos que reflejan los sesgos y discriminación de la sociedad','Porque es mala','No la replica','Porque los programadores quieren'],c:0},{q:'¿Por qué el sistema policial predictivo es problemático?',t:'C',o:['Porque falla','Porque crea un ciclo que refuerza la vigilancia desproporcionada sobre minorías','Porque es caro','Porque la policía no lo usa'],c:1},{q:'¿Cómo se debería regular la IA?',t:'C',o:['Con auditorías de sesgo, transparencia en algoritmos y participación diversa en su desarrollo','Sin regulación','Prohibir toda IA','Solo la usen gobiernos'],c:0}]},
  {id:'8C10',zone:2,title:'Idiomas en extinción',icon:'🗣️',type:'C',theme:'gen',xp:65,text:'Cada 2 semanas muere un idioma en el mundo. De las 7.000 lenguas existentes, la mitad desaparecerá para 2100. En Colombia, de las 68 lenguas indígenas, 20 están en peligro crítico. Cuando muere un idioma, muere una forma de entender el mundo: los Yagán de Chile tienen una palabra para "la soledad de estar esperando que alguien llegue" que no existe en español. ¿Importa perder lenguas cuando todos podrían hablar inglés?',source:'Lingüística y patrimonio cultural',qs:[{q:'¿Qué se pierde cuando muere un idioma?',t:'C',o:['Unas palabras','Una forma única de entender y nombrar la realidad que no existe en otros idiomas','Nada importante','Solo tradición'],c:1},{q:'¿Es válido el argumento de "todos podrían hablar inglés"?',t:'C',o:['No importa','No: la diversidad lingüística es riqueza cognitiva, como la biodiversidad es riqueza ecológica','Sí, simplifica todo','Sí, es más práctico'],c:1},{q:'¿Cuál sería tu propuesta para Colombia?',t:'C',o:['Cada quien con su lengua','Solo enseñar español','Enseñar solo inglés','Políticas de revitalización lingüística que valoren las lenguas indígenas como patrimonio vivo'],c:3}]},

  {id:'8G01',zone:0,title:'🧩 Ordena la cronología',icon:'🧩',type:'G',theme:'soc',xp:40,game:'order',instruction:'Ordena estos eventos históricos del más antiguo al más reciente.',items:['Edward Jenner crea la primera vacuna (1796)','Mendeléyev organiza la tabla periódica (1869)','Comienza la Revolución Francesa (1789)','Se publica Crónica de una muerte anunciada (1981)','Se firma acuerdo de paz en Colombia (2016)','Se captura la primera imagen de un agujero negro (2019)']},
  {id:'8G02',zone:1,title:'✏️ Completa el concepto',icon:'✏️',type:'G',theme:'gen',xp:50,game:'complete',instruction:'Completa cada afirmación con el concepto correcto.',sentences:[{text:'La tendencia a buscar solo información que confirme lo que ya creemos se llama ___.',options:['Efecto placebo','Sesgo de confirmación','Gentrificación','Obsolescencia'],correct:1},{text:'Cuando un barrio popular se pone de moda y desplaza a los residentes originales, se llama ___.',options:['Migración','Turismo','Gentrificación','Urbanización'],correct:2},{text:'Romeo y Julieta transcurre en solo ___ días.',options:['30','10','4','7'],correct:2},{text:'El efecto ___ hace que una pastilla de azúcar mejore síntomas en un 30-40% de casos.',options:['Mariposa','Dunning-Kruger','Placebo','Invernadero'],correct:2},{text:'La "tragedia de los comunes" explica por qué los recursos ___ se sobreexplotan.',options:['Privados','Compartidos','Caros','Renovables'],correct:1}]},
  {id:'8G03',zone:2,title:'⏱️ V/F Relámpago',icon:'⏱️',type:'G',theme:'gen',xp:65,game:'tf_speed',instruction:'¡40 segundos! Verdadero o Falso sobre temas de 8°.',timeLimit:40,statements:[{text:'El conflicto armado colombiano duró más de 50 años',isTrue:true},{text:'La tabla periódica tiene 92 elementos',isTrue:false},{text:'Las vacunas salvan 3.5-5 millones de vidas al año',isTrue:true},{text:'Netflix comenzó como servicio de streaming',isTrue:false},{text:'La Revolución Francesa fue en 1789',isTrue:true},{text:'Los agujeros negros dejan escapar la luz',isTrue:false},{text:'Pablo Neruda era argentino',isTrue:false},{text:'Bitcoin fue creado por Satoshi Nakamoto',isTrue:true},{text:'El 70% de personas experimenta síndrome del impostor',isTrue:true},{text:'La Mona Lisa es la pintura más grande del Louvre',isTrue:false},{text:'Amazon creó un algoritmo que discriminaba mujeres',isTrue:true},{text:'En Colombia hay 68 lenguas indígenas',isTrue:true}]},

  {id:'9L01',zone:0,title:'La Guerra Fría',icon:'🌍',type:'L',theme:'soc',xp:35,text:'La Guerra Fría (1947-1991): EE.UU. (capitalismo) vs. URSS (comunismo). Nunca combatieron directamente pero financiaron conflictos en Corea, Vietnam, Afganistán. La carrera armamentista acumuló armas nucleares para destruir el planeta varias veces. Crisis de misiles de Cuba (1962): momento más cercano a guerra nuclear. Terminó con caída del Muro de Berlín (1989) y disolución de la URSS (1991).',source:'Historia del siglo XX',qs:[{q:'¿Entre quiénes fue?',t:'L',o:['Francia y Alemania','China y Rusia','EE.UU. y la URSS','Inglaterra y Japón'],c:2},{q:'¿Momento más cercano a guerra nuclear?',t:'L',o:['Crisis de Cuba','Caída del muro','Corea','Vietnam'],c:0},{q:'¿Cuándo terminó?',t:'L',o:['1962','1991','2001','1975'],c:1}]},
  {id:'9L02',zone:0,title:'Pedro Páramo',icon:'📖',type:'L',theme:'lit',xp:35,text:'Juan Preciado viaja a Comala buscando a su padre Pedro Páramo. Descubre que el pueblo está habitado por muertos. Los personajes son fantasmas que repiten sus historias. Pedro Páramo fue cacique que controló tierras y personas por amor obsesivo hacia Susana San Juan. Publicada en 1955 por Juan Rulfo, revolucionó la literatura al mezclar voces de vivos y muertos sin aviso.',source:'Juan Rulfo — Literatura latinoamericana',qs:[{q:'¿Quién viaja a Comala?',t:'L',o:['Juan Rulfo','Pedro Páramo','Juan Preciado','Susana'],c:2},{q:'¿Qué tiene de especial Comala?',t:'L',o:['Es bonita','Es grande','Tiene comercio','Está habitada por muertos'],c:3},{q:'¿En qué año se publicó?',t:'L',o:['1965','1955','1975','1945'],c:1}]},
  {id:'9L03',zone:0,title:'La teoría de la relatividad',icon:'⚛️',type:'L',theme:'nat',xp:35,text:'Albert Einstein publicó la teoría de la relatividad especial en 1905 y la general en 1915. La ecuación E=mc² significa que la energía (E) es igual a la masa (m) multiplicada por la velocidad de la luz al cuadrado (c²). Esto demostró que el tiempo no es absoluto: pasa más lento a mayor velocidad. Si viajaras a la velocidad de la luz, el tiempo se detendría. La relatividad general explica que la gravedad curva el espacio-tiempo.',source:'Física moderna',qs:[{q:'¿En qué año se publicó la relatividad especial?',t:'L',o:['1905','1915','1900','1920'],c:0},{q:'¿Qué significa E=mc²?',t:'L',o:['Electricidad = materia × calor','Nada','Energía = masa × luz','Energía = masa × velocidad de la luz al cuadrado'],c:3},{q:'¿Qué pasa con el tiempo a mayor velocidad?',t:'L',o:['Se acelera','No cambia','Pasa más lento','Se detiene'],c:2}]},
  {id:'9L04',zone:0,title:'El apartheid',icon:'✊',type:'L',theme:'soc',xp:35,text:'El apartheid fue un sistema de segregación racial en Sudáfrica (1948-1991). La minoría blanca (20%) gobernaba sobre la mayoría negra (80%). Los negros no podían votar, vivir en zonas blancas, casarse con blancos ni usar los mismos baños. Nelson Mandela luchó contra el apartheid y fue encarcelado 27 años. Al salir en 1990, lideró la transición democrática y fue presidente en 1994.',source:'Historia — Derechos humanos',qs:[{q:'¿Qué era el apartheid?',t:'L',o:['Un partido político','Un sistema de segregación racial','Una guerra','Una ley de inmigración'],c:1},{q:'¿Cuántos años estuvo preso Mandela?',t:'L',o:['35','27','10','20'],c:1},{q:'¿En qué año fue presidente?',t:'L',o:['2000','1988','1994','1990'],c:2}]},
  {id:'9L05',zone:0,title:'CRISPR: editando la vida',icon:'🧬',type:'L',theme:'nat',xp:35,text:'CRISPR-Cas9 es una tecnología que permite editar el ADN con precisión, como un "cortar y pegar" genético. Fue desarrollada por Jennifer Doudna y Emmanuelle Charpentier, quienes ganaron el Nobel de Química en 2020. Puede curar enfermedades genéticas, crear cultivos resistentes y eliminar plagas. En 2018, un científico chino editó los genes de dos bebés, generando escándalo mundial por las implicaciones éticas.',source:'Biotecnología',qs:[{q:'¿Qué es CRISPR?',t:'L',o:['Un medicamento','Una tecnología para editar ADN','Un virus','Un microscopio'],c:1},{q:'¿Quiénes ganaron el Nobel por desarrollarla?',t:'L',o:['Einstein y Bohr','Doudna y Charpentier','Curie y Pasteur','Watson y Crick'],c:1},{q:'¿Qué hizo el científico chino?',t:'L',o:['Creó CRISPR','Ganó el Nobel','Editó genes de dos bebés','Curó una enfermedad'],c:2}]},
  {id:'9L06',zone:0,title:'La Odisea de Homero',icon:'⛵',type:'L',theme:'lit',xp:35,text:'La Odisea, escrita por Homero alrededor del siglo VIII a.C., narra el viaje de 10 años de Ulises (Odiseo) desde Troya hasta su hogar en Ítaca. Enfrenta al cíclope Polifemo, las sirenas, la hechicera Circe y el dios Poseidón. Mientras, su esposa Penélope lo espera tejiendo y destejiendo un manto para evitar casarse con otro. Es una de las obras fundacionales de la literatura occidental.',source:'Literatura clásica',qs:[{q:'¿Cuánto dura el viaje de Ulises?',t:'L',o:['20 años','1 año','10 años','5 años'],c:2},{q:'¿Qué hace Penélope para esperar?',t:'L',o:['Teje y desteje un manto','Lucha','Viaja','Escribe cartas'],c:0},{q:'¿Aproximadamente cuándo se escribió?',t:'L',o:['Siglo VIII a.C.','Siglo I','Siglo III','Siglo XV'],c:0}]},
  {id:'9L07',zone:0,title:'Inteligencia artificial',icon:'🤖',type:'L',theme:'tec',xp:35,text:'La inteligencia artificial existe desde 1956 cuando John McCarthy acuñó el término. ChatGPT, lanzado en noviembre de 2022, alcanzó 100 millones de usuarios en 2 meses, convirtiéndose en la aplicación de mayor crecimiento en la historia. La IA puede escribir textos, generar imágenes, programar, diagnosticar enfermedades y conducir vehículos. Se estima que para 2030, la IA podría generar entre 20-50 billones de dólares anuales a la economía global.',source:'Tecnología',qs:[{q:'¿En qué año se acuñó el término IA?',t:'L',o:['1976','1946','1956','1996'],c:2},{q:'¿Cuántos usuarios alcanzó ChatGPT en 2 meses?',t:'L',o:['500 millones','10 millones','100 millones','50 millones'],c:2},{q:'¿Cuánto podría aportar la IA a la economía para 2030?',t:'L',o:['100 billones','20-50 billones','1-5 billones','500 mil millones'],c:1}]},
  {id:'9L08',zone:0,title:'El feminismo: historia',icon:'♀️',type:'L',theme:'soc',xp:35,text:'La primera ola feminista (siglo XIX) luchó por el voto femenino. En Colombia, las mujeres obtuvieron el derecho al voto en 1954. La segunda ola (1960-70) luchó por derechos laborales e igualdad legal. La tercera ola (1990s) abordó la diversidad y la interseccionalidad. Hoy, la cuarta ola se centra en el acoso sexual (#MeToo), la brecha salarial y la violencia de género. En Colombia, cada 28 horas una mujer es asesinada por razones de género.',source:'Historia social — Género',qs:[{q:'¿Cuándo obtuvieron las colombianas el derecho al voto?',t:'L',o:['1920','1970','1954','1945'],c:2},{q:'¿Cuántas olas feministas ha habido?',t:'L',o:['3','4','2','5'],c:1},{q:'¿Qué movimiento caracteriza la cuarta ola?',t:'L',o:['#MeToo y la lucha contra la violencia de género','Los derechos laborales','La diversidad','El voto'],c:0}]},
  {id:'9L09',zone:0,title:'Blockchain explicado',icon:'⛓️',type:'L',theme:'tec',xp:35,text:'Blockchain es una base de datos distribuida donde cada "bloque" de información se conecta al anterior mediante criptografía, formando una "cadena". Una vez registrada, la información no puede alterarse sin cambiar todos los bloques siguientes, lo que la hace prácticamente inmutable. Se usa en criptomonedas, contratos inteligentes, cadenas de suministro y votación electrónica. Más de 40 países exploran su uso para servicios gubernamentales.',source:'Tecnología — Sistemas distribuidos',qs:[{q:'¿Por qué blockchain es inmutable?',t:'L',o:['Porque alterar un dato requiere cambiar toda la cadena','Porque es caro','Porque nadie lo controla','Porque es secreto'],c:0},{q:'¿Dónde se usa además de criptomonedas?',t:'L',o:['Contratos, cadena de suministro, votación','Solo en cripto','En videojuegos','En música'],c:0},{q:'¿Cuántos países exploran su uso gubernamental?',t:'L',o:['100','Más de 40','5','20'],c:1}]},
  {id:'9L10',zone:0,title:'Borges y el infinito',icon:'♾️',type:'L',theme:'lit',xp:35,text:'Jorge Luis Borges (Argentina, 1899-1986) escribió cuentos que exploran el infinito, los laberintos, el tiempo y la identidad. En "La Biblioteca de Babel", imagina una biblioteca infinita que contiene todos los libros posibles. En "El Aleph", un punto contiene todos los puntos del universo. Borges quedó ciego a los 55 años pero siguió dictando obras maestras. Influyó en la física cuántica, las matemáticas y la informática.',source:'Literatura universal',qs:[{q:'¿De qué país era Borges?',t:'L',o:['Colombia','Chile','Argentina','México'],c:2},{q:'¿Qué contiene la Biblioteca de Babel?',t:'L',o:['Los mejores libros','Solo novelas','Todos los libros posibles','Libros de Borges'],c:2},{q:'¿Qué le pasó a Borges a los 55 años?',t:'L',o:['Quedó ciego','Dejó de escribir','Murió','Se mudó'],c:0}]},
  // INFERENCIAL
  {id:'9I01',zone:1,title:'Poscolonialismo y lengua',icon:'🗣️',type:'I',theme:'soc',xp:55,text:'En África, la mayoría de países tiene como idioma oficial el del colonizador. Las lenguas nativas (más de 2.000) se usan en casa pero no en tribunales ni universidades. Ngũgĩ wa Thiong\'o dejó de escribir en inglés: "El idioma del colonizador en mi boca es una cadena invisible." Chimamanda Adichie argumenta que escribir en inglés permite que el mundo escuche las historias africanas.',source:'Colonialismo cultural',qs:[{q:'¿Qué representa el idioma colonial según Ngũgĩ?',t:'I',o:['Una forma de control que persiste','Un idioma más','Una ventaja','Solo comunicación'],c:0},{q:'¿El dilema central?',t:'I',o:['El inglés es difícil','Qué idioma es bonito','África no tiene idiomas','Usar la lengua del colonizador da visibilidad pero refuerza su dominio'],c:3},{q:'¿Cómo se relaciona con Colombia?',t:'I',o:['No hay colonialismo','Las lenguas indígenas colombianas enfrentan marginación similar','No se relaciona','Colombia solo habla español'],c:1}]},
  {id:'9I02',zone:1,title:'Distopía y realidad',icon:'🔮',type:'I',theme:'lit',xp:55,text:'En "Fahrenheit 451" de Bradbury, los libros están prohibidos y la gente vive pegada a pantallas. En "Un mundo feliz" de Huxley, el control no es por miedo sino por placer: la gente está tan entretenida que no quiere pensar. Orwell temía que nos prohibieran la información. Huxley temía que ya no nos importara. ¿Cuál tenía razón?',source:'Literatura distópica',qs:[{q:'¿Diferencia entre Orwell y Huxley?',t:'I',o:['Orwell temía control por miedo; Huxley, por placer','Uno es real','No hay diferencia','Son iguales'],c:0},{q:'¿Conexión con la actualidad?',t:'I',o:['Los libros no existen','El exceso de entretenimiento puede ser una forma de control social','Ninguna','Todo es ficción'],c:1},{q:'¿Pregunta implícita del texto?',t:'I',o:['¿Quién escribió mejor?','¿Estamos siendo controlados sin darnos cuenta?','¿Cuánto cuestan los libros?','¿Cuál es más viejo?'],c:1}]},
  {id:'9I03',zone:1,title:'El mito de Sísifo',icon:'🪨',type:'I',theme:'lit',xp:55,text:'En la mitología griega, Sísifo fue condenado a empujar una roca cuesta arriba eternamente: cada vez que llegaba a la cima, la roca rodaba abajo y debía empezar de nuevo. Albert Camus lo usó como metáfora de la vida humana: trabajamos, envejecemos y morimos, aparentemente sin sentido último. Pero Camus concluye: "Hay que imaginar a Sísifo feliz", porque el sentido está en el esfuerzo mismo, no en el resultado.',source:'Filosofía existencialista',qs:[{q:'¿Qué representa la roca de Sísifo?',t:'I',o:['Las tareas repetitivas y aparentemente sin sentido de la existencia humana','Una montaña','Un castigo aleatorio','Un ejercicio'],c:0},{q:'¿Por qué Camus dice que Sísifo es feliz?',t:'I',o:['Porque el sentido de la vida está en el proceso, no en el destino final','Porque tiene amigos','Porque le gusta el ejercicio','Porque la roca es pequeña'],c:0},{q:'¿Cómo aplica esto a la vida de un estudiante?',t:'I',o:['Que estudiar es inútil','El aprendizaje tiene valor en sí mismo, no solo en la nota o el resultado final','No aplica','Que las tareas son castigo'],c:1}]},
  {id:'9I04',zone:1,title:'La trampa de la pobreza',icon:'💰',type:'I',theme:'soc',xp:55,text:'Los economistas Banerjee y Duflo (Nobel 2019) demostraron que la pobreza no es solo falta de dinero: es una "trampa" que afecta las decisiones. Quien vive en pobreza gasta más energía mental en sobrevivir el día (¿cómo como hoy?) que en planificar el futuro (¿cómo ahorro?). El estrés crónico reduce la capacidad cognitiva equivalente a perder 13 puntos de IQ. No es que los pobres tomen malas decisiones: es que la pobreza misma dificulta tomar buenas decisiones.',source:'Economía del comportamiento',qs:[{q:'¿Qué cambia el texto sobre cómo entendemos la pobreza?',t:'I',o:['Que la pobreza no existe','Nada','Que es fácil salir','De "los pobres toman malas decisiones" a "la pobreza causa malas condiciones para decidir"'],c:3},{q:'¿Qué implica que el estrés reduzca 13 puntos de IQ?',t:'I',o:['Que el IQ es inútil','Que el estrés es bueno','Que CUALQUIER persona bajo estrés crónico de pobreza vería afectada su capacidad cognitiva','Que los pobres son menos inteligentes'],c:2},{q:'¿Qué tipo de políticas sugiere esta investigación?',t:'I',o:['Políticas que reduzcan el estrés de sobrevivir para liberar capacidad mental de planificación','Castigo a los pobres','Más educación solamente','No hacer nada'],c:0}]},
  {id:'9I05',zone:1,title:'El Guernica de Picasso',icon:'🎨',type:'I',theme:'art',xp:55,text:'En 1937, aviones nazis bombardearon Guernica, un pueblo vasco español, matando a 1.654 personas. Picasso pintó un mural de 3.5 x 7.7 metros en blanco, negro y gris: un toro, un caballo herido, una madre con hijo muerto, un soldado desmembrado, una bombilla/sol que ilumina el horror. No hay color porque el color embellecer. No hay perspectiva porque el caos no tiene orden. Picasso dijo: "La pintura no está hecha para decorar departamentos. Es un instrumento de guerra ofensiva y defensiva contra el enemigo."',source:'Arte y política',qs:[{q:'¿Por qué Picasso usó solo blanco, negro y gris?',t:'I',o:['Porque no tenía pintura','Porque era más rápido','Porque era su estilo','Porque el color embellecería un horror que debe verse crudo y doloroso'],c:3},{q:'¿Qué quiso decir Picasso con su frase?',t:'I',o:['Que el arte es violento','Que la pintura es difícil','Que no le gustan los departamentos','Que el arte puede ser una herramienta de denuncia política tan poderosa como un arma'],c:3},{q:'¿Qué función cumple el arte según este ejemplo?',t:'I',o:['Denunciar injusticias, preservar la memoria y movilizar conciencias','Ganar dinero','Entretener','Decorar'],c:0}]},
  {id:'9I06',zone:1,title:'La obsolescencia programada',icon:'📱',type:'I',theme:'tec',xp:55,text:'En 1924, los fabricantes de bombillas se reunieron (Cartel Phoebus) y acordaron REDUCIR la vida útil de las bombillas de 2.500 a 1.000 horas para vender más. Hoy, Apple pagó 113 millones de dólares por ralentizar iPhones antiguos con actualizaciones. Las impresoras tienen chips que las "apagan" después de un número programado de copias. Producimos 50 millones de toneladas de basura electrónica al año.',source:'Economía y medioambiente',qs:[{q:'¿Qué es la obsolescencia programada?',t:'I',o:['Una mejora','El diseño intencional de productos para que fallen y generen recompra','Un descuento','Un error de fábrica'],c:1},{q:'¿Cuál es la consecuencia ambiental?',t:'I',o:['Ninguna','Más reciclaje','Menos consumo','50 millones de toneladas anuales de basura electrónica que contamina'],c:3},{q:'¿Qué revela sobre el sistema económico?',t:'I',o:['Que los productos son buenos','Que las empresas nos cuidan','Que el crecimiento económico a veces se construye sobre el desperdicio deliberado','Que funciona bien'],c:2}]},
  {id:'9I07',zone:1,title:'Kafka y la burocracia',icon:'🏛️',type:'I',theme:'lit',xp:55,text:'En "El proceso" de Kafka, Josef K. es arrestado una mañana sin saber por qué. Pasa toda la novela intentando averiguar su delito y acceder a los jueces, pero el sistema judicial es un laberinto de oficinas, secretarios y procedimientos que nunca lo llevan a ningún lado. Al final es ejecutado sin nunca conocer su crimen. Lo "kafkiano" describe situaciones absurdas donde el sistema se vuelve un fin en sí mismo, olvidando a las personas que debería servir.',source:'Literatura y sociedad',qs:[{q:'¿Qué critica Kafka?',t:'I',o:['Los jueces','La literatura','La policía','Los sistemas burocráticos que se vuelven laberintos que olvidan a las personas'],c:3},{q:'¿Dónde ves situaciones "kafkianas" hoy?',t:'I',o:['Cuando un trámite requiere documentos que solo se obtienen con el trámite que estás haciendo','En ningún lado','En la literatura','Solo en Europa'],c:0},{q:'¿Qué lección social tiene la novela?',t:'I',o:['Que hay que obedecer','Que los sistemas pueden volverse tan complejos que pierden su propósito original de servir al ciudadano','Que la burocracia es buena','Que los juicios son justos'],c:1}]},
  {id:'9I08',zone:1,title:'El experimento de Milgram',icon:'⚡',type:'I',theme:'gen',xp:55,text:'En 1961, el psicólogo Stanley Milgram pidió a voluntarios que aplicaran descargas eléctricas crecientes a otra persona (un actor) cada vez que erraba una pregunta. Un "científico" con bata blanca les decía "continúe, el experimento lo requiere". El 65% de los participantes llegó hasta la descarga máxima (450 voltios, potencialmente mortal). Las personas no eran crueles: obedecían a la autoridad. El estudio intentaba entender cómo ciudadanos normales participaron en el Holocausto.',source:'Psicología social',qs:[{q:'¿Qué demostró el experimento?',t:'I',o:['Que la electricidad es peligrosa','Que personas normales pueden causar daño grave cuando una autoridad se lo ordena','Que la gente es cruel','Que los voluntarios eran malos'],c:1},{q:'¿Qué representaba el "científico con bata blanca"?',t:'I',o:['Un doctor','Un profesor','La figura de autoridad que legitima acciones que individualmente no haríamos','Un actor'],c:2},{q:'¿Cómo aplica esto a situaciones actuales?',t:'I',o:['No aplica','Solo en laboratorios','Cuando obedecemos órdenes laborales, políticas o sociales sin cuestionar si son éticas','Solo en guerras'],c:2}]},
  {id:'9I09',zone:1,title:'La paradoja de Fermi',icon:'👽',type:'I',theme:'nat',xp:55,text:'Hay más de 200.000 millones de estrellas solo en nuestra galaxia, muchas con planetas. Si la vida es posible en la Tierra, estadísticamente debería existir en miles de otros lugares. Entonces, ¿dónde están todos? Esta es la Paradoja de Fermi. Las posibles respuestas inquietan: o estamos solos (improbable), o las civilizaciones se autodestruyen antes de contactar a otras (preocupante), o están ahí y nos ignoran (humillante), o somos un zoológico observado (perturbador).',source:'Astrofísica y filosofía',qs:[{q:'¿Cuál es la paradoja?',t:'I',o:['Que no hay estrellas','Que el espacio es vacío','Que dada la cantidad de estrellas, deberíamos haber encontrado vida, pero no lo hemos hecho','Que la Tierra es especial'],c:2},{q:'¿Qué implica la hipótesis de "autodestrucción"?',t:'I',o:['Que las civilizaciones tecnológicas podrían destruirse antes de alcanzar comunicación interestelar — un espejo de nuestros propios riesgos','Que la tecnología es mala','Que las guerras son buenas','Que los aliens murieron'],c:0},{q:'¿Qué nos dice la paradoja sobre nosotros mismos?',t:'I',o:['Que nuestra propia supervivencia como civilización no está garantizada y debemos cuidar nuestro planeta','Que somos los mejores','Que el espacio no importa','Nada'],c:0}]},
  {id:'9I10',zone:1,title:'La alegoría del barco de Teseo',icon:'🚢',type:'I',theme:'gen',xp:55,text:'Si reemplazas una tabla del barco de Teseo, sigue siendo el mismo barco. Si reemplazas dos, también. Pero si eventualmente reemplazas TODAS las tablas, ¿sigue siendo el barco de Teseo? Y si reconstruyes otro barco con las tablas originales, ¿cuál es el "verdadero"? Tu cuerpo reemplaza casi todas sus células cada 7-10 años. ¿Eres la misma persona que eras a los 5 años? ¿Qué te hace "tú"?',source:'Filosofía — Identidad',qs:[{q:'¿Cuál es la pregunta central?',t:'I',o:['Si los barcos son caros','¿Qué define la identidad: la materia física o algo intangible como la continuidad, la memoria?','Si Teseo existió','Si las tablas son resistentes'],c:1},{q:'¿Cómo aplica la paradoja a los seres humanos?',t:'I',o:['No aplica','Que las células no cambian','Que somos barcos','Nuestro cuerpo cambia completamente pero seguimos siendo "nosotros" — la identidad no es solo materia'],c:3},{q:'¿Qué te hace ser "tú"?',t:'I',o:['Tu ropa','Tu nombre','Tu cuerpo','Tu memoria, experiencias, relaciones y continuidad de conciencia'],c:3}]},
  // CRÍTICO
  {id:'9C01',zone:2,title:'Justicia restaurativa',icon:'⚖️',type:'C',theme:'soc',xp:75,text:'Noruega: cárceles-residencias, reincidencia 20%. EE.UU.: cárceles hacinadas, reincidencia 76%. El modelo restaurativo (reparar el daño, mediar, reintegrar) vs. punitivo (castigar con cárcel). Colombia intenta ser restaurativo con adolescentes pero faltan recursos.',source:'Justicia — DBA: Postura crítica',qs:[{q:'¿Qué evidencia sostiene el argumento?',t:'C',o:['Noticias falsas','Datos comparativos: Noruega 20% vs. EE.UU. 76% reincidencia','Opiniones','Ninguna'],c:1},{q:'¿Tesis implícita?',t:'C',o:['No hay solución','La justicia restaurativa puede ser más efectiva para reducir el crimen','El castigo funciona','Los jóvenes no cometen crímenes'],c:1},{q:'Construye un contraargumento válido:',t:'C',o:['No hay','La restaurativa podría percibirse como impunidad si no se implementa correctamente','El castigo siempre es mejor','No importa'],c:1}]},
  {id:'9C02',zone:2,title:'Colonialismo digital',icon:'💻',type:'C',theme:'tec',xp:75,text:'El 90% de los datos mundiales se almacenan en servidores de EE.UU. o China. Las apps recopilan gustos, movimientos, relaciones y pensamientos. Se venden a anunciantes e influyen en elecciones (Cambridge Analytica). América Latina produce datos masivamente pero no controla su almacenamiento. Algunos lo llaman "colonialismo digital": extraer recursos (datos) del sur para beneficio del norte.',source:'Soberanía digital — Geopolítica',qs:[{q:'¿Por qué "colonialismo digital"?',t:'C',o:['No hay tecnología en LATAM','Es metáfora','La extracción de datos sin control replica la dinámica colonial de extracción de recursos','Internet es mala'],c:2},{q:'¿Relación entre datos y poder?',t:'C',o:['Ninguna','Solo empresas','Solo números','Quien controla los datos puede influir en decisiones políticas y económicas'],c:3},{q:'¿Solución argumentada?',t:'C',o:['Desarrollar soberanía tecnológica con servidores y regulaciones propias','Ignorar','No usar celular','Prohibir internet'],c:0}]},
  {id:'9C03',zone:2,title:'El fin de la privacidad',icon:'🔐',type:'C',theme:'tec',xp:75,text:'Tu teléfono sabe dónde estás, con quién hablas, qué compras, qué lees, cuánto duermes, tu ritmo cardíaco y hasta tu estado emocional (por el tono de voz). Las empresas saben más de ti que tu mejor amigo. China implementó un "sistema de crédito social" que puntúa a los ciudadanos por su comportamiento. Los que tienen baja puntuación no pueden viajar ni acceder a servicios. ¿Es el futuro que aceptamos por "comodidad"?',source:'Vigilancia y sociedad — Ética tecnológica',qs:[{q:'¿Cuál es la pregunta central del texto?',t:'C',o:['Si los datos son importantes','Si la comodidad tecnológica justifica renunciar a la privacidad y permitir vigilancia masiva','Si los teléfonos son buenos','Si China es mala'],c:1},{q:'¿Qué implica el sistema de crédito social chino?',t:'C',o:['Que China es organizada','Que es solo para China','Que es voluntario','Que la tecnología puede convertirse en herramienta de control social totalitario'],c:3},{q:'¿Cuál es tu postura argumentada?',t:'C',o:['La privacidad es un derecho fundamental que requiere regulación estricta frente al avance tecnológico','No me importa la privacidad','La tecnología es perfecta','Solo importa a adultos'],c:0}]},
  {id:'9C04',zone:2,title:'¿Tiene la ciencia límites éticos?',icon:'🧪',type:'C',theme:'nat',xp:75,text:'La ciencia PUEDE clonar humanos, crear armas biológicas, editar genes de bebés, vigilar a poblaciones enteras con IA. Pero ¿DEBE hacerlo? En la WWII, científicos nazis experimentaron con prisioneros. Después, el Código de Núremberg (1947) estableció límites éticos a la investigación. Sin embargo, la tecnología avanza más rápido que las regulaciones. CRISPR puede eliminar enfermedades genéticas, pero también crear "bebés de diseño" accesibles solo para ricos.',source:'Bioética — Filosofía de la ciencia',qs:[{q:'¿Cuál es la diferencia entre "poder" y "deber"?',t:'C',o:['Que la capacidad técnica no implica automáticamente la justificación moral para usarla','Ninguna','Poder es más importante','Son sinónimos'],c:0},{q:'¿Por qué la velocidad tecnológica es un problema?',t:'C',o:['No lo es','Porque la tecnología avanza más rápido que nuestra capacidad de regular sus implicaciones éticas','Porque es difícil','Porque es cara'],c:1},{q:'¿Cuál sería un marco ético para la ciencia?',t:'C',o:['Prohibir la ciencia','Avanzar en conocimiento pero con regulación democrática, acceso equitativo y evaluación constante de impacto social','Sin límites','Solo los científicos deciden'],c:1}]},
  {id:'9C05',zone:2,title:'Deuda externa: la cadena invisible',icon:'🔗',type:'C',theme:'soc',xp:75,text:'Los países latinoamericanos deben billones de dólares a bancos internacionales y al FMI. Para pagar la deuda, recortan gasto en salud, educación e infraestructura. Argentina debe 400.000 millones; Colombia, 180.000 millones. Los préstamos originales a menudo fueron tomados por dictadores corruptos, pero la deuda la pagan las generaciones siguientes. El servicio de la deuda (solo los intereses) a veces supera lo que se gasta en educación.',source:'Economía internacional — Justicia global',qs:[{q:'¿Por qué el texto la llama "cadena invisible"?',t:'C',o:['Porque es bonita','Porque es secreta','Porque limita la capacidad de los países de invertir en su propio desarrollo','Porque no existe'],c:2},{q:'¿Es justo que ciudadanos actuales paguen deudas de dictadores pasados?',t:'C',o:['No importa','Siempre se debe pagar','Sí, son deudas del país','No necesariamente: la legitimidad de deudas tomadas sin consentimiento democrático es cuestionable'],c:3},{q:'¿Qué solución propondrías?',t:'C',o:['Pagar todo','No pagar nada','Auditoría de deuda, renegociación justa y priorizar inversión social sobre servicio de deuda ilegítima','Pedir más prestado'],c:2}]},
  {id:'9C06',zone:2,title:'¿Es ético comer carne?',icon:'🥩',type:'C',theme:'nat',xp:75,text:'La ganadería produce el 14.5% de emisiones de gases de efecto invernadero. Para producir 1 kg de carne se necesitan 15.000 litros de agua. Las condiciones de cría industrial causan sufrimiento animal documentado. Sin embargo, la carne es culturalmente central en muchas sociedades, fuente de empleo para millones y nutricionalmente importante para algunas poblaciones. El debate no es simple: las alternativas vegetales no están igualmente accesibles para todos.',source:'Ética alimentaria — Medioambiente',qs:[{q:'¿Por qué el texto dice que "el debate no es simple"?',t:'C',o:['Porque la carne es rica','Porque nadie se pone de acuerdo','Porque es viejo','Porque involucra medio ambiente, ética animal, cultura, economía y acceso desigual a alternativas'],c:3},{q:'¿Es justo pedir a todos que dejen de comer carne?',t:'C',o:['No necesariamente: el acceso a alternativas es desigual y la responsabilidad mayor es de la industria, no del individuo','Sí, todos deberían','Sí, los animales importan más','No, la carne es necesaria'],c:0},{q:'¿Cuál sería una postura equilibrada?',t:'C',o:['Reducir el consumo, exigir condiciones dignas de cría y que la industria asuma su impacto ambiental','Ser vegano obligatorio','No hacer nada','Comer carne sin culpa'],c:0}]},
  {id:'9C07',zone:2,title:'Renta básica universal',icon:'💰',type:'C',theme:'soc',xp:75,text:'La Renta Básica Universal (RBU) propone que el Estado pague a cada ciudadano un ingreso mínimo sin condiciones. Finlandia lo probó con 2.000 desempleados: mejoraron en bienestar y confianza, sin dejar de buscar trabajo. Kenia lo implementa con éxito. Los críticos dicen: es costoso, desincentiva el trabajo, genera inflación. Los defensores responden: elimina pobreza extrema, reduce burocracia y da libertad. Con la automatización eliminando empleos, ¿será inevitable?',source:'Economía social — Futuro del trabajo',qs:[{q:'¿Qué demostró el experimento de Finlandia?',t:'C',o:['Que nadie trabaja','Que es imposible','Que Finlandia es rica','Que la gente mejoró en bienestar sin dejar de buscar empleo, contradiciendo el mito del "desincentivo"'],c:3},{q:'¿Por qué la automatización hace urgente este debate?',t:'C',o:['Porque los robots son malos','Porque si las máquinas reemplazan empleos masivamente, millones necesitarán ingresos alternativos','No lo hace','Porque la tecnología es cara'],c:1},{q:'¿Es viable en Colombia?',t:'C',o:['Fácil','Imposible','Solo en Europa funciona','Difícil pero no imposible: requeriría reforma tributaria y redistribución, como las ya existentes en programas sociales'],c:3}]},
  {id:'9C08',zone:2,title:'Intervención humanitaria',icon:'🕊️',type:'C',theme:'soc',xp:75,text:'Cuando un gobierno masacra a su propia población (genocidio), ¿deben otros países intervenir militarmente? La ONU intervino en Bosnia (1995) y Libia (2011) alegando "Responsabilidad de Proteger". Pero la intervención en Irak (2003) fue criticada como imperialismo disfrazado. No se intervino en Ruanda (1994): 800.000 personas murieron. ¿Cuándo es legítimo intervenir y cuándo es excusa para dominar?',source:'Relaciones internacionales — Derecho humanitario',qs:[{q:'¿Cuál es el dilema central?',t:'C',o:['Si la soberanía de un país puede violarse para proteger a su propia población','Si la ONU es buena','Si los ejércitos son fuertes','Si la guerra es buena'],c:0},{q:'¿Qué revela la comparación Irak vs. Ruanda?',t:'C',o:['Que Irak es peor','Que son iguales','Que África no importa','Que se interviene cuando hay intereses geopolíticos y se ignoran tragedias cuando no los hay'],c:3},{q:'¿Cuándo sería legítima la intervención?',t:'C',o:['Nunca','Cuando hay evidencia clara de genocidio, mandato multilateral y el objetivo es proteger civiles, no recursos','Siempre que un país quiera','Solo si hay petróleo'],c:1}]},
  {id:'9C09',zone:2,title:'Transhumanismo: ¿evolucionar o perder la humanidad?',icon:'🧬',type:'C',theme:'tec',xp:75,text:'El transhumanismo propone usar tecnología para superar los límites biológicos: implantes cerebrales para mejorar la memoria, modificación genética para eliminar enfermedades, prótesis que superen la capacidad humana natural. Elon Musk ya implanta chips cerebrales (Neuralink). Los defensores dicen: es la siguiente etapa de la evolución. Los críticos advierten: solo los ricos podrán "mejorarse", creando una humanidad dividida en "mejorados" y "naturales", una nueva forma de desigualdad biológica.',source:'Bioética — Filosofía de la tecnología',qs:[{q:'¿Cuál es el riesgo social más grave?',t:'C',o:['Que sea doloroso','Que no funcione','Que las mejoras tecnológicas solo accesibles para ricos creen una nueva forma de desigualdad biológica','Que sea caro'],c:2},{q:'¿Es diferente a la cirugía estética o la educación privada?',t:'C',o:['No se relacionan','Sí, totalmente','En grado: ya existen desigualdades por acceso a salud y educación, pero las mejoras genéticas serían irreversibles y hereditarias','No, son iguales'],c:2},{q:'¿Cuál sería un marco ético justo?',t:'C',o:['Sin límites','Permitir mejoras médicas pero regular las de "mejoramiento" con acceso equitativo y control democrático','Solo para científicos','Prohibir todo'],c:1}]},
  {id:'9C10',zone:2,title:'¿Existe la objetividad periodística?',icon:'📰',type:'C',theme:'gen',xp:75,text:'Todo periodista elige qué cubrir, qué palabras usar, a quién entrevistar y qué omitir. Llamar a alguien "terrorista" o "luchador por la libertad" cambia toda la narrativa. Fox News y CNN cubren la misma noticia de formas opuestas. En Colombia, los medios son propiedad de grandes grupos económicos con intereses políticos. Si la objetividad total es imposible, ¿deberíamos exigir transparencia sobre los sesgos en lugar de pretender que no existen?',source:'Medios de comunicación — Pensamiento crítico',qs:[{q:'¿Por qué la objetividad total es imposible según el texto?',t:'C',o:['Porque los periodistas mienten','Porque no les pagan bien','Porque no son inteligentes','Porque toda decisión editorial (qué cubrir, qué palabras usar) implica un sesgo inevitable'],c:3},{q:'¿Qué implica que los medios colombianos pertenezcan a grupos económicos?',t:'C',o:['Que la información puede estar influida por los intereses económicos y políticos de los dueños','Que son gratis','Que son independientes','Que son buenos'],c:0},{q:'¿Cuál sería una mejor estrategia como lector?',t:'C',o:['Creer todo lo que leo','Solo leer redes sociales','No leer noticias','Consultar múltiples fuentes, identificar sesgos y formar opinión propia con pensamiento crítico'],c:3}]},

// Load from Firebase on startup (overrides localStorage if newer)
async function syncFromFirebase(){
  if(!fbReady||!fbDB)return;
  try{
    const snap=await fbDB.ref('users').once('value');
    const cloudData=snap.val();
    if(cloudData){
      const localData=gU();
      // Merge: cloud wins if it has more XP for a user
      const merged={...localData};
      for(const[k,v]of Object.entries(cloudData)){
        if(!merged[k]||(v.xp||0)>=(merged[k].xp||0)){merged[k]=v;}
      }
      localStorage.setItem('lm2_u',JSON.stringify(merged));
      console.log('☁️ Datos sincronizados desde la nube');
    }
  }catch(e){console.log('Sync error:',e);}
}

function doLogin(){
  const user=document.getElementById('lUser').value.trim().toLowerCase();
  const pass=document.getElementById('lPass').value;
  const err=document.getElementById('lErr');
  if(!user||!pass){err.textContent='Ingresa usuario y contraseña';err.style.display='block';return;}
  const st=STUDENTS[user];
  if(!st){err.textContent='Usuario no encontrado';err.style.display='block';return;}
  if(st.pass!==pass){err.textContent='Contraseña incorrecta';err.style.display='block';return;}
  const users=gU();
  if(!users[user])users[user]={name:st.name,grade:st.grade,group:st.group,avatar:selAv,xp:0,level:0,streak:0,done:[],history:[],perfects:0,lastDate:null,isAdmin:st.isAdmin||false,powers:[],shopOwned:[],lastAccess:new Date().toISOString()};
  else{users[user].avatar=selAv;users[user].lastAccess=new Date().toISOString();}
  sU(users);sS(user);startApp(user);
}
function doLogout(){cS();CU=null;UD=null;document.getElementById('LS').classList.remove('hid');document.getElementById('app').classList.remove('vis');document.getElementById('lUser').value='';document.getElementById('lPass').value='';}

function startApp(k){
  CU=k;UD=gU()[k];
  if(!UD)return;
  // Ensure all fields exist (backward compatibility)
  if(!UD.done)UD.done=[];
  if(!UD.history)UD.history=[];
  if(!UD.powers)UD.powers=[];
  if(!UD.shopOwned)UD.shopOwned=[];
  if(!UD.secretsUnlocked)UD.secretsUnlocked=[];
  if(!UD.writings)UD.writings=[];
  if(UD.xp===undefined)UD.xp=0;
  if(UD.level===undefined)UD.level=0;
  if(UD.streak===undefined)UD.streak=0;
  if(UD.perfects===undefined)UD.perfects=0;
  const today=new Date().toDateString();
  if(UD.lastDate){const d=Math.floor((new Date(today)-new Date(UD.lastDate))/864e5);if(d>1)UD.streak=0;}
  UD.level=0;for(let i=LEVELS.length-1;i>=0;i--){if(UD.xp>=LEVELS[i].xp){UD.level=i;break;}}
  sUser(k,UD);
  document.getElementById('LS').classList.add('hid');document.getElementById('app').classList.add('vis');
  buildNav();renderAll();
}

      const litD=(v.done||[]).filter(d=>getAct(g,d)?.type==='L').length;
      const infD=(v.done||[]).filter(d=>getAct(g,d)?.type==='I').length;
      const criD=(v.done||[]).filter(d=>getAct(g,d)?.type==='C').length;
      const gamD=(v.done||[]).filter(d=>getAct(g,d)?.type==='G').length;
      const totalSecs=hist.reduce((s,h)=>s+(h.secs||0),0);
      const wpms=hist.filter(h=>h.wpm>0);
      const avgWPM=wpms.length?Math.round(wpms.reduce((s,h)=>s+h.wpm,0)/wpms.length):0;
      const lastAccess=v.lastDate||'Nunca';
      const name=(v.name||k).replace(/,/g,' ');
      csv+=`${g}°,${k},${name},${v.xp||0},${LEVELS[v.level||0]?.name||'Novato'},${done},${totalActs},${pct},${acc},${litD},${infD},${criD},${gamD},${v.streak||0},${totalSecs},${avgWPM},${lastAccess}\n`;
    });
  });
  // Add detail sheet: individual activity history
  csv+='\n\n=== HISTORIAL DETALLADO ===\n';
  csv+='GRADO,NOMBRE,ACTIVIDAD,TIPO,CORRECTAS,TOTAL,XP,TIEMPO_SEG,VEL_PPM,FECHA\n';
  grades.forEach(g=>{
    Object.entries(allU).filter(([k,v])=>v.grade===g).forEach(([k,v])=>{
      (v.history||[]).forEach(h=>{
        const name=(v.name||k).replace(/,/g,' ');
        const tipo={L:'Literal',I:'Inferencial',C:'Crítico',G:'Juego'}[h.tp]||h.tp;
        const actName=(h.n||'').replace(/,/g,' ');
        csv+=`${g}°,${name},${actName},${tipo},${h.c},${h.t},${h.x},${h.secs||0},${h.wpm||0},${h.dt||''}\n`;
      });
    });
  });
  // Download
  const BOM='\uFEFF';
  const blob=new Blob([BOM+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  const fecha=new Date().toISOString().slice(0,10);
  a.download=`LectoMaster_Reporte_${fecha}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ═══ ACTIVITY ═══
let curAct=null,ans={},readStart=0,readTimerInterval=null;

function countWords(text){return text.split(/\s+/).filter(w=>w.length>0).length;}
function fmtTime(s){const m=Math.floor(s/60);const sec=s%60;return `${m}:${sec<10?'0':''}${sec}`;}
function startReadTimer(){
  readStart=Date.now();
  if(readTimerInterval)clearInterval(readTimerInterval);
  readTimerInterval=setInterval(()=>{
    const el=document.getElementById('rtClock');if(!el)return;
    const elapsed=Math.floor((Date.now()-readStart)/1000);
    el.textContent=fmtTime(elapsed);
    // WPM calc
    if(curAct&&elapsed>3){
      const words=countWords(curAct.text||'');
      const wpm=Math.round(words/(elapsed/60));
      const wpmEl=document.getElementById('rtWPM');
      if(wpmEl)wpmEl.textContent=wpm+' pal/min';
    }
  },1000);
}
function stopReadTimer(){
  if(readTimerInterval){clearInterval(readTimerInterval);readTimerInterval=null;}
  return readStart?Math.floor((Date.now()-readStart)/1000):0;
}

function openAct(id){
  curAct=getAct(UD.grade,id);if(!curAct)return;
  // ═══ WEEKLY LIMIT CHECK ═══
  const alreadyDone=(UD.done||[]).includes(id);
  if(!alreadyDone&&!UD.practiceMode){
    const wp=getWeeklyProgress(currentArea);
    if(wp.blocked){
      alert('🎉 ¡Ya completaste tus '+WEEKLY_LIMIT+' actividades de '+AREAS.find(a=>a.id===currentArea)?.name+' esta semana!\n\n📅 Vuelve el próximo lunes para continuar.\n💡 Puedes trabajar en otra área mientras tanto.');
      return;
    }
  }
  ans={};
  // Shuffle options for each question (store mapping)
  if(curAct.qs){

    body.innerHTML=html;
  } else if(act.game==='memory'){
    // Memory card matching game
    const pairs=[...act.pairs];
    const cards=[];
    pairs.forEach((p,i)=>{cards.push({id:i,type:'q',text:p.q,pair:i});cards.push({id:i,type:'a',text:p.a,pair:i});});
    // Shuffle cards
    for(let i=cards.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cards[i],cards[j]]=[cards[j],cards[i]];}

let tfState={idx:0,correct:0,total:0,timer:null,timeLeft:0};

function finishGame(correct,total,xpE){
  const readSecs=stopReadTimer();
  const ratio=correct/total;
  if(correct===total)UD.perfects=(UD.perfects||0)+1;
  // BLOCK: must get 66% to pass
  if(ratio>=0.66){
    const wasNew=!UD.done.includes(curAct.id);
    if(wasNew)UD.done.push(curAct.id);
    UD.xp+=xpE;
    // Record weekly progress
    if(wasNew&&!UD.practiceMode){recordWeeklyActivity(currentArea);grantPetItem();}
  }else{
    xpE=0; // No XP if failed
  }
  const today=new Date().toDateString();if(UD.lastDate!==today){const d=UD.lastDate?Math.floor((new Date(today)-new Date(UD.lastDate))/864e5):999;UD.streak=d===1?UD.streak+1:1;UD.lastDate=today;}
  UD.history.push({n:curAct.title,c:correct,t:total,x:xpE,tp:curAct.type||'G',secs:readSecs,wpm:0,dt:new Date().toISOString()});
  let nl=0;for(let i=LEVELS.length-1;i>=0;i--){if(UD.xp>=LEVELS[i].xp){nl=i;break;}}
  const oldLvl=UD.level;const lu=nl>UD.level;UD.level=nl;sUser(CU,UD);
  if(lu)checkAndBroadcastLevelUp(oldLvl,nl);
  const prevB=BADGES.filter(b=>{try{return b.fn({...UD,xp:UD.xp-xpE,grade:UD.grade})}catch{return false}}).map(b=>b.id);
  const newB=BADGES.filter(b=>b.fn({...UD,grade:UD.grade})&&!prevB.includes(b.id));
  if(ratio<0.66){
    setTimeout(()=>{closeMo();showRwFail(correct,total,curAct);},1500);
  }else{
    setTimeout(()=>{closeMo();showRw(correct,total,xpE,lu,newB);renderAll();},1800);
  }
}
// ═══ MEMORY GAME FUNCTIONS ═══
function flipCard(el){
  const st=window._memState;if(!st||st.locked)return;
  if(el.classList.contains('flip')||el.classList.contains('matched'))return;
  el.classList.add('flip');st.flipped.push(el);
  if(st.flipped.length===2){
    st.locked=true;st.moves++;
    document.getElementById('memMoves').textContent=st.moves;
    const[a,b]=st.flipped;
    if(a.dataset.pair===b.dataset.pair&&a.dataset.type!==b.dataset.type){
      // Match!
      setTimeout(()=>{a.classList.add('matched');b.classList.add('matched');st.found++;
        document.getElementById('memFound').textContent=st.found;
        st.flipped=[];st.locked=false;
        if(st.found===st.total){
          // Game complete
          const score=Math.max(0,Math.round((1-((st.moves-st.total)/(st.total*2)))*100));
          const r=score/100;const xpE=Math.round(curAct.xp*Math.max(r,0.3));
          finishGame(st.found,st.total,xpE);
        }
      },500);
    }else{
      // No match
      setTimeout(()=>{a.classList.remove('flip');b.classList.remove('flip');st.flipped=[];st.locked=false;},1000);
    }
  }
}

// ═══ FIXED FEEDBACK GENERATOR ═══
function genFixedFeedback(q,chosenIdx,text){
  const correctAns=q.o[q.c];
  const chosenAns=q.o[chosenIdx];
  const typeHints={
    L:'Busca la información directamente en el texto. Lee con atención cada oración.',
    I:'Esta pregunta requiere interpretar lo que el texto sugiere, no solo lo que dice literalmente.',
    C:'Piensa en la intención del autor y en los argumentos que presenta. ¿Cuál es la postura más fundamentada?'
  };
  // Try to find the correct answer in the text
  const textLower=text.toLowerCase();
  const correctLower=correctAns.toLowerCase();
  let hint='';
  if(textLower.includes(correctLower.substring(0,Math.min(15,correctLower.length)).toLowerCase())){
    hint=`La respuesta "${correctAns}" aparece directamente en el texto. Vuelve a leerlo con calma.`;
  } else {
    hint=typeHints[q.t]||'Relee el texto y busca pistas que te ayuden a encontrar la respuesta correcta.';
  }
  return hint;
}

const AI_API_KEY=''; // Pega tu API key de Anthropic aquí (o déjalo vacío para solo retroalimentación fija)

async function requestAIFeedback(wrongQs,act){
  if(!AI_API_KEY)return; // No API key = solo feedback fijo
  const grade=UD?.grade||6;
  const prompt=`Eres un tutor amable de comprensión lectora para un estudiante de grado ${grade}° en Colombia. El estudiante leyó este texto:

"${act.text.substring(0,500)}"

Se equivocó en estas preguntas:
${wrongQs.map((w,i)=>`${i+1}. Pregunta: "${w.question}" — Eligió: "${w.chose}" — Correcta: "${w.correct}" — Tipo: ${w.type==='L'?'Literal':w.type==='I'?'Inferencial':'Crítica'}`).join('\n')}

Para CADA pregunta, da una explicación breve (2-3 oraciones máximo) en un tono cálido y motivador. Explica POR QUÉ la respuesta correcta es la correcta y da una pista de DÓNDE en el texto se encuentra la clave. Si es inferencial o crítica, guía el razonamiento sin dar la respuesta directamente.

Responde SOLO en JSON así (sin markdown):
[{"qi":0,"feedback":"tu explicación"},{"qi":1,"feedback":"tu explicación"}]`;

  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':AI_API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,messages:[{role:'user',content:prompt}]})
    });
    const data=await resp.json();
    const text=data.content?.[0]?.text||'';
    // Parse JSON response
    const clean=text.replace(/```json|```/g,'').trim();
    const feedbacks=JSON.parse(clean);
    feedbacks.forEach(fb=>{
      const origQ=wrongQs.find(w=>w.qi===fb.qi);
      if(!origQ)return;
      const aiEl=document.getElementById('aifb'+fb.qi);
      if(aiEl){aiEl.innerHTML=`<div class="ai-label">🤖 Tutor IA</div><div>${fb.feedback}</div>`;aiEl.classList.add('show');}
    });
  }catch(e){
    // AI failed — remove loading indicators silently
    wrongQs.forEach(w=>{const el=document.getElementById('aifb'+w.qi);if(el)el.remove();});
    console.log('AI feedback error:',e);
  }
}

    const tooFast=hist.filter(h=>h.secs>0&&h.secs<15&&h.tp!=='G');
    if(tooFast.length>=2)flags.push(`⏱️ ${tooFast.length} actividades en <15 seg`);
    // 2. Perfect score but very fast
    const fastPerfect=hist.filter(h=>h.c===h.t&&h.secs>0&&h.secs<30&&h.tp!=='G');
    if(fastPerfect.length>=2)flags.push(`🎯 ${fastPerfect.length} perfectas en <30 seg`);
    // 3. Sudden improvement (last 5 much better than first 5)
    if(hist.length>=10){
      const first5=hist.slice(0,5);const last5=hist.slice(-5);
      const f5pct=first5.reduce((s,h)=>s+h.c,0)/first5.reduce((s,h)=>s+h.t,0);
      const l5pct=last5.reduce((s,h)=>s+h.c,0)/last5.reduce((s,h)=>s+h.t,0);
      if(l5pct-f5pct>0.5&&l5pct>0.9)flags.push('📈 Mejora abrupta sospechosa');

    const withTime=hist.filter(h=>h.secs>0&&h.tp!=='G');
    const avgTime=withTime.length?Math.round(withTime.reduce((s,h)=>s+h.secs,0)/withTime.length):0;
    if(avgTime>0&&avgTime<20&&withTime.length>=3)flags.push(`⚡ Promedio ${avgTime}s por actividad`);
    if(flags.length>0)suspects.push({user:k,name:v.name||k,avatar:v.avatar||'🧑',grade:v.grade,flags,avgTime});
  });

}

// ═══ ADAPTIVE LEARNING SYSTEM ═══
function getWeakestType(){
  if(!UD||!UD.history||UD.history.length<3)return null;
  const hist=UD.history;
  const types={L:{total:0,correct:0},I:{total:0,correct:0},C:{total:0,correct:0}};
  hist.forEach(h=>{if(types[h.tp]){types[h.tp].total+=h.t;types[h.tp].correct+=h.c;}});
  let weakest=null,lowestPct=100;
  Object.entries(types).forEach(([tp,d])=>{
    if(d.total>=3){const pct=Math.round(d.correct/d.total*100);if(pct<lowestPct){lowestPct=pct;weakest={type:tp,pct};}}
  });
  return weakest;
}
function getAdaptiveRecommendation(){
  const weak=getWeakestType();
  if(!weak)return null;
  const labels={L:'Literal',I:'Inferencial',C:'Crítico'};
  const tips={
    L:'Practica más lecturas literales. Lee cada oración con atención y busca datos específicos en el texto.',
    I:'Necesitas fortalecer la inferencia. Pregúntate: ¿qué quiere decir el autor entre líneas? ¿Qué consecuencias tiene?',
    C:'El análisis crítico requiere práctica. Evalúa los argumentos del texto: ¿son válidos? ¿Qué postura es más fuerte?'
  };
  // Find undone activities of that type
  const g=UD.grade;const acts=CONTENT[g]?.acts||[];
  const undone=acts.filter(a=>a.type===weak.type&&!UD.done.includes(a.id));
  return{type:weak.type,label:labels[weak.type],pct:weak.pct,tip:tips[weak.type],nextAct:undone[0]||null};
}
