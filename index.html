<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0B0E17">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LectoMaster">
<meta name="description" content="Plataforma educativa gamificada — Sede Palacio">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>LectoMaster — Comprensión Lectora</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B0E17;--bg2:#111627;--bg3:#171D30;--card:#1A2038;--card2:#1F2745;
  --neon:#00D4FF;--npur:#A855F7;--npnk:#F472B6;--ngrn:#22D3EE;
  --norg:#FB923C;--nred:#EF4444;--gold:#FBBF24;--gold2:#F59E0B;
  --txt:#E2E8F0;--txt2:#94A3B8;--txt3:#64748B;--brd:#1E293B;
  --glow:0 0 20px rgba(0,212,255,.15);
  --sh:0 4px 24px rgba(0,0,0,.4);--sh2:0 8px 40px rgba(0,0,0,.5);
  --r:12px;--r2:16px;--r3:24px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden;}
h1,h2,h3,h4{font-family:'Orbitron',sans-serif;letter-spacing:-.5px;}
button{font-family:'Outfit',sans-serif;cursor:pointer;border:none;outline:none;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:var(--neon);border-radius:10px;}::-webkit-scrollbar-track{background:var(--bg2);}
.particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.particles span{position:absolute;width:2px;height:2px;background:var(--neon);border-radius:50%;animation:rise 8s linear infinite;opacity:0;}
@keyframes rise{0%{opacity:0;transform:translateY(100vh) scale(0);}10%{opacity:.5;}90%{opacity:.5;}100%{opacity:0;transform:translateY(-10vh) scale(1.5);}}

/* ═══ LOGIN ═══ */
.login{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 30% 50%,#1a1040,#0B0E17 60%,#050710);transition:opacity .5s,visibility .5s;}
.login.hid{opacity:0;visibility:hidden;pointer-events:none;}
.login .grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);background-size:60px 60px;animation:gridScroll 20s linear infinite;}
@keyframes gridScroll{0%{background-position:0 0;}100%{background-position:60px 60px;}}
.login .gorb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;}
.gorb:nth-child(2){width:350px;height:350px;background:rgba(168,85,247,.18);top:10%;left:10%;animation:of 12s ease-in-out infinite;}
.gorb:nth-child(3){width:280px;height:280px;background:rgba(0,212,255,.12);bottom:15%;right:10%;animation:of 15s ease-in-out infinite reverse;}
@keyframes of{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(30px,-20px) scale(1.1);}}
.lbox{background:linear-gradient(145deg,rgba(26,32,56,.92),rgba(17,22,39,.96));border:1px solid rgba(0,212,255,.12);border-radius:var(--r3);padding:40px 36px;width:430px;max-width:92vw;box-shadow:var(--sh2),0 0 60px rgba(0,212,255,.06),0 0 120px rgba(168,85,247,.04);position:relative;z-index:2;animation:su .6s ease;backdrop-filter:blur(16px);}
@keyframes su{from{opacity:0;transform:translateY(30px) scale(.96);}to{opacity:1;transform:translateY(0) scale(1);}}
.lbox h1{text-align:center;font-size:26px;background:linear-gradient(135deg,var(--neon),var(--npur),var(--npnk));background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:8px 0 2px;animation:gradShift 4s ease-in-out infinite;}
@keyframes gradShift{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}
.lbox .sub{text-align:center;color:var(--txt3);font-size:12px;margin-bottom:24px;font-weight:500;}
.fg{margin-bottom:16px;}.fg label{display:block;font-weight:600;font-size:11px;color:var(--txt2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
.fg input{width:100%;padding:11px 14px;background:var(--bg);border:1.5px solid var(--brd);border-radius:var(--r);font-size:14px;font-weight:500;color:var(--txt);transition:all .3s;font-family:'Outfit',sans-serif;}
.fg input:focus{border-color:var(--neon);box-shadow:var(--glow);outline:none;}
.fg input::placeholder{color:var(--txt3);}
.av-pick{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin:5px 0;}
.av-o{width:40px;height:40px;font-size:24px;border-radius:10px;border:2px solid var(--brd);display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--bg);transition:all .2s;}
.av-o:hover{border-color:var(--neon);transform:scale(1.1);}.av-o.on{border-color:var(--npur);background:rgba(168,85,247,.12);box-shadow:var(--glow);}
.lbtn{width:100%;padding:14px;border-radius:var(--r);font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;color:#fff;letter-spacing:1px;text-transform:uppercase;background:linear-gradient(135deg,var(--neon),var(--npur));box-shadow:0 4px 20px rgba(0,212,255,.3);transition:all .3s;margin-top:6px;position:relative;overflow:hidden;}
.lbtn::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(45deg,transparent 40%,rgba(255,255,255,.12) 50%,transparent 60%);animation:btnShine 3s ease-in-out infinite;}
@keyframes btnShine{0%{transform:translateX(-100%) rotate(25deg);}100%{transform:translateX(100%) rotate(25deg);}}
.lbtn:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,212,255,.4);}
.lerr{color:var(--nred);font-size:11px;font-weight:600;margin-top:6px;display:none;text-align:center;}

/* ═══ APP ═══ */
.app{display:none;position:relative;z-index:1;}.app.vis{display:block;}
.hdr{background:linear-gradient(180deg,rgba(17,22,39,.95),rgba(11,14,23,.98));border-bottom:1px solid rgba(0,212,255,.08);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
.hdr-in{max-width:1200px;margin:0 auto;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.hdr-logo{display:flex;align-items:center;gap:8px;}.hdr-logo .ico{font-size:28px;}
.hdr-logo h2{font-size:20px;background:linear-gradient(135deg,var(--neon),var(--npur));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hdr-grade{background:var(--card);border:1px solid var(--brd);border-radius:50px;padding:4px 14px;font-size:12px;font-weight:700;color:var(--ngrn);letter-spacing:.5px;}
.pills{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.pill{background:var(--card);border:1px solid var(--brd);border-radius:50px;padding:5px 12px;display:flex;align-items:center;gap:4px;font-weight:700;font-size:13px;color:var(--txt);}
.pill .v{color:var(--gold);}
.hdr-r{display:flex;align-items:center;gap:8px;}
.hdr-av{width:42px;height:42px;border-radius:50%;border:2px solid var(--npur);display:flex;align-items:center;justify-content:center;font-size:20px;background:var(--card);position:relative;cursor:pointer;}
.hdr-av .av-acc{position:absolute;top:-4px;right:-4px;font-size:12px;}
.obtn{background:transparent;border:1px solid var(--brd);border-radius:var(--r);padding:5px 12px;color:var(--txt3);font-weight:600;font-size:11px;transition:all .2s;}
.obtn:hover{border-color:var(--nred);color:var(--nred);}
.nav{max-width:1200px;margin:0 auto;padding:14px 16px 0;display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.nav::-webkit-scrollbar{display:none;}
.nav-t{padding:10px 18px;border-radius:var(--r);font-weight:700;font-size:15px;background:var(--card);color:var(--txt3);border:1px solid var(--brd);transition:all .3s;white-space:nowrap;position:relative;overflow:hidden;}
.nav-t::after{content:'';position:absolute;bottom:0;left:50%;width:0;height:2px;background:var(--neon);transition:all .3s;transform:translateX(-50%);border-radius:2px;}
.nav-t:hover{border-color:var(--neon);color:var(--txt);}
.nav-t.on{background:linear-gradient(135deg,rgba(0,212,255,.1),rgba(168,85,247,.1));border-color:var(--neon);color:var(--neon);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,212,255,.1);}
.nav-t.on::after{width:60%;}
.mn{max-width:1200px;margin:0 auto;padding:20px 16px;}
.sec{display:none;animation:fu .5s ease;}.sec.on{display:block;}
@keyframes fu{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

/* ═══ WELCOME SPLASH ═══ */
.splash{position:fixed;inset:0;z-index:99999;background:radial-gradient(ellipse at 50% 40%,#1a1040,#0B0E17 65%,#050710);display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity .8s,visibility .8s;text-align:center;padding:20px;}
.splash.hid{opacity:0;visibility:hidden;pointer-events:none;}
.splash .sp-logo{font-size:80px;margin-bottom:10px;animation:spBounce 1.5s ease infinite;}
@keyframes spBounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-15px);}}
.splash h1{font-family:'Orbitron';font-size:36px;background:linear-gradient(135deg,var(--neon),var(--npur),var(--npnk));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;animation:su .8s;}
.splash .sp-inst{font-size:14px;color:var(--txt2);margin-bottom:4px;font-weight:600;letter-spacing:.5px;animation:su 1s;}
.splash .sp-sede{font-size:12px;color:var(--txt3);margin-bottom:30px;animation:su 1.2s;}
.splash .sp-bar{width:200px;height:4px;background:var(--bg2);border-radius:50px;overflow:hidden;margin:0 auto;}
.splash .sp-fill{width:0%;height:100%;background:linear-gradient(90deg,var(--neon),var(--npur));border-radius:50px;animation:spLoad 2.5s ease-in-out forwards;}
@keyframes spLoad{0%{width:0%}100%{width:100%}}
.splash .sp-txt{font-size:11px;color:var(--txt3);margin-top:8px;animation:su 1.4s;}

/* ═══ DICTIONARY POPUP ═══ */
.dict-pop{position:fixed;z-index:5000;background:var(--card);border:1.5px solid var(--neon);border-radius:var(--r2);padding:16px 18px;max-width:320px;box-shadow:var(--sh2),0 0 30px rgba(0,212,255,.1);display:none;animation:fu .3s;}
.dict-pop.show{display:block;}
.dict-pop .dp-word{font-family:'Orbitron';font-size:15px;color:var(--neon);margin-bottom:4px;}
.dict-pop .dp-def{font-size:14px;color:var(--txt);line-height:1.6;}
.dict-pop .dp-close{position:absolute;top:6px;right:8px;background:none;border:none;color:var(--txt3);font-size:14px;cursor:pointer;}
.dict-pop .dp-syn{font-size:11px;color:var(--txt3);margin-top:6px;font-style:italic;}
.rd-text .dict-word{border-bottom:2px dashed var(--npur);cursor:help;transition:color .2s;}
.rd-text .dict-word:hover{color:var(--npur);}

/* ═══ 1v1 DUEL ═══ */
.duel-card{background:linear-gradient(135deg,rgba(244,114,182,.06),rgba(251,146,60,.06));border:1px solid rgba(244,114,182,.15);border-radius:var(--r2);padding:18px;margin-bottom:14px;text-align:center;}
.duel-card h4{font-family:'Orbitron';font-size:14px;color:var(--npnk);margin-bottom:8px;}
.duel-card p{font-size:13px;color:var(--txt2);margin-bottom:10px;}
.duel-vs{display:flex;align-items:center;justify-content:center;gap:16px;margin:12px 0;}
.duel-player{text-align:center;}.duel-player .dp-av{font-size:36px;display:block;margin-bottom:4px;}.duel-player .dp-nm{font-size:12px;font-weight:700;color:var(--txt);}
.duel-score{font-family:'Orbitron';font-size:28px;color:var(--gold);font-weight:900;}
.duel-btn{background:linear-gradient(135deg,var(--npnk),var(--norg));color:#fff;border:none;border-radius:50px;padding:10px 24px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Outfit';}
.duel-btn:hover{transform:scale(1.05);box-shadow:0 4px 20px rgba(244,114,182,.3);}

/* ═══ ADMIN SUMMARY CHART ═══ */
.sum-chart{display:flex;gap:8px;margin-bottom:16px;}
.sum-bar-col{flex:1;text-align:center;}
.sum-bar-wrap{height:100px;background:var(--bg);border-radius:6px;display:flex;align-items:flex-end;justify-content:center;padding:2px;margin-bottom:4px;}
.sum-bar-fill{width:80%;border-radius:4px 4px 0 0;transition:height .5s;}
.sum-bar-label{font-size:10px;color:var(--txt3);font-weight:600;}
.sum-bar-val{font-size:11px;font-weight:800;color:var(--txt);font-family:'Orbitron';}
.av-pick{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin:5px 0;}
.av-o{width:44px;height:44px;font-size:26px;border-radius:12px;border:2px solid var(--brd);display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--bg);transition:all .2s;}
.av-o:hover{border-color:var(--neon);transform:scale(1.1);}.av-o.on{border-color:var(--npur);background:rgba(168,85,247,.12);box-shadow:var(--glow);}

/* ═══ DASHBOARD ═══ */
.dash-top{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;}
.dash-w{background:linear-gradient(135deg,rgba(0,212,255,.06),rgba(168,85,247,.06));border:1px solid var(--brd);border-radius:var(--r3);padding:24px;position:relative;overflow:hidden;}
.dash-w h2{font-size:20px;margin-bottom:4px;}.dash-w .greet{font-size:15px;color:var(--txt2);line-height:1.5;}
.dash-w .quote{margin-top:12px;padding:10px 16px;background:rgba(251,191,36,.05);border-left:3px solid var(--gold);border-radius:0 var(--r) var(--r) 0;font-style:italic;font-size:14px;color:var(--gold);line-height:1.5;}
.dash-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ds{background:var(--card);border:1px solid var(--brd);border-radius:var(--r2);padding:16px;text-align:center;transition:all .3s;position:relative;overflow:hidden;}
.ds:hover{border-color:var(--neon);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,212,255,.08);}
.ds::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(0,212,255,.03),transparent);transition:left .6s;}
.ds:hover::after{left:100%;}
.ds .di{font-size:24px;margin-bottom:4px;}.ds .dv{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--neon),var(--ngrn));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.ds .dl{font-size:12px;color:var(--txt3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
.xp-box{background:var(--card);border:1px solid var(--brd);border-radius:var(--r2);padding:16px;margin-bottom:18px;}
.xp-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.xp-hdr h4{font-size:14px;}.xp-lvl{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;font-weight:800;font-size:11px;padding:4px 12px;border-radius:50px;font-family:'Orbitron';}
.xp-track{background:var(--bg);border-radius:50px;height:22px;overflow:hidden;position:relative;border:1px solid var(--brd);}
.xp-fill{height:100%;border-radius:50px;background:linear-gradient(90deg,var(--neon),var(--npur));transition:width 1.2s;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:9px;font-weight:800;color:#fff;min-width:36px;position:relative;}
.xp-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);animation:shine 3s infinite;}
@keyframes shine{0%{transform:translateX(-100%);}100%{transform:translateX(100%);}}
.xp-info{display:flex;justify-content:space-between;margin-top:5px;font-size:12px;color:var(--txt3);font-weight:600;}

/* ═══ MAP ═══ */
.map-world{position:relative;width:100%;}
.zone-bg{position:absolute;left:0;right:0;overflow:hidden;border-radius:var(--r2);}
.zone-label{position:absolute;left:50%;transform:translateX(-50%);padding:8px 22px;border-radius:50px;font-family:'Orbitron';font-size:12px;font-weight:700;color:#fff;z-index:5;box-shadow:var(--sh);white-space:nowrap;letter-spacing:.5px;text-transform:uppercase;border:1px solid rgba(255,255,255,.1);}
.deco{position:absolute;pointer-events:none;user-select:none;opacity:.15;font-size:28px;}
.deco.float{animation:df 5s ease-in-out infinite;}@keyframes df{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.deco.bob{animation:db 3s ease-in-out infinite;}@keyframes db{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
.map-svg{position:absolute;top:0;left:0;width:100%;height:100%;z-index:2;pointer-events:none;}
.path-line{fill:none;stroke-width:10;stroke-linecap:round;stroke-linejoin:round;}
.path-bg{stroke:rgba(255,255,255,.04);stroke-width:16;}.path-done{stroke:var(--neon);stroke-dasharray:8 6;opacity:.7;filter:drop-shadow(0 0 8px rgba(0,212,255,.25));animation:pathFlow 2s linear infinite;}.path-future{stroke:rgba(255,255,255,.05);stroke-dasharray:8 6;}
@keyframes pathFlow{0%{stroke-dashoffset:0;}100%{stroke-dashoffset:-28;}}
.node-wrap{position:absolute;z-index:10;transform:translate(-50%,-50%);}
.node{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:var(--sh);transition:all .35s;cursor:pointer;border:3px solid rgba(255,255,255,.08);position:relative;}
.node:hover{transform:scale(1.18);box-shadow:var(--sh2);}
.node-label{position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:11px;font-weight:700;color:var(--txt2);background:var(--card);padding:3px 10px;border-radius:50px;box-shadow:var(--sh);border:1px solid var(--brd);max-width:140px;overflow:hidden;text-overflow:ellipsis;}
.node-type{position:absolute;top:-6px;right:-6px;font-size:14px;background:var(--card);border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border:1px solid var(--brd);box-shadow:0 2px 8px rgba(0,0,0,.3);}
.node.done{background:linear-gradient(135deg,var(--neon),var(--npur));border-color:rgba(0,212,255,.5);box-shadow:0 0 20px rgba(0,212,255,.15),var(--sh);}
.node.current{background:linear-gradient(135deg,var(--norg),var(--npnk));border-color:var(--norg);animation:pulse 2s ease-in-out infinite;box-shadow:0 0 24px rgba(251,146,60,.2),var(--sh);}
.node.current::before{content:'';position:absolute;inset:-8px;border-radius:50%;border:2px solid var(--norg);opacity:.4;animation:ringPop 2s ease-in-out infinite;}
@keyframes ringPop{0%,100%{transform:scale(1);opacity:.4;}50%{transform:scale(1.25);opacity:0;}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(251,146,60,.3),var(--sh);}50%{box-shadow:0 0 0 12px rgba(251,146,60,0),var(--sh2);}}
.node.locked{background:var(--bg2);border-color:var(--brd);opacity:.35;cursor:not-allowed;}.node.locked:hover{transform:scale(1);}
.char-marker{position:absolute;top:-28px;left:50%;transform:translateX(-50%);font-size:22px;animation:cb 1.5s ease-in-out infinite;z-index:11;filter:drop-shadow(0 3px 6px rgba(0,0,0,.5));}
@keyframes cb{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(-8px);}}
.node.trophy{width:72px;height:72px;font-size:32px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-color:var(--gold);}

/* ═══ MODAL ═══ */
.mo{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:12px;}.mo.open{display:flex;}
.mo-box{background:var(--card);border:1px solid var(--brd);border-radius:var(--r3);max-width:780px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--sh2);animation:su .4s;}
.mo-hdr{padding:22px 28px 16px;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--brd);}
.mo-hdr h2{font-size:20px;}
.tbdg{font-size:11px;font-weight:700;padding:4px 10px;border-radius:50px;text-transform:uppercase;letter-spacing:.5px;display:inline-block;margin-top:4px;}
.tL{background:rgba(34,211,238,.1);color:var(--ngrn);border:1px solid rgba(34,211,238,.15);}
.tI{background:rgba(168,85,247,.1);color:var(--npur);border:1px solid rgba(168,85,247,.15);}
.tC{background:rgba(251,146,60,.1);color:var(--norg);border:1px solid rgba(251,146,60,.15);}
.tG{background:rgba(244,114,182,.1);color:var(--npnk);border:1px solid rgba(244,114,182,.15);}
.mo-x{width:36px;height:36px;border-radius:50%;background:var(--bg);border:1px solid var(--brd);color:var(--txt3);font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s;}.mo-x:hover{border-color:var(--nred);color:var(--nred);}
.mo-body{padding:24px 28px;}
.rd-text{background:var(--bg2);border-radius:var(--r2);padding:24px 26px;font-size:18px;line-height:2;margin-bottom:20px;border-left:5px solid var(--neon);position:relative;letter-spacing:.2px;color:#f1f5f9;}
.rd-text::before{content:'📖';position:absolute;top:-12px;left:-12px;font-size:20px;}
.rd-src{font-size:12px;color:var(--txt3);margin-top:10px;font-style:italic;}
.q-block{background:var(--bg);border:1px solid var(--brd);border-radius:var(--r2);padding:18px 20px;margin-bottom:12px;}
.q-block h4{font-size:15px;color:var(--neon);margin-bottom:10px;font-family:'Orbitron';font-weight:600;line-height:1.4;}
.q-block .qt{font-size:9px;font-weight:700;padding:3px 7px;border-radius:50px;margin-left:6px;vertical-align:middle;}
.opts{display:flex;flex-direction:column;gap:8px;}
.opt{padding:14px 18px;border-radius:var(--r);border:1.5px solid var(--brd);background:var(--card);font-size:16px;font-weight:500;color:var(--txt);transition:all .25s;text-align:left;line-height:1.4;}
.opt:hover{border-color:var(--neon);background:var(--card2);transform:translateX(4px);}
.opt.pick{border-color:var(--npur);background:rgba(168,85,247,.08);}
.opt.ok{border-color:var(--ngrn);background:rgba(34,211,238,.08);color:var(--ngrn);animation:optOk .4s ease;}
.opt.no{border-color:var(--nred);background:rgba(239,68,68,.08);color:var(--nred);animation:optNo .4s ease;}
@keyframes optOk{0%{transform:scale(1);}40%{transform:scale(1.03);}100%{transform:scale(1);}}
@keyframes optNo{0%,100%{transform:translateX(0);}20%{transform:translateX(-6px);}60%{transform:translateX(6px);}80%{transform:translateX(-3px);}}
.fb{display:none;padding:10px 14px;border-radius:var(--r);font-weight:700;font-size:14px;margin-top:10px;text-align:center;border:1px solid;}
.fb.show{display:block;animation:fu .3s;}.fb.ok{background:rgba(34,211,238,.04);color:var(--ngrn);border-color:rgba(34,211,238,.15);}.fb.bad{background:rgba(239,68,68,.04);color:var(--nred);border-color:rgba(239,68,68,.15);}
.sub-btn{width:100%;padding:16px;border-radius:var(--r);font-family:'Orbitron';font-size:14px;font-weight:700;color:#fff;letter-spacing:1px;text-transform:uppercase;background:linear-gradient(135deg,var(--neon),var(--npur));box-shadow:0 4px 20px rgba(0,212,255,.2);transition:all .3s;margin-top:16px;}
.sub-btn:hover{transform:translateY(-2px);}.sub-btn:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none;}

/* GAME ELEMENTS */
.game-area{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r2);padding:24px;margin-bottom:16px;}
.game-area h3{font-size:16px;color:var(--npnk);margin-bottom:14px;font-family:'Orbitron';}
.game-area p{font-size:15px!important;}
.drag-item{background:var(--card);border:1.5px solid var(--brd);border-radius:var(--r);padding:14px 18px;margin-bottom:8px;font-size:16px;cursor:grab;transition:all .2s;user-select:none;line-height:1.4;}
.drag-item:hover{border-color:var(--neon);background:var(--card2);}
.drag-item.correct{border-color:var(--ngrn);background:rgba(34,211,238,.08);}
.drag-item.wrong{border-color:var(--nred);background:rgba(239,68,68,.08);}
.timer-bar{height:8px;background:var(--bg);border-radius:50px;margin-bottom:14px;overflow:hidden;}
.timer-fill{height:100%;background:linear-gradient(90deg,var(--ngrn),var(--norg),var(--nred));border-radius:50px;transition:width .5s linear;}

/* ═══ REWARD ═══ */
.rw{display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);align-items:center;justify-content:center;}.rw.show{display:flex;}
.rw-box{background:var(--card);border:1px solid var(--brd);border-radius:var(--r3);padding:40px;text-align:center;animation:su .6s;box-shadow:var(--sh2);max-width:420px;width:92%;}
.rw-box .star{font-size:64px;margin-bottom:10px;animation:spin 1s ease;}@keyframes spin{from{transform:rotate(0) scale(0);}to{transform:rotate(360deg) scale(1);}}
.rw-box h3{font-size:22px;background:linear-gradient(135deg,var(--neon),var(--npur));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;}
.rw-box .xpe{font-size:24px;font-weight:800;color:var(--gold);margin-bottom:6px;font-family:'Orbitron';}
.rw-box .nbdg{font-size:14px;color:var(--npur);font-weight:700;margin-bottom:4px;}.rw-box .msg{color:var(--txt2);font-size:15px;margin-bottom:16px;line-height:1.5;}
.rw-pwr{margin:10px 0;padding:12px;background:linear-gradient(135deg,rgba(251,191,36,.08),rgba(168,85,247,.08));border:1px solid rgba(251,191,36,.2);border-radius:var(--r2);display:none;}
.rw-pwr.show{display:block;animation:fu .5s;}
.rw-pwr .pwr-icon{font-size:36px;margin-bottom:4px;}
.rw-pwr .pwr-name{font-family:'Orbitron';font-size:13px;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:1px;}
.rw-pwr .pwr-desc{font-size:12px;color:var(--txt2);margin-top:2px;}
.rw-cl{padding:14px 32px;border-radius:var(--r);background:linear-gradient(135deg,var(--neon),var(--npur));color:#fff;font-family:'Orbitron';font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;transition:all .2s;}.rw-cl:hover{transform:scale(1.05);}

/* ═══ POWERS ═══ */
.powers-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.pwr-pill{background:linear-gradient(135deg,rgba(251,191,36,.06),rgba(168,85,247,.06));border:1px solid rgba(251,191,36,.15);border-radius:50px;padding:5px 12px;display:flex;align-items:center;gap:5px;font-weight:700;font-size:12px;color:var(--gold);animation:fu .4s;}
.pwr-pill .pi{font-size:16px;}

/* ═══ READING TIMER ═══ */
.read-timer{display:flex;align-items:center;gap:8px;padding:10px 16px;background:linear-gradient(135deg,rgba(0,212,255,.04),rgba(168,85,247,.04));border:1px solid var(--brd);border-radius:var(--r);margin-bottom:14px;}
.read-timer .rt-icon{font-size:20px;}
.read-timer .rt-clock{font-family:'Orbitron';font-size:18px;color:var(--neon);font-weight:700;letter-spacing:1px;min-width:70px;}
.read-timer .rt-label{font-size:12px;color:var(--txt3);font-weight:600;}
.read-timer .rt-wpm{font-family:'Orbitron';font-size:13px;color:var(--gold);font-weight:700;margin-left:auto;}

/* ═══ EXPORT BTN ═══ */
.export-btn{background:linear-gradient(135deg,#22D3EE,#059669);color:#fff;border:none;border-radius:var(--r);padding:12px 20px;font-family:'Orbitron';font-size:12px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px;text-transform:uppercase;}
.export-btn:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(34,211,238,.3);}

/* ═══ TTS READER ═══ */
.tts-bar{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.tts-btn{background:linear-gradient(135deg,var(--npur),var(--npnk));color:#fff;border:none;border-radius:50px;padding:8px 18px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;font-family:'Outfit';}
.tts-btn:hover{transform:scale(1.05);box-shadow:0 4px 16px rgba(168,85,247,.3);}
.tts-btn.playing{background:linear-gradient(135deg,var(--nred),var(--norg));animation:pulse 1.5s infinite;}
.tts-speed{background:var(--card);border:1px solid var(--brd);border-radius:50px;padding:4px 10px;font-size:11px;color:var(--txt2);font-weight:600;cursor:pointer;}

/* ═══ THEME TOGGLE ═══ */
.theme-toggle{background:var(--card);border:1px solid var(--brd);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:all .2s;}
.theme-toggle:hover{border-color:var(--neon);transform:scale(1.1);}
body.light-mode{--bg:#F0F2F5;--bg2:#E4E7EC;--bg3:#D5D9E2;--card:#FFFFFF;--card2:#F5F7FA;--txt:#1A1A2E;--txt2:#4A5568;--txt3:#718096;--brd:#D1D5DB;--glow:0 0 20px rgba(0,100,255,.08);--sh:0 4px 24px rgba(0,0,0,.08);--sh2:0 8px 40px rgba(0,0,0,.12);}
body.light-mode .login{background:radial-gradient(ellipse at 30% 50%,#e8e0f8,#F0F2F5 60%,#f5f5ff);}
body.light-mode .rd-text{color:#1a1a2e;}
body.light-mode .opt{color:#1a1a2e;}
body.light-mode .q-block h4{color:#2563EB;}
body.light-mode .drag-item{color:#1a1a2e;}
/* 🌊 OCEAN */
body.ocean-mode{--bg:#0A1628;--bg2:#0F1F38;--bg3:#142A48;--card:#1A3050;--card2:#1F3A5E;--neon:#38BDF8;--npur:#06B6D4;--npnk:#67E8F9;--ngrn:#22D3EE;--norg:#0EA5E9;--txt:#E0F2FE;--txt2:#7DD3FC;--txt3:#38BDF8;--brd:#164E63;--glow:0 0 20px rgba(56,189,248,.15);--sh:0 4px 24px rgba(0,0,0,.5);--sh2:0 8px 40px rgba(0,0,0,.6);}
body.ocean-mode .login{background:radial-gradient(ellipse at 30% 50%,#0c2a4a,#0A1628 60%,#050d1a);}
body.ocean-mode .rd-text{color:#E0F2FE;}body.ocean-mode .opt{color:#E0F2FE;}
/* 🌲 FOREST */
body.forest-mode{--bg:#0A1A0F;--bg2:#0F2415;--bg3:#14301C;--card:#1A3D22;--card2:#1F4A2A;--neon:#4ADE80;--npur:#22C55E;--npnk:#86EFAC;--ngrn:#34D399;--norg:#A3E635;--txt:#DCFCE7;--txt2:#86EFAC;--txt3:#4ADE80;--brd:#166534;--glow:0 0 20px rgba(74,222,128,.15);--sh:0 4px 24px rgba(0,0,0,.5);--sh2:0 8px 40px rgba(0,0,0,.6);}
body.forest-mode .login{background:radial-gradient(ellipse at 30% 50%,#0a2a12,#0A1A0F 60%,#050f08);}
body.forest-mode .rd-text{color:#DCFCE7;}body.forest-mode .opt{color:#DCFCE7;}
/* 🌅 SUNSET */
body.sunset-mode{--bg:#1A0A0F;--bg2:#2A0F18;--bg3:#3A1420;--card:#4A1A2A;--card2:#5A1F32;--neon:#FB923C;--npur:#F43F5E;--npnk:#FDA4AF;--ngrn:#FBBF24;--norg:#EF4444;--txt:#FFF1F2;--txt2:#FECDD3;--txt3:#FDA4AF;--brd:#881337;--glow:0 0 20px rgba(251,146,60,.15);--sh:0 4px 24px rgba(0,0,0,.5);--sh2:0 8px 40px rgba(0,0,0,.6);}
body.sunset-mode .login{background:radial-gradient(ellipse at 30% 50%,#3a0a1a,#1A0A0F 60%,#0f0508);}
body.sunset-mode .rd-text{color:#FFF1F2;}body.sunset-mode .opt{color:#FFF1F2;}
/* 🍬 CANDY */
body.candy-mode{--bg:#1A0A20;--bg2:#24102E;--bg3:#2E163C;--card:#3A1E4A;--card2:#462658;--neon:#E879F9;--npur:#C084FC;--npnk:#F9A8D4;--ngrn:#A78BFA;--norg:#FB7185;--txt:#FAE8FF;--txt2:#F0ABFC;--txt3:#D946EF;--brd:#6B21A8;--glow:0 0 20px rgba(232,121,249,.15);--sh:0 4px 24px rgba(0,0,0,.5);--sh2:0 8px 40px rgba(0,0,0,.6);}
body.candy-mode .login{background:radial-gradient(ellipse at 30% 50%,#2a0a3a,#1A0A20 60%,#0f0518);}
body.candy-mode .rd-text{color:#FAE8FF;}body.candy-mode .opt{color:#FAE8FF;}

/* ═══ CERTIFICATE ═══ */
.cert-btn{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;border:none;border-radius:var(--r);padding:12px 20px;font-family:'Orbitron';font-size:12px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px;text-transform:uppercase;margin-top:12px;}
.cert-btn:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(251,191,36,.3);}

/* ═══ PROGRESS CHART ═══ */
.chart-box{background:var(--card);border:1px solid var(--brd);border-radius:var(--r2);padding:18px;margin-bottom:18px;}
.chart-box h4{font-size:13px;margin-bottom:12px;font-family:'Orbitron';color:var(--neon);}
.chart-bars{display:flex;align-items:flex-end;gap:4px;height:120px;padding:0 4px;}
.chart-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.chart-fill{width:100%;border-radius:4px 4px 0 0;transition:height .6s ease;min-height:2px;}
.chart-label{font-size:9px;color:var(--txt3);font-weight:600;writing-mode:vertical-rl;text-orientation:mixed;max-height:50px;overflow:hidden;}
.chart-val{font-size:9px;color:var(--txt2);font-weight:700;font-family:'Orbitron';}

/* ═══ DAILY CHALLENGE ═══ */
.daily-box{background:linear-gradient(135deg,rgba(251,191,36,.06),rgba(244,114,182,.06));border:1px solid rgba(251,191,36,.15);border-radius:var(--r2);padding:16px 20px;margin-bottom:18px;position:relative;overflow:hidden;}

/* ═══ AI FEEDBACK ═══ */
.ai-fb{margin-top:8px;padding:12px 14px;border-radius:var(--r);background:linear-gradient(135deg,rgba(168,85,247,.05),rgba(0,212,255,.05));border:1px solid rgba(168,85,247,.15);font-size:14px;color:var(--txt);line-height:1.7;display:none;animation:fu .4s;}
.ai-fb.show{display:block;}
.ai-fb .ai-label{font-size:10px;font-weight:700;color:var(--npur);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;display:flex;align-items:center;gap:4px;}
.ai-fb .ai-loading{color:var(--txt3);font-style:italic;font-size:13px;}
.ai-fb .ai-loading::after{content:'...';animation:dots 1.5s infinite;}
@keyframes dots{0%{content:'.';}33%{content:'..';}66%{content:'...';}}
.fb-exp{margin-top:6px;font-size:13px;color:var(--txt2);line-height:1.6;padding:8px 10px;background:rgba(0,0,0,.1);border-radius:6px;}
.daily-box::before{content:'';position:absolute;top:0;right:0;width:80px;height:80px;background:radial-gradient(circle,rgba(251,191,36,.1),transparent);border-radius:50%;}
.daily-box h4{font-size:14px;font-family:'Orbitron';color:var(--gold);margin-bottom:6px;}
.daily-box p{font-size:13px;color:var(--txt2);line-height:1.5;}
.daily-go{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;border:none;border-radius:50px;padding:8px 18px;font-size:12px;font-weight:700;cursor:pointer;margin-top:8px;transition:all .2s;font-family:'Outfit';}
.daily-go:hover{transform:scale(1.05);}

/* ═══ SHOP ═══ */
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}
.shop-item{background:var(--card);border:1px solid var(--brd);border-radius:var(--r2);padding:16px 10px;text-align:center;transition:all .3s;cursor:pointer;}
.shop-item:hover{border-color:var(--gold);transform:translateY(-2px);}
.shop-item.owned{border-color:var(--ngrn);background:rgba(34,211,238,.04);}
.shop-item .si-icon{font-size:32px;display:block;margin-bottom:6px;}
.shop-item h4{font-size:11px;margin-bottom:2px;}
.shop-item .si-cost{font-family:'Orbitron';font-size:11px;color:var(--gold);font-weight:700;}
.shop-item.owned .si-cost{color:var(--ngrn);}

/* ═══ ADMIN FORMS ═══ */
.adm-form{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r2);padding:18px;margin-bottom:14px;}
.adm-form h4{font-size:13px;font-family:'Orbitron';color:var(--neon);margin-bottom:12px;}
.adm-form .af-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;align-items:flex-end;}
.adm-form .af-row .af-field{flex:1;min-width:120px;}
.adm-form .af-row label{display:block;font-size:10px;color:var(--txt3);font-weight:700;margin-bottom:3px;text-transform:uppercase;}
.adm-form .af-row input,.adm-form .af-row select{width:100%;padding:8px 10px;background:var(--bg);border:1px solid var(--brd);border-radius:var(--r);font-size:13px;color:var(--txt);font-family:'Outfit';}
.adm-form .af-row input:focus,.adm-form .af-row select:focus{border-color:var(--neon);outline:none;}
.af-btn{background:linear-gradient(135deg,var(--neon),var(--npur));color:#fff;border:none;border-radius:var(--r);padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Outfit';transition:all .2s;}
.af-btn:hover{transform:translateY(-1px);}
.af-msg{font-size:12px;margin-top:6px;font-weight:600;}

/* ═══ PROFE MESSAGE ═══ */
.profe-msg{background:linear-gradient(135deg,rgba(168,85,247,.06),rgba(0,212,255,.06));border:1px solid rgba(168,85,247,.15);border-radius:var(--r2);padding:14px 18px;margin-bottom:14px;display:none;}
.profe-msg.show{display:block;animation:fu .4s;}
.profe-msg .pm-label{font-size:10px;font-weight:700;color:var(--npur);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.profe-msg .pm-text{font-size:14px;color:var(--txt);line-height:1.6;}

/* ═══ RECORDS TABLE ═══ */
.rec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:14px;}
.rec-card{background:var(--card);border:1px solid var(--brd);border-radius:var(--r2);padding:14px;text-align:center;}
.rec-card .rc-icon{font-size:28px;margin-bottom:4px;}
.rec-card .rc-val{font-family:'Orbitron';font-size:18px;color:var(--gold);font-weight:800;}
.rec-card .rc-who{font-size:11px;color:var(--neon);font-weight:600;margin-top:2px;}
.rec-card .rc-label{font-size:10px;color:var(--txt3);margin-top:2px;}

/* ═══ BETTER CONFETTI ═══ */
.firework{position:fixed;z-index:3000;pointer-events:none;width:6px;height:6px;border-radius:50%;animation:fw 1.2s ease-out forwards;}
@keyframes fw{0%{opacity:1;transform:translate(0,0) scale(1);}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0);}}

/* ═══ BADGES/LB/STATS ═══ */
.bg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;}
.badge{background:var(--card);border:1px solid var(--brd);border-radius:var(--r2);padding:16px 10px;text-align:center;transition:all .3s;position:relative;overflow:hidden;}.badge:hover{border-color:var(--neon);transform:translateY(-2px);}
.badge:not(.lk){border-color:rgba(168,85,247,.3);background:linear-gradient(135deg,var(--card),rgba(168,85,247,.04));}
.badge:not(.lk):hover{border-color:var(--npur);box-shadow:0 0 16px rgba(168,85,247,.15);}
.badge:not(.lk)::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--npur),var(--neon));border-radius:var(--r2) var(--r2) 0 0;}
.badge .bi{font-size:40px;display:block;margin-bottom:6px;}.badge.lk .bi{filter:grayscale(1) opacity(.2);}
.badge h4{font-size:12px;margin-bottom:3px;}.badge p{font-size:10px;color:var(--txt3);}.badge.lk h4,.badge.lk p{opacity:.3;}
.lb-card{background:var(--card);border:1px solid var(--brd);border-radius:var(--r2);overflow:hidden;max-width:500px;margin:0 auto;}
.lb-hdr{background:linear-gradient(135deg,rgba(0,212,255,.06),rgba(168,85,247,.06));padding:16px;text-align:center;border-bottom:1px solid var(--brd);}.lb-hdr h3{font-size:14px;}
.lb-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--brd);transition:background .2s;}.lb-row:last-child{border-bottom:none;}.lb-row:hover{background:var(--card2);}.lb-row.me{background:rgba(251,191,36,.04);border-left:3px solid var(--gold);}
.lb-rk{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:10px;background:var(--bg);color:var(--txt3);font-family:'Orbitron';}
.lb-row:nth-child(1) .lb-rk{background:linear-gradient(135deg,#FFD700,#FFA000);color:#000;}.lb-row:nth-child(2) .lb-rk{background:linear-gradient(135deg,#C0C0C0,#9E9E9E);color:#000;}.lb-row:nth-child(3) .lb-rk{background:linear-gradient(135deg,#CD7F32,#A1661B);color:#fff;}
.lb-nm{flex:1;font-weight:600;font-size:14px;}.lb-xp{font-weight:800;color:var(--gold);font-size:13px;font-family:'Orbitron';}
.st-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:16px;}
.st{background:var(--card);border:1px solid var(--brd);border-radius:var(--r2);padding:16px;text-align:center;}.st:hover{border-color:var(--neon);}

/* ═══ ADMIN PANEL ═══ */
.admin-panel{animation:fu .4s;}

.admin-tab{padding:9px 18px;border-radius:var(--r);font-weight:700;font-size:12px;background:var(--card);color:var(--txt3);border:1px solid var(--brd);transition:all .2s;position:relative;}
.admin-tab:hover{border-color:rgba(0,212,255,.3);color:var(--txt);}
.admin-tab.on{background:linear-gradient(135deg,rgba(0,212,255,.1),rgba(168,85,247,.1));border-color:var(--neon);color:var(--neon);}
.admin-tab.on::after{content:'';position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);width:60%;height:2px;background:linear-gradient(90deg,var(--neon),var(--npur));border-radius:2px 2px 0 0;}
.admin-sec{display:none;}.admin-sec.on{display:block;}
.admin-card{background:var(--card);border:1px solid var(--brd);border-radius:var(--r2);padding:18px;margin-bottom:12px;}
.admin-card h3{font-size:14px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.progress-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--brd);}
.progress-row:last-child{border-bottom:none;}
.progress-row .pr-name{width:180px;font-weight:600;font-size:12px;flex-shrink:0;}
.progress-row .pr-bar{flex:1;height:12px;background:var(--bg);border-radius:50px;overflow:hidden;}
.progress-row .pr-fill{height:100%;border-radius:50px;transition:width .5s;}

.progress-row .pr-stats span{display:flex;align-items:center;gap:3px;}
.grade-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
.gs{background:var(--card);border:1px solid var(--brd);border-radius:var(--r2);padding:16px;text-align:center;}
.gs h4{font-size:11px;color:var(--txt2);margin-bottom:6px;}.gs .gv{font-family:'Orbitron';font-size:20px;font-weight:800;margin-bottom:2px;}
.gs .gl{font-size:9px;color:var(--txt3);}
.alert-low{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.15);border-radius:var(--r2);padding:14px;margin-bottom:12px;}
.alert-low h4{font-size:12px;color:var(--nred);margin-bottom:8px;}.alert-low p{font-size:11px;color:var(--txt2);line-height:1.5;}

.conf{position:fixed;z-index:3000;pointer-events:none;animation:cd 2s ease-out forwards;}
@keyframes cd{0%{opacity:1;transform:translateY(0) rotate(0);}100%{opacity:0;transform:translateY(100vh) rotate(720deg);}}

@media(max-width:768px){

  .progress-row{flex-wrap:wrap;}.progress-row .pr-name{width:100%;}.progress-row .pr-stats{min-width:auto;width:100%;justify-content:flex-start;}
}

/* ═══ CREATIVE WRITING ═══ */
.cw-box{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r2);padding:18px;margin-top:14px;}
.cw-box h4{font-family:'Orbitron';font-size:13px;color:var(--npnk);margin-bottom:8px;}
.cw-textarea{width:100%;min-height:80px;padding:12px;background:var(--bg);border:1.5px solid var(--brd);border-radius:var(--r);font-size:14px;color:var(--txt);font-family:'Outfit';resize:vertical;line-height:1.6;}
.cw-textarea:focus{border-color:var(--npnk);outline:none;}
.cw-info{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--txt3);}
.cw-send{background:linear-gradient(135deg,var(--npnk),var(--npur));color:#fff;border:none;border-radius:50px;padding:8px 18px;font-size:12px;font-weight:700;cursor:pointer;margin-top:8px;transition:all .2s;}
.cw-send:hover{transform:scale(1.05);}
/* ═══ CONCEPT MAP ═══ */
.cmap{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r2);padding:18px;margin-top:14px;display:none;}
.cmap.show{display:block;animation:fu .5s;}
.cmap h4{font-family:'Orbitron';font-size:13px;color:var(--neon);margin-bottom:10px;}
.cmap-nodes{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
.cmap-node{background:var(--card);border:1px solid var(--brd);border-radius:50px;padding:8px 16px;font-size:13px;font-weight:600;color:var(--txt);transition:all .3s;}
.cmap-center{background:linear-gradient(135deg,var(--neon),var(--npur));color:#fff;font-size:14px;font-weight:700;border:none;padding:10px 20px;}
.cmap-line{width:2px;height:20px;background:var(--brd);margin:0 auto;}
/* ═══ SECRET MISSIONS ═══ */
.secret-node{border:2px dashed var(--gold)!important;background:linear-gradient(135deg,rgba(251,191,36,.08),rgba(168,85,247,.08))!important;}
/* ═══ MEMORY GAME ═══ */
.mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:400px;margin:0 auto;}
.mem-card{aspect-ratio:1;border-radius:var(--r2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:24px;font-weight:700;transition:all .4s;perspective:600px;border:2px solid var(--brd);background:linear-gradient(135deg,var(--neon),var(--npur));color:transparent;user-select:none;}

.mem-card.matched{background:rgba(34,211,238,.1);border-color:var(--ngrn);color:var(--ngrn);font-size:13px;text-align:center;padding:6px;line-height:1.3;pointer-events:none;}
.mem-stats{display:flex;justify-content:center;gap:20px;margin:12px 0;font-family:'Orbitron';font-size:13px;color:var(--txt2);}
/* ═══ PET / MASCOTA ═══ */
.pet-box{background:linear-gradient(135deg,rgba(244,114,182,.06),rgba(168,85,247,.06));border:1px solid rgba(244,114,182,.15);border-radius:var(--r2);padding:20px;text-align:center;margin-bottom:14px;position:relative;overflow:hidden;}
.pet-box::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 80%,rgba(168,85,247,.06),transparent 70%);pointer-events:none;}
.pet-sprite{font-size:72px;display:block;margin:0 auto 8px;animation:petBob 2s ease-in-out infinite;filter:drop-shadow(0 8px 16px rgba(0,0,0,.3));position:relative;z-index:1;}

.pet-name{font-family:'Orbitron';font-size:14px;color:var(--npnk);margin-bottom:2px;}
.pet-stage{font-size:11px;color:var(--txt2);margin-bottom:6px;}
.pet-bar{height:8px;background:var(--bg);border-radius:50px;overflow:hidden;max-width:200px;margin:0 auto;}
.pet-fill{height:100%;background:linear-gradient(90deg,var(--npnk),var(--npur));border-radius:50px;transition:width .5s;}
.pet-info{font-size:10px;color:var(--txt3);margin-top:4px;}

.ed-form h4{font-size:14px;font-family:'Orbitron';color:var(--neon);margin-bottom:12px;}

.ed-form .ef-field{flex:1;min-width:120px;}

.ed-form input,.ed-form select,.ed-form textarea{width:100%;padding:8px 10px;background:var(--bg);border:1px solid var(--brd);border-radius:var(--r);font-size:13px;color:var(--txt);font-family:'Outfit';}
.ed-form textarea{min-height:80px;resize:vertical;line-height:1.5;}
.ed-form input:focus,.ed-form select:focus,.ed-form textarea:focus{border-color:var(--neon);outline:none;}
.q-editor{background:var(--bg);border:1px solid var(--brd);border-radius:var(--r);padding:12px;margin-bottom:8px;}
.q-editor h5{font-size:12px;color:var(--npur);margin-bottom:6px;}

/* ═══ AREA SELECTOR ═══ */
.area-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
.area-card{background:var(--card);border:2px solid var(--brd);border-radius:var(--r2);padding:18px 10px 14px;text-align:center;cursor:pointer;transition:all .3s;position:relative;overflow:hidden;}
.area-card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(255,255,255,.02),transparent 60%);opacity:0;transition:opacity .3s;}
.area-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.3);border-color:rgba(255,255,255,.12);}
.area-card:hover::before{opacity:1;}
.area-card.active{border-width:2px;transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.2);}
.area-card .ac-icon{font-size:36px;display:block;margin-bottom:6px;transition:transform .3s;}
.area-card:hover .ac-icon{transform:scale(1.2);}
.area-card .ac-name{font-size:12px;font-weight:700;color:var(--txt);letter-spacing:.2px;}
.area-card .ac-count{font-size:10px;color:var(--txt3);margin-top:2px;}
.area-card .ac-pct{font-family:'Orbitron';font-size:11px;font-weight:700;margin-top:5px;}
.area-card .ac-bar-wrap{height:5px;background:rgba(255,255,255,.07);border-radius:3px;margin-top:5px;overflow:hidden;}
.area-card .ac-bar-fill{height:100%;border-radius:3px;transition:width .6s ease;}
@media(max-width:600px){.area-grid{grid-template-columns:repeat(2,1fr);}}

/* ═══ MAPA DE CALOR ═══ */
.node.hot-1{box-shadow:0 0 0 3px rgba(251,146,60,.4);}
.node.hot-2{box-shadow:0 0 0 4px rgba(239,68,68,.5);}
.heat-legend{display:flex;gap:8px;align-items:center;font-size:11px;color:var(--txt3);margin-top:6px;flex-wrap:wrap;}
.heat-dot{width:10px;height:10px;border-radius:50%;display:inline-block;}

/* ═══ REPASO ESPACIADO ═══ */
.review-banner{background:linear-gradient(135deg,rgba(168,85,247,.08),rgba(0,212,255,.06));border:1px solid rgba(168,85,247,.25);border-radius:var(--r2);padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s;}
.review-banner:hover{border-color:var(--npur);transform:translateY(-1px);}
.review-count{font-family:'Orbitron';font-size:22px;font-weight:900;color:var(--npur);}
.node.review-due{border:3px dashed var(--npur)!important;animation:reviewPulse 2s ease-in-out infinite;}
@keyframes reviewPulse{0%,100%{box-shadow:0 0 0 0 rgba(168,85,247,.4);}50%{box-shadow:0 0 12px rgba(168,85,247,.6);}}

/* ═══ RUTA PERSONALIZADA ═══ */
.ruta-card{background:linear-gradient(135deg,rgba(34,211,238,.06),rgba(168,85,247,.04));border:1px solid rgba(34,211,238,.2);border-radius:var(--r2);padding:14px 16px;margin-bottom:12px;}
.ruta-step{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--brd);}
.ruta-step:last-child{border-bottom:none;}
.ruta-num{width:24px;height:24px;border-radius:50%;background:var(--neon);color:var(--bg);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* ═══ DIARIO DE COMPRENSIÓN ═══ */
.diary-modal{background:var(--card);border:1px solid var(--brd);border-radius:var(--r2);padding:16px;margin-top:12px;}
.diary-entry{background:var(--bg2);border-left:3px solid var(--npur);border-radius:0 var(--r) var(--r) 0;padding:10px 14px;margin-bottom:8px;}
.diary-date{font-size:10px;color:var(--txt3);margin-bottom:4px;}
.diary-text{font-size:13px;color:var(--txt);line-height:1.6;}

/* ═══ MODO CONTRARRELOJ ═══ */
.clock-bar{height:6px;background:var(--bg);border-radius:50px;margin-bottom:10px;overflow:hidden;}
.clock-fill{height:100%;border-radius:50px;transition:width .1s linear;}
.clock-fill.ok{background:var(--ngrn);}
.clock-fill.warn{background:var(--norg);}
.clock-fill.danger{background:var(--nred);animation:dangerPulse .5s ease-in-out infinite;}
@keyframes dangerPulse{0%,100%{opacity:1;}50%{opacity:.5;}}
.clock-badge{font-family:'Orbitron';font-size:13px;font-weight:800;padding:3px 10px;border-radius:50px;border:1px solid;}

/* ═══ TORNEO ═══ */
.torneo-card{background:linear-gradient(135deg,rgba(251,191,36,.08),rgba(251,146,60,.06));border:1px solid rgba(251,191,36,.25);border-radius:var(--r2);padding:16px;margin-bottom:12px;}
.torneo-badge{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;font-size:10px;font-weight:800;padding:3px 10px;border-radius:50px;display:inline-block;margin-bottom:8px;}
.torneo-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--brd);}
.torneo-row:last-child{border-bottom:none;}
.torneo-rank{width:22px;text-align:center;font-weight:800;font-size:12px;font-family:'Orbitron';}

/* ═══ MODO COOPERATIVO ═══ */
.coop-card{background:linear-gradient(135deg,rgba(34,211,238,.06),rgba(34,197,94,.04));border:1px solid rgba(34,211,238,.2);border-radius:var(--r2);padding:16px;margin-bottom:12px;}
.coop-players{display:flex;gap:10px;justify-content:center;margin:10px 0;}
.coop-player{text-align:center;padding:10px;background:var(--card);border:1px solid var(--brd);border-radius:var(--r2);flex:1;}

/* ═══ PISTAS DE COMPAÑEROS ═══ */
.hint-card{background:rgba(168,85,247,.04);border:1px dashed rgba(168,85,247,.3);border-radius:var(--r);padding:10px 14px;margin-top:8px;font-size:13px;color:var(--txt2);line-height:1.6;}
.hint-label{font-size:10px;font-weight:700;color:var(--npur);text-transform:uppercase;margin-bottom:4px;}

/* ═══ INFORME SEMANAL ═══ */
.report-card{background:var(--card);border:1px solid var(--brd);border-radius:var(--r2);padding:16px;margin-bottom:10px;}
.report-kpi{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.report-kpi-item{text-align:center;padding:10px;background:var(--bg2);border-radius:var(--r);}
.report-kpi-val{font-family:'Orbitron';font-size:20px;font-weight:900;}
.report-kpi-lbl{font-size:10px;color:var(--txt3);margin-top:3px;}

.risk-card{border-left:4px solid var(--nred);background:rgba(239,68,68,.04);border-radius:0 var(--r2) var(--r2) 0;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}

.risk-warn .risk-badge{background:rgba(251,146,60,.12);color:var(--norg);}

<script>
// ═══ PARTICLES ═══
(()=>{const p=document.getElementById('particles');for(let i=0;i<30;i++){const s=document.createElement('span');s.style.left=Math.random()*100+'%';s.style.animationDelay=Math.random()*8+'s';s.style.animationDuration=(Math.random()*6+5)+'s';if(Math.random()>.5)s.style.background='var(--npur)';p.appendChild(s);}})();

const WEEKLY_LIMIT=5; // activities per area per week
function getWeekId(){
  // ISO week: Monday-based
  const d=new Date();const day=d.getDay()||7;
  d.setDate(d.getDate()+4-day);
  const y=d.getFullYear();
  const wn=Math.ceil((((d-new Date(y,0,1))/86400000)+1)/7);
  return y+'W'+String(wn).padStart(2,'0');
}
function getWeeklyProgress(area){
  if(!UD)return{done:0,limit:WEEKLY_LIMIT,blocked:false};
  const wk=getWeekId();
  const wp=UD.weeklyProgress||{};
  const areaWp=wp[area]||{};
  const done=areaWp[wk]||0;
  return{done,limit:WEEKLY_LIMIT,blocked:done>=WEEKLY_LIMIT,remaining:Math.max(0,WEEKLY_LIMIT-done)};
}
function recordWeeklyActivity(area){
  if(!UD)return;
  const wk=getWeekId();
  if(!UD.weeklyProgress)UD.weeklyProgress={};
  if(!UD.weeklyProgress[area])UD.weeklyProgress[area]={};
  UD.weeklyProgress[area][wk]=(UD.weeklyProgress[area][wk]||0)+1;
  sUD();
  // Sync to Firebase
  if(fbReady&&fbDB&&CU){
    fbDB.ref('progress/'+CU+'/weeklyProgress/'+area+'/'+wk).set(UD.weeklyProgress[area][wk]);
  }
}

async function uploadBaseToFirebase(){
  if(!fbReady||!fbDB){alert('Firebase no está conectado. Verifica tu conexión a internet.');return;}
  if(!confirm('¿Subir todas las actividades base a Firebase? Esto permite que otros colegios las usen.'))return;
  const msg=document.getElementById('editorMsg');
  if(msg){msg.textContent='⏳ Subiendo actividades...';msg.style.color='var(--neon)';}
  try{
    const data={};
    [6,7,8,9].forEach(g=>{
      if(!CONTENT[g])return;
      data[g]={};
      CONTENT[g].acts.forEach(a=>{data[g][a.id]=a;});
    });
    await fbDB.ref('activities').set(data);
    const total=Object.values(data).reduce((s,g)=>s+Object.keys(g).length,0);
    if(msg){msg.textContent='✅ '+total+' actividades subidas a Firebase exitosamente';msg.style.color='var(--ngrn)';}
  }catch(e){
    if(msg){msg.textContent='❌ Error: '+e.message;msg.style.color='var(--nred)';}
  }
}

  });

  const zone=type==='L'?0:type==='I'?1:2;
  const id=editId||`${grade}${type}${Date.now().toString(36)}`;

  // Also update CONTENT if it's the current area

function editActForm(grade,actId){
  const g=parseInt(grade);
  const act=CONTENT[g]?.acts?.find(a=>a.id===actId);
  if(!act)return;
  qFieldCount=0;
  showNewActForm(g,{...act,grade:g});
  document.getElementById('actFormArea').scrollIntoView({behavior:'smooth'});
}

function deleteAct(grade,actId){
  const g=parseInt(grade);
  const act=CONTENT[g]?.acts?.find(a=>a.id===actId);
  if(!act)return;
  if(!confirm('¿Eliminar "'+act.title+'"? Esta acción no se puede deshacer.'))return;
  CONTENT[g].acts=CONTENT[g].acts.filter(a=>a.id!==actId);
  if(fbReady&&fbDB)fbDB.ref('activities/'+g+'/'+actId).remove();
  renderActList();
}
