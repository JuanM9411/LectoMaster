  // LITERAL
  {id:'7L01',zone:0,title:'La Revolución Industrial',icon:'⚙️',type:'L',theme:'soc',xp:30,text:'Comenzó en Inglaterra a finales del siglo XVIII. La máquina de vapor (James Watt, 1769) transformó la producción. Miles de campesinos migraron a ciudades. Jornadas de 14-16 horas, incluidos niños desde los 5 años. Condiciones insalubres. Creó riqueza para dueños, miseria para trabajadores.',source:'Historia Universal',qs:[{q:'¿Dónde comenzó?',t:'L',o:['Francia','España','Inglaterra','Alemania'],c:2},{q:'¿Cuántas horas trabajaban?',t:'L',o:['8','10','14 a 16','6'],c:2},{q:'¿Desde qué edad trabajaban niños?',t:'L',o:['10','5','12','8'],c:1}]},
  {id:'7L02',zone:0,title:'García Márquez',icon:'📚',type:'L',theme:'lit',xp:30,text:'Nació en Aracataca, 1927. "Cien años de soledad" (1967): 50 millones de copias, 37 idiomas. Nobel de Literatura 1982. Macondo se inspiró en Aracataca y las historias de su abuela.',source:'Literatura colombiana',qs:[{q:'¿Dónde nació?',t:'L',o:['Bogotá','Cartagena','Aracataca','Medellín'],c:2},{q:'¿En qué año se publicó la novela?',t:'L',o:['1957','1967','1977','1982'],c:1},{q:'¿Cuántas copias vendió?',t:'L',o:['10M','30M','50M','100M'],c:2}]},
  {id:'7L03',zone:0,title:'El ADN',icon:'🧬',type:'L',theme:'nat',xp:30,text:'El ADN (ácido desoxirribonucleico) contiene las instrucciones genéticas de todos los seres vivos. Fue descubierto por Watson y Crick en 1953. Tiene forma de doble hélice. El genoma humano tiene 3.000 millones de pares de bases. Compartimos 98.7% del ADN con los chimpancés y 60% con los plátanos.',source:'Biología — Genética',qs:[{q:'¿Qué forma tiene el ADN?',t:'L',o:['Circular','Cuadrada','Doble hélice','Recta'],c:2},{q:'¿Cuánto ADN compartimos con chimpancés?',t:'L',o:['50%','75%','98.7%','100%'],c:2},{q:'¿En qué año se descubrió su estructura?',t:'L',o:['1943','1953','1963','1973'],c:1}]},
  {id:'7L04',zone:0,title:'Van Gogh: genio incomprendido',icon:'🌻',type:'L',theme:'art',xp:30,text:'Vincent van Gogh pintó más de 2.100 obras en solo 10 años. En vida vendió un solo cuadro. Sufría de enfermedades mentales y se cortó parte de la oreja en 1888. Murió en 1890 a los 37 años. Hoy, su cuadro "Los girasoles" vale más de 80 millones de dólares. Su estilo postimpresionista influyó en todo el arte del siglo XX.',source:'Historia del arte',qs:[{q:'¿Cuántas obras pintó Van Gogh?',t:'L',o:['500','1.000','2.100','5.000'],c:2},{q:'¿Cuántos cuadros vendió en vida?',t:'L',o:['Ninguno','Uno','Diez','Cien'],c:1},{q:'¿A qué edad murió?',t:'L',o:['27','37','47','57'],c:1}]},
  {id:'7L05',zone:0,title:'El cuerpo humano en números',icon:'🫀',type:'L',theme:'nat',xp:30,text:'El corazón late unas 100.000 veces al día. El cerebro tiene 86.000 millones de neuronas. Los huesos del cuerpo son 206. La sangre recorre 96.000 km diarios. El intestino delgado mide 7 metros. El ser humano produce 25.000 litros de saliva en su vida, suficiente para llenar dos piscinas.',source:'Anatomía',qs:[{q:'¿Cuántas veces late el corazón al día?',t:'L',o:['50.000','100.000','200.000','10.000'],c:1},{q:'¿Cuántos huesos tenemos?',t:'L',o:['150','206','300','100'],c:1},{q:'¿Cuánto mide el intestino delgado?',t:'L',o:['3 metros','5 metros','7 metros','10 metros'],c:2}]},
  {id:'7L06',zone:0,title:'La Segunda Guerra Mundial',icon:'🌍',type:'L',theme:'soc',xp:30,text:'Duró de 1939 a 1945. Murieron entre 70 y 85 millones de personas. Alemania nazi, liderada por Hitler, invadió Polonia el 1 de septiembre de 1939. Los Aliados (EE.UU., URSS, Reino Unido, Francia) derrotaron al Eje (Alemania, Italia, Japón). Terminó con las bombas atómicas sobre Hiroshima y Nagasaki en agosto de 1945.',source:'Historia — WWII',qs:[{q:'¿Cuántos años duró?',t:'L',o:['4','6','8','10'],c:1},{q:'¿Qué país fue invadido primero?',t:'L',o:['Francia','Polonia','Rusia','Inglaterra'],c:1},{q:'¿Cuántas personas murieron?',t:'L',o:['20-30 millones','40-50 millones','70-85 millones','100 millones'],c:2}]},
  {id:'7L07',zone:0,title:'Minecraft: más que un juego',icon:'⛏️',type:'L',theme:'tec',xp:30,text:'Minecraft fue creado por Markus Persson (Notch) en 2011 y vendido a Microsoft por 2.500 millones de dólares en 2014. Es el videojuego más vendido de la historia con más de 300 millones de copias. Se usa en escuelas de 115 países como herramienta educativa (Minecraft Education). Los estudiantes aprenden arquitectura, historia, programación y trabajo en equipo construyendo mundos virtuales.',source:'Tecnología educativa',qs:[{q:'¿Cuánto pagó Microsoft por Minecraft?',t:'L',o:['100 millones','500 millones','2.500 millones','10.000 millones'],c:2},{q:'¿Cuántas copias se han vendido?',t:'L',o:['100 millones','200 millones','300 millones','500 millones'],c:2},{q:'¿En cuántos países se usa en educación?',t:'L',o:['50','80','115','200'],c:2}]},
  {id:'7L08',zone:0,title:'Los océanos',icon:'🌊',type:'L',theme:'nat',xp:30,text:'Los océanos cubren el 71% de la superficie terrestre. El Pacífico es el más grande (165 millones de km²). La fosa de las Marianas es el punto más profundo: 11.034 metros. Solo hemos explorado el 5% del océano. Hay más artefactos históricos bajo el mar que en todos los museos del mundo. Los océanos producen el 50% del oxígeno que respiramos.',source:'Geografía — Oceanografía',qs:[{q:'¿Qué porcentaje de la Tierra cubren los océanos?',t:'L',o:['50%','60%','71%','80%'],c:2},{q:'¿Cuánto del océano hemos explorado?',t:'L',o:['5%','25%','50%','75%'],c:0},{q:'¿Qué porcentaje de oxígeno producen?',t:'L',o:['10%','25%','50%','75%'],c:2}]},
  {id:'7L09',zone:0,title:'La Independencia de Colombia',icon:'🇨🇴',type:'L',theme:'soc',xp:30,text:'El 20 de julio de 1810, el incidente del Florero de Llorente desencadenó el grito de independencia en Bogotá. Simón Bolívar lideró la campaña libertadora. La Batalla de Boyacá, el 7 de agosto de 1819, selló la independencia de la Nueva Granada. Bolívar soñaba con una Gran Colombia que uniera Venezuela, Colombia, Ecuador y Panamá, pero el proyecto se disolvió en 1830.',source:'Historia de Colombia',qs:[{q:'¿Qué fecha es el grito de independencia?',t:'L',o:['7 de agosto','20 de julio','12 de octubre','25 de diciembre'],c:1},{q:'¿Qué batalla selló la independencia?',t:'L',o:['Carabobo','Pichincha','Boyacá','Junín'],c:2},{q:'¿Qué países formarían la Gran Colombia?',t:'L',o:['Colombia y Venezuela','Colombia, Venezuela, Ecuador y Panamá','Todos los de Sudamérica','Colombia y Perú'],c:1}]},
  {id:'7L10',zone:0,title:'El cerebro adolescente',icon:'🧠',type:'L',theme:'nat',xp:30,text:'El cerebro no termina de desarrollarse hasta los 25 años. La última parte en madurar es la corteza prefrontal, responsable de tomar decisiones, controlar impulsos y prever consecuencias. Por eso los adolescentes tienden a tomar más riesgos. En cambio, el sistema límbico (emociones) ya está completamente activo. Esto explica por qué los adolescentes sienten las emociones con más intensidad que los adultos.',source:'Neurociencia del desarrollo',qs:[{q:'¿A qué edad termina de desarrollarse el cerebro?',t:'L',o:['18 años','21 años','25 años','30 años'],c:2},{q:'¿Qué parte madura al final?',t:'L',o:['El cerebelo','El sistema límbico','La corteza prefrontal','El tallo cerebral'],c:2},{q:'¿Qué controla la corteza prefrontal?',t:'L',o:['Las emociones','El movimiento','Decisiones, impulsos y consecuencias','La memoria'],c:2}]},
  // INFERENCIAL
  {id:'7I01',zone:1,title:'Migración venezolana',icon:'🚶',type:'I',theme:'soc',xp:45,text:'Desde 2015, más de 7 millones de venezolanos salieron de su país. Colombia recibió 2.5 millones. Enfrentan discriminación y empleo informal. Pero estudios muestran que la migración aporta: emprendimientos, mano de obra y diversidad. En los 2000, miles de colombianos migraron a Venezuela cuando era próspera.',source:'Migración — Sociales',qs:[{q:'¿Por qué menciona que colombianos migraron a Venezuela?',t:'I',o:['Para cambiar tema','Para mostrar que la migración se da en ambas direcciones','No es importante','Para criticar'],c:1},{q:'¿Qué contradicción señala?',t:'I',o:['Todos son ricos','Genera discriminación pero también aporta económicamente','No afecta a nadie','Es solo problema'],c:1},{q:'¿Idea principal?',t:'I',o:['Venezuela es mala','La migración es compleja con consecuencias positivas y negativas','Colombia no recibe migrantes','Migrantes no trabajan'],c:1}]},
  {id:'7I02',zone:1,title:'El lenguaje del poder',icon:'🦁',type:'I',theme:'lit',xp:45,text:'Un león propuso que votaran al líder, pero definió que el criterio fuera la fuerza. Ganó. La hormiga sugirió "¿y si fuera inteligencia o trabajo en equipo?", pero nadie la escuchó. El búho pensó: "El que define las reglas del juego, gana antes de empezar."',source:'Fábula — Pensamiento crítico',qs:[{q:'¿Por qué ganó el león?',t:'I',o:['Era el más inteligente','Él mismo definió el criterio','Todos lo querían','Era el más viejo'],c:1},{q:'¿Qué representa la hormiga?',t:'I',o:['Los débiles','Voces ignoradas que proponen criterios diferentes','Los insectos','Perdedores'],c:1},{q:'¿Qué quiso decir el búho?',t:'I',o:['Que las reglas no importan','Quien controla las reglas controla el resultado','Que el león es tonto','Que los búhos son sabios'],c:1}]},
  {id:'7I03',zone:1,title:'La paradoja de la tolerancia',icon:'⚖️',type:'I',theme:'gen',xp:45,text:'El filósofo Karl Popper planteó: si una sociedad es tolerante con todo, incluyendo la intolerancia, eventualmente los intolerantes destruirán la tolerancia misma. Es como dejar que alguien incendie la estación de bomberos. Por lo tanto, para preservar la tolerancia, debemos ser intolerantes con la intolerancia. Este principio es la base de las leyes contra el discurso de odio.',source:'Filosofía política',qs:[{q:'¿Cuál es la paradoja?',t:'I',o:['Que tolerar es difícil','Que tolerar la intolerancia destruye la tolerancia misma','Que nadie es tolerante','Que la tolerancia no existe'],c:1},{q:'¿Qué significa la metáfora de la estación de bomberos?',t:'I',o:['Que hay incendios','Que proteger lo que nos protege a veces requiere límites','Que los bomberos son buenos','Que las estaciones son importantes'],c:1},{q:'¿Cómo aplica esto a redes sociales?',t:'I',o:['No aplica','Permitir discurso de odio en nombre de la "libertad" puede destruir la convivencia','Las redes son libres','No hay odio en redes'],c:1}]},
  {id:'7I04',zone:1,title:'¿Por qué nos da miedo la oscuridad?',icon:'🌑',type:'I',theme:'nat',xp:45,text:'El miedo a la oscuridad no es realmente a la oscuridad: es al no saber qué hay en ella. Evolutivamente, nuestros ancestros que temían la oscuridad sobrevivían más, porque los depredadores cazaban de noche. Ese miedo se grabó en nuestro ADN. Curiosamente, los niños de 0-2 años NO temen la oscuridad; el miedo aparece entre los 3-5 años, cuando el cerebro desarrolla la imaginación suficiente para crear amenazas invisibles.',source:'Psicología evolutiva',qs:[{q:'¿Realmente le tememos a la oscuridad?',t:'I',o:['Sí','No: tememos a lo desconocido que podría estar en ella','Solo algunos','Solo de noche'],c:1},{q:'¿Por qué los bebés no temen la oscuridad?',t:'I',o:['Son valientes','Aún no tienen imaginación para crear amenazas mentales','No ven bien','Están acostumbrados'],c:1},{q:'¿Qué nos enseña sobre el miedo en general?',t:'I',o:['Que somos cobardes','Que muchos miedos son construcciones mentales heredadas, no peligros reales','Que los ancestros eran miedosos','Que la oscuridad es peligrosa'],c:1}]},
  {id:'7I05',zone:1,title:'El mapa de Peters vs. Mercator',icon:'🗺️',type:'I',theme:'soc',xp:45,text:'El mapa de Mercator (1569), el más usado en escuelas, distorsiona el tamaño real de los continentes: Europa y Norteamérica parecen más grandes. África, que es 14 veces más grande que Groenlandia, aparece del mismo tamaño. El mapa de Peters (1974) corrige las proporciones reales pero distorsiona las formas. ¿Por qué seguimos usando un mapa que hace ver más grande al norte?',source:'Geografía y geopolítica',qs:[{q:'¿Qué problema tiene el mapa de Mercator?',t:'I',o:['Es viejo','Hace parecer más grandes a Europa y Norteamérica','No tiene colores','Es difícil de leer'],c:1},{q:'¿Qué implica políticamente usar este mapa?',t:'I',o:['Nada','Refuerza visualmente la idea de que el norte global es más importante','Es tradición','No hay otro mapa'],c:1},{q:'¿Cuál es la reflexión implícita?',t:'I',o:['Que los mapas son bonitos','Que hasta la forma de representar el mundo puede estar sesgada por relaciones de poder','Que la geografía no importa','Que todos los mapas son iguales'],c:1}]},
  {id:'7I06',zone:1,title:'El dilema del tranvía',icon:'🚃',type:'I',theme:'gen',xp:45,text:'Un tranvía sin frenos va hacia 5 personas atadas a la vía. Puedes desviar el tranvía a otra vía donde solo hay 1 persona. Si no haces nada, mueren 5. Si actúas, salvas 5 pero tú eliges que muera 1. ¿Es moralmente correcto actuar? Los utilitaristas dicen sí: salvar más vidas es mejor. Los deontologistas dicen no: nunca es correcto elegir matar a alguien activamente.',source:'Ética — Filosofía moral',qs:[{q:'¿Cuál es el dilema central?',t:'I',o:['Si los tranvías son seguros','Si está bien causar un daño menor para evitar uno mayor','Si las personas deben estar en las vías','Si los frenos fallan mucho'],c:1},{q:'¿Cuál es la diferencia entre no actuar y actuar?',t:'I',o:['Ninguna','No actuar permite que algo pase; actuar te hace responsable directo','Es lo mismo','Actuar es siempre mejor'],c:1},{q:'¿Qué revela este dilema sobre la moral humana?',t:'I',o:['Que somos malos','Que no existen respuestas morales absolutas y que el contexto importa','Que la filosofía es inútil','Que todos pensamos igual'],c:1}]},
  {id:'7I07',zone:1,title:'La música de las ballenas',icon:'🐋',type:'I',theme:'nat',xp:45,text:'Las ballenas jorobadas cantan canciones que duran hasta 20 minutos y las repiten durante horas. Cada población tiene su propia canción que va cambiando con el tiempo, como una cultura musical. Una ballena solitaria, llamada "la ballena de 52 hercios", canta a una frecuencia que ninguna otra ballena puede escuchar. Ha sido llamada "la ballena más sola del mundo".',source:'Biología marina',qs:[{q:'¿Qué sugiere que cada población tenga su propia canción?',t:'I',o:['Que cantan mal','Que las ballenas tienen una forma de cultura','Que es casualidad','Que no se escuchan'],c:1},{q:'¿Por qué la ballena de 52 hercios es "la más sola"?',t:'I',o:['Porque está lejos','Porque nadie puede escuchar su comunicación','Porque es vieja','Porque es pequeña'],c:1},{q:'¿Qué metáfora humana evoca esta ballena?',t:'I',o:['La de un nadador','La de alguien que habla pero nadie lo entiende ni lo escucha','La de un músico','La de un científico'],c:1}]},
  {id:'7I08',zone:1,title:'El efecto Dunning-Kruger',icon:'🤔',type:'I',theme:'gen',xp:45,text:'Los psicólogos Dunning y Kruger descubrieron en 1999 que las personas con menor conocimiento sobre un tema tienden a sobreestimar su competencia, mientras que los expertos tienden a subestimarse. Es decir: los que menos saben creen que saben mucho, y los que más saben dudan de sí mismos. Esto explica por qué en internet, quienes gritan más fuerte sobre un tema suelen ser los menos informados.',source:'Psicología cognitiva',qs:[{q:'¿Qué descubrieron Dunning y Kruger?',t:'I',o:['Que todos somos iguales','Que la ignorancia genera falsa seguridad y el conocimiento genera humildad','Que los expertos son arrogantes','Que internet es malo'],c:1},{q:'¿Cómo aplica esto a debates en redes sociales?',t:'I',o:['No aplica','Los más ruidosos suelen ser los menos informados','Las redes son educativas','Todos tienen razón'],c:1},{q:'¿Qué deberías hacer al enterarte de este efecto?',t:'I',o:['Ignorarlo','Cuestionar tu propia seguridad cuando opinas sobre algo que no dominas','Gritar más fuerte','No opinar nunca'],c:1}]},
  {id:'7I09',zone:1,title:'El arte de la propaganda',icon:'📢',type:'I',theme:'soc',xp:45,text:'Durante la Segunda Guerra Mundial, todos los bandos usaron propaganda: carteles, radio, cine. Los nazis usaron frases repetitivas y enemigos comunes para unir al pueblo. Los Aliados usaron héroes y patriotismo. Joseph Goebbels, ministro de propaganda nazi, dijo: "Una mentira repetida mil veces se convierte en verdad." Hoy, los algoritmos de redes sociales repiten contenido similar, creando "cámaras de eco" donde solo escuchamos lo que ya creemos.',source:'Historia y medios de comunicación',qs:[{q:'¿Qué paralelo traza el texto entre propaganda y redes sociales?',t:'I',o:['Ninguno','Ambos repiten mensajes hasta que se naturalizan, creando realidades parciales','Que las redes son nazis','Que la propaganda ya no existe'],c:1},{q:'¿Qué son las "cámaras de eco"?',t:'I',o:['Salas de música','Espacios donde solo escuchamos opiniones que confirman las nuestras','Cuartos de grabación','Lugares silenciosos'],c:1},{q:'¿Cómo puedes romper tu "cámara de eco"?',t:'I',o:['No usando internet','Buscando activamente fuentes y perspectivas diferentes a las tuyas','Creyendo todo','Dejando de leer'],c:1}]},
  {id:'7I10',zone:1,title:'La economía del helado',icon:'🍦',type:'I',theme:'gen',xp:45,text:'Un estudio encontró que las ventas de helado y los casos de ahogamiento aumentan al mismo tiempo en verano. ¿Significa que el helado causa ahogamientos? No. Ambos aumentan por una tercera variable: el calor. Cuando hace calor, más personas compran helado Y más personas van a nadar. Esto se llama "correlación no implica causalidad" y es uno de los errores lógicos más comunes.',source:'Estadística y pensamiento crítico',qs:[{q:'¿El helado causa ahogamientos?',t:'I',o:['Sí','No: ambos son causados por una tercera variable (el calor)','Tal vez','No hay datos'],c:1},{q:'¿Qué error lógico describe el texto?',t:'I',o:['Error matemático','Confundir correlación con causalidad','Error ortográfico','Error de cálculo'],c:1},{q:'¿Dónde más ves este error?',t:'I',o:['En ningún lado','Cuando se dice que vacunarse causa autismo porque coincide en el tiempo','En la escuela','En los videojuegos'],c:1}]},
  // CRÍTICO
  {id:'7C01',zone:2,title:'¿Votar a los 16?',icon:'🗳️',type:'C',theme:'soc',xp:65,text:'En Brasil y Argentina votan desde los 16. En Colombia desde los 18. A favor: los jóvenes pagan impuestos al consumir, les afectan decisiones políticas sobre educación, y a los 16 pueden trabajar. En contra: falta madurez, son influenciables. Curiosamente, nadie cuestiona que a los 18 se tenga automáticamente la madurez necesaria.',source:'Ciudadanía — DBA: Argumentación',qs:[{q:'¿Argumento más fuerte a favor?',t:'C',o:['Son jóvenes','Las decisiones políticas ya los afectan directamente','Sus amigos quieren','Es divertido'],c:1},{q:'¿Qué debilidad señala en AMBAS posturas?',t:'C',o:['No hay datos','Nadie garantiza que a los 18 se sea maduro tampoco','Votar no sirve','Jóvenes no quieren'],c:1},{q:'¿Tu argumento fundamentado?',t:'C',o:['No me interesa','La madurez no depende de la edad sino de la formación ciudadana','Solo adultos saben','Votar a los 10'],c:1}]},
  {id:'7C02',zone:2,title:'IA en la escuela',icon:'🤖',type:'C',theme:'tec',xp:65,text:'Un colegio permitió usar IA para tareas. Notas subieron 30%, pero en examen presencial sin IA cayeron 45%. Debate: ¿herramienta o atajo? Un estudiante: "La calculadora no nos hizo peores en matemáticas." Una profesora: "Pero primero aprendieron a sumar solos."',source:'Tecnología y educación',qs:[{q:'¿El problema central?',t:'C',o:['La IA es cara','Mejorar notas con IA no significa mejorar comprensión','Los profesores son malos','Las tareas son difíciles'],c:1},{q:'¿Es válida la comparación con la calculadora?',t:'C',o:['Sí, son lo mismo','Parcialmente: ambas son herramientas pero la base del conocimiento debe existir primero','No, son diferentes','No importa'],c:1},{q:'¿Postura más equilibrada?',t:'C',o:['Prohibir toda IA','Usar IA sin límites','Usar IA como complemento después de dominar lo básico','No usar tecnología'],c:2}]},
  {id:'7C03',zone:2,title:'Cancelación: ¿justicia o linchamiento?',icon:'🚫',type:'C',theme:'gen',xp:65,text:'La "cultura de la cancelación" en redes sociales busca responsabilizar a personas por comentarios ofensivos. A favor: da voz a quienes antes no podían denunciar abusos de poder. En contra: no permite defensa, el castigo (perder empleo, reputación) es desproporcional, y un error del pasado define a la persona para siempre. ¿Dónde está el límite entre justicia social y linchamiento digital?',source:'Sociedad digital — Ética',qs:[{q:'¿Cuál es el argumento a favor de la cancelación?',t:'C',o:['Es divertido','Da poder a quienes antes no podían denunciar abusos','Destruye reputaciones','No tiene argumentos'],c:1},{q:'¿Cuál es la crítica más fuerte en contra?',t:'C',o:['Que es aburrida','Que no permite defensa y el castigo puede ser desproporcionado','Que no funciona','Que es nueva'],c:1},{q:'¿Cuál sería un sistema más justo?',t:'C',o:['Cancelar a todos','Permitir diálogo, contexto y proporcionalidad antes de juzgar','No hacer nada','Prohibir redes sociales'],c:1}]},
  {id:'7C04',zone:2,title:'¿La belleza es objetiva?',icon:'💄',type:'C',theme:'art',xp:65,text:'En la Edad Media, las mujeres "bellas" eran pálidas y con curvas amplias (símbolo de riqueza). Hoy, el estándar incluye piel bronceada y cuerpo delgado. En Mauritania, las niñas son forzadas a comer para engordar porque la gordura es belleza. En Corea del Sur, el 30% de mujeres se ha operado los párpados. Si la belleza cambia según época y lugar, ¿es "natural" o es una construcción social?',source:'Sociología — Estándares de belleza',qs:[{q:'¿Qué demuestra que la belleza cambie según la época?',t:'C',o:['Que la gente es indecisa','Que la belleza es una construcción social, no algo natural o universal','Que antes eran tontos','Que la belleza no existe'],c:1},{q:'¿Quiénes se benefician de que existan estándares de belleza?',t:'C',o:['Nadie','Las industrias que venden productos para alcanzar esos estándares','Los gobiernos','Los científicos'],c:1},{q:'¿Cuál es la postura más liberadora?',t:'C',o:['Seguir las tendencias','Cuestionar los estándares y reconocer que la diversidad es la verdadera norma','Ignorar la belleza','Operarse para encajar'],c:1}]},
  {id:'7C05',zone:2,title:'Minería vs. medio ambiente',icon:'⛏️',type:'C',theme:'nat',xp:65,text:'Colombia es el cuarto productor de carbón del mundo. La minería genera miles de empleos y regalías para municipios. Pero la minería a cielo abierto destruye ecosistemas, contamina ríos y desplaza comunidades. En La Guajira, la mina del Cerrejón desvió arroyos que eran la única fuente de agua de comunidades Wayúu. ¿El desarrollo económico justifica el daño ambiental y social?',source:'Economía vs. ambiente — Colombia',qs:[{q:'¿Cuál es el dilema central?',t:'C',o:['Si la minería es aburrida','Si el crecimiento económico justifica destruir el medioambiente y afectar comunidades','Si Colombia es minera','Si el carbón es útil'],c:1},{q:'¿Por qué el caso Wayúu es especialmente grave?',t:'C',o:['Porque es lejos','Porque se privó de agua a comunidades que dependían de ella para sobrevivir','Porque es ilegal','Porque los Wayúu no quieren trabajar'],c:1},{q:'¿Cuál sería un modelo más justo?',t:'C',o:['Más minería','Minería responsable con consulta previa, restauración ambiental y distribución equitativa de beneficios','Prohibir toda minería','No hacer nada'],c:1}]},
  {id:'7C06',zone:2,title:'Servicio militar obligatorio',icon:'🪖',type:'C',theme:'soc',xp:65,text:'En Colombia, el servicio militar es obligatorio para hombres. No hacerlo impide obtener la libreta militar, necesaria para trabajar formalmente. Los defensores dicen que forma carácter, disciplina y amor patrio. Los opositores argumentan que viola la libertad individual, que es sexista (solo hombres) y que en un país con conflicto armado, enviar jóvenes al ejército es poner vidas en riesgo. Países como Japón y Costa Rica no tienen ejército.',source:'Derechos y ciudadanía',qs:[{q:'¿Qué derecho se cuestiona?',t:'C',o:['Derecho al trabajo','La libertad individual de elegir si se quiere ser militar o no','Derecho a la educación','Derecho al voto'],c:1},{q:'¿Por qué el texto lo califica de "sexista"?',t:'C',o:['Porque no es','Porque es obligatorio solo para hombres, no para mujeres','Porque es difícil','Porque dura mucho'],c:1},{q:'¿Cuál es tu postura argumentada?',t:'C',o:['Todos deben ir','Debería ser voluntario y equitativo, con alternativas de servicio social','Nadie debería ir','Solo mujeres'],c:1}]},
  {id:'7C07',zone:2,title:'Tarea vs. tiempo libre',icon:'📝',type:'C',theme:'gen',xp:65,text:'Finlandia no deja tareas a menores de 16 años. Japón deja hasta 4 horas diarias. Los defensores de la tarea argumentan que refuerza hábitos de estudio. Los estudios muestran que en primaria las tareas no mejoran el rendimiento, pero en secundaria tienen efecto moderado. Lo que sí mejora el rendimiento es el sueño, el juego y la lectura libre. ¿Y si el tiempo de tareas se usara en leer por placer?',source:'Debate educativo internacional',qs:[{q:'¿Qué evidencia cuestiona las tareas?',t:'C',o:['Que son aburridas','Que en primaria no mejoran rendimiento y el sueño/juego sí lo hacen','Que Finlandia es mejor','Que los profes son malos'],c:1},{q:'¿Es válido comparar Finlandia con Colombia?',t:'C',o:['Sí, son iguales','Parcialmente: los contextos son distintos pero la evidencia es útil como referencia','No, son muy diferentes','Solo vale comparar países vecinos'],c:1},{q:'¿Cuál sería tu propuesta?',t:'C',o:['Eliminar toda tarea','Tareas significativas, cortas, que motiven curiosidad en vez de repetición mecánica','Más tareas','4 horas de tarea diaria'],c:1}]},
  {id:'7C08',zone:2,title:'Energía nuclear: ¿solución o amenaza?',icon:'☢️',type:'C',theme:'nat',xp:65,text:'La energía nuclear produce electricidad sin emitir CO₂, clave contra el cambio climático. Francia genera el 70% de su electricidad con nuclear. Pero los accidentes de Chernóbil (1986) y Fukushima (2011) causaron desastres ambientales. Los residuos nucleares permanecen radiactivos miles de años. Los defensores dicen que es la energía más segura estadísticamente. Los opositores dicen que cuando falla, falla catastrófica e irreversiblemente.',source:'Energía y medioambiente',qs:[{q:'¿Cuál es la ventaja principal de la nuclear?',t:'C',o:['Es barata','Produce electricidad sin emisiones de CO₂','Es fácil','No tiene residuos'],c:1},{q:'¿Cuál es la diferencia entre riesgo y consecuencia?',t:'C',o:['Son lo mismo','La probabilidad de accidente es baja, pero la consecuencia cuando ocurre es catastrófica','No hay diferencia','El riesgo es peor'],c:1},{q:'¿Cuál sería tu postura argumentada?',t:'C',o:['Nuclear para todo','Invertir en nuclear junto con renovables, con regulaciones estrictas y planes de residuos','Prohibir toda nuclear','Solo solar y eólica'],c:1}]},
  {id:'7C09',zone:2,title:'El derecho a morir',icon:'💭',type:'C',theme:'gen',xp:65,text:'La eutanasia es legal en Colombia desde 2015 para enfermos terminales. Países como Países Bajos y Bélgica la permiten en más casos. Los defensores argumentan que es un acto de compasión: evitar sufrimiento innecesario. Los opositores dicen que la vida es sagrada y que las presiones económicas podrían llevar a que personas vulnerables elijan morir por no ser "carga". ¿Quién debe decidir el final de una vida: el paciente, su familia, el médico o el Estado?',source:'Bioética y derechos',qs:[{q:'¿Cuál es el argumento principal a favor?',t:'C',o:['Que ahorrar recursos','Evitar sufrimiento innecesario a una persona que lo decide libremente','Que la vida no importa','Que los médicos lo prefieren'],c:1},{q:'¿Cuál es el riesgo que plantean los opositores?',t:'C',o:['Que es inmoral','Que personas vulnerables podrían sentir presión para morir por razones económicas','Que es ilegal','Que no funciona'],c:1},{q:'¿Quién debería decidir?',t:'C',o:['Solo el Estado','El paciente informado, con acompañamiento médico y psicológico, sin presiones externas','Solo la familia','Solo el médico'],c:1}]},
  {id:'7C10',zone:2,title:'Educación: ¿memorizar o pensar?',icon:'🎓',type:'C',theme:'gen',xp:65,text:'El modelo educativo tradicional evalúa la memoria: fechas, fórmulas, definiciones. Pero cualquier dato se puede buscar en Google en 3 segundos. Lo que Google no puede hacer es pensar críticamente, resolver problemas complejos o crear ideas nuevas. Singapur y Canadá reformaron su educación hacia el pensamiento crítico y la creatividad. Sus estudiantes lideran pruebas internacionales. Colombia sigue evaluando principalmente memoria.',source:'Política educativa',qs:[{q:'¿Cuál es el argumento central contra memorizar?',t:'C',o:['Que es aburrido','Que la información está disponible instantáneamente y lo valioso es saber analizarla','Que la memoria no existe','Que Google es malo'],c:1},{q:'¿Qué demuestran Singapur y Canadá?',t:'C',o:['Que son ricos','Que educar para el pensamiento crítico produce mejores resultados medibles','Que la memoria no importa','Que son diferentes'],c:1},{q:'¿Cómo reformarías la evaluación escolar?',t:'C',o:['Solo exámenes de memoria','Evaluar análisis, argumentación y aplicación del conocimiento, no solo repetición','Eliminar evaluaciones','Solo proyectos'],c:1}]},

  {id:'7G01',zone:0,title:'✏️ Completa la frase',icon:'✏️',type:'G',theme:'gen',xp:40,game:'complete',instruction:'Completa cada frase con la palabra correcta basándote en lo que has aprendido.',sentences:[{text:'La Revolución Industrial comenzó en ___ a finales del siglo XVIII.',options:['Francia','Inglaterra','Alemania','España'],correct:1},{text:'García Márquez se inspiró en Aracataca para crear el pueblo ficticio de ___.',options:['Comala','Macondo','Yoknapatawpha','Ítaca'],correct:1},{text:'El ADN tiene forma de ___.',options:['Círculo','Cuadrado','Doble hélice','Triángulo'],correct:2},{text:'Van Gogh vendió ___ cuadro(s) en vida.',options:['Cien','Diez','Ninguno','Un solo'],correct:3},{text:'El cerebro adolescente no termina de desarrollarse hasta los ___ años.',options:['18','21','25','30'],correct:2}]},
  {id:'7G02',zone:1,title:'🔍 Intruso conceptual',icon:'🔍',type:'G',theme:'gen',xp:50,game:'intruder',instruction:'Encuentra el elemento que NO pertenece al grupo. ¡Cuidado, requiere pensar!',rounds:[{category:'Sesgos cognitivos',options:['Sesgo de confirmación','Efecto Dunning-Kruger','Correlación ≠ causalidad','Ley de gravedad'],intruder:3,explanation:'La ley de gravedad es un hecho físico, no un sesgo cognitivo'},{category:'Argumentos contra el voto a los 16',options:['Falta de madurez','Son influenciables','Las decisiones políticas los afectan','No están preparados'],intruder:2,explanation:'Que las decisiones los afecten es un argumento A FAVOR, no en contra'},{category:'Características de la propaganda',options:['Repetición de mensajes','Verificación de fuentes','Apelación a emociones','Uso de enemigos comunes'],intruder:1,explanation:'La propaganda NO verifica fuentes; las manipula'},{category:'Miembros de los Aliados en WWII',options:['EE.UU.','Reino Unido','Italia','URSS'],intruder:2,explanation:'Italia era parte del Eje, no de los Aliados'}]},
  {id:'7G03',zone:2,title:'⏱️ V/F Velocidad',icon:'⏱️',type:'G',theme:'gen',xp:60,game:'tf_speed',instruction:'¡35 segundos! Verdadero o Falso sobre los temas de 7°.',timeLimit:35,statements:[{text:'La Revolución Industrial comenzó en Francia',isTrue:false},{text:'El ADN humano comparte 98.7% con los chimpancés',isTrue:true},{text:'Van Gogh pintó más de 2.100 obras',isTrue:true},{text:'La Segunda Guerra Mundial duró 8 años',isTrue:false},{text:'El corazón late unas 100.000 veces al día',isTrue:true},{text:'La independencia de Colombia se firmó el 7 de agosto de 1810',isTrue:false},{text:'El cerebro tiene 86.000 millones de neuronas',isTrue:true},{text:'Minecraft se usa en educación en 115 países',isTrue:true},{text:'Los océanos producen el 25% del oxígeno',isTrue:false},{text:'Bolívar soñaba con la Gran Colombia',isTrue:true}]}

genGrade(8, [
  {id:'8L01',zone:0,title:'Conflicto armado colombiano',icon:'🕊️',type:'L',theme:'soc',xp:30,text:'Duró más de 50 años. Surgieron guerrillas como FARC y ELN en los 60, motivadas por desigualdad y exclusión política. Más de 8 millones de desplazados. En 2016 se firmó acuerdo de paz en La Habana. Santos recibió Nobel de la Paz.',source:'Historia contemporánea',qs:[{q:'¿Cuántos años duró?',t:'L',o:['20','30','Más de 50','10'],c:2},{q:'¿Cuántos desplazados hubo?',t:'L',o:['1 millón','8 millones','500 mil','3 millones'],c:1},{q:'¿Dónde se firmó el acuerdo?',t:'L',o:['Bogotá','Washington','La Habana','Madrid'],c:2}]},
  {id:'8L02',zone:0,title:'Crónica de una muerte anunciada',icon:'📕',type:'L',theme:'lit',xp:30,text:'Todo el pueblo sabía que los hermanos Vicario matarían a Santiago Nasar. La noticia se esparció desde la madrugada. Muchos intentaron advertirle pero por confusión, indiferencia o incredulidad, nadie lo evitó. El narrador reconstruye los hechos años después entrevistando habitantes.',source:'García Márquez — Literatura',qs:[{q:'¿Quiénes cometerían el crimen?',t:'L',o:['Santiago Nasar','Los hermanos Vicario','El narrador','La policía'],c:1},{q:'¿Sabía el pueblo?',t:'L',o:['No','Sí, todos lo sabían','Solo algunos','Nadie'],c:1},{q:'¿Cómo reconstruye la historia?',t:'L',o:['Imaginando','Entrevistando habitantes','Leyendo periódico','Viendo fotos'],c:1}]},
  {id:'8L03',zone:0,title:'La tabla periódica',icon:'⚗️',type:'L',theme:'nat',xp:30,text:'Dmitri Mendeléyev organizó los elementos químicos en 1869. La tabla actual tiene 118 elementos. El hidrógeno es el más ligero y abundante del universo. El oganesson (118) es el más pesado y fue creado artificialmente en 2006. El cuerpo humano está compuesto principalmente de oxígeno (65%), carbono (18%), hidrógeno (10%) y nitrógeno (3%).',source:'Química',qs:[{q:'¿Quién organizó la tabla periódica?',t:'L',o:['Einstein','Newton','Mendeléyev','Curie'],c:2},{q:'¿Cuántos elementos tiene?',t:'L',o:['92','100','118','150'],c:2},{q:'¿Cuál es el elemento más abundante en el cuerpo?',t:'L',o:['Carbono','Hidrógeno','Oxígeno','Nitrógeno'],c:2}]},
  {id:'8L04',zone:0,title:'El Renacimiento',icon:'🎭',type:'L',theme:'art',xp:30,text:'El Renacimiento (siglos XV-XVI) fue un movimiento cultural que nació en Italia. Leonardo da Vinci pintó La Mona Lisa y diseñó máquinas voladoras. Miguel Ángel esculpió el David y pintó la Capilla Sixtina. Galileo demostró que la Tierra gira alrededor del Sol. El Renacimiento colocó al ser humano en el centro del pensamiento, reemplazando el dominio de la Iglesia sobre el conocimiento.',source:'Historia del arte y la ciencia',qs:[{q:'¿Dónde nació el Renacimiento?',t:'L',o:['Francia','España','Italia','Alemania'],c:2},{q:'¿Quién pintó la Capilla Sixtina?',t:'L',o:['Leonardo','Rafael','Miguel Ángel','Botticelli'],c:2},{q:'¿Qué demostró Galileo?',t:'L',o:['Que la Tierra es plana','Que la Tierra gira alrededor del Sol','Que el Sol es frío','Que la Luna tiene agua'],c:1}]},
  {id:'8L05',zone:0,title:'Las vacunas',icon:'💉',type:'L',theme:'nat',xp:30,text:'Edward Jenner creó la primera vacuna en 1796 contra la viruela, usando pus de viruela bovina. La viruela mataba a 400.000 europeos al año antes de la vacuna. En 1980, la OMS declaró la viruela erradicada: la primera enfermedad eliminada por la humanidad. Hoy existen vacunas contra más de 25 enfermedades. La vacunación salva entre 3.5 y 5 millones de vidas cada año.',source:'Historia de la medicina',qs:[{q:'¿Quién creó la primera vacuna?',t:'L',o:['Pasteur','Fleming','Jenner','Koch'],c:2},{q:'¿Cuándo se erradicó la viruela?',t:'L',o:['1950','1970','1980','2000'],c:2},{q:'¿Cuántas vidas salva la vacunación al año?',t:'L',o:['1 millón','3.5-5 millones','10 millones','500 mil'],c:1}]},
  {id:'8L06',zone:0,title:'Streaming: el fin del cine',icon:'🎬',type:'L',theme:'tec',xp:30,text:'Netflix comenzó en 1997 enviando DVDs por correo. En 2007 lanzó el streaming. Hoy tiene 260 millones de suscriptores. En 2020, durante la pandemia, las plataformas de streaming crecieron 40%. Los cines perdieron el 80% de su audiencia. Disney+, HBO Max, Amazon Prime y Spotify compiten por nuestra atención. Un estadounidense promedio pasa 4.5 horas diarias viendo contenido en streaming.',source:'Industria del entretenimiento',qs:[{q:'¿Cuándo comenzó Netflix?',t:'L',o:['1997','2007','2010','2015'],c:0},{q:'¿Cuántos suscriptores tiene Netflix?',t:'L',o:['100 millones','150 millones','260 millones','500 millones'],c:2},{q:'¿Cuánto creció el streaming durante la pandemia?',t:'L',o:['10%','20%','40%','80%'],c:2}]},
  {id:'8L07',zone:0,title:'La Revolución Francesa',icon:'🇫🇷',type:'L',theme:'soc',xp:30,text:'Comenzó en 1789 con la toma de la Bastilla el 14 de julio. El pueblo francés se rebeló contra la monarquía de Luis XVI. Los revolucionarios proclamaron "Libertad, Igualdad, Fraternidad". Se abolieron los privilegios de la nobleza. Luis XVI y María Antonieta fueron guillotinados en 1793. La revolución inspiró movimientos de independencia en toda América Latina.',source:'Historia Universal',qs:[{q:'¿En qué año comenzó?',t:'L',o:['1776','1789','1799','1810'],c:1},{q:'¿Cuál era el lema?',t:'L',o:['Paz y guerra','Libertad, Igualdad, Fraternidad','Dios y patria','Rey y pueblo'],c:1},{q:'¿A quién inspiró en América Latina?',t:'L',o:['A los conquistadores','A los movimientos de independencia','A los comerciantes','A los artistas'],c:1}]},
  {id:'8L08',zone:0,title:'Agujeros negros',icon:'🕳️',type:'L',theme:'nat',xp:30,text:'Un agujero negro es una región del espacio donde la gravedad es tan intensa que nada puede escapar, ni siquiera la luz. Se forman cuando estrellas masivas colapsan al final de su vida. En 2019, el telescopio Event Horizon capturó la primera imagen real de un agujero negro, ubicado a 55 millones de años luz. El agujero negro más cercano a la Tierra está a 1.600 años luz.',source:'Astrofísica',qs:[{q:'¿Por qué nada escapa de un agujero negro?',t:'L',o:['Porque es grande','Porque su gravedad es tan intensa que atrapa hasta la luz','Porque está lejos','Porque es oscuro'],c:1},{q:'¿Cuándo se tomó la primera foto real?',t:'L',o:['2010','2015','2019','2022'],c:2},{q:'¿Cómo se forman?',t:'L',o:['Por explosiones','Cuando estrellas masivas colapsan','Por meteoritos','Por radiación'],c:1}]},
  {id:'8L09',zone:0,title:'Pablo Neruda',icon:'✍️',type:'L',theme:'lit',xp:30,text:'Neftalí Ricardo Reyes Basoalto, conocido como Pablo Neruda, nació en Chile en 1904. Escribió más de 50 libros de poesía. "Veinte poemas de amor y una canción desesperada" (1924) es uno de los poemarios más vendidos en español. Recibió el Nobel de Literatura en 1971. Fue también diplomático y político. Murió en 1973, 12 días después del golpe de Estado contra Salvador Allende.',source:'Literatura latinoamericana',qs:[{q:'¿De qué país era Neruda?',t:'L',o:['Argentina','Colombia','Chile','México'],c:2},{q:'¿Cuántos libros escribió?',t:'L',o:['10','25','Más de 50','100'],c:2},{q:'¿En qué año ganó el Nobel?',t:'L',o:['1965','1971','1980','1950'],c:1}]},
  {id:'8L10',zone:0,title:'Las criptomonedas',icon:'₿',type:'L',theme:'tec',xp:30,text:'Bitcoin fue creado en 2009 por una persona o grupo bajo el pseudónimo Satoshi Nakamoto. Es una moneda digital descentralizada: no depende de ningún banco ni gobierno. Funciona con tecnología blockchain, un registro público e inmutable de transacciones. En 2021, El Salvador se convirtió en el primer país en adoptar Bitcoin como moneda legal. Existen más de 20.000 criptomonedas diferentes.',source:'Tecnología financiera',qs:[{q:'¿Quién creó Bitcoin?',t:'L',o:['Elon Musk','Mark Zuckerberg','Satoshi Nakamoto','Steve Jobs'],c:2},{q:'¿En qué año se creó?',t:'L',o:['2005','2009','2013','2017'],c:1},{q:'¿Qué país lo adoptó como moneda legal?',t:'L',o:['Japón','EE.UU.','El Salvador','Suiza'],c:2}]},
  // INFERENCIAL
  {id:'8I01',zone:1,title:'Calentamiento global',icon:'🌡️',type:'I',theme:'nat',xp:50,text:'La temperatura global ha aumentado 1.1°C desde la era preindustrial. Parece poco. Pero ha provocado: derretimiento de glaciares, aumento del mar, sequías extremas. Los 10 países más ricos producen el 70% de emisiones. Los más afectados son los más pobres, que paradójicamente menos contaminan.',source:'Cambio climático',qs:[{q:'¿Qué paradoja señala?',t:'I',o:['Que hace frío','Que los más afectados son los que menos contaminan','No hay problema','Todos contaminan igual'],c:1},{q:'¿Por qué "1.1°C" no es poco?',t:'I',o:['Es mentira','Sus efectos ya son devastadores a escala global','Termómetros fallan','No importa'],c:1},{q:'¿Crítica implícita a acuerdos internacionales?',t:'I',o:['Son buenos','Son voluntarios y difíciles de hacer cumplir','No existen','Son secretos'],c:1}]},
  {id:'8I02',zone:1,title:'1984 y la vigilancia',icon:'👁️',type:'I',theme:'lit',xp:50,text:'En "1984" de Orwell, "El Gran Hermano" vigila a todos mediante pantallas. Pensar diferente es crimen. Se creía exagerada en 1949. Hoy, con reconocimiento facial, algoritmos predictivos y redes que registran cada clic, muchos preguntan: ¿Orwell fue novelista o profeta?',source:'Literatura y sociedad',qs:[{q:'¿Por qué compara la novela con la actualidad?',t:'I',o:['Es ficción','La tecnología actual se parece a la vigilancia del libro','Orwell vivió hoy','Las novelas se cumplen'],c:1},{q:'¿Qué significa "novelista o profeta"?',t:'I',o:['Adivinaba el futuro','Lo que imaginó como ficción se está haciendo realidad','Era religioso','Escribía mal'],c:1},{q:'¿Idea principal?',t:'I',o:['1984 es buen libro','La vigilancia tecnológica actual plantea preguntas similares a la novela','La tecnología es mala','Debemos leer más'],c:1}]},
  {id:'8I03',zone:1,title:'El síndrome del impostor',icon:'🎭',type:'I',theme:'gen',xp:50,text:'El 70% de las personas experimenta el "síndrome del impostor" al menos una vez: la sensación de no merecer sus logros y el miedo a ser "descubierto" como fraude. Afecta más a personas exitosas, mujeres, minorías y estudiantes de alto rendimiento. Albert Einstein dijo: "La exagerada estima en que se tiene mi trabajo me hace sentir muy incómodo, a veces me siento como un estafador involuntario."',source:'Psicología',qs:[{q:'¿Qué revela que Einstein también lo sintiera?',t:'I',o:['Que era modesto','Que ni el mayor genio es inmune a la inseguridad sobre sus propios logros','Que era fraude','Que todos son genios'],c:1},{q:'¿Por qué afecta más a personas exitosas?',t:'I',o:['Porque son débiles','Porque a mayor éxito, mayor presión de estar a la altura y mayor miedo a fallar','Porque tienen más trabajo','Porque no son inteligentes'],c:1},{q:'¿Qué implica que el 70% lo experimente?',t:'I',o:['Que somos fraudulentos','Que es parte normal de la experiencia humana, no un defecto personal','Que nadie es bueno','Que la psicología miente'],c:1}]},
  {id:'8I04',zone:1,title:'La tragedia de los comunes',icon:'🐄',type:'I',theme:'soc',xp:50,text:'Imagina un pastizal compartido por varios ganaderos. Cada uno tiene incentivo para añadir más vacas (más ganancia individual). Pero si todos lo hacen, el pasto se agota y TODOS pierden. Este dilema explica por qué los océanos se sobrepescan, los bosques se talan y el aire se contamina: el beneficio es individual pero el costo lo paga la comunidad.',source:'Economía y medioambiente',qs:[{q:'¿Por qué cada ganadero añade más vacas?',t:'I',o:['Porque es tonto','Porque el beneficio es individual aunque el daño sea colectivo','Porque le gustan las vacas','Porque tiene espacio'],c:1},{q:'¿Cómo aplica esto a la contaminación?',t:'I',o:['No aplica','Cada empresa contamina porque el beneficio es propio pero el aire contaminado lo respiramos todos','Las empresas no contaminan','Solo aplica al campo'],c:1},{q:'¿Cuál sería la solución?',t:'I',o:['Prohibir vacas','Regulaciones colectivas que hagan que el costo individual refleje el costo social','No hacer nada','Cada quien cuide lo suyo'],c:1}]},
  {id:'8I05',zone:1,title:'Romeo y Julieta: ¿amor o impulsividad?',icon:'💔',type:'I',theme:'lit',xp:50,text:'Romeo y Julieta se conocen, se enamoran, se casan secretamente y mueren... todo en 4 días. Romeo tenía aproximadamente 16 años y Julieta 13. Antes de conocer a Julieta, Romeo estaba "locamente enamorado" de Rosalina. Shakespeare no escribió una historia de amor ideal: escribió una tragedia sobre la impulsividad juvenil potenciada por el odio familiar.',source:'Shakespeare — Análisis literario',qs:[{q:'¿Cuánto dura toda la historia?',t:'I',o:['Años','Meses','4 días','Semanas'],c:2},{q:'¿Qué sugiere que Romeo estuviera enamorado de Rosalina antes?',t:'I',o:['Que era romántico','Que su "amor" podría ser impulsividad adolescente, no amor profundo','Que era infiel','Nada'],c:1},{q:'¿Cuál era la verdadera intención de Shakespeare?',t:'I',o:['Celebrar el amor','Mostrar cómo la impulsividad y el odio causan tragedias evitables','Contar una historia bonita','Hacer llorar'],c:1}]},
  {id:'8I06',zone:1,title:'La gentrificación',icon:'🏘️',type:'I',theme:'soc',xp:50,text:'Cuando un barrio popular se "pone de moda", llegan cafeterías, tiendas caras y personas con más ingresos. Los precios suben. Los residentes originales, que dieron identidad al barrio, son desplazados por no poder pagar. En Bogotá, barrios como La Candelaria y Chapinero viven este proceso. Los nuevos residentes disfrutan de la "cultura local" que ellos mismos están eliminando al desplazar a quienes la crearon.',source:'Urbanismo y sociedad',qs:[{q:'¿Cuál es la ironía de la gentrificación?',t:'I',o:['Que los barrios mejoran','Que se busca la cultura local pero se desplaza a quienes la crearon','Que es cara','Que los barrios son feos'],c:1},{q:'¿Quiénes se benefician y quiénes se perjudican?',t:'I',o:['Todos ganan','Se benefician los nuevos residentes y propietarios; se perjudican los originales','Nadie pierde','Solo ganan los viejos'],c:1},{q:'¿Qué solución propondrías?',t:'I',o:['Prohibir mudanzas','Políticas de vivienda accesible que protejan a residentes originales','No hacer nada','Que todos se vayan'],c:1}]},
  {id:'8I07',zone:1,title:'El sesgo de confirmación',icon:'🔍',type:'I',theme:'gen',xp:50,text:'El cerebro humano tiende a buscar información que confirme lo que ya cree y a ignorar la que lo contradiga. Si crees que tu equipo es el mejor, recordarás sus victorias y olvidarás sus derrotas. Si crees que un político es corrupto, cualquier noticia ambigua la interpretarás como prueba de corrupción. Este sesgo es inconsciente y afecta a TODOS, incluidos los más inteligentes.',source:'Psicología cognitiva — Pensamiento crítico',qs:[{q:'¿Qué es el sesgo de confirmación?',t:'I',o:['Un error de cálculo','La tendencia a buscar solo información que confirme lo que ya creemos','Un tipo de mentira','Un examen'],c:1},{q:'¿Por qué es peligroso?',t:'I',o:['No es peligroso','Porque nos impide evaluar evidencia de forma objetiva y nos encierra en nuestras creencias','Porque es inconsciente','Porque afecta a pocos'],c:1},{q:'¿Cómo puedes combatirlo?',t:'I',o:['No se puede','Buscando activamente argumentos que contradigan tu postura antes de formar opinión','Leyendo más','Siendo más inteligente'],c:1}]},
  {id:'8I08',zone:1,title:'La Mona Lisa: ¿por qué es famosa?',icon:'🖼️',type:'I',theme:'art',xp:50,text:'La Mona Lisa no es la pintura más bella, más grande ni más técnica de la historia. Mide solo 77x53 cm. Entonces, ¿por qué es la más famosa? En 1911 fue ROBADA del Louvre. El robo generó escándalo mundial en periódicos. Cuando fue recuperada, millones querían ver "la pintura que alguien quiso robar". La fama se retroalimentó: es famosa porque es famosa.',source:'Arte y sociología de la fama',qs:[{q:'¿Qué evento catapultó su fama?',t:'I',o:['Una exposición','Su robo en 1911 y la cobertura mediática','Un concurso','Su precio'],c:1},{q:'¿Qué fenómeno social describe el texto?',t:'I',o:['Que el arte es subjetivo','Que la fama puede ser un ciclo que se retroalimenta: es famosa porque es famosa','Que los robos son buenos','Que el Louvre es importante'],c:1},{q:'¿Dónde más ves este fenómeno?',t:'I',o:['En ningún lado','En influencers que son famosos por ser famosos, no por un talento específico','Solo en arte','Solo en museos'],c:1}]},
  {id:'8I09',zone:1,title:'La isla de la basura',icon:'🏝️',type:'I',theme:'nat',xp:50,text:'En el Pacífico Norte existe una "isla" de basura plástica del tamaño de Francia. Se formó por las corrientes oceánicas que concentran los desechos. El 80% proviene de tierra firme: botellas, bolsas, microplásticos. Los peces ingieren estos plásticos y nosotros comemos esos peces: un estudio encontró que una persona promedio ingiere 5 gramos de plástico por semana, equivalente a una tarjeta de crédito.',source:'Contaminación — Medioambiente',qs:[{q:'¿Qué implica que comamos plástico a través de los peces?',t:'I',o:['Nada','Que la contaminación ambiental regresa a nosotros: lo que le hacemos al planeta nos lo hacemos a nosotros mismos','Que los peces son malos','Que no debemos comer pescado'],c:1},{q:'¿Por qué el texto dice "isla" entre comillas?',t:'I',o:['Porque no existe','Porque no es una isla sólida sino una acumulación dispersa de microplásticos','Porque es pequeña','Porque es nueva'],c:1},{q:'¿Qué responsabilidad individual se deduce?',t:'I',o:['Ninguna','Cada objeto plástico que tiramos puede terminar en el océano y volver a nosotros','Solo los gobiernos son responsables','El plástico no contamina'],c:1}]},
  {id:'8I10',zone:1,title:'El placebo: la mente cura',icon:'💊',type:'I',theme:'nat',xp:50,text:'En ensayos clínicos, pacientes que reciben una pastilla de azúcar creyendo que es medicina real mejoran sus síntomas en un 30-40% de los casos. Esto se llama efecto placebo. Funciona incluso cuando el paciente SABE que es placebo (estudios de Harvard, 2010). El cerebro libera sustancias curativas reales cuando cree que está siendo tratado. ¿Qué nos dice esto sobre el poder de la mente sobre el cuerpo?',source:'Neurociencia médica',qs:[{q:'¿Qué es lo más sorprendente del efecto placebo?',t:'I',o:['Que es mentira','Que funciona incluso cuando el paciente sabe que es placebo','Que las pastillas son de azúcar','Que los médicos mienten'],c:1},{q:'¿Qué revela sobre la relación mente-cuerpo?',t:'I',o:['Que el cuerpo no importa','Que la creencia y expectativa tienen poder fisiológico real sobre nuestra salud','Que la mente es débil','Que la medicina no funciona'],c:1},{q:'¿Qué implicaciones tiene para la medicina?',t:'I',o:['Que los medicamentos no sirven','Que el tratamiento psicológico y la confianza en el proceso son componentes reales de la curación','Que todos deberían tomar placebos','Que los doctores sobran'],c:1}]},
  // CRÍTICO
  {id:'8C01',zone:2,title:'Memoria vs. olvido',icon:'🕯️',type:'C',theme:'soc',xp:65,text:'Las Madres de Plaza de Mayo marcharon décadas por justicia. Colombia creó el Centro de Memoria Histórica. Alemania tiene "stolpersteine" — piedras con nombres de víctimas del Holocausto. Algunos políticos piden "pasar la página". Las víctimas responden: "Quien olvida está condenado a repetir." ¿Recordar es vivir en el pasado o es construir un futuro justo?',source:'Memoria histórica — DBA',qs:[{q:'¿Por qué las víctimas se oponen a "pasar la página"?',t:'C',o:['Les gusta el pasado','Sin memoria no hay justicia ni garantía de no repetición','Son vengativas','No quieren cambiar'],c:1},{q:'¿Argumento más fuerte del texto?',t:'C',o:['Hay que olvidar','Recordar es la base para no repetir tragedias','La historia no importa','Solo importa el futuro'],c:1},{q:'¿Tu postura argumentada?',t:'C',o:['Olvidar todo','La memoria histórica es necesaria para justicia y no repetición','No me interesa','Solo importa mi vida'],c:1}]},
  {id:'8C02',zone:2,title:'¿Meritocracia o privilegio?',icon:'⚖️',type:'C',theme:'soc',xp:65,text:'Estudiante estrato 6: colegio bilingüe, internet, clases extras, espacio silencioso. Estudiante rural en Chocó: 2 horas caminando, sin biblioteca, un profesor para todos los grados, sin internet. Ambos presentan la misma prueba Saber. Cuando el primero obtiene mejor puntaje, se dice que "se esforzó más". ¿Es justo medir con la misma vara a quienes no partieron del mismo punto?',source:'Desigualdad educativa',qs:[{q:'¿Tesis central?',t:'C',o:['Las pruebas son fáciles','Medir por igual a personas en condiciones desiguales no es justo','Estudiar no importa','El campo es malo'],c:1},{q:'¿Qué cuestiona sobre la meritocracia?',t:'C',o:['Que es perfecta','Que ignora las desigualdades de partida','Que no existe','Solo aplica en Bogotá'],c:1},{q:'¿Solución argumentada?',t:'C',o:['Eliminar pruebas','Garantizar condiciones equitativas antes de evaluar por igual','Que nadie estudie','Que todos vivan en Bogotá'],c:1}]},
  {id:'8C03',zone:2,title:'Prisión vs. rehabilitación',icon:'🔒',type:'C',theme:'soc',xp:65,text:'Noruega: cárceles que parecen residencias, reincidencia del 20%. EE.UU.: cárceles hacinadas, reincidencia del 76%. Colombia intenta ser restaurativo pero los recursos faltan. ¿Castigar previene el crimen o lo reproduce?',source:'Justicia y sociedad',qs:[{q:'¿Qué evidencia usa el texto?',t:'C',o:['Opiniones','Datos comparativos entre Noruega (20%) y EE.UU. (76%)','Noticias falsas','Ninguna'],c:1},{q:'¿Tesis implícita?',t:'C',o:['El castigo funciona','La justicia restaurativa puede ser más efectiva','No hay solución','Adolescentes no cometen crímenes'],c:1},{q:'¿Contraargumento válido?',t:'C',o:['No hay','La restaurativa podría percibirse como impunidad si no se implementa bien','El castigo siempre es mejor','No importa'],c:1}]},
  {id:'8C04',zone:2,title:'Fast fashion: ropa que mata',icon:'👕',type:'C',theme:'nat',xp:65,text:'La industria de la moda es la segunda más contaminante del mundo. Cada año se producen 100.000 millones de prendas. El 60% termina en basureros antes de un año. En 2013, el edificio Rana Plaza en Bangladesh colapsó matando a 1.134 trabajadores textiles que ganaban $2 diarios cosiendo ropa para marcas occidentales. Nosotros compramos ropa barata; alguien más paga el precio real con su salud, su vida y su planeta.',source:'Economía global — Ética del consumo',qs:[{q:'¿Por qué el texto dice "ropa que mata"?',t:'C',o:['Porque es venenosa','Porque la producción masiva de moda barata cuesta vidas humanas y destruye el planeta','Porque es fea','Porque es cara'],c:1},{q:'¿Cuál es la responsabilidad del consumidor?',t:'C',o:['Ninguna','Cada compra de ropa barata financia un sistema de explotación y contaminación','Solo de las empresas','Solo de los gobiernos'],c:1},{q:'¿Qué podrías hacer?',t:'C',o:['Nada','Comprar menos, elegir mejor, y exigir transparencia a las marcas','Dejar de vestirse','Comprar solo caro'],c:1}]},
  {id:'8C05',zone:2,title:'Drogas: ¿legalizar o prohibir?',icon:'🚫',type:'C',theme:'soc',xp:65,text:'La "guerra contra las drogas" lleva 50 años y ha costado billones de dólares. El consumo NO ha disminuido. En cambio, ha llenado cárceles, financiado carteles y causado violencia. Portugal despenalizó todas las drogas en 2001: el consumo bajó, las muertes por sobredosis cayeron 80% y las cárceles se desahogaron. Los recursos se destinaron a tratamiento de salud en lugar de persecución criminal.',source:'Política de drogas — Salud pública',qs:[{q:'¿Qué demuestra el caso de Portugal?',t:'C',o:['Que las drogas son buenas','Que tratar el consumo como tema de salud funciona mejor que criminalizarlo','Que hay que legalizar todo','Que Portugal es diferente'],c:1},{q:'¿Por qué la "guerra contra las drogas" fracasó según el texto?',t:'C',o:['Porque faltó dinero','Porque no redujo el consumo y en cambio generó violencia y encarcelamiento masivo','Porque los policías son malos','Porque las drogas son fuertes'],c:1},{q:'¿Cuál es la postura del texto?',t:'C',o:['Pro-drogas','Que un enfoque de salud pública es más efectivo que uno punitivo','Anti-drogas','Neutral'],c:1}]},
  {id:'8C06',zone:2,title:'El derecho al olvido digital',icon:'🗑️',type:'C',theme:'tec',xp:65,text:'En Europa existe el "derecho al olvido": puedes pedir a Google que elimine resultados sobre ti. Un hombre pidió eliminar una noticia de 1998 sobre una deuda que ya pagó, pero que seguía apareciendo al buscar su nombre, afectando su vida laboral. A favor: las personas merecen superar errores del pasado. En contra: limita la libertad de información y podría usarse para ocultar crímenes o corrupción. ¿Quién decide qué se olvida?',source:'Derechos digitales — Tecnología',qs:[{q:'¿Cuál es el conflicto de derechos?',t:'C',o:['No hay conflicto','El derecho a la privacidad y la segunda oportunidad vs. el derecho a la información','Privacidad vs. libertad de vestir','Información vs. entretenimiento'],c:1},{q:'¿Cuándo sería peligroso el derecho al olvido?',t:'C',o:['Nunca','Cuando se usa para ocultar información de interés público como crímenes o corrupción','Siempre','Solo en Europa'],c:1},{q:'¿Cómo se debería regular?',t:'C',o:['Sin regulación','Con criterios claros: proteger a personas comunes pero mantener información de interés público','Eliminar todo','Mantener todo'],c:1}]},
  {id:'8C07',zone:2,title:'Turismo: ¿desarrollo o destrucción?',icon:'✈️',type:'C',theme:'gen',xp:65,text:'El turismo genera el 10% del empleo mundial. En Cartagena, genera millones pero también desplaza a comunidades afro de Getsemaní por gentrificación turística. En Barcelona, los habitantes protestan con carteles "Tourists go home". Venecia limita cruceros porque hundían la ciudad. ¿El turismo masivo beneficia a las comunidades o las consume para entretenimiento de otros?',source:'Economía y cultura — Turismo sostenible',qs:[{q:'¿Cuál es la paradoja del turismo en Getsemaní?',t:'C',o:['Que es bonito','El turismo valora la cultura afro pero desplaza a la comunidad que la creó','Que es caro','Que hay muchos turistas'],c:1},{q:'¿Por qué la protesta de Barcelona dice "Tourists go home"?',t:'C',o:['Porque son xenófobos','Porque el turismo masivo degrada la calidad de vida de los residentes','Porque no hay espacio','Porque no les gusta viajar'],c:1},{q:'¿Cuál sería un turismo más ético?',t:'C',o:['Prohibir turismo','Turismo que limite la masificación, beneficie a comunidades locales y respete los ecosistemas','Turismo solo para ricos','Más turismo en todo lado'],c:1}]},
  {id:'8C08',zone:2,title:'¿Las mascotas deben tener derechos?',icon:'🐕',type:'C',theme:'nat',xp:65,text:'En Colombia, la Ley 1774 de 2016 reconoce a los animales como "seres sintientes" y penaliza el maltrato. Pero las corridas de toros siguen siendo legales como "patrimonio cultural". En 2023, una jueza argentina otorgó a una orangutana cautiva el derecho de habeas corpus (protección contra detención ilegal), reconociéndola como "persona no humana". Si los animales sienten dolor y tienen emociones, ¿dónde trazamos la línea de sus derechos?',source:'Bioética — Derecho animal',qs:[{q:'¿Cuál es la contradicción que señala el texto?',t:'C',o:['Que Colombia es injusta','Que la ley reconoce animales como sintientes pero permite actividades que causan sufrimiento','Que las leyes no sirven','Que los toros no sienten'],c:1},{q:'¿Qué implicaría considerar a un animal "persona no humana"?',t:'C',o:['Nada','Que tendría derechos legales como libertad, protección contra el sufrimiento y representación legal','Que podría votar','Que sería humano'],c:1},{q:'¿Cuál es tu postura argumentada?',t:'C',o:['Los animales no tienen derechos','Los animales que sienten merecen protección legal que impida su sufrimiento innecesario','Todos los animales son personas','Solo las mascotas merecen derechos'],c:1}]},
  {id:'8C09',zone:2,title:'Algoritmos y discriminación',icon:'🤖',type:'C',theme:'tec',xp:65,text:'Amazon desarrolló un algoritmo de contratación que penalizaba currículos con la palabra "mujer". Un sistema policial predictivo en EE.UU. enviaba más patrullas a barrios afroamericanos, creando un ciclo: más vigilancia → más arrestos → más datos → más vigilancia. Los algoritmos aprenden de datos históricos que contienen sesgos humanos. Si la sociedad fue desigual, la IA replica y amplifica esa desigualdad.',source:'Tecnología y justicia social',qs:[{q:'¿Cómo replica la IA la desigualdad humana?',t:'C',o:['No la replica','Porque aprende de datos históricos que reflejan los sesgos y discriminación de la sociedad','Porque es mala','Porque los programadores quieren'],c:1},{q:'¿Por qué el sistema policial predictivo es problemático?',t:'C',o:['Porque falla','Porque crea un ciclo que refuerza la vigilancia desproporcionada sobre minorías','Porque es caro','Porque la policía no lo usa'],c:1},{q:'¿Cómo se debería regular la IA?',t:'C',o:['Sin regulación','Con auditorías de sesgo, transparencia en algoritmos y participación diversa en su desarrollo','Prohibir toda IA','Solo la usen gobiernos'],c:1}]},
  {id:'8C10',zone:2,title:'Idiomas en extinción',icon:'🗣️',type:'C',theme:'gen',xp:65,text:'Cada 2 semanas muere un idioma en el mundo. De las 7.000 lenguas existentes, la mitad desaparecerá para 2100. En Colombia, de las 68 lenguas indígenas, 20 están en peligro crítico. Cuando muere un idioma, muere una forma de entender el mundo: los Yagán de Chile tienen una palabra para "la soledad de estar esperando que alguien llegue" que no existe en español. ¿Importa perder lenguas cuando todos podrían hablar inglés?',source:'Lingüística y patrimonio cultural',qs:[{q:'¿Qué se pierde cuando muere un idioma?',t:'C',o:['Nada importante','Una forma única de entender y nombrar la realidad que no existe en otros idiomas','Unas palabras','Solo tradición'],c:1},{q:'¿Es válido el argumento de "todos podrían hablar inglés"?',t:'C',o:['Sí, es más práctico','No: la diversidad lingüística es riqueza cognitiva, como la biodiversidad es riqueza ecológica','Sí, simplifica todo','No importa'],c:1},{q:'¿Cuál sería tu propuesta para Colombia?',t:'C',o:['Solo enseñar español','Políticas de revitalización lingüística que valoren las lenguas indígenas como patrimonio vivo','Cada quien con su lengua','Enseñar solo inglés'],c:1}]},

  {id:'8G01',zone:0,title:'🧩 Ordena la cronología',icon:'🧩',type:'G',theme:'soc',xp:40,game:'order',instruction:'Ordena estos eventos históricos del más antiguo al más reciente.',items:['Edward Jenner crea la primera vacuna (1796)','Mendeléyev organiza la tabla periódica (1869)','Comienza la Revolución Francesa (1789)','Se publica Crónica de una muerte anunciada (1981)','Se firma acuerdo de paz en Colombia (2016)','Se captura la primera imagen de un agujero negro (2019)']},

  {id:'8G03',zone:2,title:'⏱️ V/F Relámpago',icon:'⏱️',type:'G',theme:'gen',xp:65,game:'tf_speed',instruction:'¡40 segundos! Verdadero o Falso sobre temas de 8°.',timeLimit:40,statements:[{text:'El conflicto armado colombiano duró más de 50 años',isTrue:true},{text:'La tabla periódica tiene 92 elementos',isTrue:false},{text:'Las vacunas salvan 3.5-5 millones de vidas al año',isTrue:true},{text:'Netflix comenzó como servicio de streaming',isTrue:false},{text:'La Revolución Francesa fue en 1789',isTrue:true},{text:'Los agujeros negros dejan escapar la luz',isTrue:false},{text:'Pablo Neruda era argentino',isTrue:false},{text:'Bitcoin fue creado por Satoshi Nakamoto',isTrue:true},{text:'El 70% de personas experimenta síndrome del impostor',isTrue:true},{text:'La Mona Lisa es la pintura más grande del Louvre',isTrue:false},{text:'Amazon creó un algoritmo que discriminaba mujeres',isTrue:true},{text:'En Colombia hay 68 lenguas indígenas',isTrue:true}]}

  {id:'9L01',zone:0,title:'La Guerra Fría',icon:'🌍',type:'L',theme:'soc',xp:35,text:'La Guerra Fría (1947-1991): EE.UU. (capitalismo) vs. URSS (comunismo). Nunca combatieron directamente pero financiaron conflictos en Corea, Vietnam, Afganistán. La carrera armamentista acumuló armas nucleares para destruir el planeta varias veces. Crisis de misiles de Cuba (1962): momento más cercano a guerra nuclear. Terminó con caída del Muro de Berlín (1989) y disolución de la URSS (1991).',source:'Historia del siglo XX',qs:[{q:'¿Entre quiénes fue?',t:'L',o:['Francia y Alemania','EE.UU. y la URSS','Inglaterra y Japón','China y Rusia'],c:1},{q:'¿Momento más cercano a guerra nuclear?',t:'L',o:['Vietnam','Corea','Crisis de Cuba','Caída del muro'],c:2},{q:'¿Cuándo terminó?',t:'L',o:['1975','1991','2001','1962'],c:1}]},
  {id:'9L02',zone:0,title:'Pedro Páramo',icon:'📖',type:'L',theme:'lit',xp:35,text:'Juan Preciado viaja a Comala buscando a su padre Pedro Páramo. Descubre que el pueblo está habitado por muertos. Los personajes son fantasmas que repiten sus historias. Pedro Páramo fue cacique que controló tierras y personas por amor obsesivo hacia Susana San Juan. Publicada en 1955 por Juan Rulfo, revolucionó la literatura al mezclar voces de vivos y muertos sin aviso.',source:'Juan Rulfo — Literatura latinoamericana',qs:[{q:'¿Quién viaja a Comala?',t:'L',o:['Pedro Páramo','Susana','Juan Preciado','Juan Rulfo'],c:2},{q:'¿Qué tiene de especial Comala?',t:'L',o:['Es bonita','Está habitada por muertos','Es grande','Tiene comercio'],c:1},{q:'¿En qué año se publicó?',t:'L',o:['1945','1955','1965','1975'],c:1}]},
  {id:'9L03',zone:0,title:'La teoría de la relatividad',icon:'⚛️',type:'L',theme:'nat',xp:35,text:'Albert Einstein publicó la teoría de la relatividad especial en 1905 y la general en 1915. La ecuación E=mc² significa que la energía (E) es igual a la masa (m) multiplicada por la velocidad de la luz al cuadrado (c²). Esto demostró que el tiempo no es absoluto: pasa más lento a mayor velocidad. Si viajaras a la velocidad de la luz, el tiempo se detendría. La relatividad general explica que la gravedad curva el espacio-tiempo.',source:'Física moderna',qs:[{q:'¿En qué año se publicó la relatividad especial?',t:'L',o:['1900','1905','1915','1920'],c:1},{q:'¿Qué significa E=mc²?',t:'L',o:['Energía = masa × luz','Energía = masa × velocidad de la luz al cuadrado','Electricidad = materia × calor','Nada'],c:1},{q:'¿Qué pasa con el tiempo a mayor velocidad?',t:'L',o:['Se acelera','Se detiene','Pasa más lento','No cambia'],c:2}]},
  {id:'9L04',zone:0,title:'El apartheid',icon:'✊',type:'L',theme:'soc',xp:35,text:'El apartheid fue un sistema de segregación racial en Sudáfrica (1948-1991). La minoría blanca (20%) gobernaba sobre la mayoría negra (80%). Los negros no podían votar, vivir en zonas blancas, casarse con blancos ni usar los mismos baños. Nelson Mandela luchó contra el apartheid y fue encarcelado 27 años. Al salir en 1990, lideró la transición democrática y fue presidente en 1994.',source:'Historia — Derechos humanos',qs:[{q:'¿Qué era el apartheid?',t:'L',o:['Una guerra','Un sistema de segregación racial','Una ley de inmigración','Un partido político'],c:1},{q:'¿Cuántos años estuvo preso Mandela?',t:'L',o:['10','20','27','35'],c:2},{q:'¿En qué año fue presidente?',t:'L',o:['1990','1994','2000','1988'],c:1}]},
  {id:'9L05',zone:0,title:'CRISPR: editando la vida',icon:'🧬',type:'L',theme:'nat',xp:35,text:'CRISPR-Cas9 es una tecnología que permite editar el ADN con precisión, como un "cortar y pegar" genético. Fue desarrollada por Jennifer Doudna y Emmanuelle Charpentier, quienes ganaron el Nobel de Química en 2020. Puede curar enfermedades genéticas, crear cultivos resistentes y eliminar plagas. En 2018, un científico chino editó los genes de dos bebés, generando escándalo mundial por las implicaciones éticas.',source:'Biotecnología',qs:[{q:'¿Qué es CRISPR?',t:'L',o:['Un medicamento','Una tecnología para editar ADN','Un microscopio','Un virus'],c:1},{q:'¿Quiénes ganaron el Nobel por desarrollarla?',t:'L',o:['Watson y Crick','Doudna y Charpentier','Einstein y Bohr','Curie y Pasteur'],c:1},{q:'¿Qué hizo el científico chino?',t:'L',o:['Curó una enfermedad','Editó genes de dos bebés','Creó CRISPR','Ganó el Nobel'],c:1}]},
  {id:'9L06',zone:0,title:'La Odisea de Homero',icon:'⛵',type:'L',theme:'lit',xp:35,text:'La Odisea, escrita por Homero alrededor del siglo VIII a.C., narra el viaje de 10 años de Ulises (Odiseo) desde Troya hasta su hogar en Ítaca. Enfrenta al cíclope Polifemo, las sirenas, la hechicera Circe y el dios Poseidón. Mientras, su esposa Penélope lo espera tejiendo y destejiendo un manto para evitar casarse con otro. Es una de las obras fundacionales de la literatura occidental.',source:'Literatura clásica',qs:[{q:'¿Cuánto dura el viaje de Ulises?',t:'L',o:['1 año','5 años','10 años','20 años'],c:2},{q:'¿Qué hace Penélope para esperar?',t:'L',o:['Viaja','Teje y desteje un manto','Escribe cartas','Lucha'],c:1},{q:'¿Aproximadamente cuándo se escribió?',t:'L',o:['Siglo I','Siglo VIII a.C.','Siglo XV','Siglo III'],c:1}]},
  {id:'9L07',zone:0,title:'Inteligencia artificial',icon:'🤖',type:'L',theme:'tec',xp:35,text:'La inteligencia artificial existe desde 1956 cuando John McCarthy acuñó el término. ChatGPT, lanzado en noviembre de 2022, alcanzó 100 millones de usuarios en 2 meses, convirtiéndose en la aplicación de mayor crecimiento en la historia. La IA puede escribir textos, generar imágenes, programar, diagnosticar enfermedades y conducir vehículos. Se estima que para 2030, la IA podría generar entre 20-50 billones de dólares anuales a la economía global.',source:'Tecnología',qs:[{q:'¿En qué año se acuñó el término IA?',t:'L',o:['1946','1956','1976','1996'],c:1},{q:'¿Cuántos usuarios alcanzó ChatGPT en 2 meses?',t:'L',o:['10 millones','50 millones','100 millones','500 millones'],c:2},{q:'¿Cuánto podría aportar la IA a la economía para 2030?',t:'L',o:['1-5 billones','20-50 billones','100 billones','500 mil millones'],c:1}]},
  {id:'9L08',zone:0,title:'El feminismo: historia',icon:'♀️',type:'L',theme:'soc',xp:35,text:'La primera ola feminista (siglo XIX) luchó por el voto femenino. En Colombia, las mujeres obtuvieron el derecho al voto en 1954. La segunda ola (1960-70) luchó por derechos laborales e igualdad legal. La tercera ola (1990s) abordó la diversidad y la interseccionalidad. Hoy, la cuarta ola se centra en el acoso sexual (#MeToo), la brecha salarial y la violencia de género. En Colombia, cada 28 horas una mujer es asesinada por razones de género.',source:'Historia social — Género',qs:[{q:'¿Cuándo obtuvieron las colombianas el derecho al voto?',t:'L',o:['1920','1945','1954','1970'],c:2},{q:'¿Cuántas olas feministas ha habido?',t:'L',o:['2','3','4','5'],c:2},{q:'¿Qué movimiento caracteriza la cuarta ola?',t:'L',o:['El voto','Los derechos laborales','#MeToo y la lucha contra la violencia de género','La diversidad'],c:2}]},
  {id:'9L09',zone:0,title:'Blockchain explicado',icon:'⛓️',type:'L',theme:'tec',xp:35,text:'Blockchain es una base de datos distribuida donde cada "bloque" de información se conecta al anterior mediante criptografía, formando una "cadena". Una vez registrada, la información no puede alterarse sin cambiar todos los bloques siguientes, lo que la hace prácticamente inmutable. Se usa en criptomonedas, contratos inteligentes, cadenas de suministro y votación electrónica. Más de 40 países exploran su uso para servicios gubernamentales.',source:'Tecnología — Sistemas distribuidos',qs:[{q:'¿Por qué blockchain es inmutable?',t:'L',o:['Porque es caro','Porque alterar un dato requiere cambiar toda la cadena','Porque nadie lo controla','Porque es secreto'],c:1},{q:'¿Dónde se usa además de criptomonedas?',t:'L',o:['Solo en cripto','Contratos, cadena de suministro, votación','En videojuegos','En música'],c:1},{q:'¿Cuántos países exploran su uso gubernamental?',t:'L',o:['5','20','Más de 40','100'],c:2}]},
  {id:'9L10',zone:0,title:'Borges y el infinito',icon:'♾️',type:'L',theme:'lit',xp:35,text:'Jorge Luis Borges (Argentina, 1899-1986) escribió cuentos que exploran el infinito, los laberintos, el tiempo y la identidad. En "La Biblioteca de Babel", imagina una biblioteca infinita que contiene todos los libros posibles. En "El Aleph", un punto contiene todos los puntos del universo. Borges quedó ciego a los 55 años pero siguió dictando obras maestras. Influyó en la física cuántica, las matemáticas y la informática.',source:'Literatura universal',qs:[{q:'¿De qué país era Borges?',t:'L',o:['Colombia','México','Argentina','Chile'],c:2},{q:'¿Qué contiene la Biblioteca de Babel?',t:'L',o:['Solo novelas','Todos los libros posibles','Los mejores libros','Libros de Borges'],c:1},{q:'¿Qué le pasó a Borges a los 55 años?',t:'L',o:['Murió','Quedó ciego','Dejó de escribir','Se mudó'],c:1}]},
