  {id:'9I01',zone:1,title:'Poscolonialismo y lengua',icon:'🗣️',type:'I',theme:'soc',xp:55,text:'En África, la mayoría de países tiene como idioma oficial el del colonizador. Las lenguas nativas (más de 2.000) se usan en casa pero no en tribunales ni universidades. Ngũgĩ wa Thiong\'o dejó de escribir en inglés: "El idioma del colonizador en mi boca es una cadena invisible." Chimamanda Adichie argumenta que escribir en inglés permite que el mundo escuche las historias africanas.',source:'Colonialismo cultural',qs:[{q:'¿Qué representa el idioma colonial según Ngũgĩ?',t:'I',o:['Una ventaja','Una forma de control que persiste','Solo comunicación','Un idioma más'],c:1},{q:'¿El dilema central?',t:'I',o:['Qué idioma es bonito','Usar la lengua del colonizador da visibilidad pero refuerza su dominio','El inglés es difícil','África no tiene idiomas'],c:1},{q:'¿Cómo se relaciona con Colombia?',t:'I',o:['No se relaciona','Las lenguas indígenas colombianas enfrentan marginación similar','Colombia solo habla español','No hay colonialismo'],c:1}]},
  {id:'9I02',zone:1,title:'Distopía y realidad',icon:'🔮',type:'I',theme:'lit',xp:55,text:'En "Fahrenheit 451" de Bradbury, los libros están prohibidos y la gente vive pegada a pantallas. En "Un mundo feliz" de Huxley, el control no es por miedo sino por placer: la gente está tan entretenida que no quiere pensar. Orwell temía que nos prohibieran la información. Huxley temía que ya no nos importara. ¿Cuál tenía razón?',source:'Literatura distópica',qs:[{q:'¿Diferencia entre Orwell y Huxley?',t:'I',o:['Son iguales','Orwell temía control por miedo; Huxley, por placer','Uno es real','No hay diferencia'],c:1},{q:'¿Conexión con la actualidad?',t:'I',o:['Ninguna','El exceso de entretenimiento puede ser una forma de control social','Los libros no existen','Todo es ficción'],c:1},{q:'¿Pregunta implícita del texto?',t:'I',o:['¿Quién escribió mejor?','¿Estamos siendo controlados sin darnos cuenta?','¿Cuánto cuestan los libros?','¿Cuál es más viejo?'],c:1}]},
  {id:'9I03',zone:1,title:'El mito de Sísifo',icon:'🪨',type:'I',theme:'lit',xp:55,text:'En la mitología griega, Sísifo fue condenado a empujar una roca cuesta arriba eternamente: cada vez que llegaba a la cima, la roca rodaba abajo y debía empezar de nuevo. Albert Camus lo usó como metáfora de la vida humana: trabajamos, envejecemos y morimos, aparentemente sin sentido último. Pero Camus concluye: "Hay que imaginar a Sísifo feliz", porque el sentido está en el esfuerzo mismo, no en el resultado.',source:'Filosofía existencialista',qs:[{q:'¿Qué representa la roca de Sísifo?',t:'I',o:['Un castigo aleatorio','Las tareas repetitivas y aparentemente sin sentido de la existencia humana','Un ejercicio','Una montaña'],c:1},{q:'¿Por qué Camus dice que Sísifo es feliz?',t:'I',o:['Porque le gusta el ejercicio','Porque el sentido de la vida está en el proceso, no en el destino final','Porque la roca es pequeña','Porque tiene amigos'],c:1},{q:'¿Cómo aplica esto a la vida de un estudiante?',t:'I',o:['No aplica','El aprendizaje tiene valor en sí mismo, no solo en la nota o el resultado final','Que estudiar es inútil','Que las tareas son castigo'],c:1}]},
  {id:'9I04',zone:1,title:'La trampa de la pobreza',icon:'💰',type:'I',theme:'soc',xp:55,text:'Los economistas Banerjee y Duflo (Nobel 2019) demostraron que la pobreza no es solo falta de dinero: es una "trampa" que afecta las decisiones. Quien vive en pobreza gasta más energía mental en sobrevivir el día (¿cómo como hoy?) que en planificar el futuro (¿cómo ahorro?). El estrés crónico reduce la capacidad cognitiva equivalente a perder 13 puntos de IQ. No es que los pobres tomen malas decisiones: es que la pobreza misma dificulta tomar buenas decisiones.',source:'Economía del comportamiento',qs:[{q:'¿Qué cambia el texto sobre cómo entendemos la pobreza?',t:'I',o:['Nada','De "los pobres toman malas decisiones" a "la pobreza causa malas condiciones para decidir"','Que la pobreza no existe','Que es fácil salir'],c:1},{q:'¿Qué implica que el estrés reduzca 13 puntos de IQ?',t:'I',o:['Que los pobres son menos inteligentes','Que CUALQUIER persona bajo estrés crónico de pobreza vería afectada su capacidad cognitiva','Que el IQ es inútil','Que el estrés es bueno'],c:1},{q:'¿Qué tipo de políticas sugiere esta investigación?',t:'I',o:['Castigo a los pobres','Políticas que reduzcan el estrés de sobrevivir para liberar capacidad mental de planificación','Más educación solamente','No hacer nada'],c:1}]},
  {id:'9I05',zone:1,title:'El Guernica de Picasso',icon:'🎨',type:'I',theme:'art',xp:55,text:'En 1937, aviones nazis bombardearon Guernica, un pueblo vasco español, matando a 1.654 personas. Picasso pintó un mural de 3.5 x 7.7 metros en blanco, negro y gris: un toro, un caballo herido, una madre con hijo muerto, un soldado desmembrado, una bombilla/sol que ilumina el horror. No hay color porque el color embellecer. No hay perspectiva porque el caos no tiene orden. Picasso dijo: "La pintura no está hecha para decorar departamentos. Es un instrumento de guerra ofensiva y defensiva contra el enemigo."',source:'Arte y política',qs:[{q:'¿Por qué Picasso usó solo blanco, negro y gris?',t:'I',o:['Porque no tenía pintura','Porque el color embellecería un horror que debe verse crudo y doloroso','Porque era su estilo','Porque era más rápido'],c:1},{q:'¿Qué quiso decir Picasso con su frase?',t:'I',o:['Que el arte es violento','Que el arte puede ser una herramienta de denuncia política tan poderosa como un arma','Que no le gustan los departamentos','Que la pintura es difícil'],c:1},{q:'¿Qué función cumple el arte según este ejemplo?',t:'I',o:['Decorar','Denunciar injusticias, preservar la memoria y movilizar conciencias','Ganar dinero','Entretener'],c:1}]},
  {id:'9I06',zone:1,title:'La obsolescencia programada',icon:'📱',type:'I',theme:'tec',xp:55,text:'En 1924, los fabricantes de bombillas se reunieron (Cartel Phoebus) y acordaron REDUCIR la vida útil de las bombillas de 2.500 a 1.000 horas para vender más. Hoy, Apple pagó 113 millones de dólares por ralentizar iPhones antiguos con actualizaciones. Las impresoras tienen chips que las "apagan" después de un número programado de copias. Producimos 50 millones de toneladas de basura electrónica al año.',source:'Economía y medioambiente',qs:[{q:'¿Qué es la obsolescencia programada?',t:'I',o:['Un error de fábrica','El diseño intencional de productos para que fallen y generen recompra','Un descuento','Una mejora'],c:1},{q:'¿Cuál es la consecuencia ambiental?',t:'I',o:['Ninguna','50 millones de toneladas anuales de basura electrónica que contamina','Más reciclaje','Menos consumo'],c:1},{q:'¿Qué revela sobre el sistema económico?',t:'I',o:['Que funciona bien','Que el crecimiento económico a veces se construye sobre el desperdicio deliberado','Que las empresas nos cuidan','Que los productos son buenos'],c:1}]},
  {id:'9I07',zone:1,title:'Kafka y la burocracia',icon:'🏛️',type:'I',theme:'lit',xp:55,text:'En "El proceso" de Kafka, Josef K. es arrestado una mañana sin saber por qué. Pasa toda la novela intentando averiguar su delito y acceder a los jueces, pero el sistema judicial es un laberinto de oficinas, secretarios y procedimientos que nunca lo llevan a ningún lado. Al final es ejecutado sin nunca conocer su crimen. Lo "kafkiano" describe situaciones absurdas donde el sistema se vuelve un fin en sí mismo, olvidando a las personas que debería servir.',source:'Literatura y sociedad',qs:[{q:'¿Qué critica Kafka?',t:'I',o:['La literatura','Los sistemas burocráticos que se vuelven laberintos que olvidan a las personas','Los jueces','La policía'],c:1},{q:'¿Dónde ves situaciones "kafkianas" hoy?',t:'I',o:['En ningún lado','Cuando un trámite requiere documentos que solo se obtienen con el trámite que estás haciendo','En la literatura','Solo en Europa'],c:1},{q:'¿Qué lección social tiene la novela?',t:'I',o:['Que los juicios son justos','Que los sistemas pueden volverse tan complejos que pierden su propósito original de servir al ciudadano','Que hay que obedecer','Que la burocracia es buena'],c:1}]},
  {id:'9I08',zone:1,title:'El experimento de Milgram',icon:'⚡',type:'I',theme:'gen',xp:55,text:'En 1961, el psicólogo Stanley Milgram pidió a voluntarios que aplicaran descargas eléctricas crecientes a otra persona (un actor) cada vez que erraba una pregunta. Un "científico" con bata blanca les decía "continúe, el experimento lo requiere". El 65% de los participantes llegó hasta la descarga máxima (450 voltios, potencialmente mortal). Las personas no eran crueles: obedecían a la autoridad. El estudio intentaba entender cómo ciudadanos normales participaron en el Holocausto.',source:'Psicología social',qs:[{q:'¿Qué demostró el experimento?',t:'I',o:['Que la gente es cruel','Que personas normales pueden causar daño grave cuando una autoridad se lo ordena','Que la electricidad es peligrosa','Que los voluntarios eran malos'],c:1},{q:'¿Qué representaba el "científico con bata blanca"?',t:'I',o:['Un doctor','La figura de autoridad que legitima acciones que individualmente no haríamos','Un actor','Un profesor'],c:1},{q:'¿Cómo aplica esto a situaciones actuales?',t:'I',o:['No aplica','Cuando obedecemos órdenes laborales, políticas o sociales sin cuestionar si son éticas','Solo en guerras','Solo en laboratorios'],c:1}]},
  {id:'9I09',zone:1,title:'La paradoja de Fermi',icon:'👽',type:'I',theme:'nat',xp:55,text:'Hay más de 200.000 millones de estrellas solo en nuestra galaxia, muchas con planetas. Si la vida es posible en la Tierra, estadísticamente debería existir en miles de otros lugares. Entonces, ¿dónde están todos? Esta es la Paradoja de Fermi. Las posibles respuestas inquietan: o estamos solos (improbable), o las civilizaciones se autodestruyen antes de contactar a otras (preocupante), o están ahí y nos ignoran (humillante), o somos un zoológico observado (perturbador).',source:'Astrofísica y filosofía',qs:[{q:'¿Cuál es la paradoja?',t:'I',o:['Que no hay estrellas','Que dada la cantidad de estrellas, deberíamos haber encontrado vida, pero no lo hemos hecho','Que el espacio es vacío','Que la Tierra es especial'],c:1},{q:'¿Qué implica la hipótesis de "autodestrucción"?',t:'I',o:['Que las guerras son buenas','Que las civilizaciones tecnológicas podrían destruirse antes de alcanzar comunicación interestelar — un espejo de nuestros propios riesgos','Que los aliens murieron','Que la tecnología es mala'],c:1},{q:'¿Qué nos dice la paradoja sobre nosotros mismos?',t:'I',o:['Nada','Que nuestra propia supervivencia como civilización no está garantizada y debemos cuidar nuestro planeta','Que somos los mejores','Que el espacio no importa'],c:1}]},
  {id:'9I10',zone:1,title:'La alegoría del barco de Teseo',icon:'🚢',type:'I',theme:'gen',xp:55,text:'Si reemplazas una tabla del barco de Teseo, sigue siendo el mismo barco. Si reemplazas dos, también. Pero si eventualmente reemplazas TODAS las tablas, ¿sigue siendo el barco de Teseo? Y si reconstruyes otro barco con las tablas originales, ¿cuál es el "verdadero"? Tu cuerpo reemplaza casi todas sus células cada 7-10 años. ¿Eres la misma persona que eras a los 5 años? ¿Qué te hace "tú"?',source:'Filosofía — Identidad',qs:[{q:'¿Cuál es la pregunta central?',t:'I',o:['Si los barcos son caros','¿Qué define la identidad: la materia física o algo intangible como la continuidad, la memoria?','Si las tablas son resistentes','Si Teseo existió'],c:1},{q:'¿Cómo aplica la paradoja a los seres humanos?',t:'I',o:['No aplica','Nuestro cuerpo cambia completamente pero seguimos siendo "nosotros" — la identidad no es solo materia','Que somos barcos','Que las células no cambian'],c:1},{q:'¿Qué te hace ser "tú"?',t:'I',o:['Tu cuerpo','Tu memoria, experiencias, relaciones y continuidad de conciencia','Tu nombre','Tu ropa'],c:1}]},
  // CRÍTICO
  {id:'9C01',zone:2,title:'Justicia restaurativa',icon:'⚖️',type:'C',theme:'soc',xp:75,text:'Noruega: cárceles-residencias, reincidencia 20%. EE.UU.: cárceles hacinadas, reincidencia 76%. El modelo restaurativo (reparar el daño, mediar, reintegrar) vs. punitivo (castigar con cárcel). Colombia intenta ser restaurativo con adolescentes pero faltan recursos.',source:'Justicia — DBA: Postura crítica',qs:[{q:'¿Qué evidencia sostiene el argumento?',t:'C',o:['Opiniones','Datos comparativos: Noruega 20% vs. EE.UU. 76% reincidencia','Noticias falsas','Ninguna'],c:1},{q:'¿Tesis implícita?',t:'C',o:['El castigo funciona','La justicia restaurativa puede ser más efectiva para reducir el crimen','No hay solución','Los jóvenes no cometen crímenes'],c:1},{q:'Construye un contraargumento válido:',t:'C',o:['No hay','La restaurativa podría percibirse como impunidad si no se implementa correctamente','El castigo siempre es mejor','No importa'],c:1}]},
  {id:'9C02',zone:2,title:'Colonialismo digital',icon:'💻',type:'C',theme:'tec',xp:75,text:'El 90% de los datos mundiales se almacenan en servidores de EE.UU. o China. Las apps recopilan gustos, movimientos, relaciones y pensamientos. Se venden a anunciantes e influyen en elecciones (Cambridge Analytica). América Latina produce datos masivamente pero no controla su almacenamiento. Algunos lo llaman "colonialismo digital": extraer recursos (datos) del sur para beneficio del norte.',source:'Soberanía digital — Geopolítica',qs:[{q:'¿Por qué "colonialismo digital"?',t:'C',o:['Es metáfora','La extracción de datos sin control replica la dinámica colonial de extracción de recursos','Internet es mala','No hay tecnología en LATAM'],c:1},{q:'¿Relación entre datos y poder?',t:'C',o:['Ninguna','Quien controla los datos puede influir en decisiones políticas y económicas','Solo números','Solo empresas'],c:1},{q:'¿Solución argumentada?',t:'C',o:['Prohibir internet','Desarrollar soberanía tecnológica con servidores y regulaciones propias','No usar celular','Ignorar'],c:1}]},
  {id:'9C03',zone:2,title:'El fin de la privacidad',icon:'🔐',type:'C',theme:'tec',xp:75,text:'Tu teléfono sabe dónde estás, con quién hablas, qué compras, qué lees, cuánto duermes, tu ritmo cardíaco y hasta tu estado emocional (por el tono de voz). Las empresas saben más de ti que tu mejor amigo. China implementó un "sistema de crédito social" que puntúa a los ciudadanos por su comportamiento. Los que tienen baja puntuación no pueden viajar ni acceder a servicios. ¿Es el futuro que aceptamos por "comodidad"?',source:'Vigilancia y sociedad — Ética tecnológica',qs:[{q:'¿Cuál es la pregunta central del texto?',t:'C',o:['Si los teléfonos son buenos','Si la comodidad tecnológica justifica renunciar a la privacidad y permitir vigilancia masiva','Si China es mala','Si los datos son importantes'],c:1},{q:'¿Qué implica el sistema de crédito social chino?',t:'C',o:['Que China es organizada','Que la tecnología puede convertirse en herramienta de control social totalitario','Que es solo para China','Que es voluntario'],c:1},{q:'¿Cuál es tu postura argumentada?',t:'C',o:['No me importa la privacidad','La privacidad es un derecho fundamental que requiere regulación estricta frente al avance tecnológico','La tecnología es perfecta','Solo importa a adultos'],c:1}]},
  {id:'9C04',zone:2,title:'¿Tiene la ciencia límites éticos?',icon:'🧪',type:'C',theme:'nat',xp:75,text:'La ciencia PUEDE clonar humanos, crear armas biológicas, editar genes de bebés, vigilar a poblaciones enteras con IA. Pero ¿DEBE hacerlo? En la WWII, científicos nazis experimentaron con prisioneros. Después, el Código de Núremberg (1947) estableció límites éticos a la investigación. Sin embargo, la tecnología avanza más rápido que las regulaciones. CRISPR puede eliminar enfermedades genéticas, pero también crear "bebés de diseño" accesibles solo para ricos.',source:'Bioética — Filosofía de la ciencia',qs:[{q:'¿Cuál es la diferencia entre "poder" y "deber"?',t:'C',o:['Ninguna','Que la capacidad técnica no implica automáticamente la justificación moral para usarla','Son sinónimos','Poder es más importante'],c:1},{q:'¿Por qué la velocidad tecnológica es un problema?',t:'C',o:['No lo es','Porque la tecnología avanza más rápido que nuestra capacidad de regular sus implicaciones éticas','Porque es cara','Porque es difícil'],c:1},{q:'¿Cuál sería un marco ético para la ciencia?',t:'C',o:['Sin límites','Avanzar en conocimiento pero con regulación democrática, acceso equitativo y evaluación constante de impacto social','Prohibir la ciencia','Solo los científicos deciden'],c:1}]},
  {id:'9C05',zone:2,title:'Deuda externa: la cadena invisible',icon:'🔗',type:'C',theme:'soc',xp:75,text:'Los países latinoamericanos deben billones de dólares a bancos internacionales y al FMI. Para pagar la deuda, recortan gasto en salud, educación e infraestructura. Argentina debe 400.000 millones; Colombia, 180.000 millones. Los préstamos originales a menudo fueron tomados por dictadores corruptos, pero la deuda la pagan las generaciones siguientes. El servicio de la deuda (solo los intereses) a veces supera lo que se gasta en educación.',source:'Economía internacional — Justicia global',qs:[{q:'¿Por qué el texto la llama "cadena invisible"?',t:'C',o:['Porque es bonita','Porque limita la capacidad de los países de invertir en su propio desarrollo','Porque no existe','Porque es secreta'],c:1},{q:'¿Es justo que ciudadanos actuales paguen deudas de dictadores pasados?',t:'C',o:['Sí, son deudas del país','No necesariamente: la legitimidad de deudas tomadas sin consentimiento democrático es cuestionable','No importa','Siempre se debe pagar'],c:1},{q:'¿Qué solución propondrías?',t:'C',o:['Pagar todo','Auditoría de deuda, renegociación justa y priorizar inversión social sobre servicio de deuda ilegítima','No pagar nada','Pedir más prestado'],c:1}]},
  {id:'9C06',zone:2,title:'¿Es ético comer carne?',icon:'🥩',type:'C',theme:'nat',xp:75,text:'La ganadería produce el 14.5% de emisiones de gases de efecto invernadero. Para producir 1 kg de carne se necesitan 15.000 litros de agua. Las condiciones de cría industrial causan sufrimiento animal documentado. Sin embargo, la carne es culturalmente central en muchas sociedades, fuente de empleo para millones y nutricionalmente importante para algunas poblaciones. El debate no es simple: las alternativas vegetales no están igualmente accesibles para todos.',source:'Ética alimentaria — Medioambiente',qs:[{q:'¿Por qué el texto dice que "el debate no es simple"?',t:'C',o:['Porque la carne es rica','Porque involucra medio ambiente, ética animal, cultura, economía y acceso desigual a alternativas','Porque es viejo','Porque nadie se pone de acuerdo'],c:1},{q:'¿Es justo pedir a todos que dejen de comer carne?',t:'C',o:['Sí, todos deberían','No necesariamente: el acceso a alternativas es desigual y la responsabilidad mayor es de la industria, no del individuo','No, la carne es necesaria','Sí, los animales importan más'],c:1},{q:'¿Cuál sería una postura equilibrada?',t:'C',o:['Comer carne sin culpa','Reducir el consumo, exigir condiciones dignas de cría y que la industria asuma su impacto ambiental','Ser vegano obligatorio','No hacer nada'],c:1}]},
  {id:'9C07',zone:2,title:'Renta básica universal',icon:'💰',type:'C',theme:'soc',xp:75,text:'La Renta Básica Universal (RBU) propone que el Estado pague a cada ciudadano un ingreso mínimo sin condiciones. Finlandia lo probó con 2.000 desempleados: mejoraron en bienestar y confianza, sin dejar de buscar trabajo. Kenia lo implementa con éxito. Los críticos dicen: es costoso, desincentiva el trabajo, genera inflación. Los defensores responden: elimina pobreza extrema, reduce burocracia y da libertad. Con la automatización eliminando empleos, ¿será inevitable?',source:'Economía social — Futuro del trabajo',qs:[{q:'¿Qué demostró el experimento de Finlandia?',t:'C',o:['Que nadie trabaja','Que la gente mejoró en bienestar sin dejar de buscar empleo, contradiciendo el mito del "desincentivo"','Que es imposible','Que Finlandia es rica'],c:1},{q:'¿Por qué la automatización hace urgente este debate?',t:'C',o:['No lo hace','Porque si las máquinas reemplazan empleos masivamente, millones necesitarán ingresos alternativos','Porque los robots son malos','Porque la tecnología es cara'],c:1},{q:'¿Es viable en Colombia?',t:'C',o:['Imposible','Difícil pero no imposible: requeriría reforma tributaria y redistribución, como las ya existentes en programas sociales','Fácil','Solo en Europa funciona'],c:1}]},
  {id:'9C08',zone:2,title:'Intervención humanitaria',icon:'🕊️',type:'C',theme:'soc',xp:75,text:'Cuando un gobierno masacra a su propia población (genocidio), ¿deben otros países intervenir militarmente? La ONU intervino en Bosnia (1995) y Libia (2011) alegando "Responsabilidad de Proteger". Pero la intervención en Irak (2003) fue criticada como imperialismo disfrazado. No se intervino en Ruanda (1994): 800.000 personas murieron. ¿Cuándo es legítimo intervenir y cuándo es excusa para dominar?',source:'Relaciones internacionales — Derecho humanitario',qs:[{q:'¿Cuál es el dilema central?',t:'C',o:['Si la guerra es buena','Si la soberanía de un país puede violarse para proteger a su propia población','Si la ONU es buena','Si los ejércitos son fuertes'],c:1},{q:'¿Qué revela la comparación Irak vs. Ruanda?',t:'C',o:['Que son iguales','Que se interviene cuando hay intereses geopolíticos y se ignoran tragedias cuando no los hay','Que Irak es peor','Que África no importa'],c:1},{q:'¿Cuándo sería legítima la intervención?',t:'C',o:['Nunca','Cuando hay evidencia clara de genocidio, mandato multilateral y el objetivo es proteger civiles, no recursos','Siempre que un país quiera','Solo si hay petróleo'],c:1}]},
  {id:'9C09',zone:2,title:'Transhumanismo: ¿evolucionar o perder la humanidad?',icon:'🧬',type:'C',theme:'tec',xp:75,text:'El transhumanismo propone usar tecnología para superar los límites biológicos: implantes cerebrales para mejorar la memoria, modificación genética para eliminar enfermedades, prótesis que superen la capacidad humana natural. Elon Musk ya implanta chips cerebrales (Neuralink). Los defensores dicen: es la siguiente etapa de la evolución. Los críticos advierten: solo los ricos podrán "mejorarse", creando una humanidad dividida en "mejorados" y "naturales", una nueva forma de desigualdad biológica.',source:'Bioética — Filosofía de la tecnología',qs:[{q:'¿Cuál es el riesgo social más grave?',t:'C',o:['Que sea caro','Que las mejoras tecnológicas solo accesibles para ricos creen una nueva forma de desigualdad biológica','Que sea doloroso','Que no funcione'],c:1},{q:'¿Es diferente a la cirugía estética o la educación privada?',t:'C',o:['Sí, totalmente','En grado: ya existen desigualdades por acceso a salud y educación, pero las mejoras genéticas serían irreversibles y hereditarias','No, son iguales','No se relacionan'],c:1},{q:'¿Cuál sería un marco ético justo?',t:'C',o:['Prohibir todo','Permitir mejoras médicas pero regular las de "mejoramiento" con acceso equitativo y control democrático','Sin límites','Solo para científicos'],c:1}]},

const gU=()=>{try{return JSON.parse(localStorage.getItem('lm2_u'))||{}}catch{return{}}};
const sU=u=>{
  localStorage.setItem('lm2_u',JSON.stringify(u));
  // Sync to Firebase
  if(fbReady&&fbDB){try{fbDB.ref('users').set(u);}catch(e){}}
};
const gS=()=>localStorage.getItem('lm2_s');
const sS=u=>localStorage.setItem('lm2_s',u);

const gUser=k=>gU()[k]||null;
const sUser=(k,d)=>{
  const u=gU();u[k]=d;sU(u);
  // Also sync individual user to Firebase
  if(fbReady&&fbDB){try{fbDB.ref('users/'+k).set(d);}catch(e){}}
};

// Load from Firebase on startup (overrides localStorage if newer)
async function syncFromFirebase(){
  if(!fbReady||!fbDB)return;
  try{
    const snap=await fbDB.ref('users').once('value');
    const cloudData=snap.val();
    if(cloudData){
      const localData=gU();
      // Merge: cloud wins if it has more XP for a user
      const merged={...localData};
      for(const[k,v]of Object.entries(cloudData)){
        if(!merged[k]||(v.xp||0)>=(merged[k].xp||0)){merged[k]=v;}
      }
      localStorage.setItem('lm2_u',JSON.stringify(merged));
      console.log('☁️ Datos sincronizados desde la nube');
    }
  }catch(e){console.log('Sync error:',e);}
}

const NODE_H=100,ZONE_PAD=45;
function curIdx(){const acts=CONTENT[UD.grade]?.acts||[];for(let i=0;i<acts.length;i++){if(!UD.done.includes(acts[i].id))return i;}return acts.length;}

function renderMap(){
  const g=UD.grade;const data=CONTENT[g];if(!data)return;
  const acts=data.acts,zones=data.zones;
  const world=document.getElementById('mapWorld');if(!world)return;
  const pts=[];let y=45;
  zones.forEach((z,zi)=>{y+=ZONE_PAD;const za=acts.filter(a=>a.zone===zi);za.forEach((act,ai)=>{const p=ai/((za.length-1)||1);let xP;if(zi%2===0)xP=.22+.32*Math.sin(p*Math.PI);else xP=.78-.32*Math.sin(p*Math.PI);xP+=.04*Math.sin((zi*4+ai*2.5)*1.2);xP=Math.max(.15,Math.min(.85,xP));pts.push({id:act.id,x:xP,y,zi});y+=NODE_H;});y+=15;});
  pts.push({id:'trophy',x:.5,y:y+15,zi:-1});
  const totalH=y+80;world.style.height=totalH+'px';
  const ci=curIdx();let html='';
  zones.forEach((z,zi)=>{const za=acts.filter(a=>a.zone===zi);const fp=pts.find(p=>p.id===za[0]?.id);const lp=pts.find(p=>p.id===za[za.length-1]?.id);if(!fp||!lp)return;const zS=fp.y-ZONE_PAD-10,zE=lp.y+60,h=zE-zS;html+=`<div class="zone-bg" style="top:${zS}px;height:${h}px;background:${z.gradient};"><div class="zone-label" style="top:6px;background:${z.labelBg};">${z.name}</div>`;if(z.decos)z.decos.forEach(d=>{html+=`<div class="deco ${d.a}" style="left:${d.x};top:${d.y};">${d.e}</div>`;});html+=`</div>`;});
  html+=`<svg class="map-svg" viewBox="0 0 100 ${totalH}" preserveAspectRatio="none">`;
  const pp=pts.map(p=>({x:p.x*100,y:p.y}));let pathD='M '+pp[0].x+' '+pp[0].y;for(let i=1;i<pp.length;i++){const pr=pp[i-1],cu=pp[i],mY=(pr.y+cu.y)/2;pathD+=` C ${pr.x} ${mY}, ${cu.x} ${mY}, ${cu.x} ${cu.y}`;}
  html+=`<path class="path-line path-bg" d="${pathD}"/>`;
  const dc=Math.min(ci,pts.length-1);if(dc>0){let dD='M '+pp[0].x+' '+pp[0].y;for(let i=1;i<=dc;i++){const pr=pp[i-1],cu=pp[i],mY=(pr.y+cu.y)/2;dD+=` C ${pr.x} ${mY}, ${cu.x} ${mY}, ${cu.x} ${cu.y}`;}html+=`<path class="path-line path-done" d="${dD}"/>`;}
  if(dc<pp.length-1){const sI=Math.max(0,dc);let fD='M '+pp[sI].x+' '+pp[sI].y;for(let i=sI+1;i<pp.length;i++){const pr=pp[i-1],cu=pp[i],mY=(pr.y+cu.y)/2;fD+=` C ${pr.x} ${mY}, ${cu.x} ${mY}, ${cu.x} ${cu.y}`;}html+=`<path class="path-line path-future" d="${fD}"/>`;}

// ═══ EXPORT CSV ═══
function exportAllCSV(){
  const allU=gU();
  const grades=[6,7,8,9];
  let csv='GRADO,USUARIO,NOMBRE,XP,NIVEL,ACTIVIDADES,TOTAL_DISPONIBLE,%_AVANCE,PRECISION_%,LITERALES,INFERENCIALES,CRITICAS,JUEGOS,RACHA,TIEMPO_TOTAL_SEG,VEL_PROMEDIO_PPM,ULTIMO_ACCESO\n';
  grades.forEach(g=>{
    const totalActs=CONTENT[g]?.acts?.length||0;
    Object.entries(allU).filter(([k,v])=>v.grade===g).sort((a,b)=>a[1].name?.localeCompare(b[1].name)).forEach(([k,v])=>{
      const done=v.done?.length||0;
      const pct=Math.round(done/totalActs*100);
      const hist=v.history||[];
      const tq=hist.reduce((s,h)=>s+h.t,0);
      const cq=hist.reduce((s,h)=>s+h.c,0);
      const acc=tq?Math.round(cq/tq*100):0;
      const litD=(v.done||[]).filter(d=>getAct(g,d)?.type==='L').length;
      const infD=(v.done||[]).filter(d=>getAct(g,d)?.type==='I').length;
      const criD=(v.done||[]).filter(d=>getAct(g,d)?.type==='C').length;
      const gamD=(v.done||[]).filter(d=>getAct(g,d)?.type==='G').length;
      const totalSecs=hist.reduce((s,h)=>s+(h.secs||0),0);
      const wpms=hist.filter(h=>h.wpm>0);
      const avgWPM=wpms.length?Math.round(wpms.reduce((s,h)=>s+h.wpm,0)/wpms.length):0;
      const lastAccess=v.lastDate||'Nunca';
      const name=(v.name||k).replace(/,/g,' ');
      csv+=`${g}°,${k},${name},${v.xp||0},${LEVELS[v.level||0]?.name||'Novato'},${done},${totalActs},${pct},${acc},${litD},${infD},${criD},${gamD},${v.streak||0},${totalSecs},${avgWPM},${lastAccess}\n`;
    });
  });
  // Add detail sheet: individual activity history
  csv+='\n\n=== HISTORIAL DETALLADO ===\n';
  csv+='GRADO,NOMBRE,ACTIVIDAD,TIPO,CORRECTAS,TOTAL,XP,TIEMPO_SEG,VEL_PPM,FECHA\n';
  grades.forEach(g=>{
    Object.entries(allU).filter(([k,v])=>v.grade===g).forEach(([k,v])=>{
      (v.history||[]).forEach(h=>{
        const name=(v.name||k).replace(/,/g,' ');
        const tipo={L:'Literal',I:'Inferencial',C:'Crítico',G:'Juego'}[h.tp]||h.tp;
        const actName=(h.n||'').replace(/,/g,' ');
        csv+=`${g}°,${name},${actName},${tipo},${h.c},${h.t},${h.x},${h.secs||0},${h.wpm||0},${h.dt||''}\n`;
      });
    });
  });
  // Download
  const BOM='\uFEFF';
  const blob=new Blob([BOM+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  const fecha=new Date().toISOString().slice(0,10);
  a.download=`LectoMaster_Reporte_${fecha}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

let curAct=null,ans={},readStart=0,readTimerInterval=null;

function countWords(text){return text.split(/\s+/).filter(w=>w.length>0).length;}
function fmtTime(s){const m=Math.floor(s/60);const sec=s%60;return `${m}:${sec<10?'0':''}${sec}`;}
function startReadTimer(){
  readStart=Date.now();
  if(readTimerInterval)clearInterval(readTimerInterval);
  readTimerInterval=setInterval(()=>{
    const el=document.getElementById('rtClock');if(!el)return;
    const elapsed=Math.floor((Date.now()-readStart)/1000);
    el.textContent=fmtTime(elapsed);
    // WPM calc
    if(curAct&&elapsed>3){
      const words=countWords(curAct.text||'');
      const wpm=Math.round(words/(elapsed/60));
      const wpmEl=document.getElementById('rtWPM');
      if(wpmEl)wpmEl.textContent=wpm+' pal/min';
    }
  },1000);
}
function stopReadTimer(){
  if(readTimerInterval){clearInterval(readTimerInterval);readTimerInterval=null;}
  return readStart?Math.floor((Date.now()-readStart)/1000):0;
}

function openAct(id){
  curAct=getAct(UD.grade,id);if(!curAct)return;ans={};
  document.getElementById('moT').textContent=curAct.icon+' '+curAct.title;

  const typeCls={L:'tL',I:'tI',C:'tC',G:'tG'};
  document.getElementById('moType').textContent=typeLabels[curAct.type]||'';

  const qtLab={L:'Literal',I:'Inferencial',C:'Crítico'};const qtCls={L:'tL',I:'tI',C:'tC'};

// ═══ GAMIFIED ACTIVITY RENDERER ═══
function renderGame(act){
  const body=document.getElementById('moB');
  if(act.game==='order'){
    // Reorder paragraphs/sentences game
    const shuffled=[...act.items].sort(()=>Math.random()-.5);
    let html=`<div class="game-area"><h3>🧩 ORDENA CORRECTAMENTE</h3><p style="font-size:12px;color:var(--txt2);margin-bottom:12px;">${act.instruction}</p><div id="orderList">`;
    shuffled.forEach((item,i)=>{html+=`<div class="drag-item" data-orig="${act.items.indexOf(item)}" draggable="true" onclick="moveItem(this)">${i+1}. ${item}</div>`;});
    html+=`</div></div><button class="sub-btn" onclick="checkOrder()">VERIFICAR ORDEN</button>`;
    body.innerHTML=html;
  } else if(act.game==='intruder'){
    // Find the intruder
    let html=`<div class="game-area"><h3>🔍 ENCUENTRA EL INTRUSO</h3><p style="font-size:12px;color:var(--txt2);margin-bottom:12px;">${act.instruction}</p>`;
    act.rounds.forEach((r,ri)=>{
      html+=`<div class="q-block" id="ir${ri}"><h4>${ri+1}. ${r.category}</h4><div class="opts">${r.options.map((o,oi)=>`<button class="opt" onclick="pickIntruder(${ri},${oi},this)">${o}</button>`).join('')}</div><div class="fb" id="ifb${ri}"></div></div>`;
    });
    html+=`</div><button class="sub-btn" id="subBtn" onclick="checkIntruders()" disabled>VERIFICAR</button>`;
    body.innerHTML=html;
  } else if(act.game==='tf_speed'){

// ═══ FIXED FEEDBACK GENERATOR ═══
function genFixedFeedback(q,chosenIdx,text){
  const correctAns=q.o[q.c];
  const chosenAns=q.o[chosenIdx];
  const typeHints={
    L:'Busca la información directamente en el texto. Lee con atención cada oración.',
    I:'Esta pregunta requiere interpretar lo que el texto sugiere, no solo lo que dice literalmente.',
    C:'Piensa en la intención del autor y en los argumentos que presenta. ¿Cuál es la postura más fundamentada?'
  };
  // Try to find the correct answer in the text
  const textLower=text.toLowerCase();
  const correctLower=correctAns.toLowerCase();
  let hint='';
  if(textLower.includes(correctLower.substring(0,Math.min(15,correctLower.length)).toLowerCase())){
    hint=`La respuesta "${correctAns}" aparece directamente en el texto. Vuelve a leerlo con calma.`;
  } else {
    hint=typeHints[q.t]||'Relee el texto y busca pistas que te ayuden a encontrar la respuesta correcta.';
  }
  return hint;
}

const AI_API_KEY=''; // Pega tu API key de Anthropic aquí (o déjalo vacío para solo retroalimentación fija)

async function requestAIFeedback(wrongQs,act){
  if(!AI_API_KEY)return; // No API key = solo feedback fijo
  const grade=UD?.grade||6;
  const prompt=`Eres un tutor amable de comprensión lectora para un estudiante de grado ${grade}° en Colombia. El estudiante leyó este texto:

"${act.text.substring(0,500)}"

Se equivocó en estas preguntas:
${wrongQs.map((w,i)=>`${i+1}. Pregunta: "${w.question}" — Eligió: "${w.chose}" — Correcta: "${w.correct}" — Tipo: ${w.type==='L'?'Literal':w.type==='I'?'Inferencial':'Crítica'}`).join('\n')}

Para CADA pregunta, da una explicación breve (2-3 oraciones máximo) en un tono cálido y motivador. Explica POR QUÉ la respuesta correcta es la correcta y da una pista de DÓNDE en el texto se encuentra la clave. Si es inferencial o crítica, guía el razonamiento sin dar la respuesta directamente.

Responde SOLO en JSON así (sin markdown):
[{"qi":0,"feedback":"tu explicación"},{"qi":1,"feedback":"tu explicación"}]`;

  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':AI_API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,messages:[{role:'user',content:prompt}]})
    });
    const data=await resp.json();
    const text=data.content?.[0]?.text||'';
    // Parse JSON response
    const clean=text.replace(/```json|```/g,'').trim();
    const feedbacks=JSON.parse(clean);
    feedbacks.forEach(fb=>{
      const origQ=wrongQs.find(w=>w.qi===fb.qi);
      if(!origQ)return;
      const aiEl=document.getElementById('aifb'+fb.qi);
      if(aiEl){aiEl.innerHTML=`<div class="ai-label">🤖 Tutor IA</div><div>${fb.feedback}</div>`;aiEl.classList.add('show');}
    });
  }catch(e){
    // AI failed — remove loading indicators silently
    wrongQs.forEach(w=>{const el=document.getElementById('aifb'+w.qi);if(el)el.remove();});
    console.log('AI feedback error:',e);
  }
}

.cert .name{font-family:'Orbitron';font-size:28px;color:#FBBF24;margin:20px 0 6px;position:relative;}
.cert .grade{font-size:16px;color:#E2E8F0;margin-bottom:24px;position:relative;}
.cert .stats{display:flex;justify-content:center;gap:30px;margin:20px 0;position:relative;}
.cert .stat{text-align:center;}.cert .stat .v{font-family:'Orbitron';font-size:24px;color:#00D4FF;}.cert .stat .l{font-size:11px;color:#94A3B8;text-transform:uppercase;letter-spacing:1px;}
.cert .footer{margin-top:30px;color:#64748B;font-size:12px;position:relative;}
.cert .seal{font-size:48px;margin:10px 0;position:relative;}
.print-btn{position:fixed;top:20px;right:20px;background:#FBBF24;color:#000;border:none;padding:12px 24px;border-radius:12px;font-weight:700;cursor:pointer;font-size:14px;}
@media print{.print-btn{display:none;} body{background:#fff;} .cert{border-color:#FBBF24;box-shadow:none;}}

<button class="print-btn" onclick="window.print()">🖨️ Imprimir / Guardar PDF</button>
<div class="cert">

<div class="name">${UD.name}</div>

</div>
