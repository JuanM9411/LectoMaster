<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LectoMaster — Comprensión Lectora</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B0E17;--bg2:#111627;--bg3:#171D30;--card:#1A2038;--card2:#1F2745;
  --neon:#00D4FF;--npur:#A855F7;--npnk:#F472B6;--ngrn:#22D3EE;
  --norg:#FB923C;--nred:#EF4444;--gold:#FBBF24;--gold2:#F59E0B;
  --txt:#E2E8F0;--txt2:#94A3B8;--txt3:#64748B;--brd:#1E293B;
  --glow:0 0 20px rgba(0,212,255,.15);
  --sh:0 4px 24px rgba(0,0,0,.4);--sh2:0 8px 40px rgba(0,0,0,.5);
  --r:12px;--r2:16px;--r3:24px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden;}
h1,h2,h3,h4{font-family:'Orbitron',sans-serif;letter-spacing:-.5px;}
button{font-family:'Outfit',sans-serif;cursor:pointer;border:none;outline:none;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:var(--neon);border-radius:10px;}::-webkit-scrollbar-track{background:var(--bg2);}
.particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.particles span{position:absolute;width:2px;height:2px;background:var(--neon);border-radius:50%;animation:rise 8s linear infinite;opacity:0;}
@keyframes rise{0%{opacity:0;transform:translateY(100vh) scale(0);}10%{opacity:.5;}90%{opacity:.5;}100%{opacity:0;transform:translateY(-10vh) scale(1.5);}}

/* ═══ LOGIN ═══ */
.login{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 30% 50%,#1a1040,#0B0E17 60%,#050710);transition:opacity .5s,visibility .5s;}
.login.hid{opacity:0;visibility:hidden;pointer-events:none;}
.login .grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);background-size:60px 60px;}
.login .gorb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;}
.gorb:nth-child(2){width:300px;height:300px;background:rgba(168,85,247,.12);top:10%;left:10%;animation:of 12s ease-in-out infinite;}
.gorb:nth-child(3){width:250px;height:250px;background:rgba(0,212,255,.08);bottom:15%;right:10%;animation:of 15s ease-in-out infinite reverse;}
@keyframes of{0%,100%{transform:translate(0,0);}50%{transform:translate(30px,-20px);}}
.lbox{background:linear-gradient(145deg,var(--card),var(--bg2));border:1px solid var(--brd);border-radius:var(--r3);padding:40px 36px;width:430px;max-width:92vw;box-shadow:var(--sh2),var(--glow);position:relative;z-index:2;animation:su .6s ease;}
@keyframes su{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
.lbox h1{text-align:center;font-size:22px;background:linear-gradient(135deg,var(--neon),var(--npur));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:8px 0 2px;}
.lbox .sub{text-align:center;color:var(--txt3);font-size:12px;margin-bottom:24px;font-weight:500;}
.fg{margin-bottom:16px;}.fg label{display:block;font-weight:600;font-size:11px;color:var(--txt2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
.fg input{width:100%;padding:11px 14px;background:var(--bg);border:1.5px solid var(--brd);border-radius:var(--r);font-size:14px;font-weight:500;color:var(--txt);transition:all .3s;font-family:'Outfit',sans-serif;}
.fg input:focus{border-color:var(--neon);box-shadow:var(--glow);outline:none;}
.fg input::placeholder{color:var(--txt3);}
.av-pick{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin:5px 0;}
.av-o{width:40px;height:40px;font-size:24px;border-radius:10px;border:2px solid var(--brd);display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--bg);transition:all .2s;}
.av-o:hover{border-color:var(--neon);transform:scale(1.1);}.av-o.on{border-color:var(--npur);background:rgba(168,85,247,.12);box-shadow:var(--glow);}
.lbtn{width:100%;padding:13px;border-radius:var(--r);font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;color:#fff;letter-spacing:1px;text-transform:uppercase;background:linear-gradient(135deg,var(--neon),var(--npur));box-shadow:0 4px 20px rgba(0,212,255,.3);transition:all .3s;margin-top:6px;}
.lbtn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,212,255,.4);}
.lerr{color:var(--nred);font-size:11px;font-weight:600;margin-top:6px;display:none;text-align:center;}

/* ═══ APP ═══ */
.app{display:none;position:relative;z-index:1;}.app.vis{display:block;}
.hdr{background:linear-gradient(180deg,var(--bg2),var(--bg));border-bottom:1px solid var(--brd);position:sticky;top:0;z-index:100;}
.hdr-in{max-width:1200px;margin:0 auto;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.hdr-logo{display:flex;align-items:center;gap:8px;}.hdr-logo .ico{font-size:22px;}
.hdr-logo h2{font-size:15px;background:linear-gradient(135deg,var(--neon),var(--npur));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hdr-grade{background:var(--card);border:1px solid var(--brd);border-radius:50px;padding:3px 12px;font-size:10px;font-weight:700;color:var(--ngrn);letter-spacing:.5px;}
.pills{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.pill{background:var(--card);border:1px solid var(--brd);border-radius:50px;padding:5px 12px;display:flex;align-items:center;gap:4px;font-weight:700;font-size:13px;color:var(--txt);}
.pill .v{color:var(--gold);}
.hdr-r{display:flex;align-items:center;gap:8px;}
.hdr-av{width:34px;height:34px;border-radius:50%;border:2px solid var(--npur);display:flex;align-items:center;justify-content:center;font-size:18px;background:var(--card);}
.obtn{background:transparent;border:1px solid var(--brd);border-radius:var(--r);padding:4px 10px;color:var(--txt3);font-weight:600;font-size:10px;transition:all .2s;}
.obtn:hover{border-color:var(--nred);color:var(--nred);}
.nav{max-width:1200px;margin:0 auto;padding:12px 16px 0;display:flex;gap:5px;overflow-x:auto;}
.nav-t{padding:9px 16px;border-radius:var(--r);font-weight:700;font-size:14px;background:var(--card);color:var(--txt3);border:1px solid var(--brd);transition:all .3s;white-space:nowrap;}
.nav-t:hover{border-color:var(--neon);color:var(--txt);}
.nav-t.on{background:linear-gradient(135deg,rgba(0,212,255,.08),rgba(168,85,247,.08));border-color:var(--neon);color:var(--neon);}
.mn{max-width:1200px;margin:0 auto;padding:16px;}
.sec{display:none;animation:fu .4s;}.sec.on{display:block;}
@keyframes fu{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* ═══ DASHBOARD ═══ */
.dash-top{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;}
.dash-w{background:linear-gradient(135deg,rgba(0,212,255,.06),rgba(168,85,247,.06));border:1px solid var(--brd);border-radius:var(--r3);padding:24px;position:relative;overflow:hidden;}
.dash-w h2{font-size:20px;margin-bottom:4px;}.dash-w .greet{font-size:15px;color:var(--txt2);line-height:1.5;}
.dash-w .quote{margin-top:12px;padding:10px 16px;background:rgba(251,191,36,.05);border-left:3px solid var(--gold);border-radius:0 var(--r) var(--r) 0;font-style:italic;font-size:14px;color:var(--gold);line-height:1.5;}
.dash-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ds{background:var(--card);border:1px solid var(--brd);border-radius:var(--r2);padding:16px;text-align:center;transition:all .3s;}
.ds:hover{border-color:var(--neon);}
.ds .di{font-size:24px;margin-bottom:4px;}.ds .dv{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--neon),var(--ngrn));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.ds .dl{font-size:12px;color:var(--txt3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
.xp-box{background:var(--card);border:1px solid var(--brd);border-radius:var(--r2);padding:16px;margin-bottom:18px;}
.xp-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.xp-hdr h4{font-size:14px;}.xp-lvl{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;font-weight:800;font-size:11px;padding:4px 12px;border-radius:50px;font-family:'Orbitron';}
.xp-track{background:var(--bg);border-radius:50px;height:22px;overflow:hidden;position:relative;border:1px solid var(--brd);}
.xp-fill{height:100%;border-radius:50px;background:linear-gradient(90deg,var(--neon),var(--npur));transition:width 1.2s;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:9px;font-weight:800;color:#fff;min-width:36px;position:relative;}
.xp-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);animation:shine 3s infinite;}
@keyframes shine{0%{transform:translateX(-100%);}100%{transform:translateX(100%);}}
.xp-info{display:flex;justify-content:space-between;margin-top:5px;font-size:12px;color:var(--txt3);font-weight:600;}

/* ═══ MAP ═══ */
.map-world{position:relative;width:100%;}
.zone-bg{position:absolute;left:0;right:0;overflow:hidden;border-radius:var(--r2);}
.zone-label{position:absolute;left:50%;transform:translateX(-50%);padding:8px 22px;border-radius:50px;font-family:'Orbitron';font-size:12px;font-weight:700;color:#fff;z-index:5;box-shadow:var(--sh);white-space:nowrap;letter-spacing:.5px;text-transform:uppercase;border:1px solid rgba(255,255,255,.1);}
.deco{position:absolute;pointer-events:none;user-select:none;opacity:.15;font-size:28px;}
.deco.float{animation:df 5s ease-in-out infinite;}@keyframes df{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.deco.bob{animation:db 3s ease-in-out infinite;}@keyframes db{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
.map-svg{position:absolute;top:0;left:0;width:100%;height:100%;z-index:2;pointer-events:none;}
.path-line{fill:none;stroke-width:10;stroke-linecap:round;stroke-linejoin:round;}
.path-bg{stroke:rgba(255,255,255,.03);stroke-width:14;}.path-done{stroke:var(--neon);stroke-dasharray:8 6;opacity:.6;filter:drop-shadow(0 0 4px rgba(0,212,255,.2));}.path-future{stroke:rgba(255,255,255,.04);stroke-dasharray:8 6;}
.node-wrap{position:absolute;z-index:10;transform:translate(-50%,-50%);}
.node{width:68px;height:68px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:var(--sh);transition:all .35s;cursor:pointer;border:3px solid rgba(255,255,255,.08);position:relative;}
.node:hover{transform:scale(1.15);box-shadow:var(--sh2);}
.node-label{position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:11px;font-weight:700;color:var(--txt2);background:var(--card);padding:3px 10px;border-radius:50px;box-shadow:var(--sh);border:1px solid var(--brd);max-width:130px;overflow:hidden;text-overflow:ellipsis;}
.node-type{position:absolute;top:-6px;right:-6px;font-size:14px;background:var(--card);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border:1px solid var(--brd);}
.node.done{background:linear-gradient(135deg,var(--neon),var(--npur));border-color:var(--neon);}
.node.current{background:linear-gradient(135deg,var(--norg),var(--npnk));border-color:var(--norg);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(251,146,60,.3),var(--sh);}50%{box-shadow:0 0 0 12px rgba(251,146,60,0),var(--sh2);}}
.node.locked{background:var(--bg2);border-color:var(--brd);opacity:.35;cursor:not-allowed;}.node.locked:hover{transform:scale(1);}
.char-marker{position:absolute;top:-28px;left:50%;transform:translateX(-50%);font-size:22px;animation:cb 1.5s ease-in-out infinite;z-index:11;filter:drop-shadow(0 3px 6px rgba(0,0,0,.5));}
@keyframes cb{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(-8px);}}
.node.trophy{width:72px;height:72px;font-size:32px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-color:var(--gold);}

/* ═══ MODAL ═══ */
.mo{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:12px;}.mo.open{display:flex;}
.mo-box{background:var(--card);border:1px solid var(--brd);border-radius:var(--r3);max-width:780px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--sh2);animation:su .4s;}
.mo-hdr{padding:22px 28px 16px;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--brd);}
.mo-hdr h2{font-size:20px;}
.tbdg{font-size:11px;font-weight:700;padding:4px 10px;border-radius:50px;text-transform:uppercase;letter-spacing:.5px;display:inline-block;margin-top:4px;}
.tL{background:rgba(34,211,238,.1);color:var(--ngrn);border:1px solid rgba(34,211,238,.15);}
.tI{background:rgba(168,85,247,.1);color:var(--npur);border:1px solid rgba(168,85,247,.15);}
.tC{background:rgba(251,146,60,.1);color:var(--norg);border:1px solid rgba(251,146,60,.15);}
.tG{background:rgba(244,114,182,.1);color:var(--npnk);border:1px solid rgba(244,114,182,.15);}
.mo-x{width:36px;height:36px;border-radius:50%;background:var(--bg);border:1px solid var(--brd);color:var(--txt3);font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s;}.mo-x:hover{border-color:var(--nred);color:var(--nred);}
.mo-body{padding:24px 28px;}
.rd-text{background:var(--bg2);border-radius:var(--r2);padding:24px 26px;font-size:18px;line-height:2;margin-bottom:20px;border-left:5px solid var(--neon);position:relative;letter-spacing:.2px;color:#f1f5f9;}
.rd-text::before{content:'📖';position:absolute;top:-12px;left:-12px;font-size:20px;}
.rd-src{font-size:12px;color:var(--txt3);margin-top:10px;font-style:italic;}
.q-block{background:var(--bg);border:1px solid var(--brd);border-radius:var(--r2);padding:18px 20px;margin-bottom:12px;}
.q-block h4{font-size:15px;color:var(--neon);margin-bottom:10px;font-family:'Orbitron';font-weight:600;line-height:1.4;}
.q-block .qt{font-size:9px;font-weight:700;padding:3px 7px;border-radius:50px;margin-left:6px;vertical-align:middle;}
.opts{display:flex;flex-direction:column;gap:8px;}
.opt{padding:14px 18px;border-radius:var(--r);border:1.5px solid var(--brd);background:var(--card);font-size:16px;font-weight:500;color:var(--txt);transition:all .25s;text-align:left;line-height:1.4;}
.opt:hover{border-color:var(--neon);background:var(--card2);transform:translateX(4px);}
.opt.pick{border-color:var(--npur);background:rgba(168,85,247,.08);}
.opt.ok{border-color:var(--ngrn);background:rgba(34,211,238,.08);color:var(--ngrn);}
.opt.no{border-color:var(--nred);background:rgba(239,68,68,.08);color:var(--nred);}
.fb{display:none;padding:10px 14px;border-radius:var(--r);font-weight:700;font-size:14px;margin-top:10px;text-align:center;border:1px solid;}
.fb.show{display:block;animation:fu .3s;}.fb.ok{background:rgba(34,211,238,.04);color:var(--ngrn);border-color:rgba(34,211,238,.15);}.fb.bad{background:rgba(239,68,68,.04);color:var(--nred);border-color:rgba(239,68,68,.15);}
.sub-btn{width:100%;padding:16px;border-radius:var(--r);font-family:'Orbitron';font-size:14px;font-weight:700;color:#fff;letter-spacing:1px;text-transform:uppercase;background:linear-gradient(135deg,var(--neon),var(--npur));box-shadow:0 4px 20px rgba(0,212,255,.2);transition:all .3s;margin-top:16px;}
.sub-btn:hover{transform:translateY(-2px);}.sub-btn:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none;}

/* GAME ELEMENTS */
.game-area{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r2);padding:24px;margin-bottom:16px;}
.game-area h3{font-size:16px;color:var(--npnk);margin-bottom:14px;font-family:'Orbitron';}
.game-area p{font-size:15px!important;}
.drag-item{background:var(--card);border:1.5px solid var(--brd);border-radius:var(--r);padding:14px 18px;margin-bottom:8px;font-size:16px;cursor:grab;transition:all .2s;user-select:none;line-height:1.4;}
.drag-item:hover{border-color:var(--neon);background:var(--card2);}
.drag-item.correct{border-color:var(--ngrn);background:rgba(34,211,238,.08);}
.drag-item.wrong{border-color:var(--nred);background:rgba(239,68,68,.08);}
.timer-bar{height:8px;background:var(--bg);border-radius:50px;margin-bottom:14px;overflow:hidden;}
.timer-fill{height:100%;background:linear-gradient(90deg,var(--ngrn),var(--norg),var(--nred));border-radius:50px;transition:width .5s linear;}

/* ═══ REWARD ═══ */
.rw{display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);align-items:center;justify-content:center;}.rw.show{display:flex;}
.rw-box{background:var(--card);border:1px solid var(--brd);border-radius:var(--r3);padding:40px;text-align:center;animation:su .6s;box-shadow:var(--sh2);max-width:420px;width:92%;}
.rw-box .star{font-size:64px;margin-bottom:10px;animation:spin 1s ease;}@keyframes spin{from{transform:rotate(0) scale(0);}to{transform:rotate(360deg) scale(1);}}
.rw-box h3{font-size:22px;background:linear-gradient(135deg,var(--neon),var(--npur));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;}
.rw-box .xpe{font-size:24px;font-weight:800;color:var(--gold);margin-bottom:6px;font-family:'Orbitron';}
.rw-box .nbdg{font-size:14px;color:var(--npur);font-weight:700;margin-bottom:4px;}.rw-box .msg{color:var(--txt2);font-size:15px;margin-bottom:16px;line-height:1.5;}
.rw-pwr{margin:10px 0;padding:12px;background:linear-gradient(135deg,rgba(251,191,36,.08),rgba(168,85,247,.08));border:1px solid rgba(251,191,36,.2);border-radius:var(--r2);display:none;}
.rw-pwr.show{display:block;animation:fu .5s;}
.rw-pwr .pwr-icon{font-size:36px;margin-bottom:4px;}
.rw-pwr .pwr-name{font-family:'Orbitron';font-size:13px;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:1px;}
.rw-pwr .pwr-desc{font-size:12px;color:var(--txt2);margin-top:2px;}
.rw-cl{padding:14px 32px;border-radius:var(--r);background:linear-gradient(135deg,var(--neon),var(--npur));color:#fff;font-family:'Orbitron';font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;transition:all .2s;}.rw-cl:hover{transform:scale(1.05);}

/* ═══ POWERS ═══ */
.powers-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.pwr-pill{background:linear-gradient(135deg,rgba(251,191,36,.06),rgba(168,85,247,.06));border:1px solid rgba(251,191,36,.15);border-radius:50px;padding:5px 12px;display:flex;align-items:center;gap:5px;font-weight:700;font-size:12px;color:var(--gold);animation:fu .4s;}
.pwr-pill .pi{font-size:16px;}

/* ═══ READING TIMER ═══ */
.read-timer{display:flex;align-items:center;gap:8px;padding:10px 16px;background:linear-gradient(135deg,rgba(0,212,255,.04),rgba(168,85,247,.04));border:1px solid var(--brd);border-radius:var(--r);margin-bottom:14px;}
.read-timer .rt-icon{font-size:20px;}
.read-timer .rt-clock{font-family:'Orbitron';font-size:18px;color:var(--neon);font-weight:700;letter-spacing:1px;min-width:70px;}
.read-timer .rt-label{font-size:12px;color:var(--txt3);font-weight:600;}
.read-timer .rt-wpm{font-family:'Orbitron';font-size:13px;color:var(--gold);font-weight:700;margin-left:auto;}

/* ═══ EXPORT BTN ═══ */
.export-btn{background:linear-gradient(135deg,#22D3EE,#059669);color:#fff;border:none;border-radius:var(--r);padding:12px 20px;font-family:'Orbitron';font-size:12px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px;text-transform:uppercase;}
.export-btn:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(34,211,238,.3);}

/* ═══ TTS READER ═══ */
.tts-bar{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.tts-btn{background:linear-gradient(135deg,var(--npur),var(--npnk));color:#fff;border:none;border-radius:50px;padding:8px 18px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;font-family:'Outfit';}
.tts-btn:hover{transform:scale(1.05);box-shadow:0 4px 16px rgba(168,85,247,.3);}
.tts-btn.playing{background:linear-gradient(135deg,var(--nred),var(--norg));animation:pulse 1.5s infinite;}
.tts-speed{background:var(--card);border:1px solid var(--brd);border-radius:50px;padding:4px 10px;font-size:11px;color:var(--txt2);font-weight:600;cursor:pointer;}

/* ═══ THEME TOGGLE ═══ */
.theme-toggle{background:var(--card);border:1px solid var(--brd);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:all .2s;}
.theme-toggle:hover{border-color:var(--neon);transform:scale(1.1);}
body.light-mode{--bg:#F0F2F5;--bg2:#E4E7EC;--bg3:#D5D9E2;--card:#FFFFFF;--card2:#F5F7FA;--txt:#1A1A2E;--txt2:#4A5568;--txt3:#718096;--brd:#D1D5DB;--glow:0 0 20px rgba(0,100,255,.08);--sh:0 4px 24px rgba(0,0,0,.08);--sh2:0 8px 40px rgba(0,0,0,.12);}
body.light-mode .login{background:radial-gradient(ellipse at 30% 50%,#e8e0f8,#F0F2F5 60%,#f5f5ff);}
body.light-mode .rd-text{color:#1a1a2e;}
body.light-mode .opt{color:#1a1a2e;}
body.light-mode .q-block h4{color:#2563EB;}
body.light-mode .drag-item{color:#1a1a2e;}

/* ═══ CERTIFICATE ═══ */
.cert-btn{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;border:none;border-radius:var(--r);padding:12px 20px;font-family:'Orbitron';font-size:12px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px;text-transform:uppercase;margin-top:12px;}
.cert-btn:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(251,191,36,.3);}

/* ═══ PROGRESS CHART ═══ */
.chart-box{background:var(--card);border:1px solid var(--brd);border-radius:var(--r2);padding:18px;margin-bottom:18px;}
.chart-box h4{font-size:13px;margin-bottom:12px;font-family:'Orbitron';color:var(--neon);}
.chart-bars{display:flex;align-items:flex-end;gap:4px;height:120px;padding:0 4px;}
.chart-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.chart-fill{width:100%;border-radius:4px 4px 0 0;transition:height .6s ease;min-height:2px;}
.chart-label{font-size:9px;color:var(--txt3);font-weight:600;writing-mode:vertical-rl;text-orientation:mixed;max-height:50px;overflow:hidden;}
.chart-val{font-size:9px;color:var(--txt2);font-weight:700;font-family:'Orbitron';}

/* ═══ DAILY CHALLENGE ═══ */
.daily-box{background:linear-gradient(135deg,rgba(251,191,36,.06),rgba(244,114,182,.06));border:1px solid rgba(251,191,36,.15);border-radius:var(--r2);padding:16px 20px;margin-bottom:18px;position:relative;overflow:hidden;}

/* ═══ AI FEEDBACK ═══ */
.ai-fb{margin-top:8px;padding:12px 14px;border-radius:var(--r);background:linear-gradient(135deg,rgba(168,85,247,.05),rgba(0,212,255,.05));border:1px solid rgba(168,85,247,.15);font-size:14px;color:var(--txt);line-height:1.7;display:none;animation:fu .4s;}
.ai-fb.show{display:block;}
.ai-fb .ai-label{font-size:10px;font-weight:700;color:var(--npur);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;display:flex;align-items:center;gap:4px;}
.ai-fb .ai-loading{color:var(--txt3);font-style:italic;font-size:13px;}
.ai-fb .ai-loading::after{content:'...';animation:dots 1.5s infinite;}
@keyframes dots{0%{content:'.';}33%{content:'..';}66%{content:'...';}}
.fb-exp{margin-top:6px;font-size:13px;color:var(--txt2);line-height:1.6;padding:8px 10px;background:rgba(0,0,0,.1);border-radius:6px;}
.daily-box::before{content:'';position:absolute;top:0;right:0;width:80px;height:80px;background:radial-gradient(circle,rgba(251,191,36,.1),transparent);border-radius:50%;}
.daily-box h4{font-size:14px;font-family:'Orbitron';color:var(--gold);margin-bottom:6px;}
.daily-box p{font-size:13px;color:var(--txt2);line-height:1.5;}
.daily-go{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;border:none;border-radius:50px;padding:8px 18px;font-size:12px;font-weight:700;cursor:pointer;margin-top:8px;transition:all .2s;font-family:'Outfit';}
.daily-go:hover{transform:scale(1.05);}

/* ═══ BADGES/LB/STATS ═══ */
.bg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;}
.badge{background:var(--card);border:1px solid var(--brd);border-radius:var(--r2);padding:16px 10px;text-align:center;transition:all .3s;}.badge:hover{border-color:var(--neon);}
.badge .bi{font-size:40px;display:block;margin-bottom:6px;}.badge.lk .bi{filter:grayscale(1) opacity(.2);}
.badge h4{font-size:12px;margin-bottom:3px;}.badge p{font-size:10px;color:var(--txt3);}.badge.lk h4,.badge.lk p{opacity:.3;}
.lb-card{background:var(--card);border:1px solid var(--brd);border-radius:var(--r2);overflow:hidden;max-width:500px;margin:0 auto;}
.lb-hdr{background:linear-gradient(135deg,rgba(0,212,255,.06),rgba(168,85,247,.06));padding:16px;text-align:center;border-bottom:1px solid var(--brd);}.lb-hdr h3{font-size:14px;}
.lb-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--brd);transition:background .2s;}.lb-row:last-child{border-bottom:none;}.lb-row:hover{background:var(--card2);}.lb-row.me{background:rgba(251,191,36,.04);border-left:3px solid var(--gold);}
.lb-rk{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:10px;background:var(--bg);color:var(--txt3);font-family:'Orbitron';}
.lb-row:nth-child(1) .lb-rk{background:linear-gradient(135deg,#FFD700,#FFA000);color:#000;}.lb-row:nth-child(2) .lb-rk{background:linear-gradient(135deg,#C0C0C0,#9E9E9E);color:#000;}.lb-row:nth-child(3) .lb-rk{background:linear-gradient(135deg,#CD7F32,#A1661B);color:#fff;}
.lb-nm{flex:1;font-weight:600;font-size:14px;}.lb-xp{font-weight:800;color:var(--gold);font-size:13px;font-family:'Orbitron';}
.st-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:16px;}
.st{background:var(--card);border:1px solid var(--brd);border-radius:var(--r2);padding:16px;text-align:center;}.st:hover{border-color:var(--neon);}
.st .si{font-size:28px;margin-bottom:4px;}.st .sv{font-family:'Orbitron';font-size:22px;color:var(--neon);}.st .sl{font-size:11px;color:var(--txt3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;}

/* ═══ ADMIN PANEL ═══ */
.admin-panel{animation:fu .4s;}
.admin-tabs{display:flex;gap:5px;margin-bottom:16px;flex-wrap:wrap;}
.admin-tab{padding:8px 16px;border-radius:var(--r);font-weight:700;font-size:12px;background:var(--card);color:var(--txt3);border:1px solid var(--brd);transition:all .2s;}
.admin-tab:hover{border-color:var(--neon);color:var(--txt);}
.admin-tab.on{background:linear-gradient(135deg,rgba(0,212,255,.08),rgba(168,85,247,.08));border-color:var(--neon);color:var(--neon);}
.admin-sec{display:none;}.admin-sec.on{display:block;}
.admin-card{background:var(--card);border:1px solid var(--brd);border-radius:var(--r2);padding:18px;margin-bottom:12px;}
.admin-card h3{font-size:14px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.progress-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--brd);}
.progress-row:last-child{border-bottom:none;}
.progress-row .pr-name{width:180px;font-weight:600;font-size:12px;flex-shrink:0;}
.progress-row .pr-bar{flex:1;height:12px;background:var(--bg);border-radius:50px;overflow:hidden;}
.progress-row .pr-fill{height:100%;border-radius:50px;transition:width .5s;}
.progress-row .pr-stats{display:flex;gap:8px;font-size:10px;color:var(--txt3);font-weight:600;min-width:200px;justify-content:flex-end;}
.progress-row .pr-stats span{display:flex;align-items:center;gap:3px;}
.grade-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
.gs{background:var(--card);border:1px solid var(--brd);border-radius:var(--r2);padding:16px;text-align:center;}
.gs h4{font-size:11px;color:var(--txt2);margin-bottom:6px;}.gs .gv{font-family:'Orbitron';font-size:20px;font-weight:800;margin-bottom:2px;}
.gs .gl{font-size:9px;color:var(--txt3);}
.alert-low{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.15);border-radius:var(--r2);padding:14px;margin-bottom:12px;}
.alert-low h4{font-size:12px;color:var(--nred);margin-bottom:8px;}.alert-low p{font-size:11px;color:var(--txt2);line-height:1.5;}

.conf{position:fixed;z-index:3000;pointer-events:none;animation:cd 2s ease-out forwards;}
@keyframes cd{0%{opacity:1;transform:translateY(0) rotate(0);}100%{opacity:0;transform:translateY(100vh) rotate(720deg);}}

@media(max-width:768px){

}

  {id:'6L01',zone:0,title:'La leyenda del Dorado',icon:'🏺',type:'L',theme:'soc',xp:25,text:'Los muiscas realizaban una ceremonia sagrada en la laguna de Guatavita. El nuevo cacique era cubierto con polvo de oro y navegaba en balsa hasta el centro. Arrojaba ofrendas de oro y esmeraldas al agua. Los conquistadores españoles convirtieron estas historias en la leyenda de "El Dorado", una ciudad de oro que buscaron sin encontrar. El Dorado no era un lugar, sino una persona: el cacique dorado.',source:'Historia precolombina',qs:[{q:'¿Dónde era la ceremonia?',t:'L',o:['Río Magdalena','Laguna de Guatavita','Cartagena','Amazonas'],c:1},{q:'¿Qué arrojaba al agua?',t:'L',o:['Piedras','Comida','Oro y esmeraldas','Flores'],c:2},{q:'¿Quiénes crearon la leyenda?',t:'L',o:['Los muiscas','Los incas','Los conquistadores','Los portugueses'],c:2}]},
  {id:'6L02',zone:0,title:'El sistema solar',icon:'🪐',type:'L',theme:'nat',xp:25,text:'El sistema solar tiene 8 planetas que orbitan alrededor del Sol. Los cuatro más cercanos (Mercurio, Venus, Tierra, Marte) son rocosos. Los cuatro lejanos (Júpiter, Saturno, Urano, Neptuno) son gaseosos. Júpiter es el más grande: cabrían 1.300 Tierras dentro. Plutón fue reclasificado como "planeta enano" en 2006. La Tierra es el único planeta conocido con vida.',source:'Ciencias Naturales — Astronomía',qs:[{q:'¿Cuántos planetas tiene el sistema solar?',t:'L',o:['7','8','9','10'],c:1},{q:'¿Cuál es el planeta más grande?',t:'L',o:['Saturno','Neptuno','Júpiter','Marte'],c:2},{q:'¿Cuándo reclasificaron a Plutón?',t:'L',o:['2000','2006','2010','1999'],c:1}]},
  {id:'6L03',zone:0,title:'Frida Kahlo',icon:'🎨',type:'L',theme:'art',xp:25,text:'Magdalena Carmen Frida Kahlo nació en México en 1907. A los 18 años sufrió un grave accidente de autobús que la dejó con dolor crónico toda la vida. Durante su recuperación empezó a pintar autorretratos. Frida pintó 143 obras, de las cuales 55 son autorretratos. Se casó con el muralista Diego Rivera. Su obra refleja dolor físico, identidad mexicana y feminismo. Hoy es un ícono cultural mundial.',source:'Arte y biografía',qs:[{q:'¿Dónde nació Frida?',t:'L',o:['Colombia','Argentina','México','España'],c:2},{q:'¿Cuántos autorretratos pintó?',t:'L',o:['143','55','100','200'],c:1},{q:'¿Qué evento cambió su vida?',t:'L',o:['Una guerra','Un accidente de autobús','Un incendio','Una enfermedad'],c:1}]},
  {id:'6L04',zone:0,title:'El agua en Colombia',icon:'💧',type:'L',theme:'nat',xp:25,text:'Colombia posee 6 vertientes hidrográficas. El río Magdalena, con 1.528 km, es el más importante. Según el IDEAM, el 40% del agua está contaminada. Paradójicamente, muchas comunidades rurales no tienen agua potable a pesar de estar rodeadas de ríos.',source:'Geografía — IDEAM',qs:[{q:'¿Cuántas vertientes tiene Colombia?',t:'L',o:['4','5','6','8'],c:2},{q:'¿Cuántos km tiene el Magdalena?',t:'L',o:['1.000','1.528','2.000','800'],c:1},{q:'¿Qué % del agua está contaminada?',t:'L',o:['20%','30%','40%','50%'],c:2}]},
  {id:'6L05',zone:0,title:'Los videojuegos: historia',icon:'🎮',type:'L',theme:'tec',xp:25,text:'El primer videojuego fue "Pong" (1972), un tenis de mesa digital. En 1985, Nintendo lanzó "Super Mario Bros" que vendió 40 millones de copias. En 1996, "Pokémon" revolucionó los juegos portátiles. Hoy, la industria de videojuegos genera más dinero que el cine y la música juntos: 180.000 millones de dólares anuales. Más de 3.000 millones de personas juegan videojuegos en el mundo.',source:'Tecnología e industria cultural',qs:[{q:'¿Cuál fue el primer videojuego?',t:'L',o:['Mario','Pokémon','Pong','Tetris'],c:2},{q:'¿Cuántas copias vendió Mario Bros?',t:'L',o:['10 millones','40 millones','100 millones','5 millones'],c:1},{q:'¿Cuántas personas juegan videojuegos?',t:'L',o:['1.000 millones','2.000 millones','3.000 millones','500 millones'],c:2}]},
  {id:'6L06',zone:0,title:'La fotosíntesis',icon:'🌱',type:'L',theme:'nat',xp:25,text:'Las plantas producen su propio alimento mediante la fotosíntesis. Necesitan tres ingredientes: luz solar, agua y dióxido de carbono (CO₂). Las hojas capturan la luz con una sustancia verde llamada clorofila. Como resultado, la planta produce glucosa (azúcar) para alimentarse y libera oxígeno al aire. Sin fotosíntesis, no habría oxígeno para respirar ni alimentos en la cadena alimenticia.',source:'Ciencias Naturales — Biología',qs:[{q:'¿Qué sustancia da color verde a las hojas?',t:'L',o:['Glucosa','Oxígeno','Clorofila','Agua'],c:2},{q:'¿Qué libera la planta al aire?',t:'L',o:['CO₂','Agua','Glucosa','Oxígeno'],c:3},{q:'¿Cuántos ingredientes necesita la fotosíntesis?',t:'L',o:['2','3','4','5'],c:1}]},
  {id:'6L07',zone:0,title:'Shakira: biografía',icon:'🎤',type:'L',theme:'gen',xp:25,text:'Shakira Isabel Mebarak nació en Barranquilla, Colombia, el 2 de febrero de 1977. Escribió su primera canción a los 8 años. Su álbum "Pies Descalzos" (1995) la hizo famosa en Latinoamérica. En 2010, su canción "Waka Waka" fue el himno del Mundial de Fútbol en Sudáfrica. Ha vendido más de 80 millones de discos y es la artista colombiana más exitosa de la historia.',source:'Cultura general — Biografía',qs:[{q:'¿Dónde nació Shakira?',t:'L',o:['Bogotá','Medellín','Barranquilla','Cali'],c:2},{q:'¿A qué edad escribió su primera canción?',t:'L',o:['5 años','8 años','12 años','15 años'],c:1},{q:'¿Cuántos discos ha vendido?',t:'L',o:['50 millones','80 millones','100 millones','30 millones'],c:1}]},
  {id:'6L08',zone:0,title:'Los dinosaurios',icon:'🦕',type:'L',theme:'nat',xp:25,text:'Los dinosaurios vivieron durante 165 millones de años, desde el período Triásico hasta el Cretácico. El más grande conocido es el Argentinosaurio, que medía 40 metros. El más feroz fue el Tiranosaurio Rex, con dientes de 30 cm. Se extinguieron hace 66 millones de años cuando un asteroide de 10 km de diámetro impactó en lo que hoy es Yucatán, México. Las aves actuales son descendientes directos de los dinosaurios.',source:'Paleontología',qs:[{q:'¿Cuántos millones de años vivieron los dinosaurios?',t:'L',o:['50','100','165','200'],c:2},{q:'¿Qué los extinguió?',t:'L',o:['Un volcán','Una inundación','Un asteroide','El frío'],c:2},{q:'¿De qué animales actuales descienden?',t:'L',o:['Reptiles','Mamíferos','Aves','Peces'],c:2}]},
  {id:'6L09',zone:0,title:'La Constitución de 1991',icon:'📜',type:'L',theme:'soc',xp:25,text:'La Constitución Política de Colombia fue promulgada el 4 de julio de 1991. Reemplazó a la de 1886. Fue escrita por una Asamblea Nacional Constituyente con 70 miembros, incluyendo representantes indígenas, exguerrilleros y líderes sociales. Estableció que Colombia es un Estado social de derecho. Creó la tutela como mecanismo para proteger derechos fundamentales. También reconoció la diversidad étnica y cultural del país.',source:'Cívica — Constitución colombiana',qs:[{q:'¿En qué año se promulgó?',t:'L',o:['1886','1991','2000','1975'],c:1},{q:'¿Cuántos miembros tuvo la Asamblea?',t:'L',o:['50','70','100','30'],c:1},{q:'¿Qué mecanismo creó para proteger derechos?',t:'L',o:['El voto','La tutela','El plebiscito','El decreto'],c:1}]},
  {id:'6L10',zone:0,title:'Internet: ¿cómo funciona?',icon:'🌐',type:'L',theme:'tec',xp:25,text:'Internet nació en 1969 como ARPANET, una red militar estadounidense. Tim Berners-Lee inventó la World Wide Web en 1989. Hoy, más de 5.000 millones de personas usan internet. La información viaja por cables submarinos que cruzan los océanos: hay más de 500 cables que suman 1.3 millones de kilómetros. Un mensaje de WhatsApp viaja por estos cables a la velocidad de la luz antes de llegar al celular del receptor.',source:'Tecnología',qs:[{q:'¿En qué año nació internet?',t:'L',o:['1989','1969','1999','1975'],c:1},{q:'¿Quién inventó la World Wide Web?',t:'L',o:['Steve Jobs','Bill Gates','Tim Berners-Lee','Mark Zuckerberg'],c:2},{q:'¿Cuántas personas usan internet?',t:'L',o:['3.000 millones','5.000 millones','1.000 millones','8.000 millones'],c:1}]},

  // ─── INFERENCIAL (zone 1) ───
  {id:'6I01',zone:1,title:'El Principito y la rosa',icon:'🌹',type:'I',theme:'lit',xp:40,text:'"Fue el tiempo que perdiste con tu rosa lo que la hace importante", dijo el zorro. El Principito viajó por planetas con adultos extraños: un rey sin súbditos, un vanidoso sin público. En la Tierra descubrió miles de rosas iguales a la suya. Se sintió engañado. Pero el zorro enseñó que su rosa era única por el vínculo que habían creado.',source:'Saint-Exupéry — El Principito',qs:[{q:'¿Por qué se sintió engañado?',t:'I',o:['Las rosas eran feas','Creyó que la suya no era única','No le gustaban','Eran falsas'],c:1},{q:'¿Qué hace especial a la rosa según el zorro?',t:'I',o:['Su color','Su tamaño','El tiempo y cuidado invertido','Ser la más bonita'],c:2},{q:'Los adultos de los planetas representan...',t:'I',o:['Personas normales','Vicios humanos','Amigos','Profesores'],c:1}]},
  {id:'6I02',zone:1,title:'Deforestación del Amazonas',icon:'🌳',type:'I',theme:'nat',xp:40,text:'La Amazonía colombiana ha perdido más de 2 millones de hectáreas de bosque en 20 años. Las causas: ganadería, cultivos ilícitos y minería. Cuando se tala un árbol, se destruye el hogar de cientos de especies, se libera carbono y se debilita el ciclo del agua. Los pueblos indígenas que protegen la selva durante milenios ven cómo sus territorios se reducen.',source:'Medioambiente',qs:[{q:'¿Qué consecuencia va más allá de perder madera?',t:'I',o:['Sube el precio','Se destruyen ecosistemas y se altera el clima','Se pierden empleos','Llueve más'],c:1},{q:'¿Por qué se mencionan los pueblos indígenas?',t:'I',o:['Causan deforestación','Protegen la selva y pierden territorios','Venden madera','No les importa'],c:1},{q:'¿Qué relación hay entre árboles y lluvias?',t:'I',o:['Ninguna','Los árboles participan en el ciclo del agua','Causan sequías','Las lluvias destruyen árboles'],c:1}]},
  {id:'6I03',zone:1,title:'El mito de la caverna',icon:'🕯️',type:'I',theme:'lit',xp:40,text:'Platón imaginó personas encadenadas en una caverna desde niños, mirando solo sombras en la pared. Creían que esas sombras eran la realidad. Si alguien se liberaba y salía al sol, al principio el brillo lo cegaría. Pero al acostumbrarse, vería el mundo real. Si volviera a la caverna a contarles, los demás lo tomarían por loco.',source:'Filosofía — Platón',qs:[{q:'¿Qué representan las sombras?',t:'I',o:['Fantasmas','Lo que creemos que es real pero no lo es','Dibujos','Animales'],c:1},{q:'¿Por qué los encadenados no creerían al libre?',t:'I',o:['Porque es mentiroso','Porque no conocen otra realidad','Porque están sordos','Porque no habla bien'],c:1},{q:'¿Qué representa salir de la caverna?',t:'I',o:['Viajar','Acceder al conocimiento verdadero','Hacer ejercicio','Dormir'],c:1}]},
  {id:'6I04',zone:1,title:'¿Por qué bostezamos?',icon:'🥱',type:'I',theme:'nat',xp:40,text:'Los científicos aún no saben con certeza por qué bostezamos. La teoría más aceptada dice que el bostezo enfría el cerebro: al abrir la boca, el aire fresco baja la temperatura cerebral. Curiosamente, el bostezo es contagioso: ver a alguien bostezar activa las "neuronas espejo", las mismas que nos hacen sentir empatía. Los bebés bostezan desde el útero. Incluso los perros bostezan cuando ven a sus dueños hacerlo.',source:'Neurociencia',qs:[{q:'¿Qué función tendría el bostezo según la teoría?',t:'I',o:['Dar sueño','Enfriar el cerebro','Respirar mejor','Abrir la boca'],c:1},{q:'¿Por qué el bostezo es contagioso?',t:'I',o:['Por una bacteria','Por las neuronas espejo (empatía)','Por el aire','Por aburrimiento'],c:1},{q:'¿Qué nos dicen las neuronas espejo sobre los humanos?',t:'I',o:['Que somos lentos','Que estamos conectados emocionalmente','Que dormimos mucho','Que somos iguales'],c:1}]},
  {id:'6I05',zone:1,title:'La música y las emociones',icon:'🎵',type:'I',theme:'art',xp:40,text:'Cuando escuchamos música que nos gusta, el cerebro libera dopamina, la misma sustancia que se libera al comer chocolate o recibir un abrazo. Una canción triste puede hacernos llorar aunque nuestra vida esté bien. La música activa simultáneamente más partes del cerebro que cualquier otra actividad humana. Por eso se usa en terapias con pacientes de Alzheimer: aunque olviden sus nombres, recuerdan canciones de su juventud.',source:'Neurociencia y arte',qs:[{q:'¿Por qué la música nos hace sentir bien?',t:'I',o:['Por el volumen','Porque libera dopamina en el cerebro','Por las letras','Por el ritmo'],c:1},{q:'¿Qué revela el uso de música con Alzheimer?',t:'I',o:['Que la música es medicina','Que la memoria musical es más resistente que otros tipos','Que el Alzheimer es leve','Que la música cura todo'],c:1},{q:'¿Por qué una canción triste nos hace llorar?',t:'I',o:['Porque somos débiles','Porque la música activa emociones profundas en el cerebro','Por las letras solamente','Porque estamos tristes'],c:1}]},
  {id:'6I06',zone:1,title:'El efecto mariposa',icon:'🦋',type:'I',theme:'nat',xp:40,text:'En 1961, el meteorólogo Edward Lorenz descubrió algo sorprendente: cambiar un número mínimo en un modelo climático generaba resultados completamente diferentes. Lo llamó "efecto mariposa": teóricamente, el aleteo de una mariposa en Brasil podría causar un tornado en Texas semanas después. Esto no significa que las mariposas causen tornados, sino que los sistemas complejos son extremadamente sensibles a pequeños cambios iniciales.',source:'Ciencia — Teoría del caos',qs:[{q:'¿Qué descubrió Lorenz?',t:'I',o:['Que las mariposas vuelan lejos','Que pequeños cambios generan grandes consecuencias','Que el clima es fácil de predecir','Que los tornados son frecuentes'],c:1},{q:'¿Qué significa realmente "efecto mariposa"?',t:'I',o:['Que las mariposas son peligrosas','Que en sistemas complejos, pequeñas causas tienen grandes efectos','Que Brasil tiene muchas mariposas','Que los tornados son impredecibles'],c:1},{q:'¿Cómo aplica esto a la vida diaria?',t:'I',o:['No aplica','Pequeñas decisiones pueden tener consecuencias grandes e impredecibles','Solo aplica al clima','Solo a las mariposas'],c:1}]},
  {id:'6I07',zone:1,title:'Los colores y el marketing',icon:'🎨',type:'I',theme:'tec',xp:40,text:'Las empresas eligen sus colores cuidadosamente. El rojo (Coca-Cola, YouTube) genera urgencia y hambre. El azul (Facebook, Samsung) transmite confianza. El amarillo (McDonald\'s) evoca felicidad. El verde (Starbucks) sugiere naturaleza. Los supermercados pintan las ofertas en rojo porque el cerebro lo asocia con "actúa rápido". Un estudio reveló que el 85% de los consumidores dice que el color es la razón principal para elegir un producto.',source:'Marketing y psicología',qs:[{q:'¿Por qué las ofertas suelen ser en rojo?',t:'I',o:['Es bonito','Porque el cerebro lo asocia con urgencia','Es más barato','Tradición'],c:1},{q:'¿Qué revela el dato del 85%?',t:'I',o:['Que la gente no lee','Que somos más influenciados por lo visual de lo que creemos','Que los colores no importan','Que el 15% es ciego'],c:1},{q:'¿Por qué las empresas de tecnología usan azul?',t:'I',o:['Es su color favorito','Porque transmite confianza y seriedad','Porque es barato','Por casualidad'],c:1}]},
  {id:'6I08',zone:1,title:'El Hombre Araña: ¿héroe o vigilante?',icon:'🕷️',type:'I',theme:'lit',xp:40,text:'"Un gran poder conlleva una gran responsabilidad." Peter Parker es un adolescente común que obtiene poderes extraordinarios. Decide usarlos para proteger a otros después de que su inacción causó la muerte de su tío Ben. Pero Spider-Man opera fuera de la ley: no tiene autorización oficial, destruye propiedad y decide por sí solo quién es el villano. ¿Es un héroe porque salva vidas, o un problema porque actúa sin control?',source:'Narrativa — Ética en ficción',qs:[{q:'¿Por qué Peter Parker decide ser héroe?',t:'I',o:['Por fama','Porque su inacción tuvo consecuencias fatales','Por dinero','Por diversión'],c:1},{q:'¿Cuál es el dilema ético que plantea el texto?',t:'I',o:['Si los poderes son reales','Si actuar fuera de la ley está bien cuando el fin es bueno','Si los villanos existen','Si las arañas son peligrosas'],c:1},{q:'¿Qué significa "un gran poder conlleva una gran responsabilidad"?',t:'I',o:['Que los poderosos son responsables','Que cuanta más capacidad tienes, mayor es tu deber de usarla bien','Que el poder corrompe','Que los héroes son fuertes'],c:1}]},
  {id:'6I09',zone:1,title:'¿Los animales sienten?',icon:'🐾',type:'I',theme:'nat',xp:40,text:'En 2012, un grupo de neurocientíficos firmó la "Declaración de Cambridge sobre la Conciencia", afirmando que muchos animales tienen experiencias conscientes. Los elefantes lloran a sus muertos, los cuervos fabrican herramientas, los pulpos resuelven laberintos. Si los animales sienten dolor, alegría y miedo como nosotros, ¿es ético encerrarlos en zoológicos "para educar", o cazarlos "por tradición"?',source:'Ética y ciencias naturales',qs:[{q:'¿Qué afirmó la Declaración de Cambridge?',t:'I',o:['Que los animales no sienten','Que muchos animales tienen experiencias conscientes','Que solo los humanos piensan','Que los zoológicos son buenos'],c:1},{q:'¿Qué implica que los elefantes lloren a sus muertos?',t:'I',o:['Nada','Que tienen emociones complejas similares al duelo humano','Que están enfermos','Que son débiles'],c:1},{q:'¿Cuál es la pregunta ética central?',t:'I',o:['Si los animales son bonitos','Si tenemos derecho a tratar como objetos a seres que sienten','Si los zoológicos son divertidos','Si los cuervos son inteligentes'],c:1}]},
  {id:'6I10',zone:1,title:'Las fake news',icon:'📰',type:'I',theme:'tec',xp:40,text:'Un estudio del MIT reveló que las noticias falsas se propagan 6 veces más rápido que las verdaderas en redes sociales. ¿Por qué? Porque las fake news apelan a emociones fuertes: miedo, indignación, sorpresa. Nuestro cerebro reacciona primero emocionalmente y después racionalmente. Cuando algo nos enfurece, lo compartimos antes de verificar si es cierto. Los algoritmos de redes sociales amplifican lo que genera más reacciones, sin importar si es verdad.',source:'Medios y pensamiento crítico',qs:[{q:'¿Por qué las noticias falsas se propagan más rápido?',t:'I',o:['Porque son más cortas','Porque activan emociones fuertes antes que la razón','Porque son gratuitas','Porque internet es rápido'],c:1},{q:'¿Qué papel juegan los algoritmos?',t:'I',o:['Verifican la verdad','Amplifican lo que genera más reacciones, sin importar si es verdad','Bloquean las fake news','No hacen nada'],c:1},{q:'¿Cuál sería la mejor defensa contra las fake news?',t:'I',o:['No usar internet','Detenerse a verificar antes de reaccionar emocionalmente','Creer todo','Solo leer títulos'],c:1}]},

  // ─── CRÍTICO (zone 2) ───
  {id:'6C01',zone:2,title:'¿Quién escribe la historia?',icon:'📜',type:'C',theme:'soc',xp:60,text:'Durante siglos, la historia de América se contó desde la perspectiva europea. Colón fue presentado como "descubridor" heroico. Pero, ¿se puede "descubrir" un continente donde vivían millones de personas con culturas propias? Los pueblos originarios tenían astronomía, medicina y gobierno. Quizás no fueron "descubiertos", sino invadidos.',source:'Pensamiento crítico histórico',qs:[{q:'¿Por qué el autor cuestiona "descubrimiento"?',t:'C',o:['Colón no llegó primero','Ya existían civilizaciones completas','Es palabra difícil','Los vikingos llegaron antes'],c:1},{q:'¿Cuál es el argumento principal?',t:'C',o:['Colón fue héroe','La historia se ha contado desde un solo punto de vista','Los indígenas no tenían cultura','Europa era mejor'],c:1},{q:'Si defiendes esta postura, ¿qué dirías?',t:'C',o:['La historia debe contarse desde todas las perspectivas','Solo importa la versión de los ganadores','No vale estudiar historia','El pasado no importa'],c:0}]},
  {id:'6C02',zone:2,title:'Redes sociales: ¿conexión o aislamiento?',icon:'📱',type:'C',theme:'tec',xp:60,text:'78% de adolescentes colombianos pasa más de 4 horas en redes, pero 62% se siente solo frecuentemente. Las plataformas generan adicción: likes como validación, algoritmos de emociones fuertes. Compararse con vidas "perfectas" causa ansiedad. Sin embargo, otros argumentan que las redes conectan personas lejanas y crean comunidades de apoyo.',source:'Medios y sociedad',qs:[{q:'¿Cuál es la contradicción principal?',t:'C',o:['Las redes son gratis','Estar más conectados digitalmente puede generar más soledad real','Los adultos no usan redes','Son divertidas'],c:1},{q:'¿Qué postura presenta el texto?',t:'C',o:['Las redes son totalmente malas','Son perfectas','Presenta ambos lados del debate','Deberían prohibirse'],c:2},{q:'¿Cuál sería TU argumento?',t:'C',o:['Las redes son malas siempre','Depende del uso consciente de cada persona','No me importa','Solo adultos deberían usarlas'],c:1}]},
  {id:'6C03',zone:2,title:'Uniforme escolar: ¿sí o no?',icon:'👔',type:'C',theme:'gen',xp:60,text:'Los defensores del uniforme argumentan: reduce la desigualdad visible (nadie se compara por ropa), crea sentido de pertenencia y elimina la distracción de "qué ponerme". Los opositores dicen: limita la expresión personal, no elimina realmente la desigualdad (zapatos, mochilas siguen siendo diferentes) y enseña obediencia en lugar de identidad. En Finlandia, el país con mejor educación del mundo, no hay uniformes.',source:'Debate educativo',qs:[{q:'¿Cuál es el argumento más fuerte A FAVOR del uniforme?',t:'C',o:['Es bonito','Reduce la desigualdad visible entre estudiantes','Es barato','Los profesores lo prefieren'],c:1},{q:'¿Cuál es el argumento más fuerte EN CONTRA?',t:'C',o:['Es feo','No elimina la desigualdad real y limita la expresión','Es caro','Nadie lo quiere'],c:1},{q:'¿El ejemplo de Finlandia prueba que el uniforme es malo?',t:'C',o:['Sí, totalmente','No necesariamente: la calidad educativa depende de muchos factores','Sí, hay que copiar a Finlandia','No importa'],c:1}]},
  {id:'6C04',zone:2,title:'¿Los zoológicos son éticos?',icon:'🦁',type:'C',theme:'nat',xp:60,text:'Los zoológicos argumentan que educan al público, protegen especies en peligro y financian investigación. Los críticos responden: los animales sufren estrés en cautiverio, los recintos nunca replican su hábitat natural, y la "educación" se puede lograr con documentales. Un oso polar en un zoológico tropical recorre obsesivamente el mismo camino (estereotipia), señal de sufrimiento psicológico. Pero sin zoológicos, el rinoceronte blanco del norte ya estaría extinto.',source:'Ética ambiental',qs:[{q:'¿Cuál es el dilema central?',t:'C',o:['Si los zoológicos son divertidos','Si es ético privar de libertad a animales para protegerlos y educar','Si los animales son bonitos','Si los zoológicos son caros'],c:1},{q:'¿Qué es la "estereotipia" y qué indica?',t:'C',o:['Un tipo de animal','Un comportamiento repetitivo que indica sufrimiento psicológico','Un nombre científico','Una enfermedad'],c:1},{q:'¿Cuál sería una postura equilibrada?',t:'C',o:['Cerrar todos los zoológicos','Transformarlos en santuarios con condiciones dignas, enfocados en conservación','Abrir más zoológicos','No importa'],c:1}]},
  {id:'6C05',zone:2,title:'Trabajo infantil',icon:'👷',type:'C',theme:'soc',xp:60,text:'En Colombia, más de 1 millón de niños trabajan. Muchos lo hacen para ayudar a sus familias a sobrevivir. La ley prohíbe el trabajo infantil, pero la pobreza obliga a muchas familias a depender de esos ingresos. Algunos argumentan que el trabajo "forma carácter". Pero los datos muestran que los niños que trabajan tienen 40% más probabilidades de abandonar la escuela, perpetuando el ciclo de pobreza.',source:'Sociología — Derechos de la infancia',qs:[{q:'¿Por qué prohibir el trabajo infantil no es suficiente?',t:'C',o:['Porque a los niños les gusta','Porque la pobreza obliga a las familias a depender de esos ingresos','Porque la ley no funciona','Porque los niños son fuertes'],c:1},{q:'¿Qué demuestra el dato del 40%?',t:'C',o:['Que trabajar es bueno','Que el trabajo infantil perpetúa la pobreza al quitar educación','Que la escuela es aburrida','Que los niños no quieren estudiar'],c:1},{q:'¿Cuál sería la solución más efectiva?',t:'C',o:['Castigar a las familias','Atacar la pobreza para que las familias no necesiten que los niños trabajen','Permitir el trabajo','Ignorar el problema'],c:1}]},
  {id:'6C06',zone:2,title:'¿Es justo el fútbol femenino?',icon:'⚽',type:'C',theme:'gen',xp:60,text:'En 2023, un futbolista hombre del top mundial gana aproximadamente 100 veces más que una futbolista mujer del mismo nivel. Los estadios para partidos masculinos se llenan; los femeninos apenas al 30%. Los que defienden la diferencia argumentan que "el fútbol masculino genera más dinero". Los críticos responden: genera más dinero porque históricamente recibió TODA la inversión, publicidad y atención. Si se hubiera invertido igual en el femenino, ¿los resultados serían diferentes?',source:'Igualdad de género — Deporte',qs:[{q:'¿Cuál es el argumento de quienes defienden la brecha salarial?',t:'C',o:['Que los hombres son mejores','Que el fútbol masculino genera más dinero','Que las mujeres no juegan bien','Que es tradición'],c:1},{q:'¿Cómo responden los críticos?',t:'C',o:['No responden','Que la diferencia de ingresos es resultado de décadas de inversión desigual','Que no importa el dinero','Que el fútbol no es importante'],c:1},{q:'¿Cuál es tu postura argumentada?',t:'C',o:['Los hombres merecen más','La igualdad requiere invertir equitativamente para comparar resultados reales','El fútbol no importa','No tengo opinión'],c:1}]},
  {id:'6C07',zone:2,title:'Comida chatarra en colegios',icon:'🍔',type:'C',theme:'nat',xp:60,text:'El 30% de los niños colombianos tiene sobrepeso. Las tiendas escolares venden papas, gaseosas y dulces porque generan ganancias. Prohibirlas podría mejorar la salud pero limita la libertad de elección. Chile implementó la "Ley de Etiquetado" que pone sellos negros en alimentos no saludables y prohíbe su venta en colegios. La obesidad infantil bajó 25% en 5 años. Pero los vendedores perdieron ingresos.',source:'Salud pública vs. libertad',qs:[{q:'¿Por qué las tiendas venden comida chatarra?',t:'C',o:['Porque es rica','Porque genera más ganancias que la comida saludable','Porque no hay otra opción','Porque los niños la piden'],c:1},{q:'¿Qué demuestra el ejemplo de Chile?',t:'C',o:['Que las leyes no sirven','Que las regulaciones pueden mejorar la salud pública significativamente','Que Chile es mejor','Que prohibir es malo'],c:1},{q:'¿Cuál es el dilema ético?',t:'C',o:['Si la comida es rica','Si la salud pública justifica limitar la libertad de elección','Si los vendedores son malos','Si los niños saben elegir'],c:1}]},
  {id:'6C08',zone:2,title:'Inteligencia artificial: ¿amiga o enemiga?',icon:'🤖',type:'C',theme:'tec',xp:60,text:'La IA puede diagnosticar enfermedades mejor que algunos médicos, escribir textos y crear arte. Pero también puede reemplazar empleos: un estudio estima que el 40% de los trabajos actuales podrían ser automatizados en 20 años. Los optimistas dicen que la IA creará nuevos empleos. Los pesimistas advierten que esos nuevos empleos requerirán educación que no todos pueden pagar. ¿Quién se beneficia cuando la tecnología avanza pero la desigualdad permanece?',source:'Tecnología y sociedad',qs:[{q:'¿Cuál es el riesgo principal que señala el texto?',t:'C',o:['Que la IA es cara','Que los beneficios de la IA pueden concentrarse en quienes ya tienen ventajas','Que la IA no funciona','Que los robots son peligrosos'],c:1},{q:'¿Por qué el argumento de "creará nuevos empleos" es insuficiente?',t:'C',o:['Porque es falso','Porque esos empleos requieren formación que no todos pueden costear','Porque nadie quiere trabajar','Porque la IA es mala'],c:1},{q:'¿Cuál sería tu postura?',t:'C',o:['Prohibir la IA','El avance tecnológico debe acompañarse de políticas que reduzcan la desigualdad','Ignorar el problema','Solo beneficia a los ricos'],c:1}]},
  {id:'6C09',zone:2,title:'El reggaetón: ¿arte o problema?',icon:'🎶',type:'C',theme:'art',xp:60,text:'El reggaetón es el género musical más escuchado en Latinoamérica. Sus defensores dicen que es expresión cultural legítima de barrios populares, que da voz a comunidades marginadas y que ha llevado el español al mundo. Sus críticos señalan que muchas letras cosifican a la mujer, normalizan la violencia y promueven el consumismo. ¿Puede un género musical ser culturalmente valioso y éticamente problemático al mismo tiempo?',source:'Cultura y crítica social',qs:[{q:'¿Cuál es la tesis central del texto?',t:'C',o:['Que el reggaetón es malo','Que algo puede tener valor cultural y problemas éticos simultáneamente','Que toda música es buena','Que no importa la letra'],c:1},{q:'¿Es válido criticar un género musical? ¿Por qué?',t:'C',o:['No, la música es libre','Sí, porque la música influye en valores y comportamientos sociales','No, es solo entretenimiento','Sí, porque suena mal'],c:1},{q:'¿Cuál es la postura más madura?',t:'C',o:['Disfrutarlo sin pensar','Disfrutar la música pero ser consciente y crítico de los mensajes que transmite','Prohibirlo','Escuchar solo clásica'],c:1}]},
  {id:'6C10',zone:2,title:'¿Deberían los niños tener celular?',icon:'📱',type:'C',theme:'gen',xp:60,text:'En España se debate prohibir celulares a menores de 16 años. A favor: proteger de ciberacoso, adicción a pantallas, contenido inapropiado y pérdida de atención. En contra: el celular es herramienta educativa, permite comunicación familiar y prepara para el mundo digital. Los neurocientíficos advierten que el cerebro adolescente es especialmente vulnerable a la dopamina de las notificaciones. Pero también señalan que prohibir sin enseñar crea adultos sin criterio digital.',source:'Debate social — Tecnología y educación',qs:[{q:'¿Cuál es el riesgo neurológico específico?',t:'C',o:['Que el celular pesa','Que el cerebro adolescente es vulnerable a la adicción por dopamina','Que se dañan los ojos','Que olvidan estudiar'],c:1},{q:'¿Por qué "prohibir sin enseñar" es problemático?',t:'C',o:['Porque es aburrido','Porque no forma criterio para cuando sí tengan acceso','Porque los niños se enojan','Porque es imposible'],c:1},{q:'¿Cuál sería la solución más efectiva?',t:'C',o:['Prohibir totalmente','Educación digital progresiva con acompañamiento adulto','Dar celular sin límites','No hacer nada'],c:1}]},

  {id:'6G01',zone:0,title:'🧩 Ordena la historia',icon:'🧩',type:'G',theme:'lit',xp:35,game:'order',instruction:'Lee estos eventos de la leyenda del Dorado y ordénalos cronológicamente. Toca un elemento para subirlo.',items:['Los muiscas preparan una ceremonia sagrada en Guatavita','El nuevo cacique es cubierto con polvo de oro','Navega en balsa hasta el centro de la laguna','Arroja ofrendas de oro y esmeraldas al agua','Los conquistadores españoles escuchan las historias','Buscan una ciudad de oro sin encontrarla']},
